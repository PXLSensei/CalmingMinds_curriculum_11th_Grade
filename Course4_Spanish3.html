rticiple of vivir). 'Alguna vez' = ever, naturally paired with present perfect for life experiences."}, {"t": "mc", "q": "'Cuando llegamos al festival, la banda ya ___ su presentación.' (comenzar — pluperfect)", "o": ["comenzó", "había comenzado", "ha comenzado", "comienza"], "a": 1, "e": "'Había comenzado' — pluperfect. The band's start happened BEFORE the group arrived. 'Ya' reinforces that the action was already completed. Pluperfect = earlier action; preterite ('llegamos') = later action."}, {"t": "mc", "q": "'Voy a estudiar mucho ___ que puedas ayudarme en el examen.' (para que / so that you)", "o": ["para", "para que / puedas", "a menos que / puedas", "cuando / puedas"], "a": 1, "e": "'Para que puedas' — 'para que' ALWAYS takes subjunctive. 'Para que puedas ayudarme' = so that you can help me. The purpose expressed requires subjunctive."}, {"t": "sa", "q": "En español: Write a paragraph of 8–10 sentences about a historical or social issue that matters to you. Use ALL: 1 present perfect (recent relevance), 1 pluperfect (what had already happened), 1 imperfect subjunctive (past desire, fear, or recommendation), 1 adverbial clause with subjunctive (para que/antes de que/cuando-future), and 1 reported speech construction. Underline and label each."}]}]}, {"title": "Unit 5: El Mundo Profesional", "weeks": "Semanas 12–14", "lessons": [{"day": "Sem. 12, Día 1", "title": "El lenguaje formal y profesional", "obj": ["Distinguish formal from informal register in Spanish", "Use formal vocabulary and structures in professional contexts", "Write a formal email or letter in Spanish"], "read": "<p>Spanish 3 introduces you to <strong>formal register</strong> — the language of professional settings, academic writing, and official communication. The shift from informal to formal Spanish is significant and essential for real-world competency.</p><div class='gbox'><h5>Registro formal vs. informal — key differences</h5><p><strong>Informal:</strong> tú · oye · mucho (a lot) · cosa · un montón de · ¿Qué tal?</p><p><strong>Formal:</strong> usted · disculpe / permítame · considerablemente · aspecto/elemento · una gran cantidad de · Buenos días, ¿cómo está usted?</p><p><strong>Verbs:</strong> quiero → quisiera / me gustaría · necesito → necesitaría · hay que → es necesario / se requiere</p></div><div class='gbox'><h5>Vocabulario profesional y de trabajo</h5><p>el puesto (position/job) · el cargo (role/title) · la empresa (company) · el currículum vítae (CV/resume) · la entrevista de trabajo · el/la solicitante (applicant) · la carta de presentación (cover letter) · los requisitos (requirements) · la experiencia laboral · las habilidades (skills) · el salario · los beneficios · el plazo (deadline) · adjuntar (to attach) · solicitar (to apply for)</p></div><div class='gbox'><h5>Formal email structure in Spanish</h5><p><strong>Saludo:</strong> Estimado/a señor/a [apellido]: · A quien corresponda: · De mi mayor consideración:</p><p><strong>Introducción:</strong> Me dirijo a usted con el fin de... · Por medio de la presente... · En respuesta a su anuncio...</p><p><strong>Cuerpo:</strong> Con respecto a... · En cuanto a... · Le informo que... · Adjunto encontrará...</p><p><strong>Cierre:</strong> Quedo a su disposición para cualquier consulta. · En espera de su respuesta, se despide atentamente, · Reciba un cordial saludo,</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> Professional communication norms in Spanish-speaking countries tend to be more formal than in the US. Cold emails typically include a full formal greeting ('Estimado señor García:'). Meetings often begin with personal small talk before business. Business cards are exchanged with both hands or with the right hand. Using first names immediately — common in US workplaces — can seem presumptuous in some Latin American and Spanish business contexts.</div>", "act": {"t": "Formal email writing", "d": "Write a formal email of 8–10 sentences in Spanish for ONE of these situations: (1) Apply for an internship at a Spanish-language media company, (2) Request information about a university program in a Spanish-speaking country, OR (3) Write a professional follow-up after a job interview. Requirements: proper formal salutation, at least 3 formal vocabulary words, 1 conditional (quisiera / me gustaría / sería posible que...), proper formal closing. Avoid informal language throughout."}, "qs": [{"t": "mc", "q": "Which salutation is appropriate for a formal email to an unknown recipient?", "o": ["¡Hola!", "Oye", "", "Estimado/a señor/a:", "¿Qué tal?"], "a": 2, "e": "'Estimado/a señor/a:' — the correct formal salutation for an unknown recipient. In formal Spanish correspondence, you always use 'Estimado/a' (Esteemed/Dear) + title + surname, or 'A quien corresponda' (To whom it may concern) for unknown recipients."}, {"t": "mc", "q": "'Quisiera ___ más información sobre el programa.' — what does 'quisiera' show?", "o": ["A command form of querer", "A formal", " polite alternative to 'quiero' using the imperfect subjunctive (I would like)", "A past tense form", "A future form"], "a": 1, "e": "'Quisiera' = I would like — the imperfect subjunctive of querer used as a polite form in formal register. 'Quisiera solicitar información' is significantly more professional than 'Quiero información.' This is one of the most important formal register structures."}, {"t": "mc", "q": "'Adjunto ___ mi currículum vítae para su consideración.' (encontrará)", "o": ["encontrarás", "encontrará", "encontraría", "encuentras"], "a": 1, "e": "'Encontrará' — formal usted form. In formal writing, you always use 'usted' and its conjugations. 'Adjunto encontrará mi CV' = 'Attached you will find my CV.' This is a standard phrase in professional Spanish correspondence."}, {"t": "sa", "q": "En español: Write the opening 3 sentences of a formal email applying for a job or internship. Include: (1) formal salutation, (2) one sentence introducing why you are writing using 'Me dirijo a usted con el fin de...' or 'Por medio de la presente...', (3) one sentence about your background using formal vocabulary."}]}, {"day": "Sem. 12, Día 2", "title": "Por vs. para — mastering the distinction", "obj": ["Master all uses of por and para", "Apply the distinction in complex sentences", "Avoid common errors at Spanish 3 level"], "read": "<p>Por and para are two of the most frequently confused prepositions in Spanish. At Spanish 3, you need to use them automatically and correctly in complex sentences.</p><div class='gbox'><h5>PARA — purpose, destination, recipient, deadline</h5><p>1. <strong>Purpose/goal:</strong> <span class='ex'>Estudio para <strong>aprender</strong>. (I study in order to learn.)</span></p><p>2. <strong>Recipient:</strong> <span class='ex'>Este regalo es <strong>para ti</strong>. (This gift is for you.)</span></p><p>3. <strong>Destination:</strong> <span class='ex'>Salgo <strong>para Madrid</strong> mañana. (I'm leaving for Madrid.)</span></p><p>4. <strong>Deadline:</strong> <span class='ex'>Necesito el informe <strong>para el viernes</strong>. (I need the report by Friday.)</span></p><p>5. <strong>Opinion/perspective:</strong> <span class='ex'><strong>Para mí</strong>, es muy importante. (For me / In my opinion...)</span></p><p>6. <strong>Comparison (unexpected):</strong> <span class='ex'>Habla muy bien <strong>para ser</strong> principiante. (She speaks very well for a beginner.)</span></p></div><div class='gbox'><h5>POR — cause, exchange, duration, agent, movement through</h5><p>1. <strong>Cause/reason:</strong> <span class='ex'>Lo hice <strong>por amor</strong>. (I did it out of/because of love.)</span></p><p>2. <strong>Exchange:</strong> <span class='ex'>Pagué cien dólares <strong>por</strong> el libro. (I paid $100 for the book.)</span></p><p>3. <strong>Duration:</strong> <span class='ex'>Estudié <strong>por tres horas</strong>. (I studied for three hours.)</span></p><p>4. <strong>On behalf of/in favor of:</strong> <span class='ex'>Voté <strong>por</strong> ese candidato. (I voted for that candidate.)</span></p><p>5. <strong>Agent (passive voice):</strong> <span class='ex'>El libro fue escrito <strong>por</strong> Neruda.</span></p><p>6. <strong>Movement through/along:</strong> <span class='ex'>Caminé <strong>por</strong> el parque. (I walked through the park.)</span></p><p>7. <strong>Per/rate:</strong> <span class='ex'>Gana veinte dólares <strong>por hora</strong>. (She earns $20 per hour.)</span></p></div>", "tip": "<div class='cbox'><strong>Truco mnemónico:</strong> Think of PARA as forward-looking (purpose, destination, deadline, recipient — all point toward a goal or endpoint). Think of POR as backward-looking or circumstantial (cause, reason, exchange, duration — explaining the context or circumstances around an action). When in doubt, ask: Is this about PURPOSE (para) or CAUSE/CIRCUMSTANCE (por)?</div>", "act": {"t": "Por vs. para in professional context", "d": "Write 10 sentences using por and para correctly — 5 with each. Connect them to the professional/work theme of Unit 5: talk about career goals, job applications, reasons for studying Spanish, professional exchanges, deadlines, etc. After each sentence, write in parentheses which use of por/para applies (purpose, cause, deadline, exchange, etc.)."}, "qs": [{"t": "mc", "q": "'Trabajo muy duro ___ conseguir mis metas profesionales.' (in order to)", "o": ["por", "para", "de", "en"], "a": 1, "e": "'Para' — purpose/goal. 'Trabajo duro para conseguir mis metas' = I work hard in order to achieve my goals. PARA is used when the subsequent action is the PURPOSE of the first action."}, {"t": "mc", "q": "'Le agradezco ___ su tiempo y consideración.' (for — cause/reason of gratitude)", "o": ["para", "en", "por", "de"], "a": 2, "e": "'Por' — cause/reason. 'Le agradezco por su tiempo' = I thank you for (because of) your time. Gratitude is expressed with 'por' because the time/consideration is the CAUSE of the gratitude. 'Gracias por...' is one of the most common uses of por."}, {"t": "mc", "q": "'El informe debe estar listo ___ el próximo lunes.' (by — deadline)", "o": ["por", "para", "en", "a"], "a": 1, "e": "'Para' — deadline. 'Para el próximo lunes' = by next Monday. Deadlines always use PARA. 'El informe debe estar listo PARA el lunes' = The report must be ready BY Monday."}, {"t": "sa", "q": "En español: Write 2 sentences using PARA and 2 sentences using POR, all about your goals for learning Spanish or your future career. Label which use of each preposition you are using (purpose, cause, deadline, duration, etc.)."}]}, {"day": "Sem. 12, Día 3", "title": "El mundo laboral — careers, skills, and professional life", "obj": ["Build vocabulary for careers and the professional world", "Discuss career goals and professional skills in Spanish", "Use formal language structures in conversation about work"], "read": "<p>Discussing careers and professional life is a key Spanish 3 topic. This vocabulary also appears extensively in NC World Language assessments.</p><div class='gbox'><h5>Vocabulario: carreras y profesiones</h5><p>el/la médico/a · el/la abogado/a (lawyer) · el/la ingeniero/a · el/la maestro/a · el/la periodista (journalist) · el/la diseñador/a (designer) · el/la programador/a · el/la empresario/a (entrepreneur) · el/la trabajador/a social (social worker) · el/la científico/a · el/la arquitecto/a · el/la traductor/a (translator)</p></div><div class='gbox'><h5>Vocabulario: habilidades profesionales</h5><p>el liderazgo (leadership) · la comunicación efectiva · el trabajo en equipo (teamwork) · la resolución de problemas (problem-solving) · la creatividad · la adaptabilidad · el pensamiento crítico · la gestión del tiempo (time management) · la iniciativa · las habilidades digitales · ser bilingüe (to be bilingual) · dominar el inglés/español (to master English/Spanish)</p></div><div class='gbox'><h5>Expresiones para hablar de trabajo</h5><p>tener experiencia en... · especializarse en... · dedicarse a... · ascender (to get promoted) · emprender (to start a business) · trabajar de manera independiente · colaborar con... · aportar (to contribute) · impactar positivamente · el campo laboral (the job market)</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> Bilingualism is increasingly valued in the US job market — and globally. Spanish-English bilinguals earn on average 5–20% more than monolingual workers in fields like healthcare, law, education, social work, and business. In Latin America, English proficiency is highly sought after. Your Spanish 3 skills are not just academic — they are a professional asset that will serve you for decades.</div>", "act": {"t": "Career goals presentation", "d": "Write a paragraph of 8–10 sentences describing your professional goals and why you think Spanish will be important for your career. Structure: (1) What career field interests you and why? (2) What skills do you have or want to develop? (3) How will Spanish specifically help you in that field? (4) What would you do if you could work anywhere in the world? (si clause + conditional). Use at least 5 professional vocabulary words and formal register throughout."}, "qs": [{"t": "mc", "q": "'Mi meta profesional es ___ en el campo de la medicina.' (to specialize)", "o": ["trabajar", "especializarme", "dedicarme", "ascender"], "a": 1, "e": "'Especializarme' — reflexive: especializarse en = to specialize in. 'Mi meta es especializarme en pediatría' = My goal is to specialize in pediatrics. This is the correct verb for academic/professional specialization."}, {"t": "mc", "q": "'Ser bilingüe es una ventaja enorme ___ el campo laboral.' (in the professional world context — in the field)", "o": ["por", "de", "para", "en"], "a": 3, "e": "'En el campo laboral' = in the job market / in the professional field. 'En' is used for location within a field or context. 'Para el campo laboral' would mean 'for the benefit of' the job market — different meaning."}, {"t": "mc", "q": "'Los estudios demuestran que los trabajadores bilingües ___ más oportunidades laborales.' (tener — present subjunctive context: that they have)", "o": ["tienen", "tengan", "tuvieran", "tendrán"], "a": 0, "e": "'Tienen' — indicative. 'Los estudios demuestran que + indicative' because 'demostrar que' expresses certainty/established fact, which takes the indicative. Compare: 'Los estudios recomiendan que' → subjunctive."}, {"t": "sa", "q": "En español: Write 4–5 sentences about one professional skill you want to develop and how it will help you in your future career. Use at least 2 professional vocabulary words and 1 conditional construction (me gustaría / quisiera / podría...)."}]}, {"day": "Sem. 12, Día 4", "title": "La voz pasiva — passive voice in Spanish", "obj": ["Understand and form the passive voice in Spanish", "Use ser + past participle for true passive", "Use se + verb for impersonal/passive constructions"], "read": "<p>The passive voice appears frequently in formal writing, academic texts, news, and professional Spanish. There are two main ways to express passive meaning in Spanish.</p><div class='gbox'><h5>True passive: ser + past participle (+ por + agent)</h5><p>The past participle agrees in gender and number with the subject.</p><p class='ex'>El libro fue escrito <strong>por</strong> García Márquez. (The book was written by García Márquez.)</p><p class='ex'>Las leyes fueron aprobadas <strong>por</strong> el parlamento. (The laws were approved by parliament.)</p><p class='ex'>El proyecto será presentado mañana. (The project will be presented tomorrow.)</p><p>Used when the agent (who did it) is stated or important.</p></div><div class='gbox'><h5>Passive se (se + verb) — more common in everyday Spanish</h5><p>Much more common in spoken and written Spanish than the true passive:</p><p class='ex'>Se habla español en 20 países. (Spanish is spoken in 20 countries.)</p><p class='ex'>Se venden apartamentos aquí. (Apartments are sold here.)</p><p class='ex'>Se necesitan traductores bilingües. (Bilingual translators are needed.)</p><p class='ex'>Se dice que el mercado laboral está cambiando. (It is said that the job market is changing.)</p><p>Used when the agent is unknown, unimportant, or general.</p></div><div class='gbox'><h5>Passive voice in academic/professional writing</h5><p>In formal writing, the true passive is common for citing sources and describing processes:</p><p class='ex'>Se ha comprobado que... · Ha sido documentado que... · Los datos muestran que se necesitan...</p></div>", "tip": "<div class='cbox'><strong>Nota:</strong> While the passive voice exists in Spanish, it is used less frequently than in English. Spanish speakers often prefer active constructions or the 'se' passive. In academic and journalistic writing, the 'se' passive is especially common: 'Se publicó el informe' (The report was published) rather than 'El informe fue publicado.' Recognizing both forms is essential for reading authentic texts.</div>", "act": {"t": "Passive voice in professional and academic contexts", "d": "Write 8 sentences using passive voice constructions. Use: 3 sentences with true passive (ser + past participle ± por + agent) — about historical events, published works, or professional decisions; 3 sentences with se-passive — about what is needed/said/known in your field of interest; 2 sentences using passive voice in an academic/evidence context (Se ha comprobado que... / Ha sido documentado que...). Connect sentences to professional or historical themes."}, "qs": [{"t": "mc", "q": "'El tratado de paz ___ firmado por los dos presidentes en 2016.' (ser — preterite passive)", "o": ["fue", "era", "ha sido", "ser"], "a": 0, "e": "'Fue firmado' — preterite passive: ser (preterite) + past participle. 'Fue firmado POR los dos presidentes' — the agent (los presidentes) is stated using 'por.' The past participle 'firmado' agrees with the masculine singular subject 'el tratado.'"}, {"t": "mc", "q": "'___ habla español como lengua oficial en veinte países.' (se-passive)", "o": ["Se", "Es", "Está", "Ha"], "a": 0, "e": "'Se habla español...' — se-passive for general/impersonal statements. 'Se habla' (singular) because 'español' is singular. If plural: 'Se hablan varios idiomas.' This is far more common than the true passive for general facts."}, {"t": "mc", "q": "'___ necesitan profesionales bilingües en el sector de salud.' (se-passive, plural subject)", "o": ["Se", "Es", "Son", "Han"], "a": 0, "e": "'Se necesitan' — se-passive with plural subject. 'Profesionales bilingües' is plural → 'se necesitan' (plural verb). Compare: 'Se necesita un traductor' (singular). The verb agrees with what would be the subject in active voice."}, {"t": "sa", "q": "En español: Write 3 sentences using different passive voice constructions: (1) true passive with 'ser + past participle + por + agent' about something historical, (2) se-passive about what is needed in a field you're interested in, (3) se-passive academic phrase (Se ha comprobado que... / Se dice que...)."}]}, {"day": "Sem. 12, Día 5", "title": "Escritura profesional — el currículum y la carta de presentación", "obj": ["Write a professional resume/CV summary in Spanish", "Draft a cover letter introduction", "Apply all formal language structures in professional writing"], "read": "<p>Writing professional documents in Spanish — a CV or cover letter — is an immediately practical skill. The structure differs somewhat from English conventions.</p><div class='gbox'><h5>El currículum vítae en español — key sections</h5><p><strong>Datos personales:</strong> Nombre · Dirección · Teléfono · Correo electrónico · (NOT date of birth in US context)</p><p><strong>Perfil profesional:</strong> A 3–4 sentence summary of who you are, your key skills, and your goals.</p><p><strong>Formación académica:</strong> Education in reverse chronological order.</p><p><strong>Experiencia laboral:</strong> Work experience in reverse chronological order with bullet points.</p><p><strong>Habilidades:</strong> Languages (level), technical skills, soft skills.</p><p><strong>Referencias:</strong> Disponibles a petición. (Available upon request.)</p></div><div class='gbox'><h5>Perfil profesional — vocabulary</h5><p>Soy una persona proactiva y comprometida con... · Cuento con experiencia en... · Me especializo en... · Tengo sólidos conocimientos de... (I have solid knowledge of...) · Me apasiona... (I am passionate about...) · Estoy en busca de una oportunidad para... · Mi objetivo profesional es...</p></div><div class='gbox'><h5>Cover letter key phrases</h5><p>Me dirijo a usted para solicitar el puesto de... · He tenido la oportunidad de desarrollar habilidades en... · Considero que mi perfil se ajusta a los requisitos del puesto porque... · Estoy convencido/a de que podría contribuir de manera significativa a... · Quedo a su disposición para una entrevista en el momento que usted considere oportuno.</p></div>", "tip": "<div class='cbox'><strong>Diferencias culturales:</strong> In some Latin American countries and Spain, CVs traditionally include a photo, date of birth, and marital status — information that would be inappropriate on a US resume for legal reasons. When writing a CV for a US employer, follow US conventions (no photo, no personal data). When applying to positions in Spanish-speaking countries, research local conventions. Being aware of these differences is cultural and professional competency.</div>", "act": {"t": "Professional profile and cover letter opening", "d": "Write a professional profile (perfil profesional) of 4–5 sentences describing yourself as a future professional. Then write the first paragraph of a cover letter (4–5 sentences) for a job or internship you would genuinely want. Requirements: formal register throughout, at least 2 sentences using the conditional (podría, contribuiría, me gustaría), 1 present perfect (he desarrollado, he tenido la oportunidad de...), correct formal salutation and closing phrases."}, "qs": [{"t": "mc", "q": "'Me dirijo a usted ___ solicitar información sobre el programa de pasantías.' (to/in order to — purpose)", "o": ["por", "para", "de", "en"], "a": 1, "e": "'Para' — purpose. 'Me dirijo a usted para solicitar' = I am contacting you in order to request. 'Para + infinitive' expresses purpose — one of the most common structures in formal correspondence."}, {"t": "mc", "q": "'Cuento ___ tres años de experiencia en diseño gráfico.' (I have / I count on)", "o": ["de", "en", "con", "por"], "a": 2, "e": "'Cuento con' — 'contar con' = to have / to count on (resources, experience). 'Cuento con tres años de experiencia' is a formal alternative to 'Tengo tres años de experiencia.' Very common in professional writing."}, {"t": "mc", "q": "'Estoy convencida de que ___ aportar valor significativo al equipo.' (poder — conditional, yo)", "o": ["puedo", "podría", "pude", "pueda"], "a": 1, "e": "'Podría' — conditional. 'Estoy convencida de que podría aportar valor' = I am convinced that I could contribute significant value. The conditional is more professional and humble than the present indicative ('puedo'), showing that you are aware your contribution is to be proven."}, {"t": "sa", "q": "En español: Write your professional profile (perfil profesional) in 3–4 sentences. Describe your interests, key skills, and professional goal. Use formal register and at least 1 conditional and 1 present perfect construction."}]}, {"day": "Sem. 13, Día 1", "title": "El español en el mundo — global relevance and future", "obj": ["Understand the global reach and importance of Spanish", "Discuss the future of Spanish as a world language", "Connect language learning to global citizenship"], "read": "<p>Spanish is not just an academic subject — it is a global force shaping politics, culture, economy, and social life. Understanding the scope of Spanish in the world gives your language learning deeper purpose.</p><div class='gbox'><h5>El español en cifras (Spanish by the numbers)</h5><p>~500 millones de hablantes nativos (2nd most native speakers in the world)</p><p>~600 millones de hablantes totales (including L2 speakers)</p><p>Lengua oficial en 20 países en 4 continentes</p><p>2ª lengua más estudiada en el mundo (después del inglés)</p><p>4ª lengua más usada en internet</p><p>Lengua oficial de la ONU, la Unión Europea, y la OEA</p></div><div class='gbox'><h5>El español en los Estados Unidos</h5><p>~62 millones de latinos en los EEUU</p><p>~42 millones de hablantes nativos de español en los EEUU</p><p>El español: 2ª lengua más hablada en los EEUU</p><p>Estados como Nuevo México, California, Texas, Florida y Nueva York tienen fuertes comunidades hispanohablantes</p><p>El español afroamericano, el espanglish, el español chicano, el español caribeño — todas variedades válidas</p></div><div class='gbox'><h5>El futuro del español</h5><p>Para 2050, los EEUU podría ser el país con más hispanohablantes del mundo</p><p>El español es la 2ª lengua más usada en Twitter/X</p><p>La industria del entretenimiento en español (Netflix, música) crece rápidamente</p><p>El español es esencial en medicina, derecho, negocios, y educación en los EEUU</p></div>", "tip": "<div class='cbox'><strong>Reflexión:</strong> You are learning Spanish in North Carolina — a state that has seen dramatic growth in its Latino population, particularly from Mexico and Central America, over the past 30 years. NC now has over 1 million Latino residents. The Spanish you are learning connects you directly to your neighbors, community, and the state you live in. Language learning is not abstract — it is a bridge to real people and real communities around you.</div>", "act": {"t": "Position paper: the value of Spanish", "d": "Write a position paper paragraph of 9–10 sentences arguing for the importance of Spanish in today's world and in your own future. This should be your most sophisticated writing yet. Use: advanced connectors (si bien, a pesar de que, dado que, en consecuencia), evidence language (Según los datos... / Se ha comprobado que...), 1 future tense, 1 conditional, 1 present subjunctive, 1 present perfect. Make a compelling, evidence-based argument."}, "qs": [{"t": "mc", "q": "'Para 2050, se estima que los Estados Unidos ___ el país con más hispanohablantes del mundo.' (ser — future)", "o": ["será", "sería", "sea", "es"], "a": 0, "e": "'Será' — simple future for a prediction or estimate about a specific future time. 'Para 2050' signals a future time point, and the simple future is the correct tense for projections and estimates."}, {"t": "mc", "q": "'El español es ___ la segunda lengua más hablada en los Estados Unidos.' (currently)", "o": ["actualmente", "probablemente", "posiblemente", "quizás"], "a": 0, "e": "'Actualmente' = currently / at present. The sentence states a current fact about Spanish's status in the US. 'Actualmente' is the correct adverb for 'currently/nowadays' in formal Spanish. Note: 'actualmente' ≠ 'actually' in English."}, {"t": "mc", "q": "'___ que el bilingüismo beneficia tanto al individuo como a la sociedad.' (It has been proven that)", "o": ["Se cree", "Se ha comprobado", "Se duda", "Se teme"], "a": 1, "e": "'Se ha comprobado que' = it has been proven / confirmed that. This impersonal present perfect construction introduces well-established facts in academic writing. It's more authoritative than 'se cree' (it is believed) or 'se dice' (it is said)."}, {"t": "sa", "q": "En español: Write 4–5 sentences arguing that learning Spanish is valuable for YOUR specific future goals. Use specific evidence or examples, at least 1 future tense, and 1 formal connector."}]}, {"day": "Sem. 13, Día 2", "title": "La tecnología y el trabajo — digital skills and modern careers", "obj": ["Discuss technology's impact on careers and the workforce", "Use technology and work vocabulary together", "Write about the future of work using advanced grammar"], "read": "<p>Technology is transforming the job market in Spanish-speaking countries and globally. This lesson combines Unit 2's technology vocabulary with Unit 5's professional vocabulary for rich, complex discussion.</p><div class='gbox'><h5>Vocabulario: tecnología y trabajo</h5><p>la automatización (automation) · la inteligencia artificial en el trabajo · el teletrabajo / el trabajo remoto · las plataformas digitales · los trabajos del futuro · el freelancer / el trabajador autónomo · las habilidades digitales · el aprendizaje automático (machine learning) · la ciberseguridad · la economía gig (gig economy) · el emprendimiento digital · la transformación digital de las empresas</p></div><div class='gbox'><h5>Connecting technology and work — advanced structures</h5><p class='ex'>Se estima que la IA <strong>reemplazará</strong> el 30% de los empleos actuales para 2030. (future)</p><p class='ex'>Es importante que los trabajadores <strong>desarrollen</strong> nuevas habilidades. (subjunctive)</p><p class='ex'>Si no nos adaptamos, muchos empleos <strong>desaparecerán</strong>. (real si clause)</p><p class='ex'>Si la tecnología <strong>siguiera</strong> avanzando al ritmo actual, <strong>cambiaría</strong> todo. (hypothetical)</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> The tech industry is growing rapidly across Latin America. Cities like Medellín (Colombia), Santiago (Chile), Bogotá, Buenos Aires, and Mexico City have vibrant tech startup ecosystems. 'Silicon Andino' and 'Silicon Chapultepec' are informal names for emerging tech hubs. Latin American tech entrepreneurs are creating solutions for distinctly regional problems — financial inclusion, agricultural technology, and educational access.</div>", "act": {"t": "Technology and the future of work essay paragraph", "d": "Write a body paragraph of 9–10 sentences on this prompt: '¿La inteligencia artificial es más una amenaza o una oportunidad para el mundo laboral?' Requirements: (1) clear topic sentence taking a position, (2) 2 supporting arguments with evidence language, (3) a specific example from the Spanish-speaking tech world, (4) at least 3 technology/work vocabulary words, (5) 1 future tense, 1 conditional, 1 subjunctive, (6) 3 connectors from different categories."}, "qs": [{"t": "mc", "q": "'Se estima que la automatización ___ un impacto significativo en muchos empleos.' (tener — future)", "o": ["tiene", "tenga", "tendrá", "tendría"], "a": 2, "e": "'Tendrá' — future tense for predictions and estimates. 'Se estima que + future indicative' for projected facts. Note: 'Se estima que + subjunctive' would be wrong here because 'estimar' in this context is used as a factual claim, not an expression of doubt."}, {"t": "mc", "q": "'Es fundamental que los trabajadores ___ habilidades digitales en el siglo XXI.' (desarrollar)", "o": ["desarrollan", "desarrollen", "desarrollarán", "desarrollaran"], "a": 1, "e": "'Desarrollen' — present subjunctive. 'Es fundamental que' = impersonal expression (I in WEIRDO) → subjunctive. Main verb is present → present subjunctive."}, {"t": "mc", "q": "'___ el teletrabajo presenta desafíos, también ofrece beneficios importantes.' (Although)", "o": ["Porque", "Sin embargo", "Aunque", "Por lo tanto"], "a": 2, "e": "'Aunque' + indicative = although (stating a fact). 'Aunque el teletrabajo presenta desafíos, también ofrece beneficios' — concession connector acknowledging both sides of the issue."}, {"t": "sa", "q": "En español: Write 3–4 sentences about how technology will change the career field you're interested in. Use: 1 future verb, 1 subjunctive (es importante que... / es posible que...), and at least 1 technology/work vocabulary word."}]}, {"day": "Sem. 13, Día 3", "title": "Repaso: por/para, voz pasiva, y registro formal", "obj": ["Consolidate por vs. para in complex sentences", "Review passive voice constructions", "Integrate formal register across writing and speaking"], "read": "<p><strong>Unit 5 grammar consolidation.</strong> Three structures from Unit 5 that require systematic review: por/para, passive voice, and formal register. This lesson uses them together in professional contexts.</p><div class='gbox'><h5>Por/para quick review</h5><p><strong>PARA:</strong> P-urpose · A-ddressed to · R-eckoned for (deadline) · A-destination</p><p><strong>POR:</strong> P-assing through · O-n behalf of · R-eason/cause + duration + exchange + agent</p><p>Common errors: 'gracias POR' (not para) · 'salgo PARA Madrid' (not por) · 'lo hizo POR miedo' (not para)</p></div><div class='gbox'><h5>Passive voice quick review</h5><p>True passive (with agent): <span class='ex'>La carta fue escrita POR García Márquez.</span></p><p>Se-passive (no specific agent): <span class='ex'>Se habla español. / Se necesitan traductores.</span></p><p>Academic passive: <span class='ex'>Se ha comprobado que... / Ha sido documentado que...</span></p></div><div class='gbox'><h5>Formal register markers — quick checklist</h5><p>✓ Usted (not tú) in professional contexts</p><p>✓ Quisiera / Me gustaría (not quiero) for requests</p><p>✓ Estimado/a señor/a (not ¡Hola!)</p><p>✓ Me dirijo a usted con el fin de... (not Te escribo para...)</p><p>✓ Quedo a su disposición (not Avísame)</p><p>✓ No slang, no filler words, varied vocabulary</p></div>", "tip": "<div class='cbox'><strong>Consejo integrador:</strong> The best way to consolidate these three structures is to use them all in the same paragraph. Try writing a formal email that includes: 'me dirijo a usted para solicitar...' (para + purpose), 'he adjuntado el currículum que fue preparado con mucho cuidado' (true passive), and 'quisiera saber si se ofrecen oportunidades de pasantía' (se-passive + formal register). One paragraph, three structures.</div>", "act": {"t": "Integrated formal writing", "d": "Write a complete formal email of 10–12 sentences applying for a Spanish language internship at a nonprofit that serves the Latino community in North Carolina. The email must include: (1) formal salutation and closing, (2) at least 2 uses of por and 2 uses of para (label them), (3) 1 true passive and 1 se-passive construction, (4) formal register throughout (quisiera, me dirijo a usted, cuento con...), (5) 1 present perfect, (6) a si clause at the end expressing your commitment."}, "qs": [{"t": "mc", "q": "'Trabajé en ese proyecto ___ seis meses.' (duration — for)", "o": ["para", "por", "en", "de"], "a": 1, "e": "'Por' — duration. 'Trabajé por seis meses' = I worked for six months. Duration of time always uses POR. 'Para seis meses' would mean 'by six months' (deadline) — very different meaning."}, {"t": "mc", "q": "'La propuesta ___ revisada por el comité antes de la reunión.' (ser — pluperfect passive)", "o": ["fue", "había sido", "es", "será"], "a": 1, "e": "'Había sido revisada' — pluperfect passive: había sido + past participle. The proposal was reviewed (earlier action) before the meeting (later action). Past participle 'revisada' agrees with feminine 'la propuesta.'"}, {"t": "mc", "q": "'___ ofrecen becas para estudiantes bilingües.' (se-passive — scholarships are offered)", "o": ["Es", "Se", "Son", "Han"], "a": 1, "e": "'Se ofrecen becas' — se-passive with plural subject. 'Becas' (scholarships) is plural → 'se ofrecen' (plural). This is a general statement about what is offered, without specifying who offers them."}, {"t": "sa", "q": "En español: Write 3 sentences that each use a different structure from Unit 5: (1) a sentence with 'para' (purpose), (2) a se-passive construction, (3) a formal register phrase from a cover letter (using quisiera / me gustaría / cuento con)."}]}, {"day": "Sem. 13, Día 4", "title": "Producción oral — entrevista de trabajo simulada", "obj": ["Perform a simulated job interview in Spanish", "Use formal language under pressure", "Respond to unexpected questions at Intermediate-High level"], "read": "<p>A job interview in Spanish is one of the most practical real-world applications of your language skills. Today you prepare for and conduct a simulated interview.</p><div class='gbox'><h5>Preguntas comunes de entrevista en español</h5><p>¿Puede presentarse brevemente? · ¿Cuáles son sus principales fortalezas y debilidades? · ¿Por qué le interesa este puesto? · ¿Qué experiencia tiene en este campo? · ¿Dónde se ve en cinco años? · ¿Cómo maneja el trabajo bajo presión? · ¿Por qué debería contratarle? · ¿Tiene alguna pregunta para nosotros?</p></div><div class='gbox'><h5>Respuestas estructuradas — STAR method en español</h5><p><strong>S</strong>ituación: Describe the context briefly (imperfect)</p><p><strong>T</strong>area: What was your responsibility? (preterite)</p><p><strong>A</strong>cción: What did you do? (preterite)</p><p><strong>R</strong>esultado: What was the outcome? (preterite/present perfect)</p><p class='ex'>STAR en acción: 'En mi trabajo anterior, cuando (S) necesitábamos organizar un evento, (T) yo era responsable de coordinar con los proveedores. (A) Creé un cronograma detallado y (A) comuniqué con todos los participantes. (R) Como resultado, el evento fue un gran éxito.'</p></div><div class='gbox'><h5>Vocabulario de entrevista</h5><p>mis fortalezas son... · tengo facilidad para... · me considero una persona... · he tenido la oportunidad de... · en cuanto a mis debilidades, trabajo en... · a largo plazo, mi objetivo es... · estoy dispuesto/a a...</p></div>", "tip": "<div class='cbox'><strong>Consejo cultural:</strong> In job interviews in many Spanish-speaking countries, interviewers may ask personal questions that would be inappropriate in US interviews — about your family, whether you're married, your age. While you are not obligated to answer, being culturally aware of this difference helps you navigate cross-cultural professional situations. In international settings, follow the norms of the country where you're interviewing.</div>", "act": {"t": "Simulated interview responses", "d": "Write out COMPLETE answers (3–5 sentences each) to these 4 interview questions in formal Spanish: (1) '¿Puede presentarse brevemente?' (2) '¿Por qué le interesa trabajar en el sector hispanohablante?' (3) '¿Cuál ha sido su mayor logro académico o personal hasta ahora?' (4) '¿Dónde se ve en diez años?' Use the STAR method where applicable. Include at least 1 conditional, 1 present perfect, and 1 subjunctive across your four answers."}, "qs": [{"t": "mc", "q": "'¿___ presentarme brevemente?' — Which question opening is most formally appropriate?", "o": ["¿Puedes", "¿Podría usted", "¿Puede usted", "¿Me puedes permitir"], "a": 2, "e": "'¿Puede usted presentarse brevemente?' — formal job interview register uses 'usted.' '¿Puedes' is informal (tú). '¿Podría usted' is also acceptable and slightly more formal (conditional). For a standard interview question, '¿Puede usted...?' is the most common formal phrasing."}, {"t": "mc", "q": "'En cuanto a mis debilidades, ___ trabajando en mejorar mi gestión del tiempo.' (I am working on)", "o": ["estoy", "he sido", "fui", "estaré"], "a": 0, "e": "'Estoy trabajando en' = I am (currently) working on. Present progressive (estar + gerund) is used to describe an ongoing process of improvement — the ideal response to a weakness question, showing self-awareness and growth mindset."}, {"t": "mc", "q": "In the STAR method for interview responses, 'R — Resultado' should describe:", "o": ["The background/context of the situation", "Your specific role in the task", "The actions you took step by step", "The outcome or result achieved", " ideally quantified"], "a": 3, "e": "R = Resultado: the outcome or result achieved, ideally with specific details ('el evento fue un éxito y aumentamos la participación un 20%'). Quantified results are powerful in interview responses because they show concrete impact."}, {"t": "sa", "q": "En español: Write a 4–5 sentence answer to '¿Por qué quiere trabajar/estudiar en un contexto hispanohablante?' Use formal register throughout, at least 1 conditional, and specific reasons from your own experience or goals."}]}, {"day": "Sem. 13, Día 5", "title": "Evaluación de la Unidad 5", "obj": ["Demonstrate mastery of Unit 5 grammar and vocabulary", "Apply formal register, por/para, and passive voice", "Show professional Spanish competency"], "read": "<p><strong>Evaluación de la Unidad 5.</strong> Quick review:</p><ul><li><strong>Registro formal:</strong> usted · quisiera/me gustaría · Estimado/a señor/a · Me dirijo a usted con el fin de... · Quedo a su disposición</li><li><strong>Por:</strong> cause/reason · duration · exchange · on behalf of · agent in passive · movement through · per/rate</li><li><strong>Para:</strong> purpose/goal · recipient · destination · deadline · opinion · comparison (unexpected)</li><li><strong>Voz pasiva:</strong> true passive (ser + pp + por) · se-passive (se + verb, agrees with subject) · academic passive (se ha comprobado que...)</li><li><strong>Vocabulario profesional:</strong> puestos · habilidades · currículum · carta de presentación · campo laboral · entrevista · expresiones formales</li><li><strong>Estructuras integradas:</strong> conditional for formal requests · present perfect in professional contexts · adverbial clauses in formal writing</li></ul>", "tip": "<div class='cbox'><strong>Antes del quiz:</strong> Write from memory: (1) 3 formal email phrases (salutation, intro, closing). (2) 2 sentences — one with 'por' and one with 'para' in professional contexts. (3) One se-passive sentence about your field of interest. This is the most applied unit so far — think about how you'd actually use these in a real job application.</div>", "act": {"t": "Pre-quiz review", "d": "From memory: (1) Write a proper formal email salutation, intro line, and closing. (2) Write 1 sentence with 'por' and 1 with 'para' in a professional context — label which use applies. (3) Write 1 se-passive sentence (Se necesitan... / Se busca... / Se ofrecen...) about a job or skill. (4) Write 1 sentence using formal 'quisiera' instead of informal 'quiero.' Review any areas that felt uncertain before starting the quiz."}, "qs": [{"t": "mc", "q": "'Estudié español ___ cinco años en la escuela secundaria.' (duration)", "o": ["para", "por", "de", "a"], "a": 1, "e": "'Por' — duration. 'Estudié español POR cinco años' = I studied Spanish for five years. Duration of time = POR. 'Para cinco años' would mean 'by/for the purpose of five years' — nonsensical here."}, {"t": "mc", "q": "'El informe ___ presentado por el director de recursos humanos.' (ser — preterite passive)", "o": ["es", "fue", "ha", "había"], "a": 1, "e": "'Fue presentado' — preterite passive (ser preterite + past participle). The report was presented (completed past action) BY the HR director. 'Por' introduces the agent. Past participle 'presentado' agrees with masculine 'el informe.'"}, {"t": "mc", "q": "'Me dirijo a usted ___ solicitar información sobre las oportunidades de voluntariado.' (para — purpose)", "o": ["por", "para", "de", "a"], "a": 1, "e": "'Para' — purpose. 'Me dirijo a usted para solicitar' = I am contacting you in order to request. This is standard formal correspondence language. 'Para + infinitive' = in order to do something."}, {"t": "sa", "q": "En español: Write a 5–6 sentence professional summary (perfil profesional) for yourself as a future bilingual professional. Use: formal register throughout, 1 present perfect (he desarrollado / he tenido), 1 conditional (podría / me gustaría), 1 se-passive (se requieren / se valoran), and at least 2 professional vocabulary words."}]}]}, {"title": "Unit 6: La Literatura y la Expresión", "weeks": "Semanas 15–17", "lessons": [{"day": "Sem. 15, Día 1", "title": "Introducción a la literatura hispanoamericana", "obj": ["Survey major genres and authors of Hispanic literature", "Build literary analysis vocabulary in Spanish", "Connect literary themes to cultural and historical contexts"], "read": "<p>Hispanic literature is one of the richest and most influential in the world. Spanish 3 introduces you to major authors, genres, and themes — not just as cultural knowledge but as texts that reveal how Spanish-speaking societies see themselves and the world.</p><div class='gbox'><h5>Vocabulario literario avanzado</h5><p>la narrativa (narrative/prose fiction) · el cuento (short story) · la novela · la poesía · el ensayo literario · el realismo mágico (magical realism) · el boom latinoamericano · la voz narrativa · el narrador no confiable (unreliable narrator) · el flashback / la analepsis · el monólogo interior · la metáfora · el símbolo · la ironía dramática · el tono · el estilo · el lenguaje figurado</p></div><div class='gbox'><h5>Autores clave — el canon hispanohablante</h5><p><strong>Gabriel García Márquez</strong> (Colombia, 1927–2014): Realismo mágico · 'Cien años de soledad' · Nobel Prize 1982</p><p><strong>Isabel Allende</strong> (Chile, 1942–): 'La casa de los espíritus' · feminist perspective · exile and return</p><p><strong>Pablo Neruda</strong> (Chile, 1904–1973): Poetry · 'Veinte poemas de amor...' · Nobel Prize 1971 · political poetry</p><p><strong>Jorge Luis Borges</strong> (Argentina, 1899–1986): Short fiction · labyrinths, mirrors, infinity · 'Ficciones'</p><p><strong>Sandra Cisneros</strong> (USA, 1954–): Chicana literature · 'The House on Mango Street' · bilingual identity</p><p><strong>Julia de Burgos</strong> (Puerto Rico, 1914–1953): Poetry · feminist · identity · nature</p></div>", "tip": "<div class='cbox'><strong>El realismo mágico:</strong> This literary style — most famously associated with Gabriel García Márquez — presents magical events as ordinary occurrences in realistic settings. It emerged partly as a response to Latin American political violence and social inequality: when reality is so extreme it seems unreal, magic becomes a way to describe it. 'Cien años de soledad' (1967) is widely considered the greatest novel written in Spanish.</div>", "act": {"t": "Literary author profile", "d": "Choose ONE author from today's lesson. Research them briefly using a Spanish-language source. Write 7–8 sentences in Spanish about: who they are (background, country, era), what their major work is about (present tense for literary plots), what literary style or technique they are known for, why their work matters culturally, and one passage or idea from their work that interests you. Use at least 3 literary vocabulary words."}, "qs": [{"t": "mc", "q": "'Cien años de soledad' by García Márquez is an example of:", "o": ["naturalismo", "realismo mágico", "poesía concreta", "el modernismo"], "a": 1, "e": "'Realismo mágico' — magical realism. García Márquez's masterwork presents magical events (characters ascending to heaven, ghosts wandering the house) as entirely ordinary in a realistic Caribbean village. This blending of magical and realistic is the defining feature of magical realism."}, {"t": "mc", "q": "Pablo Neruda was a Nobel Prize-winning writer known primarily for:", "o": ["Short fiction about labyrinths", "Political novels about Chilean history", "Poetry", " including love poetry and politically engaged verse", "Magical realist novels"], "a": 2, "e": "Pablo Neruda (1904–1973) was a Chilean poet known for his passionate love poetry ('Veinte poemas de amor y una canción desesperada') and later for deeply political poetry ('Canto general'). He won the Nobel Prize for Literature in 1971."}, {"t": "mc", "q": "Sandra Cisneros is significant in Hispanic literature because:", "o": ["She was the first Latin American to win the Nobel Prize", "She writes about the Chicana/Latino experience in the United States", " exploring bilingual identity and life on the US-Mexico border", "She invented magical realism", "She translated García Márquez into English"], "a": 1, "e": "Sandra Cisneros (1954–) is a Mexican-American author whose work centers on the Chicana experience in the US, particularly in Chicago. 'The House on Mango Street' explores bilingual identity, poverty, and coming-of-age on the US-Mexico border. She represents the vital tradition of US Latino literature."}, {"t": "sa", "q": "En español: Write 3–4 sentences about what aspect of Hispanic literature (magical realism, political poetry, Chicana literature, short fiction) most interests you and why. Use at least 2 literary vocabulary words."}]}, {"day": "Sem. 15, Día 2", "title": "El presente histórico y el análisis literario", "obj": ["Use the historical present for literary analysis", "Write a literary analysis paragraph in Spanish", "Apply literary vocabulary in analytical writing"], "read": "<p>Literary analysis in Spanish uses the <strong>historical present</strong> (presente histórico) — you write about what characters do and what happens in the story as if it is happening now. This is standard in Spanish literary analysis.</p><div class='gbox'><h5>El presente histórico en el análisis literario</h5><p>In English: 'Aureliano Buendía died in the war.' → In literary analysis: 'Aureliano Buendía <strong>muere</strong> en la guerra.'</p><p>All literary events are described in the PRESENT tense in analysis, even though they are past events in the narrative.</p><p class='ex'>El narrador <strong>cuenta</strong> la historia desde una perspectiva omnisciente.</p><p class='ex'>La protagonista <strong>decide</strong> abandonar su hogar en busca de libertad.</p><p class='ex'>El simbolismo del color amarillo <strong>aparece</strong> a lo largo de toda la novela.</p></div><div class='gbox'><h5>Frases para el análisis literario</h5><p>El/la autor/a sugiere que... · El texto refleja... · A través de [técnica], el/la escritor/a... · El personaje representa... · Este episodio simboliza... · La voz narrativa transmite... · El uso de [recurso literario] crea el efecto de... · Se puede interpretar que... · El tema central del texto es... · El desenlace sugiere que...</p></div><div class='gbox'><h5>Estructura del párrafo de análisis literario</h5><p>1. <strong>Argumento/afirmación:</strong> Your analytical claim about the text</p><p>2. <strong>Evidencia:</strong> Quote or paraphrase from the text (very brief)</p><p>3. <strong>Análisis:</strong> Explain WHY the evidence supports your claim</p><p>4. <strong>Conexión:</strong> Connect to theme or broader meaning</p></div>", "tip": "<div class='cbox'><strong>Consejo para el análisis literario:</strong> The weakest literary analyses simply summarize what happens. The strongest analyses make an argument about WHY something in the text is significant. Don't say 'El protagonista va al bosque.' Say 'El viaje del protagonista al bosque simboliza su búsqueda de identidad — el bosque representa lo desconocido y lo interior que aún no ha explorado.' Make a claim, provide evidence, analyze the evidence.</div>", "act": {"t": "Literary analysis paragraph", "d": "Write a literary analysis paragraph of 8–10 sentences about 'El dinosaurio' by Monterroso (studied in Unit 3) OR about any other short Spanish text you have read. Requirements: (1) Use the historical present throughout. (2) Make one clear analytical argument (not a summary). (3) Use at least 3 literary analysis phrases from today. (4) Include at least 1 subjunctive construction (Es posible que el dinosaurio simbolice... / El lector puede dudar de que...). (5) Use the paragraph structure: claim → evidence → analysis → connection."}, "qs": [{"t": "mc", "q": "In Spanish literary analysis, plot events should be described in the:", "o": ["Preterite tense", "Imperfect tense", "Historical present (present tense)", "Conditional tense"], "a": 2, "e": "Historical present — in literary analysis, all plot events are described in the present tense ('el protagonista decide,' 'el narrador cuenta,' 'la historia termina'), even though these are past fictional events. This is the standard convention in Spanish literary analysis."}, {"t": "mc", "q": "'A través del simbolismo de la lluvia, el autor ___ una atmósfera de melancolía.' (crear — historical present)", "o": ["creó", "crea", "crearía", "creará"], "a": 1, "e": "'Crea' — historical present (present tense). In literary analysis, the author's techniques are always described in the present: 'el autor CREA una atmósfera.' The present tense makes the analysis feel immediate and relevant."}, {"t": "mc", "q": "The strongest literary analysis paragraph structure should:", "o": ["Summarize the plot in detail", "Make a clear analytical argument", " then support it with evidence and explain its significance", "Only quote from the text without explanation", "Describe the author's biography"], "a": 1, "e": "Strong literary analysis: make an argument (claim) → provide evidence (brief quote/paraphrase) → analyze the evidence (explain WHY it's significant) → connect to broader themes. Summary alone is NOT analysis."}, {"t": "sa", "q": "En español: Write the first 2 sentences of a literary analysis paragraph about any text you've read. Sentence 1: your analytical claim (a statement about what the text MEANS, not just what happens). Sentence 2: the evidence that supports your claim. Use the historical present."}]}, {"day": "Sem. 15, Día 3", "title": "La poesía hispanoamericana — reading and responding", "obj": ["Read and analyze a poem in Spanish", "Identify poetic devices in Spanish", "Write a personal response to poetry"], "read": "<p>Poetry is the most concentrated form of language — every word is chosen with extraordinary care. Reading poetry in Spanish builds vocabulary, intuition for the language, and cultural understanding.</p><div class='gbox'><h5>Términos poéticos</h5><p>el verso (line of poetry) · la estrofa (stanza) · la rima (rhyme) · el ritmo (rhythm) · la imagen (image/imagery) · la personificación · la metáfora · el símil (simile: como/cual) · la aliteración · la anáfora (repetition of words at the start of lines) · el tono emocional · el enjambement (run-on lines) · el hablante lírico (lyric speaker/poetic I)</p></div><p><strong>Poema para analizar:</strong></p><blockquote><p><strong>«Puedo escribir los versos» — Pablo Neruda (fragmento)</strong></p><p><em>Puedo escribir los versos más tristes esta noche.<br>Escribir, por ejemplo: «La noche está estrellada,<br>y tiritan, azules, los astros, a lo lejos.»<br>El viento de la noche gira en el cielo y canta.<br>Puedo escribir los versos más tristes esta noche.<br>La quise, y a veces ella también me quería.</em></p></blockquote><p><strong>Preguntas de análisis:</strong></p><ul><li>What mood does the first line establish? How does the repetition contribute to this?</li><li>What poetic images appear? (stars, wind, cold)</li><li>What does 'tiritan' suggest about the stars?</li><li>What does 'a veces' (sometimes) reveal about the relationship?</li></ul>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> Pablo Neruda is one of the best-selling poets in world history. His 'Veinte poemas de amor y una canción desesperada' (1924), published when he was just 19, has sold millions of copies. It is one of the most read poetry collections ever written in Spanish. Neruda's political activism against the Pinochet dictatorship in Chile (which he did not survive — he died in 1973, days after the coup) adds another dimension to reading his work.</div>", "act": {"t": "Poetry analysis and personal response", "d": "Part 1: Write a literary analysis paragraph (5–6 sentences) about Neruda's poem fragment. Use the historical present, at least 2 literary analysis phrases, and at least 1 observation about poetic technique (metaphor, imagery, repetition, mood). Part 2: Write a personal response paragraph (4–5 sentences) connecting the poem's theme to your own experience or observations. This response can be in a more personal voice (use yo, mis experiencias) but still in formal Spanish."}, "qs": [{"t": "mc", "q": "In Neruda's fragment, 'tiritan, azules, los astros' most likely means:", "o": ["The stars are singing", "The stars are shivering/trembling (blue with cold)", "The stars are falling", "The stars are blue planets"], "a": 1, "e": "'Tiritar' = to shiver/tremble (from cold). 'Tiritan, azules, los astros' — the stars shiver blue in the distance, personifying the stars as cold, shivering beings. This personification and imagery creates the cold, isolated, melancholy tone of the poem."}, {"t": "mc", "q": "The repetition of 'Puedo escribir los versos más tristes esta noche' is an example of:", "o": ["La rima", "La anáfora / el estribillo (refrain)", "La aliteración", "El enjambement"], "a": 1, "e": "'La anáfora' — repetition of words or phrases at the beginning of lines or stanzas. In Neruda's poem, this first line serves as a refrain that recurs throughout, reinforcing the speaker's emotional state and the act of writing as a way of processing sadness."}, {"t": "mc", "q": "'La quise, y a veces ella también me quería.' — what does 'a veces' (sometimes) suggest about the relationship?", "o": ["The relationship was perfect and mutual", "The love was not always reciprocal — she only loved him sometimes — suggesting complexity and pain", "They only met occasionally", "The speaker is uncertain if the relationship happened"], "a": 1, "e": "'A veces ella también me quería' — the word 'a veces' (sometimes) reveals that her love was conditional, intermittent, or uncertain, while his was consistent ('la quise' — simple past, complete). This asymmetry is the emotional heart of the poem's sadness."}, {"t": "sa", "q": "En español: Write 3–4 sentences analyzing ONE poetic technique you noticed in Neruda's fragment (imagery, personification, repetition, tone). Explain: what is the technique? What specific words create it? What effect does it have on the reader?"}]}, {"day": "Sem. 15, Día 4", "title": "Escritura creativa en español", "obj": ["Write an original creative text in Spanish", "Apply literary techniques learned this unit", "Express personal voice and creativity in Spanish"], "read": "<p>Creative writing in Spanish — whether a short story, poem, or personal narrative — is one of the highest-level language activities. It requires combining all your grammar knowledge, vocabulary, and cultural understanding in service of expression and communication.</p><div class='gbox'><h5>Técnicas para la escritura creativa</h5><p><strong>Muestra, no cuentes</strong> (Show, don't tell): Instead of 'Estaba triste' → 'Los ojos se le llenaron de lágrimas y dejó caer el teléfono lentamente.'</p><p><strong>Detalles sensoriales:</strong> sight, sound, smell, taste, touch — 'el olor a café recién hecho' / 'el ruido del tráfico en la avenida' / 'la textura áspera del papel viejo'</p><p><strong>Variedad de oraciones:</strong> Mix short, punchy sentences with longer, complex ones for rhythm and effect.</p><p><strong>Voz auténtica:</strong> Write about what you actually know and feel — authentic detail is always more compelling than invention.</p></div><div class='gbox'><h5>Tipos de escritura creativa para Spanish 3</h5><p><strong>Microcuento:</strong> 50–150 word story — inspired by Monterroso. Challenge: say everything in a very small space.</p><p><strong>Poema libre:</strong> Free verse poem with at least 8 lines — use imagery and metaphor, no need to rhyme.</p><p><strong>Narración personal:</strong> Personal narrative about a memory, place, or person important to you — 150–200 words.</p><p><strong>Continuación:</strong> Write what happens next in 'El dinosaurio' — expand the micro-story into 100–150 words.</p></div>", "tip": "<div class='cbox'><strong>Consejo:</strong> The biggest mistake in Spanish creative writing is trying to write in English and translate. Instead, think in Spanish from the beginning — start with simple images or feelings you can express, then expand them. 'Un árbol viejo. Una ventana rota. Una carta sin destinatario.' Three images in Spanish can become the seed of an entire story. Trust the language you have.</div>", "act": {"t": "Original creative writing", "d": "Write an original creative text in Spanish. Choose ONE form: (1) Microcuento (50–150 words) — a complete story in miniature, (2) Poema libre (8+ lines) — using imagery, metaphor, and at least 1 personification, (3) Narración personal (150–200 words) — a memory about a person, place, or moment, OR (4) Continuación de 'El dinosaurio' (100–150 words) — what happens when the protagonist wakes up and the dinosaur is still there? Requirements: use the historical present OR past tense consistently, include at least 2 sensory details, demonstrate intentional word choice."}, "qs": [{"t": "mc", "q": "'Show, don't tell' in creative writing means:", "o": ["Using only showing verbs", " never abstract nouns", "Describing emotions and states through specific sensory details and actions rather than stating them directly", "Never telling the reader what happened", "Only writing in the present tense"], "a": 1, "e": "'Show, don't tell' means conveying emotions and situations through specific, concrete details and actions rather than abstract statements. Instead of 'Estaba nervioso' (telling), write 'Le temblaban las manos y miraba el reloj cada dos minutos' (showing). The reader feels the emotion through the details."}, {"t": "mc", "q": "'El olor a café recién hecho llenó la habitación' is an example of:", "o": ["Un detalle sensorial (olfativo — smell)", "Una metáfora directa", "La voz pasiva", "El realismo mágico"], "a": 0, "e": "A sensory detail — specifically olfactory (smell). Sensory details (sight, sound, smell, taste, touch) ground fiction in physical reality and help readers experience the scene rather than just understand it intellectually. They are essential tools in creative writing."}, {"t": "mc", "q": "Which opening best demonstrates 'show, don't tell' in Spanish?", "o": ["Era un día triste.", "El cielo estaba nublado y el viento hacía temblar las hojas secas del árbol solitario en el patio.", "Tenía sentimientos negativos.", "La situación era difícil."], "a": 1, "e": "Option B shows through specific images: overcast sky, wind, trembling dry leaves, solitary tree — the reader constructs the sadness from these concrete details rather than being told 'era triste.' This is the power of showing."}, {"t": "sa", "q": "En español: Write the first 3–4 sentences of your creative text (whichever type you chose). Focus on: sensory details, intentional word choice, and either the historical present or consistent past tense. Make the opening compelling enough that a reader would want to continue."}]}, {"day": "Sem. 15, Día 5", "title": "El español y la identidad — language as self-expression", "obj": ["Reflect on Spanish as a language of personal and cultural identity", "Discuss code-switching and Spanglish as linguistic phenomena", "Connect language to identity, power, and culture"], "read": "<p>Language is not just a communication tool — it is how we think, feel, create, and define who we are. For Spanish speakers in the US and around the world, the relationship between language and identity is complex and deeply personal.</p><div class='gbox'><h5>El code-switching y el espanglish</h5><p><strong>Code-switching:</strong> The practice of alternating between Spanish and English within a conversation or sentence. '¿Ya comiste? Because dinner is ready.' Linguists consider this a sophisticated linguistic skill, not a deficit.</p><p><strong>Espanglish:</strong> A hybrid form that combines Spanish and English grammatical structures and vocabulary. Common in US Latino communities. Examples: 'Voy a taipear este documento' (from 'to type') · 'Parquea el carro' (from 'to park')</p><p><strong>Academic debate:</strong> Some argue Spanglish undermines Spanish proficiency. Others argue it represents a valid, evolving variety that reflects the bicultural experience of US Latinos.</p></div><div class='gbox'><h5>Lenguaje e identidad — vocabulario</h5><p>la lengua materna (mother tongue) · el bilingüismo · la identidad lingüística · el orgullo cultural (cultural pride) · la pérdida del idioma (language loss) · la revitalización (language revitalization) · la comunidad de hablantes · la variedades del español · el español patrimonial (heritage Spanish) · la lealtad lingüística (language loyalty)</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> Gloria Anzaldúa (1942–2004), a Chicana writer from South Texas, wrote powerfully about language and identity. In 'Borderlands/La Frontera: The New Mestiza' (1987), she writes in a mix of English and Spanish, arguing that to deny one language is to deny part of yourself. Her work legitimized code-switching as a literary choice and political act. Many US Latino writers today intentionally mix languages as an expression of bicultural identity.</div>", "act": {"t": "Reflection: language and identity", "d": "Write a personal reflection of 8–10 sentences on ONE of these questions: (1) What does knowing Spanish mean to you personally? How does it connect to your identity or community? (2) What do you think about Spanglish and code-switching — is it a problem, a solution, or something more complex? (3) If Spanish were at risk of disappearing in your community or in the US, what would be lost? Use thoughtful, formal Spanish. Include 1 subjunctive, 1 conditional, and at least 2 vocabulary words from today's language and identity section."}, "qs": [{"t": "mc", "q": "Linguists' view of code-switching is generally that:", "o": ["It is a sign of poor language skills in both languages", "It represents a sophisticated bilingual skill — the ability to navigate two language systems simultaneously", "It should be avoided in all contexts", "It only occurs when speakers forget a word"], "a": 1, "e": "Linguists generally view code-switching as a sophisticated linguistic skill demonstrating mastery of two languages and the ability to navigate both simultaneously. Research shows code-switchers often have stronger command of both languages than monolinguals, not weaker."}, {"t": "mc", "q": "'La lengua materna' means:", "o": ["The official language of a country", "The mother tongue — the language learned first in childhood", " often associated with home and family", "The language of formal education", "The language spoken by the majority"], "a": 1, "e": "'La lengua materna' = the mother tongue — the first language learned in childhood, typically the language of the home and family. It carries deep emotional and cultural associations and is often the language of our most intimate thoughts and memories."}, {"t": "mc", "q": "'El español patrimonial' (heritage Spanish) refers to:", "o": ["Spanish learned only in school", "Spanish spoken in Spain", "Spanish spoken by individuals raised in Spanish-speaking homes in the US who were educated primarily in English", "Ancient forms of Spanish"], "a": 2, "e": "Heritage Spanish (español patrimonial) describes the Spanish of individuals who grew up in Spanish-speaking households in the US but received formal education in English. They typically have strong oral proficiency but may have less formal written training. Heritage speakers have a valuable and distinct linguistic profile."}, {"t": "sa", "q": "En español: Write 3–4 sentences about your own relationship with the Spanish language. Why are you learning it? What does it mean to you? How do you hope to use it in the future? Be honest and personal."}]}, {"day": "Sem. 16, Día 1", "title": "Repaso integral — Unidades 5 y 6", "obj": ["Review and consolidate all Unit 5 and 6 grammar and vocabulary", "Demonstrate advanced writing combining multiple structures", "Prepare for the Unit 6 assessment"], "read": "<p><strong>Repaso integral — Unidades 5 y 6.</strong> This lesson reviews the major structures and themes from Units 5 and 6, focusing on integration rather than isolated rules.</p><p><strong>Grammar inventory — Units 5 and 6:</strong></p><ul><li>Registro formal: usted · quisiera/me gustaría · carta de presentación phrases · entrevista vocabulary</li><li>Por vs. para: all 7 uses of POR · all 6 uses of PARA · common error pairs</li><li>Voz pasiva: true passive (ser + pp + por) · se-passive (se + verb agrees with subject) · academic passive</li><li>Historical present in literary analysis · literary analysis paragraph structure (claim → evidence → analysis)</li><li>Literary vocabulary: realismo mágico, narrador, símbolo, metáfora, anáfora, etc.</li><li>Poetic devices: imagen, personificación, símil, anáfora, tono</li><li>Language and identity vocabulary: lengua materna, bilingüismo, code-switching, espanglish</li></ul><p><strong>How all structures combine:</strong> A sophisticated professional email uses formal register + para (purpose) + se-passive + present perfect + conditional. A literary analysis paragraph uses historical present + analytical phrases + subjunctive for interpretation + literary vocabulary.</p>", "tip": "<div class='cbox'><strong>Estrategia de repaso:</strong> For each grammar structure, write ONE sentence from your own life or experience. Don't review grammar in the abstract — apply it. 'Se habla español en mi comunidad.' 'Estudié para mejorar mis oportunidades.' 'El libro fue escrito por un autor colombiano.' Real sentences you write yourself stick far better than reviewing a list.</div>", "act": {"t": "Integrated writing — literature and profession", "d": "Write two SHORT paragraphs (5–6 sentences each) that together demonstrate your Spanish 3 competency: PÁRRAFO 1 — Analyze a work of Hispanic literature or culture you have studied this year (use historical present, literary analysis phrases, subjunctive, at least 2 literary vocabulary words). PÁRRAFO 2 — Describe your professional goals and how Spanish will play a role in them (use formal register, por/para correctly, 1 passive construction, 1 conditional). Together, these two paragraphs should showcase the best of your Spanish 3 writing."}, "qs": [{"t": "mc", "q": "Which sentence correctly uses the se-passive with a plural subject?", "o": ["Se necesita traductores bilingües.", "Se necesitan traductores bilingües.", "Se necesitaron traductores bilingüe.", "Traductores bilingüe se necesitan."], "a": 1, "e": "'Se necesitan traductores bilingües' — se-passive agrees with 'traductores bilingües' (plural). In se-passive, the verb agrees with the subject that would be the direct object in active voice. Plural noun → plural verb."}, {"t": "mc", "q": "In literary analysis, 'El protagonista representa la lucha del pueblo latinoamericano' is an example of:", "o": ["Summary (retelling what happens)", "Analysis (interpreting the meaning/significance of a character)", "Biography (describing the author's life)", "Description (noting physical characteristics)"], "a": 1, "e": "This sentence makes an analytical claim about what the protagonist REPRESENTS — it interprets the text rather than summarizing it. 'Representa la lucha' goes beyond description to argue for a thematic meaning. This is literary analysis."}, {"t": "mc", "q": "'Lo hizo ___ amor, no ___ dinero.' (POR — motivation/cause)", "o": ["para / para", "por / por", "por / para", "para / por"], "a": 1, "e": "'Lo hizo POR amor, no POR dinero' — both are POR because both express motivation/cause (he did it because of love, not because of money). Causes and motivations always use POR. 'Para' would indicate purpose/goal, which doesn't fit here."}, {"t": "sa", "q": "En español: Write a 4–5 sentence paragraph analyzing what you think is the most important theme in any Hispanic literary work you've read or learned about this year. Use the historical present, at least 1 analytical phrase (el autor sugiere que / el texto refleja), and 1 subjunctive construction (es posible que / el lector puede interpretar que...)."}]}, {"day": "Sem. 16, Día 2", "title": "Preparación para el portafolio — reflexión del semestre", "obj": ["Reflect on language growth throughout the semester", "Identify strongest areas and areas for continued growth", "Prepare materials for the final portfolio"], "read": "<p>A language learning portfolio documents your growth over time. Looking back at where you started (your Unit 1 baseline writing) and comparing it to where you are now is one of the most powerful ways to see your real progress.</p><div class='gbox'><h5>Portfolio components for Spanish 3</h5><p>1. <strong>Muestra de escritura de la Unidad 1</strong> — your baseline paragraph from Day 1</p><p>2. <strong>Mejor ensayo del semestre</strong> — your strongest essay or paragraph (your choice)</p><p>3. <strong>Análisis literario</strong> — your literary analysis paragraph</p><p>4. <strong>Escritura creativa</strong> — your creative writing from Unit 6</p><p>5. <strong>Reflexión final</strong> — a reflective essay on your learning (today's activity)</p></div><div class='gbox'><h5>Vocabulario para la reflexión</h5><p>el progreso (progress) · el crecimiento (growth) · el desafío (challenge) · el logro (achievement/accomplishment) · la meta alcanzada (goal achieved) · el área de mejora (area for improvement) · desarrollar habilidades · ganar confianza · superar dificultades · reflexionar sobre... · darse cuenta de que... (to realize that...)</p></div>", "tip": "<div class='cbox'><strong>Sobre el aprendizaje de idiomas:</strong> Research in language acquisition consistently shows that explicit reflection on one's own learning process — metacognition — significantly accelerates language development. When you can articulate what you know, what you don't know, and how you learn best, you become a more effective language learner. Today's reflection is not just an assessment — it is itself a learning activity.</div>", "act": {"t": "Semester reflection essay", "d": "Write a reflection essay of 10–12 sentences on your Spanish 3 learning journey this semester. Address: (1) What grammar structure was most challenging and how did you work through it? (2) What is the most interesting cultural thing you learned about the Spanish-speaking world? (3) Compare your writing from Unit 1 to your writing now — what specifically has improved? (4) What goal do you still want to achieve in Spanish? (5) How do you plan to continue using Spanish outside of class? Use sophisticated, formal Spanish throughout. Include at least 1 subjunctive, 1 conditional, and vocabulary from the reflection vocabulary list."}, "qs": [{"t": "mc", "q": "'Me doy cuenta de que ___ mucho desde el comienzo del semestre.' (progresar — present perfect)", "o": ["progreso", "he progresado", "progresé", "progresan"], "a": 1, "e": "'He progresado' — present perfect for action with present relevance. 'Me doy cuenta de que he progresado mucho' = I realize that I have progressed a lot. The present perfect connects past progress to the current moment of reflection."}, {"t": "mc", "q": "'Si ___ más tiempo, me gustaría estudiar más literatura hispanoamericana.' (tener — hypothetical)", "o": ["tengo", "tendré", "tuviera", "tenga"], "a": 2, "e": "'Tuviera' — imperfect subjunctive for hypothetical si clause. 'Si tuviera más tiempo' = if I had more time (but I don't). The conditional 'me gustaría' in the result clause confirms this is a hypothetical/unreal condition."}, {"t": "mc", "q": "'El mayor ___ de este semestre ha sido perder el miedo a hablar en español.' (accomplishment)", "o": ["desafío", "logro", "progreso", "crecimiento"], "a": 1, "e": "'El logro' = the accomplishment/achievement. 'El mayor logro de este semestre ha sido...' = The greatest accomplishment of this semester has been... 'Desafío' = challenge, 'progreso' = progress, 'crecimiento' = growth — all related but distinct concepts."}, {"t": "sa", "q": "En español: Write 4–5 sentences reflecting on your Spanish learning this semester. What was your greatest challenge? What is your greatest accomplishment? What do you want to keep working on? Use at least 1 subjunctive and 1 conditional."}]}, {"day": "Sem. 16, Día 3", "title": "Evaluación de la Unidad 6 — examen final semestral", "obj": ["Demonstrate mastery of all Spanish 3 Units 1–6 grammar", "Produce sophisticated writing at Intermediate-High level", "Complete the Spanish 3 semester assessment"], "read": "<p><strong>Evaluación Final — Spanish 3 Semestre.</strong> This is your comprehensive semester assessment. Review all major structures from Units 1–6:</p><ul><li>Units 1–2: Present · Preterite · Imperfect · Object pronouns · Reflexives · Gustar-type · Future · Conditional · Present subjunctive (WEIRDO)</li><li>Units 3–4: Imperfect subjunctive · Si clauses · Present perfect · Pluperfect · Adverbial clauses · Reported speech</li><li>Units 5–6: Por vs. para · Passive voice · Formal register · Literary analysis · Historical present</li><li>Vocabulary: environment · technology · family · history · social movements · immigration · professional · literary</li><li>Writing: argumentative essay · compare/contrast · concession · literary analysis · formal correspondence</li></ul><p><strong>ACTFL target:</strong> At Intermediate-High, you can handle a variety of communicative tasks, narrate and describe in all major time frames, deal with a complication or unexpected situation, and produce paragraph-length discourse.</p>", "tip": "<div class='cbox'><strong>Felicitaciones:</strong> Completing Spanish 3 Units 1–6 represents significant linguistic achievement. You have studied the subjunctive mood in three tenses, mastered complex narration across multiple time frames, read and analyzed authentic literature, written professional documents, and engaged with the cultural and historical depth of the Spanish-speaking world. This is Intermediate-High level Spanish — a real, meaningful communicative competency. ¡Buen trabajo!</div>", "act": {"t": "Final semester writing assessment", "d": "Write a comprehensive essay of 12–15 sentences on this prompt: '¿Cómo ha influido la cultura hispanohablante en el mundo y en tu propia vida?' (How has Hispanic/Latin culture influenced the world and your own life?) This is your final showcase of Spanish 3 writing. Include at minimum: 1 example from literature or history (historical present or past tense), 1 professional/future application (conditional), 1 personal connection (first person, subjunctive of emotion or desire), 1 passive construction, 1 use of por and 1 of para, 4 connectors from different categories. Write your best Spanish — show everything you've learned."}, "qs": [{"t": "mc", "q": "Which sentence demonstrates the HIGHEST level of Spanish 3 complexity?", "o": ["La cultura hispanohablante es importante.", "La cultura hispanohablante ha influido en muchos aspectos de la vida moderna.", "A pesar de que la influencia hispanohablante no siempre ha sido reconocida debidamente", " ha quedado demostrado que su impacto en la música", " el arte", " y la política globales ha sido profundo e irreversible.", "La cultura hispanohablante tiene mucha historia e importancia."], "a": 2, "e": "Option C: pluperfect passive ('ha quedado demostrado'), concession ('a pesar de que... no siempre'), present perfect ('ha sido reconocida,' 'ha sido profundo'), formal vocabulary ('reconocida debidamente,' 'irreversible'), parallel structure ('música, arte, política'). This is Intermediate-High writing."}, {"t": "mc", "q": "'La novela fue escrita ___ Gabriel García Márquez durante su exilio en México.' (by — passive agent)", "o": ["para", "por", "de", "a"], "a": 1, "e": "'Por' — passive agent. True passive uses 'por' to introduce the agent (who performed the action): 'fue escrita POR García Márquez.' 'Para' would indicate purpose, not authorship. This is one of the most important uses of 'por.'"}, {"t": "mc", "q": "'Ojalá que los jóvenes de hoy ___ la riqueza de la cultura hispanohablante.' (apreciar)", "o": ["aprecian", "aprecien", "apreciarán", "apreciaran"], "a": 1, "e": "'Aprecien' — present subjunctive. 'Ojalá que' = the O in WEIRDO → always subjunctive. Main verb in this context is present/implied present → present subjunctive. 'Ojalá que aprecien' = I hope that they (will) appreciate."}, {"t": "sa", "q": "En español: Write your best 5–6 sentence paragraph about what learning Spanish has meant to you this year. This is your final reflective response. Use sophisticated, formal Spanish with varied grammar. Include
