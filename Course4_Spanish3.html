 at least 2 advanced structures (subjunctive, conditional, present perfect, passive, or adverbial clause) and express genuine, personal reflection."}]}]}];

let scores=JSON.parse(localStorage.getItem('sp3_complete')||'{}');
let cu=0,cl=0,curAns={},submitted=false,view='welcome';
function lk(u,l){return u+'_'+l}
function save(){localStorage.setItem('sp3_complete',JSON.stringify(scores))}
function showTab(t,btn){
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(t==='grades')renderGradebook();
  else if(t==='toc')renderTOC();
  else renderLesson(cu,cl);
}
function buildNav(){
  const ul=document.getElementById('unit-list');ul.innerHTML='';
  U.forEach((u,ui)=>{
    const done=u.lessons.filter((_,li)=>scores[lk(ui,li)]!==undefined).length;
    const ub=document.createElement('button');ub.className='unit-btn'+(ui===cu&&view==='lesson'?' active':'');
    ub.innerHTML='<span style="font-size:10px;line-height:1.3">'+u.title+'</span><span class="badge '+(done===u.lessons.length?'done':'')+'">'+done+'/'+u.lessons.length+'</span>';
    ub.onclick=((_ui,_ub)=>()=>toggleUnit(_ui,_ub))(ui,ub);ul.appendChild(ub);
    const ll=document.createElement('div');ll.className='lesson-list';ll.id='ll'+ui;ll.style.display=ui===cu&&view==='lesson'?'block':'none';
    u.lessons.forEach((les,li)=>{
      const sc=scores[lk(ui,li)];const lb=document.createElement('button');
      lb.className='lesson-btn'+(ui===cu&&li===cl&&view==='lesson'?' active':'')+(sc!==undefined?' completed':'');
      lb.innerHTML='<span>'+les.day+'</span>'+(sc!==undefined?'<span class="score-pill">'+Math.round(sc)+'%</span>':'');
      lb.title=les.title;lb.onclick=((_ui,_li)=>()=>go(_ui,_li))(ui,li);ll.appendChild(lb);
    });ul.appendChild(ll);
  });
}
function toggleUnit(ui,btn){
  document.querySelectorAll('.unit-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.lesson-list').forEach(ll=>ll.style.display='none');
  document.getElementById('ll'+ui).style.display='block';
  cu=ui;go(ui,0);
}
function go(ui,li){
  cu=ui;cl=li;view='lesson';curAns={};submitted=false;
  document.querySelectorAll('.nav-tab').forEach((b,i)=>{b.classList.toggle('active',i===0);});
  buildNav();renderLesson(ui,li);
}
function renderLesson(ui,li){
  const u=U[ui],les=u.lessons[li];
  const total=U.reduce((s,x)=>s+x.lessons.length,0);const done=Object.keys(scores).length;
  document.getElementById('tb-title').textContent=les.title;
  document.getElementById('tb-meta').textContent=u.title+' · '+les.day;
  document.getElementById('tb-prog').textContent=done+'/'+total+' completados';
  const sc=scores[lk(ui,li)];
  let h='<div class="content"><div class="unit-label">'+u.title+' · '+u.weeks+'</div>';
  h+='<div class="lesson-title">'+les.title+'</div>';
  h+='<div class="day-meta">'+les.day+' · Calming Minds Day School</div>';
  h+='<div class="section"><div class="sec-head">Objetivos</div><ul>'+les.obj.map(o=>'<li>'+o+'</li>').join('')+'</ul></div>';
  h+='<div class="section"><div class="sec-head">Lectura y gramática</div>'+les.read+'</div>';
  h+='<div class="section"><div class="sec-head">Nota cultural</div>'+les.tip+'</div>';
  h+='<div class="section"><div class="sec-head">Actividad</div><div class="act-box"><h5>'+les.act.t+'</h5><p>'+les.act.d+'</p><textarea class="sa-box" placeholder="Escribe aquí tus notas..." rows="4"></textarea></div></div>';
  h+='<div class="quiz-wrap"><h4>Quiz de la lección</h4><div class="quiz-sub">'+les.qs.length+' preguntas · Envía para guardar tu nota</div>';
  les.qs.forEach((q,qi)=>{
    h+='<div class="question"><p>'+(qi+1)+'. '+q.q+'</p>';
    if(q.t==='mc'){q.o.forEach((opt,oi)=>{h+='<button class="option" id="o'+qi+'_'+oi+'" onclick="pick('+qi+','+oi+')"><span class="opt-letter">'+String.fromCharCode(65+oi)+'</span><span class="opt-text">'+opt+'</span></button>';});}
    else{h+='<textarea class="sa-box" id="sa'+qi+'" placeholder="Escribe tu respuesta (3-5 oraciones)..." rows="5"></textarea>';}
    h+='<div id="fb'+qi+'"></div></div>';
  });
  let nav='';
  if(li>0)nav+='<button class="btn btn-secondary" onclick="go('+ui+','+(li-1)+')">← Anterior</button>';
  nav+='<button class="btn btn-primary" onclick="submitQ()">Enviar</button>';
  if(li<u.lessons.length-1)nav+='<button class="btn btn-next" onclick="go('+ui+','+(li+1)+')">Siguiente →</button>';
  else if(ui<U.length-1)nav+='<button class="btn btn-next" onclick="go('+(ui+1)+',0)">Siguiente unidad →</button>';
  h+='<div class="quiz-footer"><div class="score-box"><div class="score-num" id="snum">'+(sc!==undefined?Math.round(sc)+'%':'—')+'</div><div class="score-lbl">Nota</div></div><div style="display:flex;gap:8px;flex-wrap:wrap">'+nav+'</div></div></div></div>';
  document.getElementById('content').innerHTML=h;
  if(sc!==undefined)showPrev(ui,li);
}
function pick(qi,oi){if(submitted)return;document.querySelectorAll('[id^="o'+qi+'_"]').forEach(b=>b.classList.remove('selected'));document.getElementById('o'+qi+'_'+oi).classList.add('selected');curAns[qi]=oi;}
function submitQ(){
  const les=U[cu].lessons[cl];submitted=true;let mc=0,mct=0,sa=0;
  les.qs.forEach((q,qi)=>{
    if(q.t==='mc'){mct++;const sel=curAns[qi];
      if(sel===undefined){document.getElementById('fb'+qi).innerHTML='<div class="fb bad">Sin respuesta. Correcto: '+String.fromCharCode(65+q.a)+'</div>';}
      else if(sel===q.a){mc++;document.getElementById('o'+qi+'_'+sel).classList.add('correct');document.getElementById('fb'+qi).innerHTML='<div class="fb ok">¡Correcto! '+q.e+'</div>';}
      else{document.getElementById('o'+qi+'_'+sel).classList.add('wrong');document.getElementById('o'+qi+'_'+q.a).classList.add('correct');document.getElementById('fb'+qi).innerHTML='<div class="fb bad">Incorrecto. Correcto: '+String.fromCharCode(65+q.a)+'. '+q.e+'</div>';}
    }else{sa++;const el=document.getElementById('sa'+qi);if(el&&el.value.trim().length>15){document.getElementById('fb'+qi).innerHTML='<div class="fb ok">Respuesta guardada. Tu instructor la revisará.</div>';}else{document.getElementById('fb'+qi).innerHTML='<div class="fb bad">Por favor escribe una respuesta más completa.</div>';}}
  });
  const total=mct+sa;const score=total>0?(((mct>0?(mc/mct)*100:0)*mct+(sa>0?85:0)*sa)/total):100;
  scores[lk(cu,cl)]=score;save();document.getElementById('snum').textContent=Math.round(score)+'%';buildNav();
}
function showPrev(ui,li){submitted=true;U[ui].lessons[li].qs.forEach((q,qi)=>{if(q.t==='mc'){const fb=document.getElementById('fb'+qi);if(fb)fb.innerHTML='<div class="fb ok">Ya enviado. Vuelve a enviar para actualizar.</div>';}});}
function renderTOC(){
  view='toc';
  document.getElementById('tb-title').textContent='Tabla de contenidos';
  document.getElementById('tb-meta').textContent='Español 3 · Calming Minds Day School';
  const total=U.reduce((s,x)=>s+x.lessons.length,0);
  const done=Object.keys(scores).length;
  document.getElementById('tb-prog').textContent=done+'/'+total+' completados';
  let h='<div class="toc"><h2>Español 3 — Tabla de contenidos</h2><p>Calming Minds Day School · 11.º Grado · NC World Languages · 6 unidades · '+total+' lecciones</p>';
  U.forEach((u,ui)=>{
    const done2=u.lessons.filter((_,li)=>scores[lk(ui,li)]!==undefined).length;
    h+='<div class="toc-unit"><h3 onclick="go('+ui+',0)">'+u.title+' <span style="font-weight:400;color:#666">'+u.weeks+'</span> <span style="font-weight:400;float:right">'+done2+'/'+u.lessons.length+'</span></h3>';
    u.lessons.forEach((les,li)=>{
      const sc=scores[lk(ui,li)];
      h+='<div class="toc-lesson" onclick="go('+ui+','+li+')">'+(li+1)+'. '+les.title+(sc!==undefined?' <span style="color:#2E7D32;font-size:12px">✓ '+Math.round(sc)+'%</span>':'')+'</div>';
    });
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('content').innerHTML=h;
  buildNav();
}
function renderGradebook(){
  view='grades';
  const total=U.reduce((s,u)=>s+u.lessons.length,0);const done=Object.keys(scores).length;
  const all=Object.values(scores);const avg=all.length>0?all.reduce((a,b)=>a+b,0)/all.length:0;
  const gpa=avg>=90?4.0:avg>=80?3.0:avg>=70?2.0:avg>=60?1.0:0;
  document.getElementById('tb-title').textContent='Libro de notas';
  document.getElementById('tb-meta').textContent='Español 3 · Calming Minds Day School';
  document.getElementById('tb-prog').textContent=done+'/'+total+' completados';
  function pill(sc){if(sc===undefined)return '<span class="gpill p">Pendiente</span>';const g=sc>=90?'a':sc>=80?'b':sc>=70?'c':'f';const l=sc>=90?'A':sc>=80?'B':sc>=70?'C':sc>=60?'D':'F';return '<span class="gpill '+g+'">'+l+' ('+Math.round(sc)+'%)</span>';}
  let h='<div class="gb"><h2>Notas — Español 3 (Curso completo)</h2>';
  h+='<p style="font-size:13px;color:#666;margin-bottom:16px">Calming Minds Day School · 1 Crédito · 11.º Grado · NC World Languages Standards</p>';
  h+='<button class="print-btn" onclick="window.print()">Imprimir reporte de notas</button>';
  h+='<div class="stat-row"><div class="stat-card"><div class="stat-val">'+Math.round(avg)+'%</div><div class="stat-lbl">Promedio del curso</div></div><div class="stat-card"><div class="stat-val">'+done+'/'+total+'</div><div class="stat-lbl">Lecciones completadas</div></div><div class="stat-card"><div class="stat-val">'+gpa.toFixed(1)+'</div><div class="stat-lbl">GPA equivalente</div></div></div>';
  U.forEach((u,ui)=>{
    const unitScores=u.lessons.map((_,li)=>scores[lk(ui,li)]).filter(s=>s!==undefined);
    const unitAvg=unitScores.length?Math.round(unitScores.reduce((a,b)=>a+b,0)/unitScores.length):null;
    h+='<div class="gb-unit"><h3>'+u.title+' · '+u.weeks+(unitAvg!==null?' <span style="font-weight:400;float:right">Promedio: '+unitAvg+'%</span>':'')+'</h3>';
    h+='<div class="gb-row hdr"><span>Lección</span><span>Día</span><span>Nota</span><span>Calif.</span></div>';
    u.lessons.forEach((les,li)=>{
      const sc=scores[lk(ui,li)];
      h+='<div class="gb-row"><span style="cursor:pointer;color:#1a4a2e" onclick="go('+ui+','+li+')">'+les.title+'</span><span style="color:#888">'+les.day+'</span><span>'+(sc!==undefined?Math.round(sc)+'%':'—')+'</span><span>'+pill(sc)+'</span></div>';
    });
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('content').innerHTML=h;
  buildNav();
}
