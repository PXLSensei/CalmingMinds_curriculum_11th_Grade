<script>
const U=[{"title": "Unit 1: Repaso y Reactivación", "weeks": "Semanas 1–2", "lessons": [{"day": "Sem. 1, Día 1", "title": "Bienvenidos — overview and self-assessment", "obj": ["Understand the Intermediate-Mid to Intermediate-High target", "Complete a baseline self-assessment", "Activate Spanish you already know"], "read": "<p>¡Bienvenidos a Español 3! This course targets <strong>Intermediate-Mid to Intermediate-High</strong> (ACTFL) proficiency. You move from simple sentences to paragraph-length speech, organized multi-paragraph writing, and authentic text reading.</p><p>You have the building blocks from Spanish 1 and 2. Spanish 3 makes them automatic and adds new structures: the subjunctive mood, conditional tense, complex narration, and communication on real-world topics.</p><p><strong>Four skills — balanced equally:</strong></p><ul><li><strong>Hablar:</strong> Opinions and narratives at paragraph length, handling unexpected questions</li><li><strong>Escuchar:</strong> Authentic native-speaker speech at natural speed</li><li><strong>Leer:</strong> Real texts — news articles, short stories, documents</li><li><strong>Escribir:</strong> Multi-paragraph essays with correct grammar and varied vocabulary</li></ul><p><strong>NC Five Cs:</strong> Communication · Cultures · Connections · Comparisons · Communities</p><div class='vocab-grid'><div class='vocab-item'><div class='vocab-es'>sin embargo</div><div class='vocab-en'>however / nevertheless</div></div><div class='vocab-item'><div class='vocab-es'>a pesar de (que)</div><div class='vocab-en'>in spite of / despite</div></div><div class='vocab-item'><div class='vocab-es'>por lo tanto</div><div class='vocab-en'>therefore / thus</div></div><div class='vocab-item'><div class='vocab-es'>además</div><div class='vocab-en'>furthermore / in addition</div></div><div class='vocab-item'><div class='vocab-es'>ya que / puesto que</div><div class='vocab-en'>since / given that</div></div><div class='vocab-item'><div class='vocab-es'>aunque</div><div class='vocab-en'>although / even though</div></div><div class='vocab-item'><div class='vocab-es'>de hecho</div><div class='vocab-en'>in fact</div></div><div class='vocab-item'><div class='vocab-es'>es decir</div><div class='vocab-en'>that is / in other words</div></div></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> There are ~500 million native Spanish speakers worldwide. The US has ~42 million — more than Spain. Spanish is official in 20 countries across four continents, each with distinct accents, vocabulary, and cultural traditions.</div>", "act": {"t": "Baseline self-assessment", "d": "Part 1: Rate yourself 1–4 on each skill (1=very rusty, 4=confident): Speaking · Listening · Reading · Writing. Write one sentence explaining each rating. Part 2: Without looking anything up, write 4–5 sentences in Spanish about yourself — name, where you live, something you enjoy, one thing you did last week."}, "qs": [{"t": "mc", "q": "ACTFL proficiency target for Spanish 3:", "o": ["Novice-High to Intermediate-Low", "Intermediate-Mid to Intermediate-High", "Advanced-Low to Advanced-Mid", "Superior"], "a": 1, "e": "Spanish 3 targets Intermediate-Mid to Intermediate-High — paragraph-length connected speech, organized writing, and authentic text comprehension."}, {"t": "mc", "q": "Which connector means 'however'?", "o": ["además", "aunque", "sin embargo", "por lo tanto"], "a": 2, "e": "'Sin embargo' = however/nevertheless. 'Además' = furthermore, 'aunque' = although, 'por lo tanto' = therefore."}, {"t": "mc", "q": "NC World Language standards are organized around:", "o": ["Grammar rules and translation", "Communication", " Cultures", " Connections", " Comparisons", " Communities", "Vocabulary memorization only", "Test preparation"], "a": 1, "e": "The five Cs: Communication, Cultures, Connections, Comparisons, Communities — language learned in meaningful real-world contexts."}, {"t": "sa", "q": "En español: Write 4–5 sentences about yourself. Include name, where you live, something you enjoy, and one thing you did recently. This is your writing baseline."}]}, {"day": "Sem. 1, Día 2", "title": "Presente de indicativo — regular and key irregular verbs", "obj": ["Review all present tense patterns automatically", "Master 10 essential irregular verbs", "Apply SER vs. ESTAR including the event-location rule"], "read": "<p>Present tense conjugation must be automatic at Spanish 3 — under 3 seconds per verb. Today we lock in patterns and irregular verbs you need all year.</p><div class='gbox'><h5>Regular patterns</h5><p><strong>-AR (hablar):</strong> hablo · hablas · habla · hablamos · habláis · hablan</p><p><strong>-ER (comer):</strong> como · comes · come · comemos · coméis · comen</p><p><strong>-IR (vivir):</strong> vivo · vives · vive · vivimos · vivís · viven</p></div><div class='gbox'><h5>10 essential irregular verbs</h5><p><strong>ser:</strong> soy · eres · es · somos · sois · son</p><p><strong>estar:</strong> estoy · estás · está · estamos · estáis · están</p><p><strong>tener:</strong> tengo · tienes · tiene · tenemos · tenéis · tienen</p><p><strong>ir:</strong> voy · vas · va · vamos · vais · van</p><p><strong>hacer:</strong> hago · haces · hace · hacemos · hacéis · hacen</p><p><strong>poder:</strong> puedo · puedes · puede · podemos · podéis · pueden</p><p><strong>querer:</strong> quiero · quieres · quiere · queremos · queréis · quieren</p><p><strong>saber:</strong> sé · sabes · sabe · sabemos · sabéis · saben</p><p><strong>conocer:</strong> conozco · conoces · conoce · conocemos · conocéis · conocen</p><p><strong>decir:</strong> digo · dices · dice · decimos · decís · dicen</p></div><div class='gbox'><h5>SER vs. ESTAR — critical distinction</h5><p>SER (DOCTOR): Descripción · Origen · Características · Tiempo/fecha · Ocupación · Relación</p><p>ESTAR (LECHA): Location · Emotion · Condition · Health · Action (progressive)</p><p><strong>Event locations = SER:</strong></p><p class='ex'>La boda <strong>es</strong> en el jardín. ✓ &nbsp; La boda <strong>está</strong> en el jardín. ✗</p><p><strong>Meaning-changers:</strong></p><p class='ex'>Es aburrido. (boring person) / Está aburrido. (currently bored)</p><p class='ex'>Es listo. (clever) / Está listo. (ready)</p><p class='ex'>Es malo. (bad/evil) / Está malo. (sick)</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> 'Saber' vs. 'conocer' — both mean 'to know' but differently. 'Saber' = know facts/skills: 'Sé tocar la guitarra.' 'Conocer' = know/be acquainted with people/places: 'Conozco a María. Conozco Madrid.' This distinction has no English equivalent.</div>", "act": {"t": "Speed conjugation + sentences", "d": "Time yourself conjugating all six forms of each verb. Goal: under 10 seconds. Verbs: trabajar · beber · vivir · ser · estar · hacer · saber · conocer. Then write one true sentence using each verb from your own life. Finally write 2 sentences using the SAME adjective with SER and ESTAR to show the meaning difference."}, "qs": [{"t": "mc", "q": "'Nosotros ___ en Carolina del Norte.' (vivir)", "o": ["vivemos", "vivimos", "vivamos", "vivís"], "a": 1, "e": "'Vivimos' — nosotros form of -IR verbs = -imos. -AR nosotros = -amos, -ER = -emos, -IR = -imos."}, {"t": "mc", "q": "'Mi hermana ___ muy cansada hoy.' Which verb?", "o": ["es", "ser", "está", "son"], "a": 2, "e": "'Está' — ESTAR for temporary conditions. 'Cansada' is a temporary physical state, not a defining personality trait."}, {"t": "mc", "q": "'El concierto ___ en el parque esta noche.' Which verb?", "o": ["está", "estamos", "es", "va"], "a": 2, "e": "'Es' — SER for event locations. Critical exception: events use SER, not ESTAR. 'El concierto es en el parque.'"}, {"t": "sa", "q": "En español: Write 4 sentences using: one SER, one ESTAR, one TENER, one HACER. Each must be a true statement about your life."}]}, {"day": "Sem. 1, Día 3", "title": "Pretérito — narrating completed past events", "obj": ["Review preterite for regular and 9 key irregular verbs", "Use preterite time expressions", "Write a sequential past narrative"], "read": "<p>The preterite tells what <em>happened</em> — completed actions with a defined beginning and end. At Spanish 3, you narrate fluently with multiple preterite verbs and sequence connectors.</p><div class='gbox'><h5>Regular preterite</h5><p><strong>-AR (hablar):</strong> hablé · hablaste · habló · hablamos · hablasteis · hablaron</p><p><strong>-ER/-IR:</strong> comí · comiste · comió · comimos · comisteis · comieron</p></div><div class='gbox'><h5>9 key irregular preterites</h5><p><strong>ser/ir (identical):</strong> fui · fuiste · fue · fuimos · fuisteis · fueron</p><p><strong>tener:</strong> tuve · tuviste · tuvo · tuvimos · tuvisteis · tuvieron</p><p><strong>estar:</strong> estuve · estuviste · estuvo · estuvimos · estuvisteis · estuvieron</p><p><strong>hacer:</strong> hice · hiciste · hizo · hicimos · hicisteis · hicieron</p><p><strong>poder:</strong> pude · pudiste · pudo · pudimos · pudisteis · pudieron</p><p><strong>querer:</strong> quise · quisiste · quiso · quisimos · quisisteis · quisieron</p><p><strong>venir:</strong> vine · viniste · vino · vinimos · vinisteis · vinieron</p><p><strong>decir:</strong> dije · dijiste · dijo · dijimos · dijisteis · dijeron</p><p><strong>saber:</strong> supe · supiste · supo · supimos · supisteis · supieron</p></div><div class='gbox'><h5>Preterite time expressions</h5><p>ayer · anoche · la semana pasada · el mes pasado · hace dos días · de repente · por fin · primero · luego · después · finalmente</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> In Spain, the present perfect ('he comido') is used where Latin American speakers use the preterite ('comí'). '¿Qué has hecho hoy?' (Spain) = '¿Qué hiciste hoy?' (Latin America). Spanish 3 uses the Latin American preterite, standard in the US context.</div>", "act": {"t": "Past narrative paragraph", "d": "Write 7–8 sentences about last weekend. Rules: (1) Preterite throughout. (2) At least 4 different verbs, at least 2 irregular. (3) Use sequence connectors: primero, luego, después, por fin, de repente. Start: 'El fin de semana pasado...'"}, "qs": [{"t": "mc", "q": "'Ayer yo ___ al centro comercial.' (ir)", "o": ["fui", "fue", "iba", "voy"], "a": 0, "e": "'Fui' — yo form of ir/ser preterite. Context tells you which verb. 'Ayer' signals specific completed past."}, {"t": "mc", "q": "'Ellos ___ la tarea muy rápido.' (hacer)", "o": ["hacieron", "hicieron", "hizo", "hacen"], "a": 1, "e": "'Hicieron' — ellos form. Irregular: hice/hiciste/hizo/hicimos/hicisteis/hicieron. Note: yo=hice, él=hizo."}, {"t": "mc", "q": "Which signals preterite, NOT imperfect?", "o": ["siempre", "todos los días", "anoche", "generalmente"], "a": 2, "e": "'Anoche' (last night) = specific completed past → preterite. 'Siempre,' 'todos los días,' 'generalmente' = habitual past → imperfect."}, {"t": "sa", "q": "En español: Write 4–5 sentences narrating a specific past event. At least 3 preterite verbs, at least 2 irregular."}]}, {"day": "Sem. 1, Día 4", "title": "Imperfecto — background, habit, and past description", "obj": ["Master the imperfect's three main uses", "Know the only 3 irregular imperfects (ser, ir, ver)", "Combine preterite and imperfect to tell complete stories"], "read": "<p>The imperfect expresses: (1) habitual/repeated past actions, (2) ongoing background in the past, (3) mental/emotional states and descriptions in the past.</p><div class='gbox'><h5>Regular imperfect</h5><p><strong>-AR (hablar):</strong> hablaba · hablabas · hablaba · hablábamos · hablabais · hablaban</p><p><strong>-ER/-IR:</strong> comía · comías · comía · comíamos · comíais · comían</p></div><div class='gbox'><h5>Only 3 irregular imperfects</h5><p><strong>ser:</strong> era · eras · era · éramos · erais · eran</p><p><strong>ir:</strong> iba · ibas · iba · íbamos · ibais · iban</p><p><strong>ver:</strong> veía · veías · veía · veíamos · veíais · veían</p></div><div class='gbox'><h5>Preterite vs. Imperfect</h5><p class='ex'>De niña, <strong>vivía</strong> en Texas. (habitual — imperfect)</p><p class='ex'>El año pasado, <strong>viví</strong> en Texas. (specific period — preterite)</p><p class='ex'>Cuando <strong>llegué</strong>, todos <strong>hablaban</strong>. (preterite interrupts imperfect)</p><p><strong>Imperfect signals:</strong> siempre · todos los días · de niño/a · generalmente · a veces · cuando era joven</p></div>", "tip": "<div class='cbox'><strong>Consejo:</strong> Think of the imperfect as the STAGE (ongoing background) and the preterite as the ACTION on that stage. 'Llovía cuando llegamos' — rain (imperfect) was happening when we arrived (preterite). Native speakers combine these automatically in every story.</div>", "act": {"t": "Childhood memories paragraph", "d": "Write 7–8 sentences about your childhood. Include: where you lived (imperfect), what you liked to do (imperfect), what you were like as a child (imperfect), AND one specific memory (preterite). Start: 'Cuando era pequeño/a...' Include at least one 'cuando + preterite' interrupting an imperfect background."}, "qs": [{"t": "mc", "q": "'De niño, mi abuelo siempre ___ el periódico.' (leer)", "o": ["leyó", "leía", "leerá", "lee"], "a": 1, "e": "'Leía' — imperfect. 'Siempre' + habitual past routine = imperfect. Reading the newspaper was an ongoing habit, not a single completed event."}, {"t": "mc", "q": "'Yo ___ la tarea cuando mi mamá me ___ por teléfono.' (hacer/llamar)", "o": ["hice / llamó", "hacía / llamó", "hice / llamaba", "hacía / llamaba"], "a": 1, "e": "'Hacía' (imperfect — ongoing) + 'llamó' (preterite — interrupting event). Homework was in progress when the call happened."}, {"t": "mc", "q": "'De niña, me ___ mucho la música.' (gustar)", "o": ["gustó", "gustaba", "gusta", "gusto"], "a": 1, "e": "'Gustaba' — imperfect for habitual mental state. 'De niña' + ongoing preference = imperfect. 'Gustó' would mean she liked it on one specific occasion."}, {"t": "sa", "q": "En español: Write 3 sentences using the imperfect (life 5 years ago) and 1 sentence using the preterite (a specific event from that time)."}]}, {"day": "Sem. 1, Día 5", "title": "Pronombres de objeto — direct, indirect, and doubles", "obj": ["Review direct and indirect pronouns and placement rules", "Apply the le→se rule before lo/la/los/las", "Use double pronouns naturally"], "read": "<p>Object pronouns replace nouns to avoid repetition — they appear in virtually every Spanish conversation. Placement rules are rigid but consistent.</p><div class='gbox'><h5>Direct object pronouns (what/whom receives the action)</h5><p>me · te · <strong>lo/la</strong> · nos · os · <strong>los/las</strong></p><p class='ex'>¿Tienes el libro? → Sí, <strong>lo</strong> tengo.</p></div><div class='gbox'><h5>Indirect object pronouns (to/for whom)</h5><p>me · te · <strong>le</strong> · nos · os · <strong>les</strong></p><p class='ex'><strong>Le</strong> doy el libro a ella. / ¿<strong>Me</strong> puedes ayudar?</p></div><div class='gbox'><h5>Double pronouns — two critical rules</h5><p>1. IO (indirect) ALWAYS before DO (direct)</p><p>2. le/les → <strong>se</strong> before lo/la/los/las</p><p class='ex'>Te lo doy. ✓ &nbsp; Se lo explico. ✓ &nbsp; Le lo explico. ✗</p><p><strong>Placement:</strong> BEFORE conjugated verb · ATTACHED to infinitive/gerund · ATTACHED to affirmative commands · BEFORE negative commands</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> In Spain, 'leísmo' uses 'le' instead of 'lo' for masculine persons: 'Le vi' instead of 'Lo vi' (I saw him). Accepted in Spain but avoided in Latin American Spanish. Spanish 3 follows the Latin American standard.</div>", "act": {"t": "Pronoun replacement drill", "d": "Rewrite each sentence replacing underlined words with pronouns. Write the complete new sentence. 1) Compré [los zapatos] para [mi mamá]. 2) Ella dio [el regalo] a [nosotros]. 3) ¿Puedes explicar [la tarea] a [mí]? 4) Voy a mandar [el correo] a [mis amigos]. 5) La profesora enseña [español] a [los estudiantes]. Identify: direct pronoun, indirect pronoun, does le/les → se apply?"}, "qs": [{"t": "mc", "q": "'Quiero dar el regalo a María.' With pronouns: 'Quiero ___'", "o": ["darle lo", "se lo dar", "dárselo", "le lo dar"], "a": 2, "e": "'Dárselo' — IO (le→se before lo) + DO (lo), attached to infinitive. When le/les precede lo/la, they become 'se.'"}, {"t": "mc", "q": "'¿Ya ___ explicaste el problema a tus padres?' (replacing 'a tus padres')", "o": ["lo", "la", "les", "se"], "a": 2, "e": "'Les' — 'a tus padres' is the indirect object (to them) → IO pronoun 'les.' 'Lo/la' replaces the direct object (the problem)."}, {"t": "mc", "q": "'¡No ___ cuentes el secreto!' (the secret, to her)", "o": ["se lo", "lo se", "le lo", "lo le"], "a": 0, "e": "'¡No se lo cuentes!' — negative commands: pronouns BEFORE the verb. IO (le→se before lo) + DO (lo): 'se lo.'"}, {"t": "sa", "q": "En español: Write 3 sentences using BOTH a direct AND indirect object pronoun in each. Each involves giving, telling, or showing something to someone."}]}, {"day": "Sem. 2, Día 1", "title": "Verbos reflexivos y cambio de estado", "obj": ["Review reflexive verb conjugation", "Master change-of-state reflexives (ponerse, hacerse, volverse)", "Use reflexives in past tense narration"], "read": "<p>Reflexive verbs show the subject acting on itself — essential for daily routines and, at Spanish 3, for expressing changes in state.</p><div class='gbox'><h5>Reflexive pronouns</h5><p>me (yo) · te (tú) · se (él/ella/Ud.) · nos (nosotros) · os (vosotros) · se (ellos/Uds.)</p><p class='ex'>Yo <strong>me</strong> levanto a las siete. / Ella <strong>se</strong> viste rápido.</p></div><div class='gbox'><h5>Common daily routine reflexives</h5><p>levantarse · acostarse (o→ue) · ducharse · bañarse · afeitarse · maquillarse · peinarse · cepillarse los dientes · vestirse (e→i) · despertarse (e→ie) · dormirse (o→ue) · quedarse · irse · sentarse (e→ie)</p></div><div class='gbox'><h5>Change-of-state reflexives — key Spanish 3 vocabulary</h5><p><strong>ponerse + adj</strong> (sudden temporary change): <span class='ex'>Me puse nervioso antes del examen.</span></p><p><strong>volverse + adj</strong> (dramatic/permanent change): <span class='ex'>Se volvió muy serio.</span></p><p><strong>hacerse + noun/adj</strong> (through effort): <span class='ex'>Se hizo médica.</span></p><p><strong>llegar a ser</strong> (gradually over time): <span class='ex'>Llegó a ser presidenta.</span></p><p>Also: aburrirse · enojarse · alegrarse · cansarse · enamorarse (de) · preocuparse (por)</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> 'La sobremesa' — conversation that continues at the table after finishing a meal — is a valued tradition in Spain and Latin America, lasting an hour or more. In many Spanish-speaking countries, the midday meal is the main meal, shared with family. This cultural rhythm shapes daily routines.</div>", "act": {"t": "Daily routine + change of state", "d": "Write 8–9 sentences describing your complete daily routine. Include: at least 7 reflexive verbs, specific times, at least 1 change-of-state reflexive (ponerse, enojarse, alegrarse, etc.) in natural context, and 2 sentences in PRETERITE about something specific from yesterday's routine."}, "qs": [{"t": "mc", "q": "'Por las mañanas, mi hermano ___ muy tarde.' (levantarse)", "o": ["se levanta", "me levanta", "levanta", "se levantas"], "a": 0, "e": "'Se levanta' — third person singular reflexive. Pronoun 'se' matches subject 'mi hermano.'"}, {"t": "mc", "q": "'Nosotros ___ mucho en esa clase.' (aburrirse)", "o": ["nos aburrimos", "se aburrimos", "aburrimos", "nos aburremos"], "a": 0, "e": "'Nos aburrimos' — nosotros reflexive. Pronoun = nos; conjugation follows regular -IR nosotros = -imos."}, {"t": "mc", "q": "'Después de estudiar medicina ocho años, Elena ___.' (she became a doctor through effort)", "o": ["se puso médica", "se volvió médica", "se hizo médica", "llegó médica"], "a": 2, "e": "'Se hizo médica' — hacerse + profession = becoming through effort and process. Ponerse = sudden change; volverse = dramatic personality change; hacerse = becoming through work/study."}, {"t": "sa", "q": "En español: Describe tu rutina de ayer usando al menos 5 verbos reflexivos en el PRETÉRITO. Incluye un verbo de cambio de estado."}]}, {"day": "Sem. 2, Día 2", "title": "Verbos como gustar — opinions and preferences", "obj": ["Review the gustar structure completely", "Master 9 essential gustar-type verbs", "Use these verbs naturally in writing and conversation"], "read": "<p>Gustar-type verbs: what you like is the grammatical subject, and you are the indirect object. This structure appears constantly in both formal and informal communication.</p><div class='gbox'><h5>How gustar works</h5><p>Me <strong>gusta</strong> el libro. (sing. subject → gusta)</p><p>Me <strong>gustan</strong> los libros. (pl. subject → gustan)</p><p>¿Te <strong>gusta</strong> bailar? (infinitive → always singular)</p><p>Me <strong>gusta</strong> que llegues temprano. (que-clause → singular)</p><p>Emphasis: <span class='ex'>A mí me gusta, pero a ella no le gusta.</span></p></div><div class='gbox'><h5>9 essential gustar-type verbs</h5><p><strong>encantar:</strong> Me encanta la música. (I love music.)</p><p><strong>molestar:</strong> Me molesta el ruido. (Noise bothers me.)</p><p><strong>interesar:</strong> Me interesan las ciencias. (Science interests me.)</p><p><strong>importar:</strong> No me importa el dinero.</p><p><strong>parecer:</strong> Me parece interesante.</p><p><strong>faltar:</strong> Me faltan dos páginas. (I'm missing two pages.)</p><p><strong>quedar:</strong> ¿Te queda bien la chaqueta? (Does it fit?)</p><p><strong>doler:</strong> Me duele la cabeza.</p><p><strong>caer bien/mal:</strong> Me cae bien tu amigo. (I like his personality.)</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> 'Caerle bien' vs. 'gustar' — 'me gusta mi nuevo vecino' typically implies romantic interest. 'Me cae bien mi nuevo vecino' = I like his personality/character. Always use 'caer bien' for teachers, neighbors, coworkers. This distinction shows real linguistic and cultural competency.</div>", "act": {"t": "Opinion paragraph with gustar-type verbs", "d": "Write 7–8 sentences sharing genuine opinions about 4 topics. Use a DIFFERENT gustar-type verb for each (not just gustar!): la música · las matemáticas · hacer ejercicio · cocinar · las redes sociales · el trabajo en grupo · los animales · el invierno. Include: 1 negative opinion, 1 comparison (A mí me... pero a mi familia le/les...), 1 que-clause (Me molesta que... / Me alegra que...)."}, "qs": [{"t": "mc", "q": "'A nosotros ___ los deportes de equipo.' (gustar)", "o": ["nos gusta", "nos gustan", "les gustan", "me gustan"], "a": 1, "e": "'Nos gustan' — 'los deportes de equipo' is PLURAL → gustan. IO pronoun 'nos' matches 'nosotros.' Agreement is with the grammatical subject."}, {"t": "mc", "q": "'Me ___ mucho que llegues tarde siempre.' (molestar)", "o": ["molesta", "molestan", "molesto", "molestes"], "a": 0, "e": "'Molesta' — singular. Grammatical subject is the que-clause 'que llegues tarde.' Que-clauses always take the singular form of gustar-type verbs."}, {"t": "mc", "q": "To say 'I like my new teacher (as a person)' most naturally:", "o": ["Me gusta mi nueva profesora.", "Me cae bien mi nueva profesora.", "Me encanta mi nueva profesora.", "Quiero a mi nueva profesora."], "a": 1, "e": "'Me cae bien' = like someone's personality/character. 'Me gusta' about a person implies romantic interest. 'Me cae bien' is appropriate for teachers, coworkers, neighbors."}, {"t": "sa", "q": "En español: Write 4 sentences using 4 DIFFERENT gustar-type verbs (not gustar). Make them genuine personal opinions. Include 1 negative and 1 que-clause."}]}, {"day": "Sem. 2, Día 3", "title": "Vocabulario temático — four key themes", "obj": ["Activate vocabulary across four major themes", "Use vocabulary in context immediately", "Connect themes to the five Cs"], "read": "<p>Spanish 3 thematic vocabulary aligned with NC World Language standards. Key principle: never memorize a word in isolation — use it in a complete sentence immediately.</p><div class='gbox'><h5>Tema 1: Identidad y relaciones personales</h5><p>la amistad · la confianza (trust/closeness) · la lealtad (loyalty) · el apoyo (support) · la comprensión · llevarse bien/mal · superar · compartir · valorar · la autoestima</p></div><div class='gbox'><h5>Tema 2: Comunidad y sociedad</h5><p>la desigualdad · el bienestar · el medio ambiente · el desafío · la pobreza · el voluntariado · comprometerse con · luchar por · mejorar · la justicia social</p></div><div class='gbox'><h5>Tema 3: Tecnología y vida moderna</h5><p>las redes sociales · el algoritmo · la privacidad · la desinformación · el acoso cibernético · la brecha digital · la adicción a la pantalla · conectarse / desconectarse · el bienestar digital</p></div><div class='gbox'><h5>Tema 4: Salud y bienestar</h5><p>el estrés · el equilibrio · el agotamiento · la alimentación · cuidarse · el bienestar mental · rendir · la presión · el sueño</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> 'La confianza' in Latin American cultures means deep familiarity allowing honest, informal communication. 'Tenemos mucha confianza' = you can be completely yourself with that person. This concept shapes professional relationships, friendships, and family dynamics throughout the Spanish-speaking world.</div>", "act": {"t": "Thematic mini-paragraphs", "d": "Choose 2 themes. For each, write 4 connected sentences (a mini-paragraph). Each must: (1) use at least 3 vocabulary words from that theme, (2) include 1 past tense verb, (3) include 1 opinion expression (creo que, me parece que, es importante...). Use the words in meaningful context — not just definitions."}, "qs": [{"t": "mc", "q": "'El ___ entre el trabajo y el descanso es fundamental para la salud.' (balance)", "o": ["desafío", "agotamiento", "equilibrio", "bienestar"], "a": 2, "e": "'El equilibrio' = balance/equilibrium. Context: fundamental for health, between work and rest → balance."}, {"t": "mc", "q": "'Me ___ a mejorar el medio ambiente en mi comunidad.' (to commit)", "o": ["comprometo", "comprendo", "conecto", "cuido"], "a": 0, "e": "'Me comprometo a + infinitive' = I commit to doing something. 'Comprometerse a' expresses commitment to causes and goals."}, {"t": "mc", "q": "'La ___ hace que muchas personas no tengan igual acceso a la tecnología.' (digital divide)", "o": ["privacidad", "desinformación", "brecha digital", "adicción a la pantalla"], "a": 2, "e": "'La brecha digital' = the digital divide — the gap between those with and without technology access."}, {"t": "sa", "q": "En español: Write 4–5 connected sentences about a social challenge you care about. Use at least 3 vocabulary words from the social/community theme and 2 connectors from Day 1."}]}, {"day": "Sem. 2, Día 4", "title": "Escritura conectada — from sentences to paragraphs", "obj": ["Use a full connector toolkit to build cohesion", "Move from simple to complex connected writing", "Vary sentence structure at Spanish 3 level"], "read": "<p>Sentence complexity is the clearest marker of Spanish 3 vs. Spanish 2 writing. Today we build flowing paragraphs using subordination, varied structure, and a full range of connectors.</p><div class='gbox'><h5>Complete connector toolkit</h5><p><strong>Addition:</strong> además · también · asimismo · incluso</p><p><strong>Contrast:</strong> sin embargo · no obstante · por otro lado · aunque · a pesar de (que)</p><p><strong>Cause:</strong> porque · ya que · puesto que · dado que</p><p><strong>Effect:</strong> por lo tanto · como consecuencia · por eso</p><p><strong>Example:</strong> por ejemplo · tal como · es decir · o sea</p><p><strong>Sequence:</strong> primero · luego · después · finalmente</p></div><div class='gbox'><h5>Sentence complexity — three levels</h5><p><strong>Básico:</strong> El español es importante. Me gusta.</p><p><strong>Intermedio:</strong> El español es importante porque abre muchas puertas.</p><p><strong>Intermedio-alto:</strong> Aunque aprender español requiere esfuerzo, vale la pena ya que no solo abre puertas profesionales sino también culturales.</p></div><div class='gbox'><h5>Sentence variety strategies</h5><p class='ex'>Time expression start: Desde pequeña, siempre me ha interesado...</p><p class='ex'>Gerund start: Estudiando todos los días, mejoré mucho.</p><p class='ex'>Relative clause: La ciudad donde vivo tiene mucha historia.</p></div>", "tip": "<div class='cbox'><strong>Consejo:</strong> Read your paragraph aloud after writing. If you hear the same sentence structure repeating, vary it. Mix short punchy sentences with longer complex ones. Native Spanish writers rarely use identical structure twice in a row.</div>", "act": {"t": "Paragraph upgrade exercise", "d": "Rewrite these 5 simple sentences as one connected, flowing paragraph of 7–8 sentences. Add connectors, combine ideas, add one supporting detail, vary structure. Use at least 5 different connectors. Originals: 'El español es importante. Muchas personas hablan español. Es útil para el trabajo. A veces es difícil. Pero vale la pena aprenderlo.'"}, "qs": [{"t": "mc", "q": "Which sentence best shows Spanish 3 writing complexity?", "o": ["El español es importante y útil.", "Me gusta el español porque es útil.", "A pesar de que el español es difícil a veces", " vale la pena aprenderlo ya que abre puertas tanto profesionales como culturales.", "El español es muy importante."], "a": 2, "e": "Option C: concession (a pesar de que), cause connector (ya que), parallel structure (tanto... como). These features mark Intermediate-High writing."}, {"t": "mc", "q": "'___ estudié mucho, ___ no saqué buena nota.' Best connector pair?", "o": ["Porque / por lo tanto", "Aunque / sin embargo", "Además / también", "Primero / luego"], "a": 1, "e": "'Aunque estudié mucho, sin embargo no saqué buena nota.' Both signal contrast/concession — effort leading to unexpected negative result."}, {"t": "mc", "q": "'Dado que' expresses:", "o": ["contrast", "sequence", "cause / given that", "addition"], "a": 2, "e": "'Dado que' = given that / since — a formal cause connector. 'Dado que tienes experiencia, serías perfecto para el puesto.'"}, {"t": "sa", "q": "En español: Write a paragraph of 6–8 sentences about learning Spanish. Use at least 5 connectors from at least 3 different categories. Vary sentence length and structure."}]}, {"day": "Sem. 2, Día 5", "title": "Evaluación de la Unidad 1", "obj": ["Demonstrate accurate use of all Unit 1 grammar", "Produce connected paragraph-level writing", "Identify areas to focus on in Units 2–8"], "read": "<p><strong>Evaluación de la Unidad 1.</strong></p><ul><li><strong>Presente:</strong> SER vs. ESTAR (event locations = SER!) · saber vs. conocer</li><li><strong>Pretérito:</strong> ser/ir = same forms · -uv- stems (tener/estar) · hizo not hicó</li><li><strong>Imperfecto:</strong> only 3 irregulars (ser, ir, ver) · signals: siempre, todos los días, de niño/a</li><li><strong>Prét. vs. Imp.:</strong> preterite interrupts imperfect (hacía / llegó)</li><li><strong>Pronombres:</strong> IO before DO · le/les → se before lo/la · placement rules</li><li><strong>Reflexivos:</strong> pronoun matches subject · ponerse/volverse/hacerse differences</li><li><strong>Gustar-type:</strong> agreement with grammatical subject · caer bien vs. gustar for people</li><li><strong>Conectores:</strong> sin embargo, además, por lo tanto, ya que, aunque, a pesar de</li></ul>", "tip": "<div class='cbox'><strong>Estrategia:</strong> After this quiz, note exactly which questions you missed. Is there a pattern — a specific tense? Pronouns? Ser/estar? Units 2–4 build on everything in Unit 1, so addressing gaps now prevents compounding errors later.</div>", "act": {"t": "Pre-quiz conjugation check", "d": "From memory: write preterite of yo/él/ellos for HACER, IR, and TENER. Write imperfect of nosotros/yo for SER, yo/ellos for IR, tú for VER. These are the highest-frequency irregular forms — they must be automatic."}, "qs": [{"t": "mc", "q": "'Cuando era niña, mi familia ___ a la playa cada verano.' (ir)", "o": ["fue", "va", "iba", "irá"], "a": 2, "e": "'Iba' — imperfect. 'Cuando era niña' + 'cada verano' = habitual repeated past → imperfect. 'Fue' (preterite) = one specific occasion."}, {"t": "mc", "q": "'¿Ya ___ mandaste la carta a tus abuelos?' (replacing underlined with pronouns)", "o": ["lo", "les", "se les", "se la"], "a": 3, "e": "'¿Ya se la mandaste?' — 'la carta' = DO (la) · 'a tus abuelos' = IO (les → se before la) → 'se la.'"}, {"t": "mc", "q": "'Ayer me desperté, me duché, y me vestí.' What is true?", "o": ["All three are imperfect", "All three are correctly conjugated preterite reflexives", "Desperté has a stem change in the preterite", "All three have stem changes"], "a": 1, "e": "All three are correct preterite reflexives. Note: vestir (e→i) has a stem change in 3rd person preterite (se vistió), but yo 'me vestí' is regular."}, {"t": "sa", "q": "En español: Write a paragraph of 8–10 sentences as your Unit 1 writing assessment. Include ALL: 2 present verbs · 2 preterite · 2 imperfect · 1 gustar-type · 1 reflexive · 2 connectors from different categories. Write about your life, past, or opinions."}]}]}, {"title": "Unit 2: El Mundo Que Nos Rodea", "weeks": "Semanas 3–5", "lessons": [{"day": "Sem. 3, Día 1", "title": "El futuro simple — predictions, promises, and probability", "obj": ["Learn simple future conjugations including 10 irregular stems", "Distinguish from ir+a+infinitive", "Use future for probability in the present"], "read": "<p>The simple future expresses what will happen. You know <em>ir + a + infinitive</em> for near/planned future. The simple future is more formal and also expresses probability about the present.</p><div class='gbox'><h5>Simple future — infinitive as stem + same endings</h5><p><strong>-é · -ás · -á · -emos · -éis · -án</strong></p><p class='ex'>hablar → hablaré · hablarás · hablará · hablaremos · hablaréis · hablarán</p><p class='ex'>comer → comeré · comerás · comerá · comeremos · comeréis · comerán</p></div><div class='gbox'><h5>10 irregular future stems</h5><p>tener → <strong>tendr-</strong> · venir → <strong>vendr-</strong> · poner → <strong>pondr-</strong> · salir → <strong>saldr-</strong></p><p>poder → <strong>podr-</strong> · querer → <strong>querr-</strong> · saber → <strong>sabr-</strong></p><p>hacer → <strong>har-</strong> · decir → <strong>dir-</strong> · haber → <strong>habr-</strong></p></div><div class='gbox'><h5>Three uses of the simple future</h5><p>1. Future events: <span class='ex'>El año que viene estudiaré en la universidad.</span></p><p>2. Promises: <span class='ex'>Te llamaré esta noche, te lo prometo.</span></p><p>3. Probability about NOW: <span class='ex'>¿Dónde estará Juan? (I wonder where Juan is.)</span><span class='ex'>Serán las tres. (It must be about 3.)</span></p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> Environmental topics dominate Spanish-language media. Climate change, drought, and glacial retreat affect millions across Latin America. The simple future connects directly to environmental discussion: 'Si no actuamos, las temperaturas subirán dos grados.'</div>", "act": {"t": "Future predictions paragraph", "d": "Write 8 sentences using the SIMPLE FUTURE (NOT ir + a + infinitive): 2 predictions about the world/environment in 20 years · 2 about your own future · 2 promises to yourself this semester · 2 probability sentences about the present (¿Dónde estará...? / Serán las... / Tendrá...). Include at least 3 irregular stems."}, "qs": [{"t": "mc", "q": "'El año que viene, yo ___ español con más fluidez.' (hablar)", "o": ["hablaré", "hablaría", "voy a hablar", "hablo"], "a": 0, "e": "'Hablaré' — simple future yo form. Regular: infinitive + -é. 'Hablaría' = conditional. 'Voy a hablar' = near future."}, {"t": "mc", "q": "'No sé dónde está mi mochila. ___ en mi cuarto.' (probability about present)", "o": ["Estará", "Va a estar", "Está", "Estaría"], "a": 0, "e": "'Estará' — simple future expressing probability: 'It must be in my room.' A key use of the future for the present moment."}, {"t": "mc", "q": "What is the correct future stem for 'querer'?", "o": ["querer-", "querr-", "quer-", "quierr-"], "a": 1, "e": "'Querr-' — the double 'rr' is part of querer's irregular future stem: querré, querrás, querrá..."}, {"t": "sa", "q": "En español: Write 4 sentences about what your life will be like in 10 years. SIMPLE FUTURE only. At least 2 irregular stems. Start: 'En diez años...'"}]}, {"day": "Sem. 3, Día 2", "title": "El condicional — what would happen", "obj": ["Learn conditional conjugations (same irregular stems as future)", "Use for hypotheticals, polite requests, reported speech", "Distinguish real conditions (future) from hypothetical (conditional)"], "read": "<p>The conditional expresses what <em>would</em> happen. It uses the exact same irregular stems as the future — just different endings (imperfect -ER/-IR endings).</p><div class='gbox'><h5>Conditional — same stems, new endings</h5><p><strong>-ía · -ías · -ía · -íamos · -íais · -ían</strong></p><p class='ex'>hablar → hablaría · hablarías · hablaría · hablaríamos · hablaríais · hablarían</p><p class='ex'>tener → tendría · hacer → haría · decir → diría</p><p>All 10 irregular future stems also apply to the conditional!</p></div><div class='gbox'><h5>Four key uses</h5><p>1. Hypotheticals: <span class='ex'>Si tuviera dinero, viajaría por el mundo.</span></p><p>2. Polite requests: <span class='ex'>¿Podría usted hablar más despacio?</span><span class='ex'>Me gustaría una mesa para dos.</span></p><p>3. Reported speech: <span class='ex'>Dijo que vendría a las ocho.</span></p><p>4. Real vs. hypothetical: <span class='ex'>Si estudias, sacarás buenas notas. (real → FUTURE)</span><span class='ex'>Si estudiaras, sacarías buenas notas. (hypothetical → CONDITIONAL)</span></p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> Conditional for polite requests is essential cultural competency. '¿Me da un café?' sounds abrupt. '¿Me podría traer un café?' is much more polite in a restaurant or formal setting. The conditional is social skill, not just grammar.</div>", "act": {"t": "Four uses of the conditional", "d": "Write in Spanish: (1) Hypothetical response to '¿Qué harías si no tuvieras que ir a la escuela mañana?' (2–3 sentences). (2) Hypothetical response to '¿Adónde viajarías si pudieras ir a cualquier lugar?' (2–3 sentences). (3) 2 polite requests for real situations. (4) 2 reported speech sentences: 'Mi amigo/a dijo que ___.'"}, "qs": [{"t": "mc", "q": "'¿___ usted repetir eso más despacio, por favor?' (poder — polite request)", "o": ["Puede", "Podría", "Podrá", "Pudo"], "a": 1, "e": "'Podría' — conditional for polite requests. Significantly more courteous than '¿Puede usted...?' The conditional signals a request, not a demand."}, {"t": "mc", "q": "'Ella dijo que ___ tarde a la reunión.' (llegar — reported speech)", "o": ["llegará", "llegaría", "llegó", "llega"], "a": 1, "e": "'Llegaría' — conditional for reported speech when main verb is past. 'DIJO (past) que LLEGARÍA.' If present: 'DICE que LLEGARÁ' (future)."}, {"t": "mc", "q": "'Si tienes hambre ahora, ___ algo.' (comer) — real condition", "o": ["comerías", "comerás", "comas", "comer"], "a": 1, "e": "'Comerás' — REAL conditions: si + PRESENT → FUTURE. Conditional (comerías) is for hypothetical/unreal conditions."}, {"t": "sa", "q": "En español: Write 3 sentences: (1) hypothetical with conditional (Si pudiera..., ___ría...), (2) polite request, (3) reported speech (alguien dijo que + conditional)."}]}, {"day": "Sem. 3, Día 3", "title": "El medio ambiente — vocabulary and integrated writing", "obj": ["Build environmental vocabulary", "Apply future and conditional to environmental discussion", "Write a three-part organized opinion response"], "read": "<p>Environmental topics are a major Spanish 3 theme. Today we build vocabulary and practice using it with the new tenses.</p><div class='gbox'><h5>Problemas ambientales</h5><p>el cambio climático · la contaminación · la deforestación · la escasez de agua (water scarcity) · la extinción de especies · los gases de efecto invernadero · el calentamiento global · el derrame de petróleo (oil spill) · los residuos plásticos · la sequía (drought) · el deshielo de glaciares</p></div><div class='gbox'><h5>Soluciones y acciones</h5><p>reciclar · reducir · reutilizar · conservar · proteger · desarrollar energías renovables · la energía solar/eólica · el transporte público · concientizar (raise awareness) · comprometerse con · tomar medidas · implementar políticas</p></div><div class='gbox'><h5>Grammar + content connections</h5><p class='ex'>Present: El cambio climático afecta a millones de personas hoy.</p><p class='ex'>Future: Si no actuamos, las temperaturas subirán dos grados.</p><p class='ex'>Conditional: Reduciríamos las emisiones si usáramos más el transporte público.</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> Costa Rica generates over 99% of its electricity from renewables and is committed to carbon neutrality. Mexico City faces severe air pollution. Chile and Peru face devastating glacial retreat. Spanish-speaking countries have diverse — sometimes contradictory — relationships with environmental issues.</div>", "act": {"t": "Three-part environmental response", "d": "Write 9–10 sentences about one environmental problem you care about. THREE labeled sections: (1) EL PROBLEMA AHORA — present tense, 2+ environmental vocab words. (2) LO QUE PASARÁ — simple future, 2+ future verbs. (3) LAS SOLUCIONES — conditional, 2+ conditional verbs. Include 3 connectors."}, "qs": [{"t": "mc", "q": "'La ___ de los bosques amazónicos amenaza miles de especies.' (deforestation)", "o": ["sequía", "deforestación", "escasez", "contaminación"], "a": 1, "e": "'La deforestación' = deforestation — clearing/removal of forests. 'Amenazar' = to threaten."}, {"t": "mc", "q": "'___ reciclar más en nuestra comunidad.' (people need to recycle)", "o": ["Es necesario reciclar", "Es necesario que reciclemos", "Hay que reciclar", "Both A and C are correct"], "a": 3, "e": "Both 'Es necesario reciclar' and 'Hay que reciclar' are correct impersonal expressions for general necessity."}, {"t": "mc", "q": "'If we all used public transit, we would reduce pollution.' Correct structure?", "o": ["Si todos usamos el transporte", " reduciríamos.", "Si todos usáramos el transporte", " reduciríamos.", "Si todos usaríamos el transporte", " reduciríamos.", "Si todos usaremos el transporte", " reduciremos."], "a": 1, "e": "'Si todos USÁRAMOS (imperfect subj.), REDUCIRÍAMOS (conditional)' — hypothetical condition. Pattern: si + imperfect subj. → conditional."}, {"t": "sa", "q": "En español: Si pudieras cambiar UNA cosa para mejorar el medio ambiente, ¿qué harías? Write 4–5 sentences using the conditional. Start: 'Si pudiera cambiar algo...'"}]}, {"day": "Sem. 3, Día 4", "title": "Estrategias de lectura — authentic Spanish texts", "obj": ["Apply reading strategies to authentic texts", "Practice with a real Spanish news excerpt", "Build vocabulary through context and inference"], "read": "<p>Reading authentic Spanish at Spanish 3 level requires strategy — purposeful reading for meaning, not word-by-word translation.</p><p><strong>Cinco estrategias esenciales:</strong></p><ul><li><strong>Prelectura:</strong> Read title, headings, first/last sentence of each paragraph. Activate vocabulary.</li><li><strong>1ª lectura:</strong> Read once without stopping. What is the main message?</li><li><strong>2ª lectura:</strong> Specific information — numbers, names, key arguments. Look up 2–3 words maximum.</li><li><strong>Inferencia:</strong> Use word roots and context. 'El calentamiento' — you know 'caliente' (hot) → warming.</li><li><strong>Cognados:</strong> la situación, urgente, científico, la tecnología, económico — recognize instantly.</li></ul><blockquote><p><strong>Texto auténtico — BBC Mundo (adaptado):</strong></p><p><em>\"El cambio climático amenaza la biodiversidad de América Latina de forma sin precedentes. Según un informe de la CEPAL, las temperaturas aumentarán entre 1,5 y 4 grados centígrados para el año 2100 si no se toman medidas urgentes. Los expertos advierten que esto provocará sequías más frecuentes, el derretimiento de los glaciares andinos y la pérdida de especies endémicas. Sin embargo, varios países ya han comenzado a implementar políticas de energía renovable con resultados prometedores.\"</em></p></blockquote>", "tip": "<div class='cbox'><strong>Recursos auténticos gratuitos:</strong> BBC Mundo (bbc.com/mundo) · El País (elpais.com) · Univision Noticias · Dreaming Spanish (YouTube). 10 minutes of authentic reading daily significantly improves vocabulary and grammar intuition.</div>", "act": {"t": "Authentic text analysis", "d": "Read the BBC Mundo excerpt. Answer in ENGLISH: (1) Main topic? (2) Who published the report? (3) Temperature range? (4) List 3 consequences. (5) What positive note ends the text? Find 6 cognates. Then write 3–4 sentences IN SPANISH reacting to the text — at least 1 future verb and 1 opinion expression."}, "qs": [{"t": "mc", "q": "'Según el informe' means:", "o": ["despite the report", "according to the report", "because of the report", "against the report"], "a": 1, "e": "'Según' = according to. Essential for citing sources in academic and journalistic Spanish."}, {"t": "mc", "q": "'El derretimiento de los glaciares' most likely means:", "o": ["the discovery of glaciers", "the study of glaciers", "the melting of glaciers", "the protection of glaciers"], "a": 2, "e": "'Derretimiento' from 'derretir' (to melt). Context clues: climate change + glaciers + listed as negative consequence → melting."}, {"t": "mc", "q": "'Tolerating ambiguity' when reading Spanish means:", "o": ["Accepting grammatical errors", "Reading for overall meaning without stopping at every unknown word", "Skipping difficult texts", "Translating every sentence"], "a": 1, "e": "Tolerating ambiguity = reading for gist. Fluent readers use context, cognates, and inference. Stopping at every word breaks comprehension."}, {"t": "sa", "q": "En español: Write 4–5 sentences reacting to the climate text. Is it alarming? What should be done? Include at least 1 future verb and 1 conditional verb."}]}, {"day": "Sem. 3, Día 5", "title": "Hablar con opinión — OREO model and discourse markers", "obj": ["Express opinions with structure using the OREO model", "Use discourse markers and speaking fillers naturally", "Build confidence speaking at paragraph length"], "read": "<p>Spanish 3 speaking means organizing opinions clearly, giving reasons with evidence, and maintaining conversation for 2+ minutes. The OREO model provides reliable structure.</p><div class='gbox'><h5>Opinion expressions — essential for Spanish 3</h5><p>En mi opinión... · Creo que... · Pienso que... · Me parece que...</p><p>Estoy de acuerdo con... · No estoy de acuerdo con...</p><p>Es verdad que..., pero... · Lo que más me preocupa es...</p><p>Sin duda alguna... · A mi modo de ver... · Desde mi perspectiva...</p></div><div class='gbox'><h5>The OREO model</h5><p><strong>O</strong> — Opinión: State your position clearly (1–2 sentences)</p><p><strong>R</strong> — Razón: 1–2 reasons with cause connectors (porque, ya que, puesto que)</p><p><strong>E</strong> — Ejemplo: A specific concrete example (por ejemplo...)</p><p><strong>O</strong> — Opinión restated: Restate and expand conclusion (Por lo tanto, En definitiva)</p></div><div class='gbox'><h5>Discourse markers — natural spoken Spanish</h5><p><strong>Buying time:</strong> Bueno... · A ver... · Es que... · O sea... · Pues...</p><p><strong>Agreeing:</strong> Claro que sí. · Por supuesto. · Exactamente.</p><p><strong>Disagreeing:</strong> No exactamente... · No estoy muy de acuerdo porque...</p><p><strong>Adding:</strong> Además, hay que considerar... · Por otro lado... · También...</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> In Spanish-speaking academic settings, stating an opinion without reasoning is considered incomplete. 'Creo que sí' alone is insufficient — 'Creo que sí, porque...' shows education and thoughtfulness. The OREO structure reflects real argumentative norms in Spanish academic culture.</div>", "act": {"t": "2-minute recorded OREO response", "d": "Record yourself speaking in Spanish for 2 full minutes on ONE topic: '¿Las redes sociales tienen más efectos positivos o negativos?' OR '¿Qué debería hacer el gobierno para proteger el medio ambiente?' Use the OREO model. Requirements: 1 future verb · 1 conditional verb · 3 opinion expressions · 2 discourse markers. Listen back and note 1 success, 1 grammar thing to improve, 1 vocabulary gap."}, "qs": [{"t": "mc", "q": "'___ que el cambio climático es el mayor desafío de nuestra generación.'", "o": ["Me gusta", "Me parece", "Hay", "Lo que"], "a": 1, "e": "'Me parece que' = it seems to me that / I think that. Very natural in spoken Spanish. 'Creo que' and 'Pienso que' also work."}, {"t": "mc", "q": "'Hay ___ tomar medidas urgentes contra la contaminación.'", "o": ["que", "de", "para", "a"], "a": 0, "e": "'Hay que + infinitive' = one must / it's necessary to. General impersonal expression: 'Hay que tomar medidas.' No specific subject."}, {"t": "mc", "q": "In the OREO model, 'E' requires:", "o": ["Expressing doubt", "Ending with your strongest argument", "A specific concrete example to support your reasons", "Explaining a key word"], "a": 2, "e": "E = Ejemplo: a specific, concrete example. 'Por ejemplo, en mi comunidad, el reciclaje aumentó un 30% desde...' Specific beats general."}, {"t": "sa", "q": "En español: Using the OREO model, write a 5–6 sentence response to '¿Es importante aprender un segundo idioma?' Label each stage (O · R · E · O)."}]}, {"day": "Sem. 4, Día 1", "title": "El presente de subjuntivo — formation and WEIRDO triggers", "obj": ["Understand what the subjunctive mood is", "Form present subjunctive using the yo-drop + switch rule", "Identify all five WEIRDO trigger categories"], "read": "<p>The subjunctive is a mood (not a tense) expressing subjectivity: desires, emotions, doubt, recommendations, and unreality. It's one of the most important Spanish 3 structures.</p><div class='gbox'><h5>Present subjunctive — yo-drop + switch rule</h5><p>Step 1: Yo form → Step 2: Drop -o → Step 3: Add OPPOSITE vowel endings</p><p>-AR → -E endings: -e · -es · -e · -emos · -éis · -en</p><p>-ER/-IR → -A endings: -a · -as · -a · -amos · -áis · -an</p><p class='ex'>hablar → hablo → habl- → hable · hables · hable · hablemos · habléis · hablen</p><p class='ex'>tener → tengo → teng- → tenga · tengas · tenga · tengamos · tengáis · tengan</p><p class='ex'>hacer → hago → hag- → haga · hagas · haga · hagamos · hagáis · hagan</p></div><div class='gbox'><h5>6 irregular subjunctives — memorize completely</h5><p>ser: sea · seas · sea · seamos · seáis · sean</p><p>estar: esté · estés · esté · estemos · estéis · estén</p><p>ir: vaya · vayas · vaya · vayamos · vayáis · vayan</p><p>saber: sepa · sepas · sepa · sepamos · sepáis · sepan</p><p>haber: haya · hayas · haya · hayamos · hayáis · hayan</p><p>dar: dé · des · dé · demos · deis · den</p></div><div class='gbox'><h5>WEIRDO — subjunctive trigger categories</h5><p><strong>W</strong>ishes/Wants: querer que · desear que · esperar que · ojalá (que)</p><p><strong>E</strong>motion: alegrarse de que · temer que · sorprender que</p><p><strong>I</strong>mpersonal: es importante que · es necesario que · es posible que</p><p><strong>R</strong>ecommendations: recomendar que · pedir que · sugerir que · aconsejar que</p><p><strong>D</strong>oubt/Denial: dudar que · no creer que · no estar seguro de que</p><p><strong>O</strong>jalá: Ojalá (que)... — I hope that...</p><p><strong>Key rule:</strong> Same subject = INFINITIVE · Different subjects = QUE + SUBJUNCTIVE</p><p class='ex'>Quiero <strong>ir</strong>. (same) / Quiero que <strong>vayas</strong>. (different)</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> '¡Ojalá!' comes from Arabic 'wa sha' Allah' (God willing) — a legacy of 800 years of Moorish presence in Spain (711–1492). Spanish has ~4,000 Arabic-origin words: álgebra, aceite (oil), almohada (pillow), naranja (orange). 'Ojalá que todo salga bien' is one of the most common everyday expressions.</div>", "act": {"t": "WEIRDO identification and formation", "d": "For each sentence: (1) identify the WEIRDO category, (2) write the correct subjunctive form. 1) Quiero que tú ___ más ejercicio. (hacer) 2) Es importante que nosotros ___ el medio ambiente. (proteger) 3) Espera que yo ___ médica. (ser) 4) Ojalá que ___ buen tiempo. (hacer) 5) Dudo que él ___ la verdad. (decir) 6) Me alegra que ustedes ___ aquí. (estar) 7) Recomiendo que ___ más agua. (beber-tú) 8) Es posible que el examen ___ difícil. (ser)"}, "qs": [{"t": "mc", "q": "'Es necesario que todos ___ el agua.' (conservar)", "o": ["conservan", "conserven", "conservar", "conservamos"], "a": 1, "e": "'Conserven' — subjunctive, ellos/ustedes form. 'Es necesario que' = impersonal expression (I in WEIRDO) → subjunctive required."}, {"t": "mc", "q": "Why 'Quiero ir' uses infinitive but 'Quiero que vayas' uses subjunctive?", "o": ["'Ir' is irregular in subjunctive", "Same subject → infinitive; different subjects → que + subjunctive", "Subjunctive is optional with querer", "'Vaya' is present indicative"], "a": 1, "e": "Fundamental rule: same subject = infinitive. Different subjects = que + subjunctive. This is the most important subjunctive rule."}, {"t": "mc", "q": "Which sentence uses subjunctive INCORRECTLY?", "o": ["Espero que ella venga mañana.", "Recomiendo que comas más verduras.", "Es importante que estudies cada día.", "Creo que sea verdad."], "a": 3, "e": "'Creo que SEA verdad' is incorrect. Affirmative 'creer que' triggers INDICATIVE: 'Creo que ES verdad.' Only NEGATIVE 'no creer que' triggers subjunctive."}, {"t": "sa", "q": "En español: Write 5 sentences using 5 different WEIRDO trigger types (one from each W-E-I-R-D category). Different subjects in each clause. Make them genuinely personal."}]}, {"day": "Sem. 4, Día 2", "title": "Subjuntivo: impersonales y duda vs. certeza", "obj": ["Master impersonal expressions + subjunctive", "Apply the doubt/certainty distinction", "Use quizás/tal vez with correct mood"], "read": "<p>Impersonal expressions and doubt/denial trigger the subjunctive constantly in academic writing and formal speech.</p><div class='gbox'><h5>Impersonal expressions + subjunctive</h5><p>Es + adjective + que + subjunctive</p><p>Es importante / necesario / bueno / malo / urgente / posible / probable / imposible que...</p><p>Es una lástima que · Es sorprendente que · Es mejor que...</p><p class='ex'>Es una lástima que no puedas venir a la reunión.</p><p class='ex'>Es probable que llueva mañana por la tarde.</p></div><div class='gbox'><h5>Doubt/denial vs. certainty — the critical contrast</h5><p><strong>SUBJUNCTIVE (doubt/negation):</strong></p><p class='ex'>No creo que <strong>sea</strong> verdad.</p><p class='ex'>Dudo que <strong>lleguen</strong> a tiempo.</p><p class='ex'>No estoy segura de que <strong>haya</strong> suficiente tiempo.</p><p><strong>INDICATIVE (certainty/affirmation):</strong></p><p class='ex'>Creo que <strong>es</strong> verdad.</p><p class='ex'>Es cierto que <strong>tiene</strong> razón.</p><p class='ex'>Estoy segura de que <strong>llegarán</strong>.</p></div><div class='gbox'><h5>Quizás / tal vez — mood reflects certainty level</h5><p class='ex'>Quizás <strong>venga</strong> mañana. (subjunctive — more doubt)</p><p class='ex'>Quizás <strong>viene</strong> mañana. (indicative — considers it fairly likely)</p></div>", "tip": "<div class='cbox'><strong>Nota lingüística:</strong> The subjunctive appears more in formal written Spanish than rapid informal conversation. Some native speakers use indicative where subjunctive is technically required in casual speech. Using the subjunctive correctly marks you as an educated speaker — essential for academic writing and formal communication.</div>", "act": {"t": "Indicative vs. subjunctive — choose the correct mood", "d": "Complete each sentence with correct form (indicative OR subjunctive) and explain WHY: 1) Creo que el español ___ (ser) muy útil. 2) No creo que este problema ___ (tener) solución fácil. 3) Es probable que las temperaturas ___ (subir) en los próximos años. 4) Sé que nosotros ___ (poder) hacer más. 5) Es una lástima que muchas personas no ___ (reciclar). 6) Dudo que él ___ (haber) estudiado."}, "qs": [{"t": "mc", "q": "'Es posible que ___ mucho tráfico esta tarde.' (haber)", "o": ["hay", "haya", "habrá", "había"], "a": 1, "e": "'Haya' — subjunctive of haber. 'Es posible que' = impersonal expression of possibility → subjunctive."}, {"t": "mc", "q": "'No estoy segura de que él ___ la verdad.' (decir)", "o": ["dice", "diría", "diga", "decir"], "a": 2, "e": "'Diga' — subjunctive of decir (digo → dig- → diga). 'No estar seguro de que' expresses doubt → subjunctive."}, {"t": "mc", "q": "'Tal vez ella ___ a la reunión.' — which reflects MORE doubt?", "o": ["viene (indicative — more probable)", "venga (subjunctive — more uncertain)", "vendría (conditional)", "vino (preterite)"], "a": 1, "e": "'Venga' (subjunctive) = more uncertainty. 'Viene' (indicative) = speaker considers it fairly likely. Both grammatically correct — mood reflects certainty level."}, {"t": "sa", "q": "En español: Write 4 sentences about future plans — 2 with 'es posible/probable que + subjunctive' and 2 with 'creo que / sé que + indicative.' Show you understand when to use each mood."}]}, {"day": "Sem. 4, Día 3", "title": "La tecnología — vocabulary and essay writing", "obj": ["Build technology vocabulary", "Learn the five-part essay structure", "Write a complete body paragraph with connectors and subjunctive"], "read": "<p>Technology is a central Spanish 3 theme. Today we combine vocabulary with the year's most important writing skill: the five-paragraph essay.</p><div class='gbox'><h5>Vocabulario: tecnología y sociedad</h5><p>las redes sociales · el algoritmo · la inteligencia artificial · los datos personales · la privacidad · la desinformación · el acoso cibernético · la brecha digital · la adicción a la pantalla · el bienestar digital · el impacto social · conectarse / desconectarse</p></div><div class='gbox'><h5>Estructura del ensayo — cinco partes</h5><p><strong>Introducción:</strong> hook + contexto breve + tesis clara</p><p><strong>Cuerpo 1:</strong> oración temática + argumento + evidencia/ejemplo + cierre</p><p><strong>Cuerpo 2:</strong> oración temática + segundo argumento + evidencia/ejemplo + cierre</p><p><strong>Concesión:</strong> 'Es verdad que...' / 'Si bien...' + refutación</p><p><strong>Conclusión:</strong> retoma de tesis + implicación + reflexión</p></div><div class='gbox'><h5>Conectores para el ensayo</h5><p><strong>Adición:</strong> además · asimismo · incluso · también</p><p><strong>Contraste:</strong> sin embargo · no obstante · por otro lado · a pesar de (que)</p><p><strong>Causa:</strong> porque · ya que · puesto que · dado que</p><p><strong>Efecto:</strong> por lo tanto · como consecuencia · por eso</p><p><strong>Ejemplo:</strong> por ejemplo · tal como · es decir</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> Latin America has some of the world's highest social media usage rates. WhatsApp is more popular than SMS throughout most of Latin America. Understanding how news, politics, and social movements spread through digital platforms in the Spanish-speaking world is essential cultural literacy.</div>", "act": {"t": "Essay body paragraph + introduction", "d": "Write ONE complete body paragraph (9–10 sentences) for this prompt: '¿Las redes sociales tienen más efectos positivos o negativos?' Requirements: (1) clear topic sentence, (2) 2 supporting points with cause connectors, (3) specific example, (4) at least 3 connectors, (5) at least 1 subjunctive. Then write a 3-sentence introduction: hook + context + thesis."}, "qs": [{"t": "mc", "q": "'La tecnología ofrece ventajas. ___, también presenta riesgos.' Best connector?", "o": ["Además", "Sin embargo", "Por ejemplo", "Porque"], "a": 1, "e": "'Sin embargo' — contrast connector. Moving from advantages → risks = contrast. 'Además' would add more advantages."}, {"t": "mc", "q": "A 'párrafo de concesión' should:", "o": ["Introduce the essay's main topic", "Repeat the thesis word-for-word", "Acknowledge the strongest opposing view then refute or qualify it", "List counterarguments without responding"], "a": 2, "e": "Concession paragraph: acknowledge the best opposing argument ('Es verdad que...') then refute or qualify it ('sin embargo...'). Makes essays more sophisticated and persuasive."}, {"t": "mc", "q": "'___ el uso excesivo puede ser dañino, muchos jóvenes las usan responsablemente.'", "o": ["Aunque", "A pesar de que solo", "Sin embargo", "No obstante que"], "a": 0, "e": "'Aunque + indicative' = although (acknowledging a fact). Both 'aunque' and 'a pesar de que' express concession before a contrasting main clause."}, {"t": "sa", "q": "En español: Write the opening 2 sentences of a body paragraph about cyberbullying as a negative effect. Sentence 1: clear topic sentence. Sentence 2: first reason using 'ya que' or 'dado que.'"}]}, {"day": "Sem. 4, Día 4", "title": "Escuchar con estrategia — authentic Spanish listening", "obj": ["Apply systematic listening strategies", "Understand natural speech reductions", "Build a regular authentic listening habit"], "read": "<p>Listening is the hardest skill because authentic speech is fast and full of reductions. Systematic strategies make it manageable.</p><p><strong>Estrategias por etapas:</strong></p><ul><li><strong>Antes:</strong> What is the topic? Activate relevant vocabulary.</li><li><strong>1ª escucha:</strong> Gist only — main topic, who is speaking, overall message. Do NOT stop.</li><li><strong>2ª escucha:</strong> Specific details — numbers, names, key arguments.</li><li><strong>3ª escucha:</strong> Focus on specific missed passages.</li></ul><div class='gbox'><h5>Natural speech reductions</h5><p>'para' → 'pa': <span class='ex'>Voy pa' casa.</span></p><p>'está' → ''tá': <span class='ex'>¿Cómo 'tás?</span></p><p>Final -d drops: <span class='ex'>verdad → verdá · ciudad → ciudá</span></p></div><p><strong>Best resources:</strong></p><ul><li><strong>News in Slow Spanish</strong> (newsinslosspanish.com) — free episodes</li><li><strong>Dreaming Spanish</strong> (YouTube) — comprehensible input</li><li><strong>BBC Mundo videos</strong> — real news in standard Spanish</li><li><strong>TED en español</strong> — ted.com with Spanish audio and subtitles</li></ul>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> Spanish pronunciation varies dramatically by region. Argentina: 'll' and 'y' → 'sh.' Spain: 'c' before e/i → 'th.' Caribbean: rapid speech, frequent 's' aspiration. Andean Spanish: clear, slower. All equally valid. Recognizing multiple accents is a key Spanish 3 competency.</div>", "act": {"t": "Three listening sessions this week", "d": "Complete 3 listening sessions of at least 8 minutes each. For EACH session record: (1) Source and topic. (2) 3 things you understood clearly. (3) 2 words/phrases you heard but didn't catch (write phonetically). (4) Something culturally interesting. (5) 2 sentences IN SPANISH summarizing what you heard."}, "qs": [{"t": "mc", "q": "For a FIRST listen to unfamiliar audio, the best strategy is:", "o": ["Pause after every sentence to look up words", "Focus on gist — main topic", " overall message — without stopping", "Read a full transcript first", "Try to transcribe every word"], "a": 1, "e": "First listen = gist. Main topic, overall message, words you catch. Stopping at every word breaks comprehension flow."}, {"t": "mc", "q": "In natural Spanish speech, 'para' is often reduced to:", "o": ["por", "per", "pa", "pa'l"], "a": 2, "e": "'Pa' — 'Voy pa' casa' = Voy para casa. Extremely common in informal speech across many dialects."}, {"t": "mc", "q": "Spanish regional pronunciation differences indicate:", "o": ["Some dialects are grammatically incorrect", "Only one accent is correct for learners", "All regional varieties are equally valid — learners should recognize multiple accents", "Learners should avoid media from certain countries"], "a": 2, "e": "All regional varieties of Spanish are linguistically valid. Recognizing and respecting dialect variation is a Spanish 3 competency."}, {"t": "sa", "q": "En español: Describe your experience listening to authentic Spanish. What is the hardest part? What strategies will you use regularly? What type of audio would you choose to practice with and why?"}]}, {"day": "Sem. 4, Día 5", "title": "Punto de control — Unit 2 mid-unit review", "obj": ["Assess progress on future, conditional, and subjunctive", "Identify grammar strengths and gaps", "Integrate all Unit 2 structures in one writing task"], "read": "<p><strong>Punto de control — Unit 2 mid-unit check.</strong></p><p><strong>Self-evaluation checklist:</strong></p><ul><li>□ Futuro: regular AND all 10 irregular stems (tendr-, pondr-, saldr-, podr-, querr-, sabr-, har-, dir-, vendr-, habr-)</li><li>□ Condicional: same stems + -ía endings · 4 uses</li><li>□ Subjuntivo: yo-drop + switch rule · 6 irregulars (ser, estar, ir, saber, haber, dar)</li><li>□ WEIRDO: identify category AND produce form automatically</li><li>□ Creer que (indicative) vs. no creer que (subjunctive)</li><li>□ Es posible/probable que + subjunctive</li><li>□ Environmental and technology vocabulary in sentences</li></ul>", "tip": "<div class='cbox'><strong>Estrategia:</strong> Instead of abstract drills, write: one future sentence about tomorrow, one conditional about a dream, one subjunctive expressing something you hope for or doubt. Personal, meaningful sentences are remembered far better than decontextualized conjugation tables.</div>", "act": {"t": "Integration paragraph — all Unit 2 structures", "d": "Write 10–12 sentences on '¿Cómo será tu vida en diez años?' Must include ALL: 2 future verbs · 2 conditional verbs · 2 subjunctive constructions from different WEIRDO categories · 3 connectors from different categories · 2 vocabulary words from Unit 2 themes. Underline and label each required element."}, "qs": [{"t": "mc", "q": "Identify the error: 'Quiero que tú vienes a la reunión.'", "o": ["'quiero' needs subjunctive", "'vienes' should be 'vengas' — querer que + different subject → subjunctive", "'a la reunión' needs personal 'a'", "No error"], "a": 1, "e": "'Vengas' required. 'Querer que' with different subjects = subjunctive. 'Vienes' is indicative. Corrected: 'Quiero que tú VENGAS.'"}, {"t": "mc", "q": "'Ella dijo que ___ a la fiesta.' (venir — reported speech)", "o": ["vendrá", "vendría", "viene", "venga"], "a": 1, "e": "'Vendría' — conditional for reported speech in the past. 'DIJO (past) que VENDRÍA.' If present: 'DICE que VENDRÁ' (future)."}, {"t": "mc", "q": "'Es urgente que el gobierno ___ medidas contra la contaminación.' (tomar)", "o": ["toma", "tomará", "tome", "tomaba"], "a": 2, "e": "'Tome' — present subjunctive (tomar: tomo → tom- → tome). 'Es urgente que' = impersonal expression → subjunctive."}, {"t": "sa", "q": "En español: Write 5 sentences about your Spanish 3 goals. Include: 1 future, 1 conditional, 1 subjunctive after an impersonal expression, 1 after a verb of wanting, 1 of doubt or denial. All complete and grammatically correct."}]}, {"day": "Sem. 5, Día 1", "title": "La identidad cultural hispanohablante", "obj": ["Understand cultural diversity of Spanish-speaking countries", "Develop vocabulary for discussing cultural identity", "Connect personal identity to cultural heritage"], "read": "<p>'Spanish culture' is not a single thing — it's 20+ distinct national cultures across four continents, each with unique history, music, food, and social values.</p><div class='gbox'><h5>Vocabulario de identidad cultural</h5><p>la identidad cultural · la herencia (heritage) · las tradiciones · la diversidad · el patrimonio cultural · la cosmovisión (worldview) · el sincretismo (cultural blending) · indígena · mestizo/a (mixed heritage) · el colonialismo · la resistencia cultural</p></div><ul><li><strong>España:</strong> 17 autonomous communities, multiple languages (Catalan, Basque, Galician), EU member</li><li><strong>México y Centroamérica:</strong> Rich Aztec/Maya heritage, Catholic-indigenous syncretism, border culture</li><li><strong>El Caribe:</strong> Cuba, Dominican Republic, Puerto Rico — African heritage, salsa/merengue/reggaeton</li><li><strong>Sudamérica Andina:</strong> Ecuador, Peru, Bolivia — Quechua and Aymara widely spoken</li><li><strong>El Cono Sur:</strong> Argentina, Chile, Uruguay — large European immigration waves</li><li><strong>Latinos en EEUU:</strong> ~42 million native speakers — Mexican-American, Puerto Rican, Cuban-American, Dominican, Salvadoran, and many more distinct communities</li></ul>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> 'El Día de los Muertos' (Mexico, Nov. 1–2) is NOT 'Mexican Halloween' — it's a deeply meaningful indigenous-Catholic syncretic tradition where families build altars (ofrendas) to celebrate deceased relatives. UNESCO declared it an Intangible Cultural Heritage of Humanity in 2008. This is a perfect example of 'sincretismo.'</div>", "act": {"t": "Cultural deep dive research", "d": "Choose ONE Spanish-speaking country you know least about. Using a SPANISH-language source (BBC Mundo, Wikipedia in Spanish, or the country's national news site), research for 15 minutes. Write 7–8 sentences in Spanish covering: location/population, one historical fact, one cultural tradition, one current challenge, and one way its culture differs from the US. Use at least 3 vocabulary words from today's list."}, "qs": [{"t": "mc", "q": "'El ___ cultural de México incluye tradiciones indígenas y europeas.' (heritage)", "o": ["sincretismo", "patrimonio", "cosmovisión", "colonialismo"], "a": 1, "e": "'El patrimonio cultural' = cultural heritage — what is inherited and preserved from ancestors. 'El sincretismo' describes the process of blending."}, {"t": "mc", "q": "'Sincretismo' in Latin American culture refers to:", "o": ["The rejection of indigenous traditions", "The blending of indigenous", " African", " and European cultural elements", "The preservation of only Spanish colonial heritage", "The separation of cultural groups"], "a": 1, "e": "Syncretism = blending of indigenous, African, and Spanish/European elements across religion, music, food, and language — creating the distinct cultures of Latin America."}, {"t": "mc", "q": "The ~42 million native Spanish speakers in the US represent:", "o": ["A single unified community", "The smallest Spanish-speaking population in the Americas", "One of the world's largest Spanish-speaking populations comprising many distinct communities", "Primarily recent immigrants from Mexico"], "a": 2, "e": "The US has ~42 million native Spanish speakers — more than Spain. Highly diverse: Mexican-American, Puerto Rican, Cuban-American, Dominican, Salvadoran, and many others — each with distinct experiences."}, {"t": "sa", "q": "En español: ¿Por qué es importante aprender sobre las distintas culturas hispanohablantes, no solo el idioma? ¿Cómo te puede beneficiar en tu vida personal o profesional? Escribe 4–5 oraciones."}]}, {"day": "Sem. 5, Día 2", "title": "Taller de escritura — essay revision workshop", "obj": ["Apply systematic revision to improve essay writing", "Identify and correct common Spanish 3 errors", "Produce polished writing at Intermediate-High level"], "read": "<p>Good writing is rewriting. Today's workshop uses a three-level checklist to improve your essay writing from adequate to excellent.</p><div class='gbox'><h5>Lista de revisión — three levels (work in order)</h5><p><strong>Nivel 1 — Contenido:</strong></p><p>□ Clear thesis/main argument? □ Each paragraph has a topic sentence? □ Specific evidence/examples? □ Concession paragraph included?</p><p><strong>Nivel 2 — Gramática:</strong></p><p>□ Verb conjugations correct (especially subjunctive)? □ Ser/estar correct (check event locations!)? □ Noun-adjective agreement (gender AND number)? □ Accent marks correct (hablé vs. hable · esté vs. este)? □ Object pronouns correctly placed?</p><p><strong>Nivel 3 — Estilo:</strong></p><p>□ Sentence length variety? □ At least 5 different connectors? □ Vocabulary varied? □ At least one subjunctive and one future/conditional?</p></div>", "tip": "<div class='cbox'><strong>La Real Academia Española (RAE):</strong> Founded in 1713, the RAE maintains the authoritative Spanish dictionary. Motto: 'Limpia, fija y da esplendor.' Modern critics argue the RAE has been slow to include Latin American vocabulary, gender-inclusive language, and digital terms. Language, like culture, always evolves.</div>", "act": {"t": "Systematic essay revision", "d": "Take your body paragraph from Sem. 4, Día 3. Apply all three revision levels: (1) Underline every verb — verify conjugation, especially subjunctive. (2) Circle every connector — add 2 more if fewer than 4. (3) Check every adjective for gender AND number agreement. (4) Verify accent marks on subjunctive forms. Rewrite your weakest 2 sentences to make them more complex. Submit revised paragraph + 3-sentence note explaining your 3 most important changes."}, "qs": [{"t": "mc", "q": "'Las redes sociales tiene efectos positivos y negativos.' What is the error?", "o": ["'Las redes sociales' needs different article", "'tiene' should be 'tienen' — plural subject", "'positivos y negativos' should be singular", "No error"], "a": 1, "e": "Subject-verb agreement: 'Las redes sociales' (plural) requires 'TIENEN' (plural). Agreement errors are among the most common in student writing."}, {"t": "mc", "q": "Which sentence shows the highest Spanish 3 writing level?", "o": ["Las redes sociales son malas.", "Las redes sociales son malas para la salud mental.", "A pesar de sus indudables beneficios", " el uso excesivo puede resultar perjudicial para la salud mental de los jóvenes", " especialmente cuando se convierte en adicción.", "Las redes sociales tienen muchos efectos negativos."], "a": 2, "e": "Option C: complex sentence structure (a pesar de + concession), nuanced vocabulary (perjudicial, adicción), qualifier (puede resultar), specific audience (jóvenes). These mark Intermediate-High writing."}, {"t": "mc", "q": "Accent marks on subjunctive forms matter because:", "o": ["They look more formal", "They distinguish meaning: hable (subj./command) vs. hablé (preterite yo)", "They are optional in informal writing", "They only apply to irregular verbs"], "a": 1, "e": "Accents distinguish grammatical meaning: 'hable' = present subjunctive; 'hablé' = preterite yo. Similarly: 'este' (demonstrative) vs. 'esté' (subjunctive of estar)."}, {"t": "sa", "q": "En español: Explain in Spanish the 3 most important changes you made when revising your paragraph. What was wrong? Why is the new version better? Use at least 1 grammatical term (subjuntivo, concordancia, condicional, etc.)"}]}, {"day": "Sem. 5, Día 3", "title": "Evaluación de la Unidad 2", "obj": ["Demonstrate mastery of Unit 2 grammar and content", "Apply future, conditional, and subjunctive in context", "Show vocabulary growth from Unit 2 themes"], "read": "<p><strong>Evaluación de la Unidad 2.</strong> Quick review:</p><ul><li><strong>Futuro:</strong> infinitive + -é/-ás/-á/-emos/-éis/-án · 10 irregular stems: tendr-, vendr-, pondr-, saldr-, podr-, querr-, sabr-, har-, dir-, habr-</li><li><strong>Condicional:</strong> same stems + -ía endings · uses: hypotheticals, polite requests, reported speech</li><li><strong>Si clauses:</strong> real (si + present → future) · hypothetical (si + imp.subj. → conditional)</li><li><strong>Subjuntivo:</strong> yo-drop + opposite vowel · 6 irregulars: ser/estar/ir/saber/haber/dar</li><li><strong>WEIRDO:</strong> identify category and produce form</li><li><strong>Creer que</strong> (indicative) vs. <strong>no creer que</strong> (subjunctive)</li><li><strong>Vocabulario:</strong> medio ambiente · tecnología · identidad cultural</li><li><strong>Escritura:</strong> 5-part essay · connector categories · body paragraph structure</li></ul>", "tip": "<div class='cbox'><strong>Antes del quiz:</strong> From memory, write all 10 irregular future stems with one example each. Then write the yo and ella forms of the 6 irregular subjunctives. These are the most frequently tested structures from Unit 2.</div>", "act": {"t": "Pre-quiz review", "d": "From memory: (1) All 10 irregular future stems with one example each. (2) The 6 irregular present subjunctives (yo and ella forms). (3) One sentence with 'es probable que + subjunctive' and one with 'creo que + indicative' about the same topic. Check against notes and review anything you couldn't recall."}, "qs": [{"t": "mc", "q": "'Cuando sea mayor, yo ___ por todo el mundo.' (viajar — future)", "o": ["viaje", "viajaré", "viajaría", "voy a viajar"], "a": 1, "e": "'Viajaré' — simple future yo form. Regular: infinitive + -é."}, {"t": "mc", "q": "'Dudo que él ___ suficiente tiempo para estudiar.' (tener)", "o": ["tiene", "tendrá", "tenga", "tendría"], "a": 2, "e": "'Tenga' — present subjunctive of tener (tengo → teng- → tenga). 'Dudar que' = doubt → WEIRDO D → subjunctive."}, {"t": "mc", "q": "'Según el informe, las temperaturas ___.' (subir — cited prediction)", "o": ["subirían", "subirán", "suban", "suben"], "a": 1, "e": "'Subirán' — simple future for factual predictions. Cited factual predictions use future.
