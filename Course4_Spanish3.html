 'Subirían' (conditional) would be for hypothetical scenarios."}, {"t": "sa", "q": "En español: Write a paragraph of 8–10 sentences about your vision for your community in 20 years. Must include ALL: 2 future verbs · 1 conditional · 1 subjunctive after an impersonal expression · 1 subjunctive of doubt or denial · 2 connectors from different categories. Underline and label each."}]}]}, {"title": "Unit 3: La Familia y las Relaciones", "weeks": "Semanas 6–8", "lessons": [{"day": "Sem. 6, Día 1", "title": "Vocabulario: la familia, las relaciones, los valores", "obj": ["Build rich vocabulary for family and relationship topics", "Use vocabulary in paragraph-length responses", "Connect personal values to cultural discussion"], "read": "<p>Family and relationships are a foundational theme in Spanish 3, connected to cultural identity, personal values, and social structures. Today we build the vocabulary you need to discuss these topics at Intermediate-High level.</p><div class='gbox'><h5>Vocabulario: la familia</h5><p>los parientes (relatives) · el/la cónyuge (spouse) · el/la suegro/a (in-law) · el/la cuñado/a (sibling-in-law) · el/la sobrino/a (nephew/niece) · el/la bisabuelo/a (great-grandparent) · el/la padrino/madrina (godparent) · la familia extendida (extended family) · criar (to raise a child) · heredar (to inherit) · la herencia (inheritance/heritage)</p></div><div class='gbox'><h5>Vocabulario: las relaciones interpersonales</h5><p>la confianza (trust) · el respeto mutuo (mutual respect) · los celos (jealousy) · el orgullo (pride) · la decepción (disappointment) · el rencor (resentment) · reconciliarse (to reconcile) · apoyarse (to support each other) · comunicarse (to communicate) · malentenderse (to misunderstand each other)</p></div><div class='gbox'><h5>Vocabulario: los valores y las creencias</h5><p>los valores familiares (family values) · la fe (faith) · la solidaridad (solidarity) · la humildad (humility) · el sacrificio · la dedicación · comprometerse (to commit) · respetar las tradiciones · mantener los lazos (to maintain ties) · priorizar (to prioritize)</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> In many Latin American cultures, 'la familia' extends far beyond the nuclear family. Grandparents, aunts, uncles, cousins, and godparents (padrinos) are all considered close family. The concept of 'familismo' — a deep sense of loyalty, reciprocity, and solidarity within the extended family — is a core cultural value. Godparents (compadres/comadres) have significant social and emotional roles beyond baptism.</div>", "act": {"t": "Family values reflection", "d": "Write a paragraph of 7–8 sentences about your own family and its values. Use vocabulary from all three vocabulary sections. Include: a description of your family structure, 2 values that are important in your family, 1 challenge families face today (use a subjunctive construction: es importante que...), and your opinion using at least 2 gustar-type verbs. Include 3 connectors from Unit 1."}, "qs": [{"t": "mc", "q": "'El ___ es un valor muy importante en la cultura latinoamericana, donde la lealtad a la familia es fundamental.' (word meaning solidarity within the family group)", "o": ["orgullo", "familismo", "rencor", "sacrificio"], "a": 1, "e": "'Familismo' = the cultural value of deep loyalty, solidarity, and reciprocity within the extended family. A core concept in understanding Latin American family culture."}, {"t": "mc", "q": "'Mis padres se ___ muy bien — siempre se ayudan mutuamente.' (to support each other)", "o": ["reconcilian", "apoyan", "malentienden", "heredan"], "a": 1, "e": "'Se apoyan' — 'apoyarse' (reflexive) = to support each other. The reflexive 'se' indicates reciprocal action between two parties."}, {"t": "mc", "q": "'Es importante que las familias ___ abiertamente sobre sus problemas.' (comunicarse — subjunctive)", "o": ["comunican", "comunicarse", "comuniquen", "comunican"], "a": 2, "e": "'Comuniquen' — present subjunctive of comunicarse (comunicar: comunico → comunic- → comunique, but reflexive: comuniquen). 'Es importante que' = impersonal expression (I in WEIRDO) → subjunctive."}, {"t": "sa", "q": "En español: Write 4–5 sentences about one value that is important to your family. What is it? How did you learn it? Why does it matter? Use at least 3 vocabulary words from today's lesson."}]}, {"day": "Sem. 6, Día 2", "title": "El subjuntivo con emoción y deseo", "obj": ["Use the subjunctive after verbs of emotion", "Apply the subjunctive after verbs of desire and hope", "Write complex sentences expressing emotional reactions"], "read": "<p>Two of the most natural subjunctive triggers are emotion and desire — the E and W in WEIRDO. These appear constantly in conversation when you react to what others do or express what you hope will happen.</p><div class='gbox'><h5>Subjuntivo con emoción (E in WEIRDO)</h5><p>All follow: emotion expression + que + subjunctive (different subject)</p><p>alegrarse de que · estar contento/a de que · sorprender que · molestar que</p><p>temer que (to fear that) · tener miedo de que · sentir que (to be sorry that)</p><p>estar orgulloso/a de que · estar decepcionado/a de que · avergonzarse de que</p><p class='ex'>Me alegra que <strong>puedas</strong> venir a la fiesta.</p><p class='ex'>Temo que <strong>sea</strong> demasiado tarde para cambiar las cosas.</p><p class='ex'>Estoy decepcionada de que <strong>no hayan</strong> llegado a tiempo.</p></div><div class='gbox'><h5>Subjuntivo con deseo y esperanza (W in WEIRDO)</h5><p>querer que · desear que · esperar que · ojalá (que) · necesitar que</p><p>pedir que · rogar que (to beg that) · insistir en que</p><p class='ex'>Mis padres quieren que yo <strong>estudie</strong> mucho este año.</p><p class='ex'>Esperamos que todo <strong>salga</strong> bien con tu familia.</p><p class='ex'>Ojalá que <strong>haya</strong> paz en el mundo algún día.</p></div><div class='gbox'><h5>Infinitive vs. subjunctive — the same-subject rule applied</h5><p class='ex'>Me alegra <strong>poder</strong> ayudarte. (same subject — infinitive)</p><p class='ex'>Me alegra que tú <strong>puedas</strong> ayudarme. (different subjects — subjunctive)</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> In many Hispanic cultures, expressing emotions openly within the family is expected and valued. 'Decirlo todo' — saying what you feel — is part of confianza. At the same time, public emotional expression varies by region: Spaniards and many South Americans tend to be quite expressive; some Central American cultures are more reserved. The subjunctive of emotion reflects how Spanish grammatically encodes that you care about what happens to others.</div>", "act": {"t": "Emotional reactions paragraph", "d": "Write 8 sentences expressing genuine emotional reactions and desires about family/relationships using the subjunctive. Use at least: 3 different emotion triggers (alegrarse de que, temer que, estar + adjective + de que, etc.), 2 desire triggers (querer que, esperar que, ojalá que, etc.), and 1 same-subject sentence using an infinitive instead of subjunctive (to show you know the rule). Make the sentences personal and genuine."}, "qs": [{"t": "mc", "q": "'Me alegra que tu hermano ___ tan bien en la universidad.' (ir)", "o": ["va", "vaya", "fue", "irá"], "a": 1, "e": "'Vaya' — subjunctive of ir (yo: voy → vay- → vaya). 'Me alegra que' = emotion expression (E in WEIRDO) + different subject → subjunctive."}, {"t": "mc", "q": "'Temo que mis padres no ___ de acuerdo con mi decisión.' (estar)", "o": ["están", "estén", "estarán", "estar"], "a": 1, "e": "'Estén' — subjunctive of estar (yo: estoy → est- → esté; ellos: estén). 'Temer que' = emotion expression (fear) → subjunctive."}, {"t": "mc", "q": "'Me alegra ___ aquí contigo.' vs. 'Me alegra que tú ___ aquí.' — what fills the blanks?", "o": ["estar / estás", "estar / estés", "que estés / estás", "estás / estés"], "a": 1, "e": "'Me alegra ESTAR aquí' (same subject → infinitive). 'Me alegra que tú ESTÉS aquí' (different subjects → subjunctive). This contrast demonstrates the same-subject rule."}, {"t": "sa", "q": "En español: Write 3 sentences using 3 different emotion-based subjunctive triggers. Each sentence should express something genuine about your family, friends, or school. Make sure each has different subjects in the two clauses."}]}, {"day": "Sem. 6, Día 3", "title": "El subjuntivo imperfecto — introduction", "obj": ["Understand when to use the imperfect subjunctive", "Learn the formation of the imperfect subjunctive", "Use imperfect subjunctive in si clauses and with past sequence of tenses"], "read": "<p>The imperfect subjunctive (subjuntivo imperfecto) is used when the main verb is in the past OR when expressing hypothetical conditions. It's one of the most important advanced structures in Spanish.</p><div class='gbox'><h5>Imperfect subjunctive formation</h5><p>Step 1: Take the <strong>ellos/ellas preterite form</strong></p><p>Step 2: Drop <strong>-ron</strong></p><p>Step 3: Add endings: <strong>-ra · -ras · -ra · -ramos · -rais · -ran</strong></p><p class='ex'>hablar → hablaron → habla- → hablara · hablaras · hablara · habláramos · hablarais · hablaran</p><p class='ex'>comer → comieron → comie- → comiera · comieras · comiera · comiéramos · comierais · comieran</p><p class='ex'>tener → tuvieron → tuvie- → tuviera · tuvieras · tuviera · tuviéramos · tuvierais · tuvieran</p><p class='ex'>ser/ir → fueran → fue- → fuera · fueras · fuera · fuéramos · fuerais · fueran</p><p class='ex'>hacer → hicieron → hicie- → hiciera · hicieras · hiciera · hiciéramos · hicierais · hicieran</p></div><div class='gbox'><h5>Two main uses of the imperfect subjunctive</h5><p>1. <strong>Past sequence of tenses:</strong> When main verb is past, subordinate subjunctive must be imperfect.</p><p class='ex'>Quería que Juan <strong>viniera</strong>. (I wanted Juan to come.)</p><p class='ex'>Era importante que todos <strong>participaran</strong>.</p><p>2. <strong>Hypothetical si clauses:</strong> si + imperfect subj. → conditional</p><p class='ex'>Si <strong>tuviera</strong> más tiempo, <strong>estudiaría</strong> más español.</p><p class='ex'>Si yo <strong>fuera</strong> presidenta, <strong>cambiaría</strong> muchas cosas.</p></div>", "tip": "<div class='cbox'><strong>Nota lingüística:</strong> There is also an alternative imperfect subjunctive ending using -se instead of -ra: 'hablase' instead of 'hablara.' This -se form is more common in Spain and literary texts. The -ra form is far more common in everyday speech throughout the Spanish-speaking world. Both are equally correct — for Spanish 3, focus on the -ra form.</div>", "act": {"t": "Imperfect subjunctive practice", "d": "Write 7–8 sentences using the imperfect subjunctive. Include: (1) 2 past sequence sentences starting with 'Mis padres querían que yo...' / 'Era importante que nosotros...' (2) 3 si clause sentences: 'Si tuviera/fuera/pudiera..., ___ría...' (hypothetical). Make all sentences genuine and personal — about family, school, your community, or your values."}, "qs": [{"t": "mc", "q": "'Mis padres querían que yo ___ más en casa.' (ayudar)", "o": ["ayude", "ayudara", "ayudaré", "ayudo"], "a": 1, "e": "'Ayudara' — imperfect subjunctive. Main verb 'querían' is in the past → subordinate subjunctive must be imperfect. Formation: ayudaron → ayuda- → ayudara."}, {"t": "mc", "q": "'Si ___ más dinero, viajaría por Latinoamérica.' (tener)", "o": ["tengo", "tendré", "tuviera", "tenga"], "a": 2, "e": "'Tuviera' — imperfect subjunctive for hypothetical si clause. Si + imperfect subj. → conditional. Formation: tuvieron → tuvie- → tuviera."}, {"t": "mc", "q": "'Era urgente que todos ___ al médico.' (ir)", "o": ["vayan", "fueran", "van", "irán"], "a": 1, "e": "'Fueran' — imperfect subjunctive of ir. Main verb 'era' is in the past → imperfect subjunctive required. Formation: fueron → fue- → fueran."}, {"t": "sa", "q": "En español: Write 2 sentences using si + imperfect subjunctive → conditional about what you would do differently if your situation were different (family, school, community). Then write 1 sentence with past sequence of tenses."}]}, {"day": "Sem. 6, Día 4", "title": "La historia latinoamericana — key events and cultural context", "obj": ["Build vocabulary for discussing history and historical events", "Understand key moments in Latin American history", "Connect history to present cultural and social realities"], "read": "<p>Understanding Latin American history is essential cultural competency for Spanish 3. The past explains the present — language, identity, social structures, and politics in Latin America are all shaped by these historical events.</p><div class='gbox'><h5>Vocabulario histórico</h5><p>la conquista (conquest) · la colonización (colonization) · la independencia · la revolución · el movimiento (movement) · la dictadura (dictatorship) · la democracia · el golpe de estado (coup d'état) · el exilio (exile) · los derechos humanos (human rights) · la represión · la resistencia · el mestizaje (mixing/blending of peoples)</p></div><p><strong>Momentos clave en la historia latinoamericana:</strong></p><ul><li><strong>La conquista española (1492–1600s):</strong> Arrival of Columbus, conquest of the Aztec Empire (1521) and Inca Empire (1532), decimation of indigenous populations, beginning of colonization</li><li><strong>La independencia (1810–1825):</strong> Wars of independence across Latin America; key figures: Simón Bolívar (Venezuela, Colombia, Ecuador, Peru, Bolivia), José de San Martín (Argentina, Chile), Miguel Hidalgo (Mexico)</li><li><strong>El siglo XX:</strong> Mexican Revolution (1910–1920), Cuban Revolution (1959), military dictatorships across South America (1960s–1980s), civil wars in Central America (El Salvador, Guatemala, Nicaragua)</li><li><strong>El presente:</strong> Democratic transitions, ongoing social movements, immigration, indigenous rights movements, environmental challenges</li></ul>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> The Mexican Muralist Movement (Diego Rivera, José Clemente Orozco, David Alfaro Siqueiros) in the 1920s–1940s used public murals to tell the story of Mexican history and identity — the conquest, the revolution, indigenous heritage, and the mestizo identity. These murals still cover public buildings throughout Mexico City and represent one of the most important artistic responses to historical trauma in Latin American history.</div>", "act": {"t": "Historical reflection", "d": "Choose ONE historical event from today's lesson. Write 7–8 sentences about it: what happened (preterite), what the context was at the time (imperfect), why it matters today (present), and your personal reaction or opinion (subjunctive or conditional). Use at least 4 historical vocabulary words and 3 connectors. Show your ability to move between tenses to tell a complex story."}, "qs": [{"t": "mc", "q": "'La ___ española del siglo XVI tuvo efectos devastadores para las poblaciones indígenas.' (conquest)", "o": ["revolución", "independencia", "conquista", "democracia"], "a": 2, "e": "'La conquista' = the conquest — the Spanish military and political subjugation of the Americas beginning in the late 15th century. This is one of the most significant events in Latin American history."}, {"t": "mc", "q": "Simón Bolívar is historically significant because:", "o": ["He led Mexico's independence movement", "He conquered Peru for Spain", "He led independence movements across much of South America (Venezuela", " Colombia", " Ecuador", " Peru", " Bolivia)", "He founded the Cuban Revolution"], "a": 2, "e": "Simón Bolívar (1783–1830) led independence movements across Venezuela, Colombia, Ecuador, Peru, and Bolivia — earning him the title 'El Libertador.' He is one of the most revered historical figures in Latin America."}, {"t": "mc", "q": "'Los movimientos por los derechos ___ son fundamentales en la historia latinoamericana del siglo XX.' (human rights)", "o": ["históricos", "democráticos", "humanos", "independientes"], "a": 2, "e": "'Los derechos humanos' = human rights. 'Derechos humanos' is the fixed phrase for human rights, central to discussions of 20th-century Latin American history, especially regarding military dictatorships."}, {"t": "sa", "q": "En español: Choose a historical figure or event from today's lesson. Write 4–5 sentences explaining what happened, why it was important, and what effect it has had on the present. Use at least 2 different tenses."}]}, {"day": "Sem. 6, Día 5", "title": "Narración avanzada — combining tenses to tell stories", "obj": ["Combine present, preterite, imperfect, and imperfect subjunctive in narration", "Use sequence of tenses correctly", "Write a complex narrative at Spanish 3 level"], "read": "<p>Advanced narration at Spanish 3 requires moving fluidly between tenses — not just preterite and imperfect, but also present (for commentary), conditional (for what would happen), and imperfect subjunctive (for what was hoped/feared/wanted). Here's how the tenses work together:</p><div class='gbox'><h5>Tense coordination in complex narration</h5><p><strong>Setting the scene:</strong> imperfect — what things were like</p><p class='ex'>Era una tarde de otoño. Las calles estaban vacías...</p><p><strong>Advancing the action:</strong> preterite — what happened</p><p class='ex'>De repente, llegó una carta. Mi madre la abrió...</p><p><strong>Present commentary:</strong> present — what you think now</p><p class='ex'>Hoy entiendo que esa carta cambió todo...</p><p><strong>Internal states/reported speech:</strong> imperfect subjunctive</p><p class='ex'>Nadie sabía que el mundo <strong>fuera</strong> a cambiar tan rápido.</p><p class='ex'>Todos esperaban que todo <strong>saliera</strong> bien.</p><p><strong>Hypothetical reflection:</strong> conditional</p><p class='ex'>Si las cosas <strong>hubieran</strong> sido diferentes, mi familia <strong>habría</strong> quedado en México.</p></div><div class='gbox'><h5>Discourse markers for complex narration</h5><p>al principio (at first) · con el tiempo (over time) · de repente · a partir de entonces (from then on) · finalmente · en aquel entonces (back then) · hoy en día (nowadays) · sin embargo · lo que más me sorprendió fue...</p></div>", "tip": "<div class='cbox'><strong>Consejo de escritura:</strong> The most sophisticated Spanish narrators move between tenses fluidly and purposefully. Each tense shift signals something: preterite = action, imperfect = background/state, present = current commentary, conditional = speculation. When you master tense-shifting, your Spanish sounds genuinely fluent rather than textbook-mechanical.</div>", "act": {"t": "Complex narrative — family or community story", "d": "Write a narrative of 10–12 sentences about something that happened in your family or community that had a lasting impact. Requirements: (1) Set the scene with imperfect (2+ sentences). (2) Narrate what happened with preterite (3+ sentences). (3) Include internal states or hopes using imperfect subjunctive (2 sentences: 'Todos esperaban que... / Nadie sabía que...'). (4) Add present commentary (1–2 sentences). (5) Add a hypothetical reflection with conditional (1 sentence). Use 4 discourse markers from today's list."}, "qs": [{"t": "mc", "q": "In a complex narrative, which tense is used for ongoing background description?", "o": ["Preterite", "Imperfect", "Present", "Future"], "a": 1, "e": "Imperfect — for ongoing background, settings, states, and what things were like. The preterite then advances the action that occurs against this backdrop."}, {"t": "mc", "q": "'Todos esperaban que el problema se ___.' (resolver — imperfect subjunctive)", "o": ["resuelve", "resuelva", "resolviera", "resolverá"], "a": 2, "e": "'Resolviera' — imperfect subjunctive. Main verb 'esperaban' is in the past → imperfect subjunctive required. Formation: resolvieron → resolvie- → resolviera."}, {"t": "mc", "q": "'___ todo era tranquilo; ___, llegaron las noticias.' Best discourse markers?", "o": ["Además / sin embargo", "Al principio / sin embargo", "Al principio / de repente", "Con el tiempo / además"], "a": 2, "e": "'Al principio... de repente...' — 'At first everything was calm; suddenly, the news arrived.' These discourse markers signal the transition from peaceful background (imperfect) to sudden action (preterite)."}, {"t": "sa", "q": "En español: Write a 5–6 sentence mini-narrative about a past event in your family or community. Use at least 3 different tenses, 1 imperfect subjunctive construction, and 2 discourse markers from today's list."}]}, {"day": "Sem. 7, Día 1", "title": "Las cláusulas si — real and hypothetical conditions", "obj": ["Master both types of si clauses", "Distinguish real conditions (present/future) from hypothetical (imperfect subj./conditional)", "Use si clauses naturally in speaking and writing"], "read": "<p>Si clauses (conditional sentences) are one of the most important advanced structures in Spanish 3. There are two main types, and confusing them is a common error.</p><div class='gbox'><h5>Type 1: Real/possible conditions — PRESENT → FUTURE</h5><p>Si + present indicative → future (or present/command)</p><p class='ex'>Si <strong>estudias</strong> hoy, <strong>sacarás</strong> una buena nota. (If you study, you will get a good grade.)</p><p class='ex'>Si <strong>hace</strong> buen tiempo, <strong>vamos</strong> a la playa. (If it's nice, we go to the beach.)</p><p class='ex'>Si <strong>tienes</strong> tiempo, <strong>llámame</strong>. (If you have time, call me.)</p><p>These express real, possible conditions — things that can actually happen.</p></div><div class='gbox'><h5>Type 2: Hypothetical/unreal conditions — IMP. SUBJ. → CONDITIONAL</h5><p>Si + imperfect subjunctive → conditional</p><p class='ex'>Si <strong>tuviera</strong> más dinero, <strong>viajaría</strong> por toda Latinoamérica. (If I had money — but I don't — I would travel...)</p><p class='ex'>Si <strong>fuera</strong> presidenta, <strong>cambiaría</strong> las leyes de inmigración. (If I were president — but I'm not...)</p><p class='ex'>Si <strong>pudiera</strong> vivir en cualquier país, <strong>elegiría</strong> Costa Rica.</p><p>These express unreal, hypothetical, or contrary-to-fact conditions.</p></div><div class='gbox'><h5>Word order — flexible</h5><p class='ex'>Si estudias, sacarás una buena nota. = Sacarás una buena nota si estudias.</p><p>The si clause can come first or second — no change in meaning.</p></div>", "tip": "<div class='cbox'><strong>Error común:</strong> NEVER use the present subjunctive after 'si' in conditional sentences. 'Si estudies' ✗ · 'Si estudias' ✓ (real) · 'Si estudiaras' ✓ (hypothetical). Also: NEVER use conditional after 'si': 'Si estudiaría' ✗ — this is one of the most common learner errors at this level.</div>", "act": {"t": "Si clause practice — both types", "d": "Write 8 sentences using si clauses: 4 real conditions (si + present → future/command) about realistic situations in your life, and 4 hypothetical conditions (si + imperfect subj. → conditional) about things that are currently not true but you can imagine. Make them personal and genuine. Label each: (REAL) or (HYPOTHETICAL)."}, "qs": [{"t": "mc", "q": "'Si ___ más tiempo libre, aprendería a tocar la guitarra.' (tener)", "o": ["tengo", "tendré", "tuviera", "tenga"], "a": 2, "e": "'Tuviera' — hypothetical si clause: si + imperfect subjunctive → conditional. 'Aprendería' (conditional) in the result clause confirms this is Type 2 (hypothetical/unreal)."}, {"t": "mc", "q": "'Si ___ hambre, hay comida en el refrigerador.' (tener)", "o": ["tienes", "tuvieras", "tendrás", "tengas"], "a": 0, "e": "'Tienes' — REAL condition: si + present indicative → present/command. The speaker is offering food if the person is genuinely hungry. This is a real, possible situation."}, {"t": "mc", "q": "Which sentence contains an error in si clause formation?", "o": ["Si llueve mañana", " nos quedaremos en casa.", "Si tuviera alas", " volaría por el mundo.", "Si tendría dinero", " viajaría a España.", "Si puedes venir", " avísame."], "a": 2, "e": "'Si TENDRÍA dinero' ✗ — NEVER use conditional after 'si.' Correct: 'Si TUVIERA dinero, viajaría a España' (hypothetical) or 'Si TENGO dinero, viajaré a España' (real). This is one of the most common errors."}, {"t": "sa", "q": "En español: Write 2 real si clauses about your actual plans for this semester or year. Then write 2 hypothetical si clauses about what you would do if your life were completely different. Label each type."}]}, {"day": "Sem. 7, Día 2", "title": "Escritura: ensayo de comparación y contraste", "obj": ["Learn the compare/contrast essay structure in Spanish", "Use comparison vocabulary and connectors", "Write a complete compare/contrast paragraph"], "read": "<p>The compare/contrast essay is a key Spanish 3 writing form. It requires specialized vocabulary and organizational structure beyond the standard argumentative essay.</p><div class='gbox'><h5>Vocabulario de comparación y contraste</h5><p><strong>Similarities:</strong> al igual que (just like) · tanto... como... (both... and...) · de la misma manera (in the same way) · así como (just as) · comparte con (shares with) · se parece a (resembles) · en común</p><p><strong>Differences:</strong> a diferencia de (unlike) · en cambio (on the other hand) · mientras que (while/whereas) · en contraste con · por el contrario (on the contrary) · a pesar de sus similitudes (despite their similarities)</p><p><strong>Degree:</strong> más... que / menos... que · tan... como · mayor/menor (bigger/smaller) · superior/inferior · superior en cuanto a (superior in terms of)</p></div><div class='gbox'><h5>Two organizational structures</h5><p><strong>Block structure:</strong> Describe A completely, then describe B completely, then compare.</p><p><strong>Point-by-point structure:</strong> Compare A and B on point 1, then on point 2, then on point 3.</p><p>For Spanish 3, point-by-point is usually more effective for shorter essays.</p></div><div class='gbox'><h5>Comparison essay transitions</h5><p>Por un lado... por otro lado... · En primer lugar... en segundo lugar... · A diferencia de X, Y... · Mientras que X hace/es..., Y hace/es... · Tanto X como Y tienen en común...</p></div>", "tip": "<div class='cbox'><strong>Temas de comparación comunes en español 3:</strong> Two Spanish-speaking countries or regions · Two historical periods · Life in a Spanish-speaking country vs. the US · Traditional vs. modern family structures · Urban vs. rural life in Latin America · Two cultural traditions. These topics connect language practice to Cultures and Comparisons (two of the five Cs).</div>", "act": {"t": "Compare/contrast paragraph", "d": "Write ONE complete compare/contrast paragraph (8–10 sentences) comparing TWO Spanish-speaking countries or regions, OR comparing family life in a Spanish-speaking culture with family life in the US. Requirements: (1) Clear topic sentence stating what is being compared. (2) At least 2 specific similarities using similarity vocabulary. (3) At least 2 specific differences using contrast vocabulary. (4) At least 1 subjunctive construction (Es interesante que... / Es sorprendente que...). (5) 4 connectors from today's comparison vocabulary."}, "qs": [{"t": "mc", "q": "'México y Colombia comparten una herencia española, ___ también tienen diferencias culturales significativas.' (but/however)", "o": ["también", "aunque", "porque", "siempre"], "a": 1, "e": "'Aunque' = although/even though — signals concession/contrast. 'Aunque también tienen diferencias' = although they also have significant differences. 'También' alone would add information rather than contrast."}, {"t": "mc", "q": "'___ España, México tiene una fuerte herencia indígena además de la española.' (Unlike)", "o": ["Al igual que", "De la misma manera que", "A diferencia de", "Así como"], "a": 2, "e": "'A diferencia de' = unlike / in contrast to. 'A diferencia de España, México tiene...' — this connector introduces a contrast between the two countries."}, {"t": "mc", "q": "'___ España ___ México celebran el Día del idioma español.' (both... and...)", "o": ["Tanto / como", "Más / que", "A diferencia de / en cambio", "Por un lado / por otro lado"], "a": 0, "e": "'Tanto España como México' = both Spain and Mexico. This structure expresses similarity/inclusion: 'Tanto X como Y' = both X and Y (do/have/are the same thing)."}, {"t": "sa", "q": "En español: Write 3 sentences comparing two things you know well (two cities, two family members, two subjects at school, two Spanish-speaking countries). Use comparison vocabulary from today's lesson — at least 1 similarity and 1 difference connector."}]}, {"day": "Sem. 7, Día 3", "title": "Hablar del pasado con el subjuntivo", "obj": ["Use imperfect subjunctive after past emotional expressions", "Combine past narration with subjunctive reactions", "Produce paragraph-length oral and written responses about past events"], "read": "<p>One of the most common and natural uses of the imperfect subjunctive is reacting to past events — expressing how you felt about something that happened, or what was hoped/feared at the time.</p><div class='gbox'><h5>Past emotional reactions — sequence of tenses</h5><p>When the main verb is past, the subjunctive must also be past (imperfect subjunctive).</p><p class='ex'>Me alegró que Juan <strong>llegara</strong> a tiempo. (I was glad that Juan arrived on time.)</p><p class='ex'>Era una lástima que no <strong>pudiéramos</strong> ayudar más. (It was a shame we couldn't help more.)</p><p class='ex'>Mis padres tenían miedo de que yo <strong>fracasara</strong>. (My parents were afraid I would fail.)</p><p class='ex'>Fue sorprendente que todo <strong>saliera</strong> tan bien.</p></div><div class='gbox'><h5>Past desire and recommendation</h5><p class='ex'>Quería que mis hijos <strong>supieran</strong> hablar dos idiomas. (I wanted my children to know two languages.)</p><p class='ex'>El médico recomendó que <strong>descansara</strong> más.</p><p class='ex'>La profesora insistió en que <strong>leyéramos</strong> el artículo completo.</p></div><div class='gbox'><h5>Common irregular imp. subjunctive forms to practice</h5><p>ser/ir → fuera · tener → tuviera · hacer → hiciera · poder → pudiera</p><p>saber → supiera · venir → viniera · decir → dijera · estar → estuviera</p></div>", "tip": "<div class='cbox'><strong>Conexión cultural:</strong> Many Latin American literary and oral traditions rely heavily on the subjunctive to express regret, longing, and what might have been. Gabriel García Márquez, Isabel Allende, and other major Latin American authors use the subjunctive extensively in their fiction to convey the inner emotional lives of characters and the distance between reality and desire.</div>", "act": {"t": "Past subjunctive reflection", "d": "Write 7–8 sentences about a past situation — something that happened in your family, school, or community — using past-tense subjunctive. Include: 2 sentences with past emotional reactions (Me alegró que... / Era una lástima que... / Fue sorprendente que...), 2 sentences with past desire or fear (Quería que... / Tenía miedo de que...), and 1 sentence with a past recommendation (Alguien recomendó que...). Use at least 4 different irregular imperfect subjunctive verbs."}, "qs": [{"t": "mc", "q": "'Me alegró que mis padres ___ a mi graduación.' (venir)", "o": ["vienen", "vengan", "vinieran", "vendrían"], "a": 2, "e": "'Vinieran' — imperfect subjunctive of venir. Main verb 'me alegró' is in the past → imperfect subjunctive required. Formation: vinieron → vinie- → vinieran."}, {"t": "mc", "q": "'Era importante que todos los estudiantes ___ el proyecto a tiempo.' (entregar)", "o": ["entreguen", "entregarán", "entregaran", "entreguen"], "a": 2, "e": "'Entregaran' — imperfect subjunctive of entregar. 'Era importante que' is past → imperfect subjunctive. Formation: entregaron → entrega- → entregaran."}, {"t": "mc", "q": "'Fue sorprendente que el equipo ___ el campeonato.' (ganar)", "o": ["gane", "ganara", "ganó", "ganar"], "a": 1, "e": "'Ganara' — imperfect subjunctive. 'Fue sorprendente que' = past emotion expression → imperfect subjunctive required for the subordinate clause."}, {"t": "sa", "q": "En español: Write 3 sentences about things that happened in your past using past subjunctive. Use: 1 past emotional reaction (Me alegró / Era una lástima / Fue sorprendente que...), 1 past desire (Quería que...), 1 past recommendation or requirement (Era necesario que... / Alguien insistió en que...)."}]}, {"day": "Sem. 7, Día 4", "title": "Lectura literaria — short stories and authentic texts", "obj": ["Read and analyze a short literary text in Spanish", "Identify literary devices in Spanish", "Connect themes to cultural and personal experience"], "read": "<p>Reading authentic literary texts is a key Spanish 3 goal. Literary texts use language creatively — metaphor, irony, imagery, subjunctive of doubt — and require active, engaged reading.</p><div class='gbox'><h5>Vocabulario literario básico</h5><p>el narrador/la narradora (narrator) · el/la protagonista · el antagonista · el ambiente (setting) · el argumento (plot) · el tema principal (main theme) · el desenlace (resolution/ending) · el clímax · el punto de vista (point of view) · la metáfora · la ironía · el suspenso · el simbolismo</p></div><p><strong>Mini-cuento auténtico para analizar:</strong></p><blockquote><p><strong>\"El dinosaurio\" — Augusto Monterroso (Guatemala, 1959)</strong></p><p><em>«Cuando despertó, el dinosaurio todavía estaba allí.»</em></p></blockquote><p>This is considered one of the shortest complete stories ever written. Despite its brevity, it has generated enormous critical discussion.</p><p><strong>Preguntas de análisis:</strong></p><ul><li>Who woke up? The dinosaur? A human?</li><li>What does 'todavía' (still/yet) imply happened before the story begins?</li><li>Is the dinosaur literal or metaphorical? What could it symbolize?</li><li>What is the mood/tone created by this single sentence?</li></ul><p><strong>For longer texts, use SOAPS:</strong> Subject · Occasion · Audience · Purpose · Speaker</p>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> Augusto Monterroso (1921–2003) was a Guatemalan writer famous for his extremely short fiction (microcuentos). He spent much of his life in exile in Mexico due to political persecution in Guatemala. 'El dinosaurio' exemplifies the Latin American microcuento tradition — stories of one or a few sentences that contain complete narrative worlds. This tradition reflects the region's rich oral storytelling culture.</div>", "act": {"t": "Literary analysis response", "d": "Write a paragraph of 7–8 sentences analyzing 'El dinosaurio' by Augusto Monterroso. Address: (1) What do you think happened before the story begins? (2) What does the dinosaur represent metaphorically? (3) What is the effect of the word 'todavía' (still)? (4) What theme or emotion does this story express? Use literary vocabulary from today's lesson. Include at least 1 subjunctive construction (Es posible que... / Es interesante que... / Creo que el dinosaurio simbolice...)."}, "qs": [{"t": "mc", "q": "In 'El dinosaurio,' the word 'todavía' most importantly implies:", "o": ["The dinosaur is very large", "Something had happened before the story that the dinosaur survived or outlasted", "The story is set in prehistoric times", "The protagonist is a scientist"], "a": 1, "e": "'Todavía' (still/yet) implies a prior expectation that the dinosaur would be gone — it should have left or disappeared, but it hasn't. This creates the narrative tension in this micro-story. The entire story depends on this single word."}, {"t": "mc", "q": "A 'microcuento' is best described as:", "o": ["A children's story", "A poem about small things", "An extremely short short story that contains a complete narrative world", "A type of song"], "a": 2, "e": "'Microcuento' = a micro-story or flash fiction — an extremely short story (sometimes a single sentence) that contains a complete narrative arc. Augusto Monterroso is a master of this form in Latin American literature."}, {"t": "mc", "q": "When analyzing a literary text with SOAPS, 'P' stands for:", "o": ["Plot", "Person (protagonist)", "Purpose (what the author intends)", "Perspective"], "a": 2, "e": "P = Purpose — what the author intends to achieve with the text. Understanding purpose is central to literary analysis: Is it to entertain? To critique society? To create an emotional experience? To challenge assumptions?"}, {"t": "sa", "q": "En español: Write 4–5 sentences analyzing what the dinosaur might symbolize in Monterroso's story. What do you think this micro-story is really about? Use literary vocabulary and at least 1 subjunctive expression."}]}, {"day": "Sem. 7, Día 5", "title": "Evaluación de la Unidad 3", "obj": ["Demonstrate mastery of Unit 3 grammar and content", "Apply imperfect subjunctive in context", "Show vocabulary growth from Unit 3 themes"], "read": "<p><strong>Evaluación de la Unidad 3.</strong> Quick review:</p><ul><li><strong>Vocabulario:</strong> familia y relaciones · valores · historia latinoamericana · vocabulario literario</li><li><strong>Subjuntivo con emoción (E):</strong> alegrarse de que, temer que, estar + adj + de que → subjunctive</li><li><strong>Subjuntivo con deseo (W):</strong> querer que, esperar que, ojalá que → subjunctive</li><li><strong>Subjuntivo imperfecto:</strong> ellos preterite − ron + -ra endings · used when main verb is past OR in hypothetical si clauses</li><li><strong>Si clauses:</strong> REAL: si + present → future · HYPOTHETICAL: si + imp.subj. → conditional · NEVER: conditional after si, never present subj. after si</li><li><strong>Secuencia de tiempos:</strong> past main verb → imperfect subjunctive in subordinate clause</li><li><strong>Narración compleja:</strong> imperfect (background) + preterite (action) + present (commentary) + imp.subj. (internal states)</li><li><strong>Comparación y contraste:</strong> tanto...como, a diferencia de, mientras que, en cambio</li></ul>", "tip": "<div class='cbox'><strong>Antes del quiz:</strong> Write from memory the imperfect subjunctive forms of: (1) tener (yo/ellos), (2) ser/ir (yo/ellos), (3) hacer (yo/ellos). Then write one real si clause and one hypothetical si clause about your own life. Check your work before starting the quiz.</div>", "act": {"t": "Pre-quiz review", "d": "From memory, write the imperfect subjunctive: (1) all 6 forms of TENER, (2) all 6 forms of SER/IR, (3) all 6 forms of PODER. Then write 2 sentences: one real si clause (about something you actually plan) and one hypothetical si clause (about something that is not currently true). These are the most important forms to know for this evaluation."}, "qs": [{"t": "mc", "q": "'Mis abuelos querían que sus hijos ___ las tradiciones familiares.' (mantener)", "o": ["mantengan", "mantenían", "mantuvieran", "mantener"], "a": 2, "e": "'Mantuvieran' — imperfect subjunctive. 'Querían' is in the past → imperfect subjunctive required. Formation: mantuvieron → mantuvie- → mantuvieran."}, {"t": "mc", "q": "'Si ___ la oportunidad, estudiaría un semestre en España.' (tener)", "o": ["tengo", "tendré", "tuviera", "tenga"], "a": 2, "e": "'Tuviera' — hypothetical si clause: si + imperfect subjunctive → conditional. 'Estudiaría' (conditional) confirms this is a hypothetical/unreal condition."}, {"t": "mc", "q": "'Fue increíble que el equipo ___ el campeonato después de tantos obstáculos.' (ganar)", "o": ["gane", "ganará", "ganara", "gana"], "a": 2, "e": "'Ganara' — imperfect subjunctive after 'fue increíble que' (past emotion expression). Sequence of tenses: past main verb → imperfect subjunctive."}, {"t": "sa", "q": "En español: Write a paragraph of 8–10 sentences about a family tradition or cultural practice that is important to you or that you have observed. Use ALL: 1 imperfect subjunctive (past sequence of tenses), 1 si clause (real or hypothetical), 1 subjunctive of emotion or desire, 2 comparison/contrast connectors, 2 historical or cultural vocabulary words."}]}]}, {"title": "Unit 4: El Pasado y la Historia", "weeks": "Semanas 9–11", "lessons": [{"day": "Sem. 9, Día 1", "title": "El pretérito perfecto — present perfect in Spanish", "obj": ["Learn present perfect formation and uses", "Distinguish present perfect from preterite (Latin American vs. Spain usage)", "Use present perfect for recent actions and life experiences"], "read": "<p>The present perfect (pretérito perfecto compuesto) expresses actions that connect the past to the present. In Spain it's used for recent past; in Latin America it's used primarily for actions relevant to the present moment or for life experiences.</p><div class='gbox'><h5>Present perfect formation</h5><p>haber (conjugated) + past participle</p><p><strong>haber:</strong> he · has · ha · hemos · habéis · han</p><p><strong>Regular past participles:</strong></p><p>-AR → -ado: hablar → <strong>hablado</strong> · trabajar → <strong>trabajado</strong></p><p>-ER/-IR → -ido: comer → <strong>comido</strong> · vivir → <strong>vivido</strong></p><p class='ex'>He <strong>vivido</strong> en tres países. (I have lived in three countries.)</p><p class='ex'>¿Has <strong>comido</strong> alguna vez ceviche? (Have you ever eaten ceviche?)</p></div><div class='gbox'><h5>Irregular past participles — must memorize</h5><p>abrir → <strong>abierto</strong> · cubrir → <strong>cubierto</strong> · decir → <strong>dicho</strong></p><p>escribir → <strong>escrito</strong> · hacer → <strong>hecho</strong> · morir → <strong>muerto</strong></p><p>poner → <strong>puesto</strong> · resolver → <strong>resuelto</strong> · romper → <strong>roto</strong></p><p>ver → <strong>visto</strong> · volver → <strong>vuelto</strong> · abrir → <strong>abierto</strong></p></div><div class='gbox'><h5>Key uses of the present perfect</h5><p>1. Life experiences (ever/never): <span class='ex'>Nunca he visitado Argentina.</span></p><p>2. Actions recently completed with present relevance: <span class='ex'>He estudiado mucho hoy — estoy cansada.</span></p><p>3. Situations that started in the past and continue: <span class='ex'>Han vivido aquí desde 2015.</span></p></div>", "tip": "<div class='cbox'><strong>España vs. Latinoamérica:</strong> In Spain, 'Esta mañana he desayunado...' (this morning I have eaten — present perfect for recent past). In Latin America: 'Esta mañana desayuné...' (preterite). For life experiences, both regions commonly use the present perfect: '¿Has viajado alguna vez a Europa?' This distinction is important for cultural and regional competency.</div>", "act": {"t": "Life experiences interview", "d": "Write 8 sentences about life experiences using the present perfect. Use the structure: '(Nunca) he + past participle...' Include: 2 things you have done and found interesting, 2 things you have never done but would like to, 2 questions you would ask a Spanish speaker (¿Has...?), and 2 things you have done recently that are relevant to the present. Include at least 4 irregular past participles."}, "qs": [{"t": "mc", "q": "'¿___ alguna vez ___ una novela en español?' (leer — present perfect)", "o": ["Has / leído", "Habías / leído", "Habías / leer", "Has / leer"], "a": 0, "e": "'¿Has leído alguna vez...?' — present perfect question. 'Has' (tú form of haber) + 'leído' (past participle of leer, regular -ido). 'Alguna vez' = ever, commonly used with present perfect."}, {"t": "mc", "q": "Which past participle is IRREGULAR?", "o": ["hablado", "comido", "vivido", "hecho"], "a": 3, "e": "'Hecho' is the irregular past participle of hacer (to do/make). The regular ones end in -ado or -ido. Key irregulars: hecho, dicho, visto, puesto, vuelto, escrito, abierto, roto, muerto, resuelto."}, {"t": "mc", "q": "'He vivido en esta ciudad ___ diez años.' (for — with present perfect)", "o": ["por", "hace", "desde", "durante"], "a": 2, "e": "'Desde' = since/for (with ongoing situations). 'He vivido aquí desde hace diez años' OR 'He vivido aquí desde 2015.' 'Desde' + time indicates when the ongoing situation started."}, {"t": "sa", "q": "En español: Write 4 sentences about your life experiences using the present perfect. Include 2 things you have done and 2 things you have never done. Use at least 2 irregular past participles."}]}, {"day": "Sem. 9, Día 2", "title": "El pluscuamperfecto — the past perfect", "obj": ["Learn pluperfect formation and uses", "Use pluperfect to sequence past events", "Combine pluperfect with preterite/imperfect for complex narration"], "read": "<p>The pluperfect (pretérito pluscuamperfecto) expresses an action that was completed BEFORE another past action. It's 'the past of the past' — essential for sophisticated narration.</p><div class='gbox'><h5>Pluperfect formation</h5><p>haber (imperfect) + past participle</p><p><strong>haber imperfect:</strong> había · habías · había · habíamos · habíais · habían</p><p class='ex'>Cuando llegué, mis amigos ya se <strong>habían ido</strong>. (When I arrived, my friends had already left.)</p><p class='ex'>No había <strong>comido</strong> nada antes de la reunión. (I hadn't eaten anything before the meeting.)</p><p class='ex'>El problema era que nadie <strong>había</strong> <strong>dicho</strong> la verdad. (The problem was that nobody had told the truth.)</p></div><div class='gbox'><h5>Pluperfect vs. preterite — sequencing</h5><p>The pluperfect describes what happened FIRST; the preterite describes what happened SECOND.</p><p class='ex'>Cuando <strong>llegué</strong> [preterite], ya <strong>había empezado</strong> [pluperfect] la película.</p><p class='ex'>La carta <strong>llegó</strong> [preterite] después de que él <strong>había salido</strong> [pluperfect].</p><p>Signal words: ya (already) · todavía no (not yet) · cuando (when) · después de que (after) · antes de que (before) · nunca antes (never before)</p></div>", "tip": "<div class='cbox'><strong>Consejo:</strong> The pluperfect appears constantly in storytelling, journalism, and academic writing. Once you master it, your narrative complexity jumps significantly. Think of a timeline: pluperfect = furthest in the past → preterite = more recent past → present = now. Using all three correctly in one paragraph shows advanced narrative control.</div>", "act": {"t": "Pluperfect sequencing", "d": "Write 7–8 sentences about a past situation where you arrived to find things had already happened — or where something happened because of what had already occurred before. Use the pluperfect for the earlier action and preterite/imperfect for the later context. Include signal words (ya, todavía no, cuando, después de que). Possible topics: arriving late to something, finding things changed, a historical event's aftermath."}, "qs": [{"t": "mc", "q": "'Cuando llegué a la fiesta, todos mis amigos ya ___.' (irse — pluperfect)", "o": ["se van", "se habían ido", "se fueron", "se irán"], "a": 1, "e": "'Se habían ido' — pluperfect (había/habían + past participle). The friends leaving happened BEFORE the speaker arrived. Pluperfect = the earlier completed action."}, {"t": "mc", "q": "'Nunca antes ___ una novela tan larga en español.' (leer — pluperfect, yo)", "o": ["había leído", "leí", "he leído", "leeré"], "a": 0, "e": "'Había leído' — pluperfect yo form. 'Nunca antes' signals a past experience that preceded the current moment being described. Pluperfect = action completed before another past reference point."}, {"t": "mc", "q": "Which sentence correctly uses the pluperfect to sequence events?", "o": ["Cuando llegué", " el partido empezó.", "Cuando llegué", " el partido había empezado ya.", "Cuando llegué", " el partido ha empezado.", "Cuando llegué", " el partido estaba empezando."], "a": 1, "e": "'Había empezado ya' — pluperfect correctly signals the game started BEFORE the speaker arrived. The preterite 'llegué' is the later action; pluperfect 'había empezado' is the earlier one."}, {"t": "sa", "q": "En español: Write 3 sentences using the pluperfect + preterite to sequence two past events. Use signal words (ya, cuando, después de que, todavía no). Each sentence should clearly show that one event happened before another."}]}, {"day": "Sem. 9, Día 3", "title": "Movimientos sociales y políticos en el mundo hispanohablante", "obj": ["Understand key social and political movements in Spanish-speaking countries", "Build vocabulary for discussing social change and political history", "Apply complex tenses to discuss historical and contemporary issues"], "read": "<p>Social and political movements in the Spanish-speaking world have shaped modern history and continue to influence contemporary society. Understanding them is essential cultural literacy.</p><div class='gbox'><h5>Vocabulario: movimientos sociales y políticos</h5><p>el movimiento obrero (labor movement) · los derechos civiles · el feminismo · el activismo indígena · la descolonización · la amnistía (amnesty) · el exilio · la dictadura · la resistencia · el golpe de estado · la transición democrática · la justicia social · manifestarse (to protest/demonstrate) · reivindicar (to demand/claim rights) · derrocar (to overthrow)</p></div><p><strong>Movimientos clave:</strong></p><ul><li><strong>Las Madres de la Plaza de Mayo (Argentina, 1977):</strong> Mothers of the disappeared who protested weekly against the military dictatorship — a symbol of peaceful resistance worldwide</li><li><strong>El movimiento zapatista (México, 1994):</strong> Indigenous rights uprising in Chiapas led by the EZLN, demanding land rights and indigenous autonomy</li><li><strong>El movimiento de mujeres en Latinoamérica:</strong> From #MeToo to #NiUnaMenos (Not One More — protesting femicide), women's movements have transformed public discourse across the region</li><li><strong>Los pueblos indígenas:</strong> Ongoing movements for land rights, language preservation, and political representation across Ecuador, Bolivia, Peru, Mexico, and Guatemala</li></ul>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> '#NiUnaMenos' (Not One More) started in Argentina in 2015 in response to femicide — the murder of women because of their gender. The hashtag went viral across Latin America, sparking massive protests in Argentina, Chile, Mexico, Peru, and Spain. It represents one of the most significant feminist movements in the Spanish-speaking world and shows how social media has transformed political organizing.</div>", "act": {"t": "Social movement analysis", "d": "Choose ONE social or political movement from today's lesson (or research another from a Spanish-speaking country). Write 8–9 sentences analyzing it: (1) What was the historical context that led to this movement? (preterite/imperfect) (2) What had already happened that made it necessary? (pluperfect) (3) What did the movement achieve or demand? (preterite) (4) Why does it still matter today? (present + subjunctive) Use at least 4 vocabulary words from today's list."}, "qs": [{"t": "mc", "q": "Las Madres de la Plaza de Mayo protestaban contra:", "o": ["La pobreza en Argentina", "La dictadura militar argentina y la desaparición de sus hijos", "La contaminación del río de la Plata", "El gobierno democrático de Argentina"], "a": 1, "e": "Las Madres de la Plaza de Mayo protested against the Argentine military dictatorship (1976–1983) and the 'disappearance' (forced disappearance and murder) of their children. They marched every Thursday in Plaza de Mayo — an act of extraordinary courage under a violent regime."}, {"t": "mc", "q": "'El movimiento zapatista reivindicaba los derechos de los pueblos ___.' (indigenous peoples)", "o": ["urbanos", "extranjeros", "indígenas", "trabajadores"], "a": 2, "e": "'Los pueblos indígenas' = indigenous peoples. The Zapatista movement (EZLN) demanded land rights, indigenous autonomy, and recognition of indigenous rights in Mexico, particularly in Chiapas."}, {"t": "mc", "q": "'Antes de que el movimiento ___, muchas mujeres no tenían acceso a la justicia.' (comenzar — pluperfect context)", "o": ["comience", "comenzara", "hubiera comenzado", "comenzó"], "a": 2, "e": "'Hubiera comenzado' — pluperfect subjunctive used after 'antes de que' to refer to an action in the past. 'Antes de que' always takes the subjunctive; when past, use pluperfect subjunctive."}, {"t": "sa", "q": "En español: Write 4–5 sentences about a social or political issue that matters to you. What should change? Use at least 1 subjunctive construction and 2 vocabulary words from today's lesson about social movements."}]}, {"day": "Sem. 9, Día 4", "title": "El ensayo argumentativo avanzado — refutation and evidence", "obj": ["Strengthen argumentative essays with refutation techniques", "Use evidence effectively in Spanish academic writing", "Write a complete five-paragraph essay draft"], "read": "<p>Moving beyond basic five-paragraph essays, Spanish 3 argumentative writing requires engaging seriously with the opposing viewpoint — not just acknowledging it, but refuting it with evidence.</p><div class='gbox'><h5>Refutation techniques — the concession paragraph elevated</h5><p><strong>Simple concession:</strong> Es verdad que X, sin embargo Y.</p><p><strong>Acknowledge + qualify:</strong> Si bien X es cierto en algunos casos, en la mayoría de las situaciones Y. (While X is true in some cases, in most situations Y.)</p><p><strong>Acknowledge + reframe:</strong> Aunque X parece convincente a primera vista, un análisis más profundo revela que Y. (Although X seems convincing at first, deeper analysis reveals Y.)</p><p><strong>Acknowledge + turn:</strong> Precisamente porque X, es aún más importante que Y. (Precisely because X, it is even more important that Y.)</p></div><div class='gbox'><h5>Evidence language in Spanish academic writing</h5><p>Según los datos... (According to the data...) · Los estudios demuestran que... (Studies show that...) · Como señala el informe... (As the report indicates...) · Se ha comprobado que... (It has been proven that...) · Es un hecho que... (It is a fact that...) · Los expertos coinciden en que... (Experts agree that...)</p></div><div class='gbox'><h5>Hedging language — showing academic nuance</h5><p>puede ser que... · es posible que... · en algunos casos... · generalmente hablando... · aunque no siempre... · con ciertas excepciones... · tiende a...</p></div>", "tip": "<div class='cbox'><strong>Consejo académico:</strong> The best Spanish 3 essays don't just state an opinion — they engage with complexity. The strongest writers acknowledge the strongest version of the opposing argument (not a weak version), then show why their position is still correct. This is called 'steelmanning' the opposition, and it makes your argument far more persuasive and your writing far more sophisticated.</div>", "act": {"t": "Advanced concession paragraph", "d": "Write ONE advanced concession paragraph (8–10 sentences) for one of these prompts: (1) '¿Es positivo el impacto de la globalización en las culturas latinoamericanas?' OR (2) '¿Deben los países tener políticas de inmigración más abiertas?' Your paragraph must: (1) Use one of the advanced refutation techniques from today, (2) Include evidence language (Según los datos... / Los estudios demuestran...), (3) Use hedging language to show nuance, (4) Include at least 1 present perfect or pluperfect construction, (5) Use 3 connectors."}, "qs": [{"t": "mc", "q": "'Si bien la globalización ha ___ algunas tradiciones locales, también ha creado nuevas formas de identidad cultural.' (past participle of afectar)", "o": ["afectando", "afectado", "afecte", "afectara"], "a": 1, "e": "'Afectado' — past participle of afectar (regular -AR → -ado). Used with 'ha' to form present perfect: 'ha afectado' = has affected. The sentence uses 'si bien' (although) for the advanced concession technique."}, {"t": "mc", "q": "'___ los estudios, el bilingüismo tiene beneficios cognitivos significativos.' (According to)", "o": ["Por", "Para", "Según", "En cuanto a"], "a": 2, "e": "'Según' = according to. 'Según los estudios' = according to the studies. Essential for citing evidence in academic writing."}, {"t": "mc", "q": "'Aunque X parece convincente a primera vista, un análisis más profundo ___.' (revelar — present)", "o": ["revele", "reveló", "revela", "revelara"], "a": 2, "e": "'Revela' — present indicative. 'Aunque + indicative' states a fact being conceded. 'Un análisis más profundo revela' — the main clause after the concession uses present indicative."}, {"t": "sa", "q": "En español: Write a 4-sentence advanced concession that acknowledges the opposing view and then refutes it. Use one of the refutation techniques from today (si bien, aunque parece convincente, precisamente porque). Include at least one evidence phrase."}]}, {"day": "Sem. 9, Día 5", "title": "El subjuntivo en cláusulas adverbiales", "obj": ["Use subjunctive in adverbial clauses of purpose, time, and condition", "Master 'antes de que' and 'para que' + subjunctive", "Apply adverbial subjunctive in writing and speaking"], "read": "<p>Adverbial clauses (clauses that function as adverbs) frequently require the subjunctive in Spanish. Mastering these patterns significantly elevates your writing and speaking.</p><div class='gbox'><h5>Conjunctions that ALWAYS take subjunctive</h5><p>These conjunctions always introduce the subjunctive because they inherently involve future/hypothetical meaning:</p><p><strong>para que</strong> (so that): <span class='ex'>Te lo explico para que <strong>entiendas</strong>.</span></p><p><strong>antes de que</strong> (before): <span class='ex'>Llámame antes de que <strong>salgas</strong>.</span></p><p><strong>a menos que</strong> (unless): <span class='ex'>Iré a menos que <strong>llueva</strong>.</span></p><p><strong>sin que</strong> (without): <span class='ex'>Salió sin que yo lo <strong>supiera</strong>.</span></p><p><strong>con tal de que</strong> (provided that): <span class='ex'>Lo haré con tal de que me <strong>ayudes</strong>.</span></p></div><div class='gbox'><h5>Conjunctions that take EITHER indicative or subjunctive</h5><p>These take indicative for past/habitual facts, subjunctive for future/hypothetical:</p><p><strong>cuando:</strong> <span class='ex'>Cuando <strong>llegó</strong>, comimos. (past fact — indicative)</span><span class='ex'>Cuando <strong>llegues</strong>, come algo. (future — subjunctive)</span></p><p><strong>aunque:</strong> <span class='ex'>Aunque <strong>hace</strong> frío, salgo. (it IS cold — indicative)</span><span class='ex'>Aunque <strong>haga</strong> frío, saldré. (even if it should be cold — subjunctive)</span></p><p><strong>después de que:</strong> <span class='ex'>Llamé después de que <strong>llegó</strong>. (past — indicative)</span><span class='ex'>Llama después de que <strong>llegue</strong>. (future — subjunctive)</span></p></div>", "tip": "<div class='cbox'><strong>Regla mnemónica para las conjunciones que SIEMPRE usan subjuntivo:</strong> A PLACE — A (antes de que) · P (para que) · L (a menos que) · A (a condición de que) · C (con tal de que) · E (en caso de que). These conjunctions inherently look forward to something uncertain, which is why they always require the subjunctive.</div>", "act": {"t": "Adverbial subjunctive in context", "d": "Write 8 sentences using adverbial clauses with the subjunctive. Use at least: 2 sentences with 'para que + subjunctive' (stating purposes), 2 sentences with 'antes de que + subjunctive' (time clauses), 2 sentences with 'cuando + subjunctive' (future temporal), 1 sentence with 'a menos que + subjunctive' (condition), 1 sentence with 'aunque + subjunctive' (hypothetical concession). Connect the sentences to themes from Unit 3 or 4 (history, family, social issues)."}, "qs": [{"t": "mc", "q": "'Te explico la historia ___ entiendas el contexto cultural.' (para que / so that)", "o": ["para que / entiendas", "para que / entiendes", "porque / entiendas", "para / entiendas"], "a": 0, "e": "'Para que + subjunctive' — 'para que' ALWAYS takes subjunctive. It expresses purpose: 'so that you understand.' 'Para que entiendes' ✗ — never indicative after para que."}, {"t": "mc", "q": "'Cuando ___ a España, visita el Museo del Prado.' (llegar — future time clause)", "o": ["llegas", "llegues", "llegaste", "llegarás"], "a": 1, "e": "'Llegues' — subjunctive in future temporal clause. 'Cuando' + future event = subjunctive. Compare: 'Cuando llegué' (past event, indicative) vs. 'Cuando llegues' (future event, subjunctive)."}, {"t": "mc", "q": "'Saldré ___ que no ___ bien tiempo.' (a menos que / hacer)", "o": ["a menos / haga", "a menos / hace", "aunque / haga", "sin / hacer"], "a": 0, "e": "'A menos que + haga' — 'a menos que' (unless) always takes subjunctive. 'Haga' is the present subjunctive of hacer. 'Saldré a menos que haga mal tiempo' = I will go out unless the weather is bad."}, {"t": "sa", "q": "En español: Write 3 sentences using 3 different adverbial conjunctions from today's lesson (para que, antes de que, cuando, a menos que, aunque). Each must be about something real in your life — goals, plans, or conditions."}]}, {"day": "Sem. 10, Día 1", "title": "La inmigración y la identidad — a complex theme", "obj": ["Discuss immigration and identity in the Spanish-speaking world", "Build vocabulary for a complex social/political topic", "Apply advanced grammar to nuanced discussion"], "read": "<p>Immigration and identity are among the most complex and personally relevant themes in Spanish 3, connecting language study directly to contemporary US society and Latin American history.</p><div class='gbox'><h5>Vocabulario: inmigración e identidad</h5><p>el/la inmigrante · el/la refugiado/a (refugee) · el/la ciudadano/a (citizen) · la ciudadanía (citizenship) · documentado/a · indocumentado/a · el asilo (asylum) · la frontera (border) · deportar · integrarse (to integrate) · adaptarse · mantener la identidad cultural · la nostalgia · el duelo cultural (cultural grief) · la biculturalidad · el español heritage speaker</p></div><div class='gbox'><h5>Perspectivas múltiples</h5><p><strong>Razones para emigrar:</strong> la pobreza · la violencia · la falta de oportunidades · la persecución política · el cambio climático (environmental migration) · la reunificación familiar</p><p><strong>Desafíos de la integración:</strong> la barrera del idioma · la discriminación · el choque cultural · la pérdida de identidad · el racismo · la nostalgia</p><p><strong>Beneficios de la diversidad:</strong> el enriquecimiento cultural · la innovación · nuevas perspectivas · el crecimiento económico · el intercambio de ideas</p></div>", "tip": "<div class='cbox'><strong>Dato cultural:</strong> There are approximately 62 million Latinos in the United States — the largest minority group. The majority trace their roots to Mexico (~37 million), followed by Puerto Ricans, Salvadorans, Cubans, Dominicans, Guatemalans, and many others. Each community has a distinct history, culture, and relationship with the Spanish language. Heritage Spanish speakers — those who grew up in Spanish-speaking households but were educated primarily in English — represent a unique and valuable linguistic profile.</div>", "act": {"t": "Immigration and identity response", "d": "Write a paragraph of 9–10 sentences about the theme of immigration and cultural identity. Choose ONE angle: (1) The challenges of maintaining cultural identity while adapting to a new country, (2) The history of a specific Latin American immigrant community in the US, OR (3) Your own family's history of migration or cultural identity (even if you haven't moved). Use: 4 vocabulary words from today, 1 imperfect subjunctive, 1 present perfect, 1 adverbial subjunctive clause, 3 connectors."}, "qs": [{"t": "mc", "q": "'Muchos inmigrantes tienen que ___ a una nueva cultura sin perder su identidad original.' (to adapt)", "o": ["integrarse", "deportarse", "manifestarse", "reivindicar"], "a": 0, "e": "'Integrarse' = to integrate/adapt. The sentence describes the challenge of adapting to a new culture ('integrarse a una nueva cultura') while maintaining one's original identity — a key theme in immigration discussion."}, {"t": "mc", "q": "'___ que muchos inmigrantes dejan su país por la violencia y la falta de oportunidades.' (It is known/proven that)", "o": ["Se espera", "Se ha comprobado", "Se duda", "Se teme"], "a": 1, "e": "'Se ha comprobado que' = it has been proven/confirmed that. This impersonal construction uses present perfect reflexive to present established facts in academic/formal writing."}, {"t": "mc", "q": "'Los lingüistas recomiendan que los hablantes de herencia ___ en contacto con su idioma familiar.' (mantener)", "o": ["mantengan", "mantienen", "mantuvieran", "mantendrán"], "a": 0, "e": "'Mantengan' — present subjunctive. 'Recomendar que' = recommendation (R in WEIRDO) → subjunctive. Main verb is present tense 'recomiendan' → present subjunctive in the subordinate clause."}, {"t": "sa", "q": "En español: Write 4–5 sentences about what you think is most challenging about maintaining cultural identity while adapting to a new country or culture. Use at least 2 vocabulary words from today and 1 subjunctive construction."}]}, {"day": "Sem. 10, Día 2", "title": "El discurso indirecto — reported speech in Spanish", "obj": ["Learn the rules for reported speech (indirect discourse) in Spanish", "Apply sequence of tenses correctly in reported speech", "Use reported speech in narration and academic writing"], "read": "<p>Reported speech (el discurso indirecto) is used constantly in narration, journalism, and academic writing to convey what others said, thought, or believed.</p><div class='gbox'><h5>Direct vs. indirect speech — the transformation</h5><p><strong>Direct:</strong> María dijo: «Estoy muy cansada.»</p><p><strong>Indirect:</strong> María dijo que <strong>estaba</strong> muy cansada.</p><p><strong>Tense shifting in reported speech (when main verb is past):</strong></p><p>Present → Imperfect: <span class='ex'>«Tengo hambre» → Dijo que <strong>tenía</strong> hambre.</span></p><p>Preterite → Pluperfect: <span class='ex'>«Llegué tarde» → Dijo que <strong>había llegado</strong> tarde.</span></p><p>Future → Conditional: <span class='ex'>«Vendré mañana» → Dijo que <strong>vendría</strong> al día siguiente.</span></p><p>Present subj. → Imperfect subj.: <span class='ex'>«Quiero que vengas» → Dijo que quería que <strong>viniera</strong>.</span></p></div><div class='gbox'><h5>Time and place adverbs also shift</h5><p>hoy → ese día / aquí → allí / mañana → al día siguiente / ayer → el día anterior / ahora → entonces / este → ese</p></div><div class='gbox'><h5>Verbs used in reported speech</h5><p>decir · comentar · afirmar · añadir · explicar · admitir · negar · insistir en que · preguntar si · responder que · gritar que · susurrar que</p></div>", "tip": "<div class='cbox'><strong>Consejo:</strong> Reported speech is extremely common in journalism, history, and literature. Spanish news articles constantly use 'el presidente afirmó que...', 'los expertos explicaron que...', 'la ministra añadió que...' Mastering reported speech makes your news reading and academic writing significantly more sophisticated.</div>", "act": {"t": "Reported speech conversion and writing", "d": "Part 1: Convert these direct quotes to reported speech (changing tenses appropriately): 1) El presidente declaró: «Implementaremos nuevas políticas sociales.» 2) La profesora explicó: «El subjuntivo es esencial para hablar español avanzado.» 3) Los científicos afirmaron: «El cambio climático está acelerando.» Part 2: Write 4 original sentences using reported speech about something you heard in the news recently or something a family member or friend said to you."}, "qs": [{"t": "mc", "q": "'Juan dijo: «Estoy muy ocupado hoy.»' — Reported speech:", "o": ["Juan dijo que está muy ocupado hoy.", "Juan dijo que estaba muy ocupado ese día.", "Juan dijo que estuviera muy ocupado ese día.", "Juan dijo que estaría muy ocupado hoy."], "a": 1, "e": "'Juan dijo que ESTABA muy ocupado ESE DÍA.' — Present tense shifts to imperfect in reported speech when the main verb is past ('dijo'). 'Hoy' shifts to 'ese día.'"}, {"t": "mc", "q": "'La ministra anunció que ___ nuevas leyes el mes siguiente.' (aprobar — reported speech for future)", "o": ["aprobará", "aprobara", "aprobaría", "apruebe"], "a": 2, "e": "'Aprobaría' — conditional (future → conditional in reported speech). 'Anunció' is past → future in the original ('aprobaremos') shifts to conditional ('aprobaría') in indirect speech."}, {"t": "mc", "q": "In reported speech, which time expression correctly replaces 'mañana'?", "o": ["hoy", "aquí", "al día siguiente", "entonces"], "a": 2, "e": "'Al día siguiente' = the following day / the next day. Time adverbs shift in reported speech: mañana → al día siguiente · hoy → ese día · ayer → el día anterior · ahora → entonces."}, {"t": "sa", "q": "En español: Convert this into reported speech: A teacher said to you, 'You have worked very hard this semester. You will do well on the final exam. I want you to study the subjunctive carefully.' Write the reported speech version in 3 sentences."}]}, {"day": "Sem. 10, Día 3", "title": "Repaso integral — all structures in context", "obj": ["Review and integrate all grammar from Units 1–4", "Practice complex writing combining multiple structures", "Prepare for Unit 4 assessment"], "read": "<p><strong>Repaso integral de las Unidades 1–4.</strong> At this point in Spanish 3, you have studied all of the following grammar structures. This lesson reviews them as an integrated system, not as isolated rules.</p><p><strong>Complete grammar inventory — Units 1–4:</strong></p><ul><li>Present tense + SER/ESTAR · Preterite + Imperfect (and their distinction)</li><li>Reflexives · Object pronouns (direct, indirect, double) · Gustar-type verbs</li><li>Simple future · Conditional (all four uses)</li><li>Present subjunctive (WEIRDO) · Imperfect subjunctive (sequence of tenses + si clauses)</li><li>Si clauses (real vs. hypothetical)</li><li>Present perfect · Pluperfect</li><li>Adverbial clauses (para que, antes de que, cuando, a menos que, aunque)</li><li>Reported speech (sequence of tenses)</li><li>Vocabulary: environment, technology, family, history, social movements, immigration</li><li>Writing: 5-paragraph essay, compare/contrast, advanced concession, evidence language</li></ul><p>A sophisticated Spanish 3 response uses multiple structures in the same paragraph. Today's activity challenges you to do exactly that.</p>", "tip": "<div class='cbox'><strong>Estrategia de repaso:</strong> Instead of reviewing each structure in isolation, write one long paragraph that deliberately uses as many structures as possible. The challenge of weaving multiple structures together forces you to think about how they interact — which is exactly what fluent speakers do automatically. Quality beats quantity: one excellent paragraph is worth more than ten mediocre ones.</div>", "act": {"t": "Integrated writing challenge", "d": "Write a paragraph of 12–15 sentences on this topic: 'El impacto de la historia en la identidad cultural latinoamericana.' Your paragraph must include at least ONE example of each: (1) imperfect for background, (2) preterite for action, (3) present for commentary, (4) present perfect, (5) pluperfect, (6) conditional, (7) present subjunctive, (8) imperfect subjunctive, (9) adverbial clause with subjunctive, (10) reported speech. Underline and label each structure. This is your Spanish 3 mid-year writing showcase."}, "qs": [{"t": "mc", "q": "Which sentence correctly uses THREE different tenses to narrate a complex past situation?", "o": ["La historia es importante y interesante.", "Cuando los conquistadores llegaron", " las civilizaciones indígenas ya habían desarrollado sistemas complejos.", "Mañana estudiaré la historia de México.", "Si estudio historia", " aprendo mucho."], "a": 1, "e": "Option B uses: pluperfect ('habían desarrollado' — earlier action), preterite ('llegaron' — later action), and imperfect context. This is exactly how sophisticated narration sequences events in time."}, {"t": "mc", "q": "'El historiador explicó que las dictaduras ___ un impacto duradero en la sociedad.' (tener — reported speech)", "o": ["tienen", "tenían", "tuvieran", "habrán tenido"], "a": 1, "e": "'Tenían' — reported speech. Main verb 'explicó' is past → present tense in original ('tienen') shifts to imperfect ('tenían') in indirect speech. Sequence of tenses applies."}, {"t": "mc", "q": "'Estudia este tema para que ___ el contexto histórico cuando leas los textos auténticos.' (comprender)", "o": ["comprendes", "comprendas", "comprendías", "comprenderás"], "a": 1, "e": "'Comprendas' — present subjunctive after 'para que' (always subjunctive). The instruction is future/purposive. 'Para que comprendas' = so that you understand."}, {"t": "sa", "q": "En español: Write a 5–6 sentence mini-paragraph about Latin American history that uses at least 4 different tenses or moods (e.g., imperfect, preterite, present perfect, conditional or subjunctive). Underline each verb and label its tense/mood."}]}, {"day": "Sem. 10, Día 4", "title": "Producción oral avanzada — debates y presentaciones", "obj": ["Develop skills for formal oral presentations in Spanish", "Learn debate language and techniques", "Practice sustained speaking on complex topics"], "read": "<p>Formal oral production — presentations and debates — requires a distinct skill set from casual conversation. Spanish 3 builds toward being able to sustain a 3–5 minute presentation or debate contribution on a complex topic.</p><div class='gbox'><h5>Vocabulario para debates y presentaciones</h5><p><strong>Presentando tu posición:</strong> Mi posición es que... · Defiendo la idea de que... · Sostengo que... · Es mi argumento que...</p><p><strong>Apoyando con evidencia:</strong> Según los datos... · Los estudios demuestran que... · Un ejemplo concreto es... · Para ilustrar este punto...</p><p><strong>Respondiendo a la oposición:</strong> Si bien es cierto que... · Aunque mi oponente tiene razón en que... · No obstante, hay que considerar que... · Eso no cambia el hecho de que...</p><p><strong>Cerrando un argumento:</strong> En conclusión... · Por todas estas razones... · Queda claro que... · En definitiva...</p></div><div class='gbox'><h5>Structure for a 2–3 minute oral presentation</h5><p>0:00–0:20 — Hook: a question, surprising fact, or quote to capture attention</p><p>0:20–0:40 — Thesis: your position stated clearly in 2 sentences</p><p>0:40–1:30 — Main arguments: 2 arguments, each with a specific example</p><p>1:30–1:50 — Concession: acknowledge opposing view, refute it briefly</p><p>1:50–2:30 — Conclusion: restate thesis, call to action or reflection</p></div>", "tip": "<div class='cbox'><strong>Consejo para la presentación oral:</strong> The biggest difference between good and great oral presentation in Spanish is specific vocabulary and specific examples. 'Es un problema importante' is weak. 'La tasa de femicidio en México ha aumentado un 137% en los últimos cinco años, según datos de la ONU' is powerful. Specific statistics, names, dates, and examples make your oral Spanish sound confident and credible.</div>", "act": {"t": "Oral presentation preparation", "d": "Prepare a 2-minute oral presentation on ONE topic: (1) Un movimiento social importante en el mundo hispanohablante, (2) El impacto de la inmigración en la identidad cultural, OR (3) Una lección importante que la historia latinoamericana nos enseña hoy. Write out a complete script using the 5-part structure from today. Include: at least 1 piece of specific evidence (date, statistic, or name), 1 concession, and 1 advanced connector from Unit 4. Practice reading it aloud and time yourself."}, "qs": [{"t": "mc", "q": "In a formal debate response, which phrase best acknowledges the opposing view before refuting?", "o": ["Estás completamente equivocado.", "Si bien mi oponente señala un punto válido", " hay que considerar también que...", "No", " eso no es correcto.", "Según yo", " tienes razón."], "a": 1, "e": "'Si bien mi oponente señala un punto válido, hay que considerar también que...' — This acknowledges the opposing argument ('si bien... señala un punto válido') before pivoting to the refutation ('hay que considerar que'). This is sophisticated debate technique."}, {"t": "mc", "q": "A formal oral presentation should begin with:", "o": ["The conclusion", "A clear thesis statement", "A hook that captures attention — a question", " surprising fact", " or provocative statement", "An apology for any errors you might make"], "a": 2, "e": "A hook captures attention: a surprising statistic, a provocative question, or a compelling quote draws the audience in before you present your thesis. This is standard presentation technique in both Spanish and English academic contexts."}, {"t": "mc", "q": "'___ los datos de la ONU, la pobreza afecta al 30% de la población latinoamericana.' (According to)", "o": ["Para", "Por", "Según", "Con"], "a": 2, "e": "'Según' = according to. 'Según los datos de la ONU' = according to UN data. This is the standard phrase for citing sources in spoken and written Spanish."}, {"t": "sa", "q": "En español: Write out the hook and thesis (first 2 sentences) of your oral presentation from today's activity. The hook should be a question, surprising fact, or provocative statement. The thesis should state your position clearly."}]}, {"day": "Sem. 10, Día 5", "title": "Evaluación de la Unidad 4", "obj": ["Demonstrate mastery of Unit 4 grammar and content", "Apply present perfect, pluperfect, and adverbial clauses", "Show vocabulary growth from Unit 4 themes"], "read": "<p><strong>Evaluación de la Unidad 4.</strong> Quick review before the quiz:</p><ul><li><strong>Pretérito perfecto:</strong> haber (he/has/ha/hemos/habéis/han) + past participle · irregular past participles: hecho, dicho, visto, puesto, vuelto, escrito, abierto, roto, muerto, resuelto</li><li><strong>Pluscuamperfecto:</strong> haber (había/habías/había/habíamos/habíais/habían) + past participle · used for actions BEFORE another past action · signal words: ya, todavía no, cuando, después de que</li><li><strong>Subjuntivo adverbial:</strong> ALWAYS subj.: para que, antes de que, a menos que, sin que, con tal de que · SOMETIMES subj.: cuando (future), aunque (hypothetical), después de que (future)</li><li><strong>Discurso indirecto:</strong> present → imperfect · future → conditional · preterite → pluperfect · time adverbs shift: hoy → ese día, mañana → al día siguiente</li><li><strong>Vocabulario:</strong> movimientos sociales · inmigración e identidad · vocabulario académico y de debate</li></ul>", "tip": "<div class='cbox'><strong>Antes del quiz:</strong> From memory, write 5 irregular past participles. Then write one sentence using the pluperfect to show an action that happened before another past action (use 'ya' or 'cuando'). Finally, write one sentence using 'para que + subjunctive.' These are the most tested structures from Unit 4.</div>", "act": {"t": "Pre-quiz review", "d": "From memory: (1) List 8 irregular past participles. (2) Write one sentence using the present perfect (life experience). (3) Write one sentence using the pluperfect + preterite (sequencing two past events). (4) Write one sentence using 'para que + subjunctive.' (5) Convert this direct speech to indirect: 'El activista declaró: «Los derechos humanos son universales y no negociables.»' Check all answers before starting the quiz."}, "qs": [{"t": "mc", "q": "'¿___ alguna vez ___ en un país hispanohablante?' (vivir — present perfect, tú)", "o": ["Habías / vivido", "Has / vivido", "Haces / vivir", "Habrás / vivido"], "a": 1, "e": "'¿Has vivido alguna vez...?' — present perfect tú form. 'Has' (haber, tú) + 'vivido' (past pa
