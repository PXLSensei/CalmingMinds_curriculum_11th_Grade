}

.lesson-list{display:none;}
.lesson-list.open{display:block;}
.l-btn{

  padding:5px 16px 5px 38px;color:var(--dimmer);font-size:11px;

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0;}

.feedback{border-radius:5px;padding:9px 13px;margin-top:8px;font-size:12.5px;line-height:1.55;display:none;}

.lesson-nav{display:flex;gap:10px;margin-top:28px;padding-top:20px;border-top:1px solid var(--border);}

@media(max-width:800px){.sidebar{transform:translateX(-100%)}.main{margin-left:0}.u-grid{grid-template-columns:1fr}}

<script>
const COURSE={units:[

// ══════════════════════════════════════
// UNIT 1: HOW THE SYSTEM WORKS
// ══════════════════════════════════════
{id:'u1',emoji:'⚖️',name:'How the System Works',weeks:'Weeks 1–3',lessons:[
{id:'u1l1',day:'Week 1, Day 1',title:'The Structure of Criminal Justice in America',
objectives:['Map the three branches of the criminal justice system','Distinguish criminal law from civil law','Understand the constitutional foundations of criminal procedure'],
content:`<div class="body-text">
<p>The American criminal justice system is not a single thing — it is a network of overlapping institutions: law enforcement, courts, and corrections. Each branch has its own rules, culture, and incentives. Understanding how they interact is essential for evaluating any criminal case, policy, or reform.</p>
<div class="stat-row">
  <div class="stat-card"><div class="stat-num">2.1M</div><div class="stat-label">People incarcerated in the US</div></div>
  <div class="stat-card"><div class="stat-num">~97%</div><div class="stat-label">Federal cases resolved by plea bargain</div></div>
  <div class="stat-card"><div class="stat-num">4.4M</div><div class="stat-label">People on probation or parole</div></div>
</div>
<div class="def-table">
  <div class="dt-head">Three Branches of Criminal Justice</div>
  <div class="dt-row"><div class="dt-key">Law Enforcement</div><div class="dt-val">Police, sheriffs, federal agents (FBI, DEA, ATF). Investigate crimes, make arrests, gather evidence. 18,000+ agencies in the US — mostly local and decentralized.</div></div>
  <div class="dt-row"><div class="dt-key">Courts</div><div class="dt-val">Judges, prosecutors (district attorneys), defense attorneys, juries. Determine guilt and impose sentences. Dual system: state courts (most crime) and federal courts (federal crimes).</div></div>
  <div class="dt-row"><div class="dt-key">Corrections</div><div class="dt-val">Prisons, jails, probation, parole. Jails hold people awaiting trial or serving short sentences; prisons hold people serving longer sentences.</div></div>
</div>
<div class="fact-box">
  <div class="fb-title">Criminal vs. Civil Law</div>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;margin-bottom:8px;"><strong>Criminal law:</strong> The government (state or federal) prosecutes a person for an act defined as a crime. Punishment can include imprisonment. Burden of proof: <em>beyond a reasonable doubt</em> — the highest legal standard. The defendant doesn't have to prove innocence — the prosecution must prove guilt.</p>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;"><strong>Civil law:</strong> A private party sues another party for harm. No imprisonment — remedies are usually money damages. Burden of proof: <em>preponderance of the evidence</em> (more likely than not — lower standard). This is why O.J. Simpson was acquitted criminally but found liable civilly for the same deaths.</p>
</div>
<div class="amend-box">
  <div class="am-head">Constitutional Amendments That Govern Criminal Justice</div>
  <div class="am-row"><div class="am-num">4th</div><div class="am-text">Protection against unreasonable searches and seizures. Police generally need a warrant or recognized exception to search your home, car, or person.</div></div>
  <div class="am-row"><div class="am-num">5th</div><div class="am-text">Right against self-incrimination (the right to remain silent); due process; no double jeopardy (can't be tried twice for the same crime after acquittal).</div></div>
  <div class="am-row"><div class="am-num">6th</div><div class="am-text">Right to a speedy trial, public trial, impartial jury, to confront witnesses, and to have an attorney. The amendment that covers most of what happens in court.</div></div>
  <div class="am-row"><div class="am-num">8th</div><div class="am-text">Prohibition on cruel and unusual punishment and excessive bail. The basis for death penalty challenges and challenges to harsh prison conditions.</div></div>
</div>
</div>`,
cultural:`The United States has the highest incarceration rate of any country in the world — including authoritarian states. The US has approximately 5% of the world's population and about 20% of the world's prisoners. This is not because Americans commit more crime than people in other wealthy democracies — crime rates in the US are comparable to peer nations in many categories. It is primarily because of policy choices made from the 1970s through the 1990s: mandatory minimums, three-strikes laws, truth-in-sentencing, and the War on Drugs. Understanding that mass incarceration is a policy choice — not an inevitable outcome — is the starting point for thinking about reform.`,
quiz:[
  {q:"The standard of proof in a criminal trial is 'beyond a reasonable doubt,' which means:",choices:["The jury must be 100% certain of guilt — no doubt is permitted","The prosecution must convince the jury to a high degree of certainty; the defendant does not have to prove innocence","The prosecution must only show the defendant probably committed the crime","Guilt is determined by a majority vote among the 12 jurors"],a:1,fun:"'Beyond a reasonable doubt' is the highest burden of proof in American law — higher than the 'preponderance of evidence' (51%+) used in civil cases. This asymmetry is intentional: we'd rather acquit some guilty people than convict innocent ones. The presumption of innocence means the prosecution carries the entire burden. ⚖️"},
  {q:"The right against double jeopardy (5th Amendment) means:",choices:["You can't be charged with two crimes at the same time","You can't be tried for the same crime twice after acquittal or conviction","Police can't search you twice for the same evidence","You don't have to testify twice in the same trial"],a:1,fun:"This is why OJ Simpson's criminal acquittal ended criminal prosecution — the state couldn't retry him. But the Goldman and Brown families could (and did) sue him in civil court, where the burden of proof is lower (preponderance of evidence). He was found liable and ordered to pay $33.5 million. Criminal and civil are separate systems with separate rules. 📋"},
  {q:"The US has the world's highest incarceration rate primarily because:",choices:["Americans commit significantly more crime than people in other countries","Policy choices — mandatory minimums, three-strikes laws, the War on Drugs — not fundamental differences in crime rates between the US and comparable nations","The US has a more accurate system for detecting and reporting crime","Constitutional protections require more people to be imprisoned before trial"],a:1,fun:"Norway incarcerates about 75 people per 100,000. The US incarcerates about 655 per 100,000. Norway doesn't have one-ninth the crime. Both countries made policy choices. Norway invested in rehabilitation and shorter sentences; the US invested in longer sentences and punitive policies. These choices explain most of the gap. 📊"},
  {q:"Approximately what percentage of federal criminal cases are resolved through plea bargains?",choices:["About 50%","About 75%","About 97%","About 30%"],a:2,fun:"97% of federal convictions and 94% of state convictions come from guilty pleas, not trials. The constitutional right to a jury trial is almost theoretical in practice. Critics argue this gives prosecutors enormous power to coerce pleas by threatening harsh charges; defendants rational enough to take a plea deal rather than risk trial. The Sixth Amendment's trial right is increasingly a paper right. 😮"}
]},

{id:'u1l2',day:'Week 1, Day 3',title:'Due Process, Arrest, and the Pretrial System',
objectives:['Trace the process from arrest to arraignment','Understand bail, pretrial detention, and their effects','Explain the roles of prosecutors and defense attorneys'],
content:`<div class="body-text">
<p>Most Americans know about dramatic trials — but trials are rare. The real criminal justice system operates almost entirely in the pretrial phase: arrest, booking, arraignment, bail hearings, plea negotiations. Understanding this process reveals where much of the system's power and most of its inequality operates.</p>
<div class="def-table">
  <div class="dt-head">The Pretrial Process</div>
  <div class="dt-row"><div class="dt-key">Arrest</div><div class="dt-val">Police take a person into custody. Requires probable cause — a reasonable belief that the person committed a crime. Miranda rights must be read if in custody AND being interrogated.</div></div>
  <div class="dt-row"><div class="dt-key">Booking</div><div class="dt-val">Recording personal information, fingerprints, photograph. Person held in jail pending arraignment.</div></div>
  <div class="dt-row"><div class="dt-key">Grand Jury / Charging</div><div class="dt-val">For felonies: grand jury hears evidence and decides whether to indict (charge formally). Only prosecution presents — no defense, no judge. Critics call it a rubber stamp. Alternatively, prosecutor files a complaint.</div></div>
  <div class="dt-row"><div class="dt-key">Arraignment</div><div class="dt-val">Defendant appears before judge, hears charges, enters a plea (guilty, not guilty, no contest). Bail is typically set here.</div></div>
  <div class="dt-row"><div class="dt-key">Bail / Pretrial Detention</div><div class="dt-val">Bail is money paid to ensure defendant returns for trial. Those who can't afford bail stay in jail — sometimes for months or years before trial. About 450,000 people are held pretrial at any given time.</div></div>
  <div class="dt-row"><div class="dt-key">Plea Bargaining</div><div class="dt-val">Prosecutor offers reduced charges or sentence in exchange for guilty plea. Resolves ~97% of federal cases, ~94% of state cases. Criticized as coercive; defended as efficient.</div></div>
</div>
<div class="quote-pull">
  <p>"The greatest trick the Devil ever pulled was convincing the world he didn't exist. The greatest trick the criminal justice system ever pulled was convincing the public that courtroom dramas represent how it actually works."</p>
  <div class="attrib">— Common sentiment among criminal defense attorneys</div>
</div>
<div class="fact-box">
  <div class="fb-title">The Pretrial Detention Problem</div>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;">People held in pretrial detention face enormous pressure to plead guilty — even if innocent — to get out of jail. A plea deal offering "time served" (the days already spent in jail) is immediately attractive compared to months more in detention waiting for trial. Research shows that pretrial detention dramatically increases the likelihood of conviction and longer sentences — not because detained people are guiltier, but because the system's pressure on them is greater.</p>
</div>
</div>`,
cultural:`The cash bail system — where release from pretrial detention depends on ability to pay — is uniquely American. Most comparable democracies don't use cash bail; they use risk assessment to determine who to release. In the US, a wealthy person charged with a serious crime can post bail and wait for trial at home. A poor person charged with a minor offense might spend months in jail because they can't afford a few hundred dollars. New Jersey effectively eliminated cash bail in 2017 with no measurable increase in failure-to-appear rates or public safety impact. The system can be changed without chaos.`,
quiz:[
  {q:"Miranda rights must be read to a suspect when:",choices:["They are arrested","Any time police question them","They are in custody AND being interrogated — both conditions must be met","Only when charged with a felony"],a:2,fun:"Police can ask questions before arrest (no Miranda required) and can arrest without questioning (no Miranda required). Only when both conditions are met — custody AND interrogation — does Miranda apply. After Miranda, any statements must be voluntary. Many people don't realize they can invoke the right to silence at any point. 🗣️"},
  {q:"The pretrial detention system creates pressure to plead guilty because:",choices:["Judges instruct detained defendants to accept plea deals","Defendants held in jail before trial face the choice of taking a plea deal to get out immediately vs. waiting months in detention for a trial — even if innocent","The law requires a guilty plea from all detained defendants","Pretrial detention is only for defendants who are clearly guilty"],a:1,fun:"'Time served' plea deals are most coercive: 'plead guilty right now and walk out today, or wait 6 months in this cell for your trial.' Innocent people take these deals. Research by University of Pennsylvania found that detained defendants are 25% more likely to be sentenced to prison, 43% more likely to be sentenced to jail, and serve sentences 4x longer than equivalent released defendants. 😔"},
  {q:"A grand jury's role in the criminal process is to:",choices:["Determine the verdict at the end of a criminal trial","Evaluate whether there is sufficient evidence to formally charge a defendant with a crime","Set bail for defendants who cannot afford an attorney","Impose the sentence after a defendant pleads guilty"],a:1,fun:"Grand juries only hear from the prosecution. No defense attorney, no cross-examination, no judge. The standard is probable cause (much lower than reasonable doubt). Critics note that grand juries indict in nearly 99.9% of federal cases — some prosecutors say a grand jury would 'indict a ham sandwich.' The 'check' on prosecutorial power is largely theoretical. 📋"},
  {q:"Cash bail creates systemic inequality because:",choices:["Wealthier defendants receive better legal representation","It effectively creates a two-tiered system where release before trial depends on financial resources rather than flight risk or public safety","Bail bondsmen are disproportionately located in wealthy neighborhoods","Poor defendants are given higher bail amounts by judges"],a:1,fun:"Two people charged with the same crime: one posts $5,000 bail and goes home to their family and job; the other can't afford it and sits in jail for months. Equal before the law — except that one has their life significantly disrupted and faces enormous pressure to plead guilty. New Jersey's bail reform shows the alternative works. 💰"}
]},

{id:'u1l3',day:'Week 2, Day 1',title:'The Trial Process and Prosecutorial Power',
objectives:['Understand how a criminal trial proceeds','Analyze the power prosecutors hold in the system','Evaluate prosecutorial discretion and its consequences'],
content:`<div class="body-text">
<p>A criminal trial is the formal legal process for determining guilt or innocence. But since only ~3% of cases go to trial, understanding the trial also means understanding why the system was designed so that almost no one uses it.</p>
<div class="def-table">
  <div class="dt-head">Trial Phases</div>
  <div class="dt-row"><div class="dt-key">Jury selection (voir dire)</div><div class="dt-val">Attorneys question potential jurors and can exclude some (peremptory challenges, unlimited challenges for cause). Defense and prosecution each try to seat favorable jurors.</div></div>
  <div class="dt-row"><div class="dt-key">Opening statements</div><div class="dt-val">Each side previews its case. Not evidence — just a roadmap of what each side will try to prove.</div></div>
  <div class="dt-row"><div class="dt-key">Prosecution case-in-chief</div><div class="dt-val">Prosecution presents evidence and witnesses. Defense cross-examines. Prosecution has the burden — must prove guilt beyond reasonable doubt.</div></div>
  <div class="dt-row"><div class="dt-key">Defense case</div><div class="dt-val">Defense may (but doesn't have to) present evidence. Defendant has an absolute right NOT to testify — the jury can't hold this against them.</div></div>
  <div class="dt-row"><div class="dt-key">Closing arguments</div><div class="dt-val">Each side summarizes their case and argues why the evidence supports their conclusion.</div></div>
  <div class="dt-row"><div class="dt-key">Jury deliberation</div><div class="dt-val">Jury deliberates in private; most states require unanimity for conviction. If jury can't agree: hung jury, mistrial. Prosecution can retry (no double jeopardy for mistrials).</div></div>
</div>
<div class="insight-box">
  <div class="ib-head">Prosecutorial Power and Discretion</div>
  <p>Prosecutors — district attorneys at the state level, US attorneys at the federal level — have enormous discretion: whether to charge, what to charge, what to offer in plea negotiations. This power is largely unreviewable and unreviewable. A prosecutor who decides to aggressively pursue drug charges in a community will create very different outcomes than one who doesn't. Studies consistently show that racial disparities in the criminal justice system are most pronounced at charging decisions — arguably the most powerful and least scrutinized decision point.</p>
</div>
<div class="fact-box">
  <div class="fb-title">Brady Material — A Frequently Violated Requirement</div>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;">The Supreme Court ruled in <em>Brady v. Maryland</em> (1963) that prosecutors must disclose evidence favorable to the defendant — including evidence that might impeach prosecution witnesses. Brady violations — prosecutors hiding exculpatory evidence — are one of the most common contributors to wrongful convictions documented by the Innocence Project. Courts have found Brady violations to be constitutional violations, but sanctions against individual prosecutors are rare. The accountability gap enables the behavior.</p>
</div>
</div>`,
cultural:`The office of District Attorney is elected in most US jurisdictions — meaning that criminal justice policy is democratically accountable in a way that's unusual globally. This creates a "law and order" political incentive: DAs who appear tough on crime win elections; DAs who reduce incarceration rates sometimes lose. The progressive prosecutor movement (starting around 2016) — electing DAs who explicitly ran on reform platforms — tested whether the electoral incentive could be reversed. Some won; some were subsequently recalled. The question of whether criminal justice reform can win elections is still being answered.`,
quiz:[
  {q:"A prosecutor's most consequential power in the criminal justice system is:",choices:["The ability to sentence convicted defendants","Charging decisions — whether to charge, what to charge, what to offer in plea negotiations — which are largely unreviewable and shape outcomes more than judges or juries","The ability to call any witness to testify","Directly instructing juries on how to weigh evidence"],a:1,fun:"Sentencing happens after conviction and is constrained by law. Charging decisions happen before trial with enormous discretion. Charge someone with a minor drug possession vs. with intent to distribute — those carry wildly different consequences. Charge or not charge. This unreviewable decision shapes who gets prosecuted, for what, and how severely. 🔍"},
  {q:"The Brady rule (Brady v. Maryland, 1963) requires prosecutors to:",choices:["Prove all elements of a crime before filing charges","Disclose evidence that is favorable to the defendant, including evidence that could impeach prosecution witnesses","Obtain judicial approval before offering plea deals","Present all evidence at trial rather than withholding it for strategic reasons"],a:1,fun:"Brady violations — hiding exculpatory evidence — are one of the most common factors in wrongful convictions. The rule exists; enforcement is weak. Individual prosecutors who commit Brady violations are rarely sanctioned. Courts vacate convictions but don't criminally charge the prosecutors. The accountability gap is why the violations continue. ⚖️"},
  {q:"A 'hung jury' results in:",choices:["An automatic acquittal of the defendant","A mistrial — the prosecution can retry the defendant without violating double jeopardy","A conviction because unanimity is not required","An appeal to a higher court to resolve the deadlock"],a:1,fun:"Double jeopardy attaches after jeopardy 'begins' (usually when jury is sworn in). A hung jury = mistrial = no verdict, so jeopardy hasn't ended in a final judgment. The prosecution can retry. Some high-profile cases (like the first Rodney King beating trial) have been retried, though sometimes in different jurisdictions on different charges. 📋"},
  {q:"The fact that approximately 97% of federal criminal cases end in plea bargains suggests:",choices:["The evidence in federal cases is usually so overwhelming that defendants choose to plead guilty","The constitutional right to trial is largely theoretical in practice — the system is structured in ways that make trial very costly for defendants relative to pleading guilty","Federal crimes are minor enough that defendants prefer to resolve them quickly","Federal defense attorneys are less skilled than state defense attorneys"],a:1,fun:"Critics argue that the combination of mandatory minimums, prosecutorial overcharging, and pretrial detention creates such pressure that the 'trial penalty' (getting a much harsher sentence for exercising your right to trial) makes the right theoretical rather than real. This is one of the most serious structural critiques of American criminal justice. 😔"}
]},
]},

// ══════════════════════════════════════
// UNIT 2: FORENSIC SCIENCE & INVESTIGATION
// ══════════════════════════════════════
{id:'u2',emoji:'🔬',name:'Crime Scene to Courtroom',weeks:'Weeks 4–6',lessons:[
{id:'u2l1',day:'Week 4, Day 1',title:'Forensic Science — What the Evidence Actually Says',
objectives:['Understand key forensic disciplines and their scientific validity','Analyze the problem of junk science in courts','Explain the CSI effect and its real consequences'],
content:`<div class="body-text">
<p>Forensic science — the application of science to legal questions — varies enormously in scientific rigor. Some techniques are well-validated; others were accepted in courts for decades before scientific scrutiny revealed serious problems. Understanding which is which is essential for evaluating any criminal case.</p>
<div class="def-table">
  <div class="dt-head">Forensic Disciplines — Validity Varies</div>
  <div class="dt-row"><div class="dt-key">DNA analysis</div><div class="dt-val"><strong>Well-validated.</strong> Nuclear DNA matches can identify individuals with extraordinarily high probability. The scientific foundation is solid. Errors come from contamination, mixture interpretation, and lab misconduct — not the underlying science.</div></div>
  <div class="dt-row"><div class="dt-key">Fingerprint analysis</div><div class="dt-val"><strong>Accepted but under scrutiny.</strong> Fingerprints are individual, but determining a "match" involves subjective examiner judgment. Error rates aren't well-established. A 2009 National Academy of Sciences report called for more scientific rigor.</div></div>
  <div class="dt-row"><div class="dt-key">Bite mark analysis</div><div class="dt-val"><strong>Scientifically questionable.</strong> PCAST (President's Council of Advisors on Science and Technology, 2016) found bite mark analysis lacked sufficient scientific foundation for courtroom use. Multiple exonerations after bite mark convictions. Still admitted in some courts.</div></div>
  <div class="dt-row"><div class="dt-key">Hair microscopy</div><div class="dt-val"><strong>Discredited for identification.</strong> FBI admitted in 2015 that its agents had overstated hair analysis evidence for decades, affecting 2,500+ cases. Can show hair is consistent with a person's hair; cannot identify to the exclusion of all others.</div></div>
  <div class="dt-row"><div class="dt-key">Blood spatter analysis</div><div class="dt-val"><strong>Some scientific basis, often overstated.</strong> Can establish general information about events; expert conclusions often go beyond what the science supports. Highly subject to examiner bias.</div></div>
</div>
<div class="case-box">
  <div class="case-label">Case Study</div>
  <div class="case-title">The FBI Hair Analysis Scandal (2015)</div>
  <p>The FBI announced that microscopic hair analysis testimony provided by FBI agents in at least 257 trials between 1972 and 1999 was scientifically flawed — and that in 268 of the 268 cases reviewed, examiners had overstated the strength of matches. DNA testing exonerated some defendants who had been convicted partly based on this testimony. At least 14 people on death row were affected. The hair analysis technique had been accepted in courts as "scientific" for decades without proper validation. This is what happens when courts accept science on authority rather than evidence.</p>
</div>
<div class="insight-box">
  <div class="ib-head">The CSI Effect</div>
  <p>Television crime dramas (CSI, Law & Order, Forensic Files) have shaped juror expectations in ways that affect real trials. Jurors sometimes expect DNA evidence, sophisticated lab analysis, and unambiguous forensic proof in every case — even when the crime simply didn't produce that evidence. Prosecutors report cases being harder to win without forensic evidence even when the other evidence is compelling. Defense attorneys report the opposite: the same shows have made jurors more skeptical of forensic evidence claimed by prosecution. The CSI effect is real but cuts in multiple directions.</p>
</div>
</div>`,
cultural:`The Innocence Project — founded by Barry Scheck and Peter Neufeld in 1992 — has exonerated over 200 wrongfully convicted people using DNA evidence. A striking pattern: many of these cases involved forensic evidence that was overstated or scientifically invalid. Bite marks, hair analysis, arson investigation, shaken baby syndrome diagnosis — all have been used to convict people who were later exonerated. The Innocence Project's work has transformed how scientists, courts, and lawyers think about forensic evidence, but the pace of reform in courts (which still admit many questionable techniques) has been slower than the pace of scientific debunking.`,
quiz:[
  {q:"The FBI's 2015 admission about microscopic hair analysis revealed that:",choices:["Hair analysis is the most reliable forensic technique available","FBI agents had systematically overstated the strength of hair match evidence for decades in hundreds of cases, affecting thousands of trials","The FBI had discovered a more accurate hair analysis method","Courts had been improperly excluding valid hair analysis evidence"],a:1,fun:"268 of 268 cases reviewed involved overstated testimony. At least 32 defendants were sentenced to death. The technique was presented as 'scientific' for decades without proper validation studies. Courts accepted it on the authority of FBI experts rather than evaluating the underlying science. This is the 'junk science' problem — it can be in your courtroom for decades before anyone checks. 🔬"},
  {q:"DNA evidence is considered the most scientifically reliable forensic technique because:",choices:["It was developed specifically for criminal justice applications","It is based on well-established principles of molecular biology with error rates that can be calculated and are extremely low — though errors can still occur through contamination or mixture interpretation","It can never be contaminated or mishandled","Courts have approved it more times than any other forensic technique"],a:1,fun:"DNA evidence is genuinely scientifically solid — the underlying genetics is not in question. Errors come from the human handling of evidence: contamination, mixed samples with multiple contributors, lab misconduct, and statistical interpretation of mixtures. The Brandon Dassey case (Making a Murderer) illustrates DNA evidence used alongside contested interrogation tactics. 🧬"},
  {q:"The 'CSI effect' in criminal trials refers to:",choices:["The actual use of CSI television techniques in real forensic labs","Juror expectations shaped by crime television that demand forensic evidence which may not exist in real cases — sometimes making cases harder to prove despite strong evidence","The hiring of TV forensic analysts as real expert witnesses","A requirement that all criminal cases include forensic analysis"],a:1,fun:"Juror surveys consistently show people who watch crime TV expect more forensic evidence than is typical. Some prosecutors now address this directly in voir dire (jury selection), asking potential jurors about TV expectations. The irony: TV forensics is often faster, more definitive, and more dramatic than real forensics. 📺"},
  {q:"Bite mark analysis has been criticized in criminal cases because:",choices:["It requires expensive equipment unavailable in most jurisdictions","Scientific studies have found it lacks sufficient reliability for courtroom identification — people have been wrongfully convicted based on bite mark evidence that was later found unreliable","Defense attorneys are trained to challenge all forensic evidence regardless of validity","Bite marks deteriorate too quickly to be useful evidence"],a:1,fun:"Multiple men were convicted and served years in prison based partly on bite mark evidence. DNA later proved their innocence. Kennedy Brewer and Levon Brooks in Mississippi: convicted partly based on bite mark testimony from the same dentist. Both innocent. The dentist testified in both cases. The technique is still admitted in some jurisdictions despite scientific consensus that it doesn't meet reliability standards. 😔"}
]},

{id:'u2l2',day:'Week 5, Day 1',title:'Eyewitness Testimony and False Confessions',
objectives:['Explain why eyewitness memory is unreliable under stress','Analyze research on false confessions and how they happen','Evaluate reforms designed to improve accuracy'],
content:`<div class="body-text">
<p>Eyewitness testimony and confessions are among the most powerful evidence in criminal cases — and among the most likely to be wrong. The science here is clear, well-established, and largely ignored by the legal system. Understanding why requires understanding how human memory actually works.</p>
<div class="fact-box">
  <div class="fb-title">Memory Is Not a Video Recording</div>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;margin-bottom:8px;">Human memory is <em>reconstructive</em>, not reproductive. Every time you recall a memory, you are rebuilding it from fragments — and that reconstruction is influenced by what you've experienced and been told since the event. Eyewitness researcher Elizabeth Loftus has demonstrated in dozens of experiments that:</p>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;margin-bottom:5px;">• Leading questions after an event change what witnesses "remember" seeing</p>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;margin-bottom:5px;">• False memories can be implanted — people can be made to remember events that never happened</p>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;margin-bottom:5px;">• Stress and violence <em>impair</em> accurate eyewitness memory (though witnesses often feel more certain)</p>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;">• Cross-racial identifications are significantly less accurate than same-race identifications</p>
</div>
<div class="stat-row">
  <div class="stat-card"><div class="stat-num">~69%</div><div class="stat-label">DNA exonerations involving eyewitness misidentification</div></div>
  <div class="stat-card"><div class="stat-num">~30%</div><div class="stat-label">DNA exonerees who had falsely confessed</div></div>
  <div class="stat-card"><div class="stat-num">38+</div><div class="stat-label">US states reforming eyewitness ID procedures</div></div>
</div>
<div class="def-table">
  <div class="dt-head">Why People Confess to Crimes They Didn't Commit</div>
  <div class="dt-row"><div class="dt-key">The Reid Technique</div><div class="dt-val">Standard US interrogation method. Involves isolation, psychological pressure, implicit/explicit false promises, and false evidence claims ("We have your fingerprints"). Designed to elicit confessions — not necessarily accurate ones.</div></div>
  <div class="dt-row"><div class="dt-key">Sleep deprivation</div><div class="dt-val">Interrogations lasting many hours cause cognitive impairment similar to intoxication. Exhausted people make poor decisions. Many false confessions follow multi-hour interrogations.</div></div>
  <div class="dt-row"><div class="dt-key">False evidence</div><div class="dt-val">Police can legally lie about evidence during interrogations. "We have your DNA at the scene" — even if they don't. Faced with what seems like overwhelming evidence, innocent people sometimes calculate that a plea deal is their best option.</div></div>
  <div class="dt-row"><div class="dt-key">Vulnerable populations</div><div class="dt-val">Juveniles, people with intellectual disabilities, and people with mental illness are disproportionately represented among false confessors. The Central Park Five — five teenagers, the youngest 14 — all falsely confessed after lengthy interrogations.</div></div>
</div>
</div>`,
cultural:`The Central Park Five case is perhaps the most famous false confession case in American history. In 1989, five Black and Latino teenagers were convicted of the brutal attack on a jogger in Central Park. All five had confessed — after hours of interrogation, without lawyers, without parents present. DNA evidence eventually identified the real attacker (who confessed), and the convictions were vacated in 2002. All five had served sentences of 6 to 13 years. They received a $41 million settlement from New York City in 2014. Donald Trump had taken out full-page newspaper ads calling for their execution before trial. He never apologized.`,
quiz:[
  {q:"Research shows that eyewitness testimony is unreliable in part because:",choices:["Witnesses are usually trying to deceive investigators","Human memory is reconstructive rather than reproductive — each recall rebuilds the memory from fragments, subject to influence from subsequent information and suggestion","Only children have unreliable memories; adult eyewitness testimony is dependable","Eyewitnesses are typically too far away from events to see clearly"],a:1,fun:"Elizabeth Loftus's 'misinformation effect' is one of the most replicated findings in psychology: show people a film of a car accident, then ask 'how fast was the car going when it smashed into the other car?' vs. 'hit' vs. 'contacted.' Different verbs produce different speed estimates and different 'memories' of seeing broken glass (that wasn't in the film). Memory is malleable. 🧠"},
  {q:"The Central Park Five case demonstrates that false confessions can result from:",choices:["Defendants incorrectly believing they are guilty","Lengthy interrogations of juveniles without parents or attorneys, combined with psychological pressure — producing false confessions that were later disproven by DNA evidence","Witnesses identifying the wrong people in photo lineups","Prosecutors offering plea deals that defendants feel compelled to accept"],a:1,fun:"Five teenagers, the youngest 14. Hours of interrogation. No parents, no lawyers. All confessed. The actual attacker, Matias Reyes, confessed in 2002 and his DNA matched — the Five had no DNA connection to the crime. They'd been imprisoned for years. This case drove major reforms in how juveniles are interrogated and how interrogations are recorded. 💔"},
  {q:"'Blind administration' of eyewitness lineups means:",choices:["The witness is blindfolded during identification","The person administering the lineup doesn't know which person is the suspect — preventing unconscious cues that might influence the witness's selection","The lineup is conducted in a dark room to test visual memory","Witnesses are shown photos randomly rather than sequentially"],a:1,fun:"If the administrator knows which person is the suspect, they might unconsciously signal to the witness — a slight hesitation, a different tone of voice, looking more closely at the suspect's photo. Blind administration eliminates this. It's the same principle as double-blind medical trials. Simple, low-cost, demonstrably reduces false identifications. About half of US states now require or recommend it. 👁️"},
  {q:"The fact that approximately 30% of DNA exonerees had falsely confessed shows:",choices:["Most people who confess to crimes are guilty","False confessions are extremely rare events","Interrogation techniques and circumstances can cause innocent people to confess — making confessions less conclusive evidence than they appear","Recording interrogations would eliminate all false confessions"],a:2,fun:"When you hear 'but he confessed,' your confidence in guilt should not be 100% — it should update significantly but imperfectly. 30% of exonerees confessed. These were innocent people who confessed. Understanding why (exhaustion, fear, vulnerability, false promises, legal pressure) prevents treating confession as automatically reliable. 😮"}
]},
]},

// ══════════════════════════════════════
// UNIT 3: CRIMINAL PSYCHOLOGY
// ══════════════════════════════════════
{id:'u3',emoji:'🧠',name:'Criminal Psychology',weeks:'Weeks 7–9',lessons:[
{id:'u3l1',day:'Week 7, Day 1',title:'Why People Commit Crime — Criminological Theories',
objectives:['Survey biological, psychological, and sociological theories of crime','Critically evaluate claims about crime causation','Connect criminological theory to policy approaches'],
content:`<div class="body-text">
<p>Why do people commit crimes? This seems like a simple question, but criminologists have been arguing about the answer for over 200 years — and the answer matters enormously for policy. If crime is caused by individual pathology, the solution is punishment and treatment. If crime is caused by social conditions, the solution is social reform. The theory determines the policy.</p>
<div class="def-table">
  <div class="dt-head">Major Criminological Theories</div>
  <div class="dt-row"><div class="dt-key">Classical / Rational Choice</div><div class="dt-val">Crime is a rational decision: people weigh costs and benefits. If punishment is swift, certain, and severe enough, they choose not to commit crime. Basis for deterrence policy — mandatory minimums, three strikes. Research shows certainty of punishment deters more than severity.</div></div>
  <div class="dt-row"><div class="dt-key">Biological / Biosocial</div><div class="dt-val">Genetic factors, brain chemistry, prenatal environment, and early trauma affect criminal behavior. Not deterministic — biology interacts with social environment. Lead exposure (now largely removed from gasoline and paint) is associated with elevated crime rates — a dramatic environmental factor.</div></div>
  <div class="dt-row"><div class="dt-key">Social Learning Theory</div><div class="dt-val">Sutherland's differential association: people learn criminal behavior the same way they learn anything — through interaction with others who hold definitions favorable to crime. Gangs and criminal networks teach techniques, values, and norms.</div></div>
  <div class="dt-row"><div class="dt-key">Social Strain Theory</div><div class="dt-val">Merton: when people can't achieve culturally valued goals (wealth, success) through legitimate means, some turn to illegitimate means (crime). Explains higher crime rates in economically marginalized communities.</div></div>
  <div class="dt-row"><div class="dt-key">Social Control Theory</div><div class="dt-val">Hirschi: crime happens when bonds to conventional society (family, school, work) are weak. People with strong social bonds have more to lose from crime. Prevention: strengthen social bonds, not just punish crime.</div></div>
</div>
<div class="fact-box">
  <div class="fb-title">The Lead-Crime Hypothesis</div>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;">One of the most intriguing findings in criminology: the rise and fall of violent crime in the US (and internationally) tracks the rise and fall of lead exposure (from leaded gasoline and paint) with a 20-year lag. Children exposed to lead have elevated rates of impulsivity, reduced executive function, and lower IQ — all associated with criminal behavior. The removal of lead from gasoline (phased out 1975–1996) may explain a significant portion of the crime decline of the 1990s–2000s. This is an environmental, not a moral, cause — with enormous policy implications.</p>
</div>
<div class="insight-box">
  <div class="ib-head">What Actually Reduces Crime</div>
  <p>Decades of research suggest: <strong>certainty</strong> of punishment deters more than severity (people don't carefully calculate sentences before deciding to commit crimes). Early childhood interventions (home visiting programs, quality preschool) show strong crime-prevention effects decades later. Economic investment in marginalized communities reduces crime. Incarceration has diminishing returns — the US imprisons people far past any deterrent effect. Policing that builds community trust reduces crime; policing that alienates communities may increase it.</p>
</div>
</div>`,
cultural:`The "broken windows" theory — that visible disorder signals that crime is tolerated and invites more serious crime — became one of the most influential (and contested) ideas in American policing. New York City used it aggressively in the 1990s under Mayor Giuliani and Police Commissioner Bratton. Crime did fall dramatically — but so did crime in cities that didn't use broken windows policing. Economists point to the end of the crack epidemic, demographic changes, and the lead hypothesis as alternative explanations. Broken windows became associated with aggressive stop-and-frisk policing that a federal court later found unconstitutional. Criminological theories can drive policy for decades before the evidence catches up.`,
quiz:[
  {q:"Rational choice theory suggests that the most effective criminal deterrent is:",choices:["Extremely harsh mandatory minimum sentences","Certainty of being caught and punished rather than the severity of punishment — research shows swift and certain consequences deter more than severe but unlikely ones","Public humiliation of convicted criminals","Increasing the number of prisons"],a:1,fun:"This is why the research on mandatory minimums (increasing severity) shows disappointing deterrence effects — criminals don't carefully calculate sentence lengths before acting. But increasing the probability of getting caught does affect decisions. Investments in detection (cameras, DNA databases, police presence) may deter more than adding years to already-long sentences. 🔍"},
  {q:"Social strain theory explains criminal behavior as resulting from:",choices:["Criminal personalities that are present from birth","The frustration of being unable to achieve culturally valued goals (wealth, success) through legitimate means — leading some to pursue them through illegitimate means","The breakdown of traditional social institutions like religion and family","Direct imitation of criminal role models seen in media"],a:1,fun:"Merton's theory (1938) explains why crime rates are higher in economically marginalized communities: the goal (the American Dream) is universal, but the legitimate means to achieve it are not equally distributed. People blocked from legitimate paths may take illegitimate ones. Policy implication: expand legitimate opportunity (jobs, education, economic mobility) to reduce crime. 📊"},
  {q:"The lead-crime hypothesis is significant because it suggests:",choices:["Criminal behavior is always a moral choice unaffected by environment","Environmental factors (exposure to a neurotoxin affecting brain development) may explain a significant portion of crime trends — independent of moral choices or social programs","Lead exposure only affects people who were already likely to commit crime","The US crime decline of the 1990s was entirely caused by better policing"],a:1,fun:"The 20-year lag between lead exposure reduction and crime reduction is striking: children exposed to less lead in the late 1970s were the young adults of the early 2000s when crime dropped most dramatically. This doesn't mean every crime is caused by lead — but it suggests crime is not purely a moral or economic phenomenon. Environmental public health policy can be crime policy. 🧪"},
  {q:"Social learning theory (Sutherland's differential association) argues that criminal behavior is:",choices:["Biologically inherited and cannot be significantly altered","Learned through association with others who define criminal behavior favorably — the same way any other behavior is learned","Caused by individual psychological disorders","Primarily the result of media influence on vulnerable individuals"],a:1,fun:"Sutherland's insight: if you hang around people who think stealing is acceptable, who have techniques for stealing, and who reward it socially, you're more likely to steal. It's not mysterious — it's social learning. Policy implication: change the social environment (reduce concentrated disadvantage, create legitimate social bonds, provide opportunities). 👥"}
]},

{id:'u3l2',day:'Week 8, Day 1',title:'Psychopathy, Mental Illness, and the Law',
objectives:['Define psychopathy and distinguish it from mental illness','Understand the insanity defense and how rarely it succeeds','Analyze the over-representation of people with mental illness in the criminal justice system'],
content:`<div class="body-text">
<p>Popular culture has created a highly distorted picture of the relationship between mental illness, psychopathy, and crime. The reality is more complex, more nuanced, and more troubling than the dramatic version — primarily because people with serious mental illness are far more likely to be victims of crime than perpetrators, and the criminal justice system has become the de facto mental health system for millions of Americans.</p>
<div class="def-table">
  <div class="dt-head">Key Distinctions</div>
  <div class="dt-row"><div class="dt-key">Mental illness (general)</div><div class="dt-val">A broad category including depression, schizophrenia, bipolar disorder, anxiety disorders, PTSD, and many others. People with mental illness are <em>not</em> generally more violent than the general population — except when actively psychotic and untreated. They are more likely to be victims of violence.</div></div>
  <div class="dt-row"><div class="dt-key">Psychopathy</div><div class="dt-val">A personality construct characterized by lack of empathy, remorse, and emotional shallowness; interpersonal manipulativeness; antisocial behavior. About 1% of the population. NOT synonymous with violence — many psychopaths are successful in business, law, and politics. About 25-30% of prison populations score high on psychopathy scales.</div></div>
  <div class="dt-row"><div class="dt-key">Insanity defense</div><div class="dt-val">Legal standard, not psychiatric diagnosis. "Not guilty by reason of insanity" requires proving the defendant, due to severe mental illness, didn't know what they were doing OR didn't know it was wrong. Used in less than 1% of criminal cases; succeeds in about 25% of those. Often results in indefinite psychiatric commitment.</div></div>
  <div class="dt-row"><div class="dt-key">Competency to stand trial</div><div class="dt-val">A defendant must understand the charges and be able to assist in their defense. Not the same as insanity — a person can have been insane at the time of the crime but be competent to stand trial now.</div></div>
</div>
<div class="insight-box">
  <div class="ib-head">The Criminal Justice System as Mental Health System</div>
  <p>After deinstitutionalization (closing large psychiatric hospitals) in the 1960s–80s, the US didn't build adequate community mental health infrastructure. People with serious mental illness ended up in jails and prisons instead. The Los Angeles County Jail, Rikers Island (NYC), and Cook County Jail (Chicago) are now effectively the largest psychiatric facilities in the country. About 20% of people in jail have a serious mental illness. Most receive inadequate treatment. The revolving door — jail, street, crisis, jail — is the default "system" for the most vulnerable people in America.</p>
</div>
<div class="fact-box">
  <div class="fb-title">The Insanity Defense in Reality</div>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;">The insanity defense is used in less than 1% of felony cases and succeeds in about 25% of those uses — meaning it affects about 0.25% of all cases. Juries almost never accept it. People found not guilty by reason of insanity are typically committed to a secure psychiatric facility, often for longer than a prison sentence would have been. The public dramatically overestimates both how often it's used and how often it succeeds. The "insanity defense loophole" exists primarily in TV dramas.</p>
</div>
</div>`,
cultural:`John Hinckley Jr. was found not guilty by reason of insanity for shooting President Reagan in 1981. Public outrage was enormous — Congress and many states immediately tightened insanity defense standards. Many states shifted from "didn't know what they were doing or that it was wrong" to "didn't know what they were doing" — removing the moral understanding prong. Some states virtually eliminated the defense. Legal changes driven by one high-profile case often have poor policy outcomes, because the case was selected precisely because it was unusual. Good law shouldn't be made from exceptional cases.`,
quiz:[
  {q:"People with serious mental illness are, statistically:",choices:["Significantly more likely to commit violent crime than the general population","More likely to be victims of crime than perpetrators — especially when treatment is inadequate","Equally likely to commit crime as people without mental illness","Primarily dangerous to themselves, not others"],a:1,fun:"This is the most important corrective to popular culture's portrayal. People with schizophrenia, bipolar disorder, and depression are far more likely to be victimized than to victimize. The association between mental illness and violence is primarily due to untreated psychosis, substance use comorbidity, and poverty — not mental illness itself. Stigma makes everything worse. 💙"},
  {q:"The insanity defense in criminal law is used in approximately what percentage of felony cases?",choices:["About 25%","About 10%","Less than 1%","About 5%"],a:2,fun:"Less than 1% of felony cases — and it succeeds in about 25% of those attempts, meaning about 0.25% of all felony cases result in NGRI verdicts. Public perception wildly overestimates this — surveys show people think it's used in about 37% of cases. TV dramas use it constantly because it's dramatically interesting, not because it's common. 📺"},
  {q:"Deinstitutionalization of psychiatric patients (1960s-1980s) without adequate community mental health infrastructure resulted in:",choices:["Significant improvement in outcomes for people with serious mental illness","A reduction in the number of people with mental illness in institutional settings","Jails and prisons becoming de facto psychiatric facilities — with Los Angeles County Jail, Rikers Island, and Cook County Jail now effectively the largest psychiatric institutions in the country","An increase in voluntary outpatient mental health treatment"],a:2,fun:"The theory behind deinstitutionalization was good: large state hospitals were often inhumane, and community treatment would be better. The execution failed: communities didn't build adequate treatment systems. People with serious mental illness ended up on the streets or cycling through jails. About 20% of jail inmates have a serious mental illness, most without adequate treatment. The system is a humanitarian failure. 😔"},
  {q:"Psychopathy is best characterized as:",choices:["A severe mental illness that reliably predicts violent behavior","A personality construct involving lack of empathy and remorse, interpersonal manipulativeness, and antisocial behavior — present in about 1% of the general population, and common but not universal among violent offenders","A condition that affects only people who have experienced childhood trauma","Essentially the same thing as schizophrenia"],a:1,fun:"The popular image: psychopath = serial killer. The reality: the PCL-R (the standard measure) identifies many psychopaths in boardrooms, courtrooms, and political offices — where their traits can be adaptive. About 25-30% of prisoners score high; so do about 4% of CEOs. Psychopathy is a risk factor for violence, not a guarantee. Most psychopaths don't commit violent crimes. 🎭"}
]},
]},

// ══════════════════════════════════════
// UNIT 4: WRONGFUL CONVICTIONS
// ══════════════════════════════════════
{id:'u4',emoji:'🔓',name:'Wrongful Convictions',weeks:'Weeks 10–12',lessons:[
{id:'u4l1',day:'Week 10, Day 1',title:'When the System Gets It Wrong',
objectives:['Identify the leading causes of wrongful conviction','Analyze specific wrongful conviction cases','Understand the Innocence Project\'s methods and impact'],
content:`<div class="body-text">
<p>The criminal justice system convicts innocent people. This is not a radical claim — it is a documented fact. The Innocence Project has exonerated over 200 people using DNA evidence. Thousands more have been exonerated through non-DNA evidence. The question is not whether wrongful convictions happen, but how often, why, and what we can do about it.</p>
<div class="stat-row">
  <div class="stat-card"><div class="stat-num">200+</div><div class="stat-label">Innocence Project DNA exonerations</div></div>
  <div class="stat-card"><div class="stat-num">~4%</div><div class="stat-label">Estimated innocent people on death row</div></div>
  <div class="stat-card"><div class="stat-num">$2.5M</div><div class="stat-label">Average cost per wrongful conviction case</div></div>
</div>
<div class="def-table">
  <div class="dt-head">Leading Causes of Wrongful Conviction (Innocence Project data)</div>
  <div class="dt-row"><div class="dt-key">Eyewitness misidentification</div><div class="dt-val">~69% of DNA exoneration cases. The most common contributing factor. Witnesses are certain; witnesses are wrong.</div></div>
  <div class="dt-row"><div class="dt-key">Informant testimony</div><div class="dt-val">~57% of cases. People with something to gain (reduced sentence) testify about things defendants allegedly said. Often unreliable; poorly regulated.</div></div>
  <div class="dt-row"><div class="dt-key">False confession</div><div class="dt-val">~30% of cases. Interrogation pressure, psychological manipulation, and vulnerable defendants produce false confessions.</div></div>
  <div class="dt-row"><div class="dt-key">Unvalidated forensics</div><div class="dt-val">~44% of cases. Forensic techniques that weren't scientifically reliable were presented as definitive evidence.</div></div>
  <div class="dt-row"><div class="dt-key">Prosecutorial misconduct</div><div class="dt-val">~30% of cases. Brady violations (hiding exculpatory evidence), improper argument, or suborning perjury.</div></div>
  <div class="dt-row"><div class="dt-key">Inadequate defense</div><div class="dt-val">Underfunded public defenders, excessive caseloads, failure to investigate. Some public defenders handle 300+ felony cases per year.</div></div>
</div>
<div class="case-box">
  <div class="case-label">Case Study</div>
  <div class="case-title">The Exoneration of Clarence Brandley</div>
  <p>Clarence Brandley, a Black man, was convicted of murdering a white teenage girl in Texas in 1981. The key evidence: a Texas Ranger testified that a white co-worker said to Brandley, "One of you two is going to hang for this." The Ranger quoted this as if Brandley responded tellingly — omitting that the co-worker said it to both of them, and later admitted the co-worker was the actual killer. Brandley spent 9 years on death row. An investigative journalist uncovered evidence pointing to the actual killer. Texas pardoned Brandley in 1990. He came within days of being executed.</p>
</div>
<div class="insight-box">
  <div class="ib-head">Tunnel Vision</div>
  <p>One of the most dangerous phenomena in criminal investigations: investigators identify a suspect early, then unconsciously interpret all subsequent evidence through that lens. Evidence that fits the theory is remembered and emphasized; evidence that contradicts it is explained away or ignored. This isn't necessarily bad faith — it's how human cognition works. The solution is structural: require investigators to document and pursue alternative suspects, have evidence reviewed by investigators not involved in the case, and create mechanisms for reporting concerns about tunnel vision.</p>
</div>
</div>`,
cultural:`Steven Avery's case — the subject of Netflix's "Making a Murderer" (2015) — illustrates multiple wrongful conviction issues. Avery spent 18 years in prison for a rape he didn't commit, was exonerated by DNA evidence in 2003, and while suing Manitowoc County (whose officers had failed to pursue the real suspect), was convicted of a murder in 2005. The Netflix series raised serious questions about the investigation — potential evidence planting, inadequate defense of his co-defendant Brendan Dassey (who had intellectual disabilities and falsely confessed). The case remains contested. It brought wrongful conviction issues to millions of viewers who had never thought about them. True crime media, at its best, generates public attention for systemic failures.`,
quiz:[
  {q:"According to Innocence Project data, the most common factor contributing to wrongful convictions is:",choices:["Police misconduct and evidence planting","Eyewitness misidentification — contributing to approximately 69% of DNA exoneration cases","False confessions from defendants with mental illness","Prosecutorial misconduct in hiding evidence"],a:1,fun:"69% of DNA exoneration cases involved eyewitness misidentification. Witnesses were certain they were right. They were certain AND wrong. The wrongful conviction research has driven major reforms in how lineups are conducted — blind administration, sequential presentation, recording the witness's initial confidence level. Certainty ≠ accuracy. 👁️"},
  {q:"'Tunnel vision' in criminal investigations means:",choices:["Detectives who only work cases in a specific geographic area","The phenomenon of investigators focusing on one suspect early and interpreting all subsequent evidence to confirm that belief, while discounting contradictory evidence","Using narrow-beam surveillance to monitor suspects","A training technique for new investigators to develop case focus"],a:1,fun:"Tunnel vision isn't malice — it's a cognitive pattern. We all do it. In investigations, it means exculpatory evidence gets lost or unexplored, alternative suspects aren't pursued, and even examiners of scientific evidence (fingerprints, bite marks) are influenced by case context. Structural solutions: independent evidence review, documentation of alternative suspect investigation. 🔭"},
  {q:"The approximately 4% estimated wrongful conviction rate on death row is significant because:",choices:["It is too small to justify changes to capital punishment policy","It means that if the US has executed 1,500+ people since 1976, statistically dozens of innocent people have been executed","Capital punishment prevents far more crime than the wrongful conviction rate represents","It proves the death penalty is applied fairly across demographic groups"],a:1,fun:"Samuel Gross and colleagues estimated a 4.1% wrongful conviction rate among death sentences. With 1,500+ executions since 1976, the statistical implication is clear — and irreversible. An executed innocent person cannot be compensated. This is one of the most powerful arguments against capital punishment: we know the system produces wrongful convictions; execution is permanent; therefore some executed people were innocent. ⚖️"},
  {q:"Informant testimony contributes to wrongful convictions because:",choices:["Informants are never required to testify in open court","People providing testimony in exchange for reduced sentences have an obvious incentive to say whatever is necessary to secure that deal — regardless of truth","Informants are unreliable only when they are government witnesses, not private citizens","Courts automatically discount informant testimony"],a:1,fun:"Jailhouse informants claiming a defendant confessed to them are notoriously unreliable. They often have extensive criminal histories, are coached by prosecutors, and receive significant benefits for their testimony. Some individuals have testified as informants in dozens of cases. Despite this, courts routinely admit their testimony with minimal scrutiny. The Innocence Project found informants in 57% of their exoneration cases. 😔"}
]},
]},

// ══════════════════════════════════════
// UNIT 5: CRIMINAL JUSTICE REFORM
// ══════════════════════════════════════
{id:'u5',emoji:'🔄',name:'Criminal Justice Reform',weeks:'Weeks 13–15',lessons:[
{id:'u5l1',day:'Week 13, Day 1',title:'Mass Incarceration — Causes and Consequences',
objectives:['Explain how mass incarceration developed in the US from the 1970s onward','Analyze the racial dimensions of incarceration','Evaluate the evidence on incarceration\'s effectiveness as crime control'],
content:`<div class="body-text">
<p>The United States has experienced a four-decade expansion of its prison population, from about 200,000 incarcerated people in 1972 to over 2.1 million today. This didn't happen by accident — it was the product of specific policy choices. Understanding those choices is essential for understanding any debate about criminal justice reform.</p>
<div class="fact-box">
  <div class="fb-title">The Timeline of Mass Incarceration</div>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;margin-bottom:8px;"><strong>1971:</strong> Nixon declares a "War on Drugs" — frames drug use as public enemy number one</p>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;margin-bottom:8px;"><strong>1973:</strong> New York's Rockefeller Drug Laws introduce mandatory minimums for drug offenses</p>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;margin-bottom:8px;"><strong>1984:</strong> Sentencing Reform Act creates federal sentencing guidelines; reduces judicial discretion</p>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;margin-bottom:8px;"><strong>1986:</strong> Anti-Drug Abuse Act creates 100:1 crack/powder cocaine sentencing disparity</p>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;margin-bottom:8px;"><strong>1994:</strong> Crime Bill expands federal crimes, adds three-strikes provisions, provides funding for prison construction</p>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;"><strong>2010–present:</strong> First Step Act (2018), bail reform, prosecutorial reform, declining public appetite for mass incarceration</p>
</div>
<div class="stat-row">
  <div class="stat-card"><div class="stat-num">10×</div><div class="stat-label">Increase in US prison population 1972–2008</div></div>
  <div class="stat-card"><div class="stat-num">$35K+</div><div class="stat-label">Average annual cost per federal prisoner</div></div>
  <div class="stat-card"><div class="stat-num">5×</div><div class="stat-label">Rate Black Americans are imprisoned vs. white Americans</div></div>
</div>
<div class="def-table">
  <div class="dt-head">The Racial Architecture of Mass Incarceration</div>
  <div class="dt-row"><div class="dt-key">Drug enforcement disparities</div><div class="dt-val">Black and white Americans use drugs at similar rates; Black Americans are arrested for drug offenses at substantially higher rates. Enforcement is concentrated in certain communities, not uniformly applied.</div></div>
  <div class="dt-row"><div class="dt-key">100:1 crack/powder disparity</div><div class="dt-val">1986 law made crack cocaine (cheaper, more common in Black communities) trigger the same mandatory minimum as 100× more powder cocaine (more expensive, more common in white communities). Reduced to 18:1 in 2010 (Fair Sentencing Act) — still not 1:1.</div></div>
  <div class="dt-row"><div class="dt-key">Charging and sentencing</div><div class="dt-val">Studies consistently find that Black defendants receive longer sentences than white defendants for equivalent offenses, controlling for other factors. The disparity is largest at prosecutorial charging decisions.</div></div>
  <div class="dt-row"><div class="dt-key">Collateral consequences</div><div class="dt-val">A felony conviction creates cascading legal disabilities: inability to vote (in many states), difficulty finding housing and employment, ineligibility for federal student aid, deportation for non-citizens. The sentence continues long after release.</div></div>
</div>
</div>`,
cultural:`Michelle Alexander's "The New Jim Crow" (2010) argued that mass incarceration functions as a new system of racial caste — locking millions of Black men into a system of legal discrimination through the criminal label, in the same way that Jim Crow laws did through legal segregation. The book became one of the most influential works of the Obama era, sparking a national conversation about criminal justice reform that produced bipartisan legislation (First Step Act, 2018) and a generation of reform-oriented prosecutors. Whatever one thinks of Alexander's full argument, her core data on racial disparities in incarceration is uncontested.`,
quiz:[
  {q:"The crack/powder cocaine sentencing disparity (100:1 until 2010) created racial disparity because:",choices:["Black Americans committed more crack cocaine offenses than white Americans","Crack cocaine is more addictive than powder cocaine, requiring harsher penalties","Crack cocaine was cheaper and more prevalent in Black communities while powder cocaine was more prevalent in white communities — the same drug in different form triggered vastly different sentences","Federal law specifically targeted Black communities for drug enforcement"],a:1,fun:"Chemically, crack and powder cocaine are the same drug delivered differently. The sentencing disparity wasn't formally race-based — but its racial impact was predictable and predicted. Critics argued at the time that applying 100× the penalty for the form of the drug more common in poorer Black communities was effectively racial discrimination. Congress acknowledged this in 2010 but reduced it to 18:1, not 1:1. ⚖️"},
  {q:"'Collateral consequences' of a felony conviction refers to:",choices:["The cost to crime victims of criminal behavior","Legal disabilities that continue after a sentence is served — voting restrictions, employment discrimination, housing ineligibility, student aid bars — extending punishment beyond prison","The financial cost to taxpayers of incarceration","The psychological impact on the defendant's family"],a:1,fun:"The sentence doesn't end at release. A person released from prison may be unable to vote (in many states), legally discriminated against in housing and employment, ineligible for public benefits, and at risk of deportation. The 'prison label' creates a second sentence that persists for life in many jurisdictions. This undermines reintegration and increases recidivism — the opposite of what rehabilitation seeks. 🔑"},
  {q:"Research on the effectiveness of incarceration as crime control shows:",choices:["Incarceration is the most effective crime prevention strategy available","Incarceration has diminishing returns — it may have reduced crime at low levels of incarceration but the US now incarcerates far past any deterrent or incapacitation benefit, at enormous financial and social cost","Incarceration has no effect on crime rates","Countries with higher incarceration rates always have lower crime rates"],a:1,fun:"When someone who would otherwise commit crimes is incarcerated, crime temporarily decreases (incapacitation effect). But at current US incarceration levels, those marginal effects are small — we're imprisoning people who pose low public safety risk. Meanwhile, incarceration increases recidivism (by disrupting employment, housing, and family), and the $35K+/year cost could fund many more effective interventions. 📊"},
  {q:"The political drivers of mass incarceration expansion (1970s–1990s) included:",choices:["Empirical research showing incarceration was the most effective crime reduction strategy","Political incentives to appear 'tough on crime,' combined with the War on Drugs, mandatory minimum sentencing, and the construction of a prison-industrial complex that created financial interests in continued expansion","Public demands for rehabilitation over punishment","Federal court orders requiring state prison construction"],a:1,fun:"Nixon's domestic policy chief John Ehrlichman admitted years later: 'The Nixon campaign in 1968...had two enemies: the antiwar left and Black people. We knew we couldn't make it illegal to be either...but by getting the public to associate the hippies with marijuana and Blacks with heroin, and then criminalizing both heavily, we could disrupt those communities.' The War on Drugs was explicit about its political logic. 📰"}
]},

{id:'u5l2',day:'Week 14, Day 1',title:'Reform — What Works and What\'s Contested',
objectives:['Evaluate evidence-based criminal justice reforms','Analyze police reform proposals and their evidence base','Understand restorative justice as an alternative framework'],
content:`<div class="body-text">
<p>Criminal justice reform is not simply a liberal or conservative project — there is now bipartisan agreement that many current policies don't work and should change. The disagreements are about which changes, how fast, and who bears the costs. Understanding the evidence is the starting point for participating in this debate intelligently.</p>
<div class="def-table">
  <div class="dt-head">Reforms with Strong Evidence</div>
  <div class="dt-row"><div class="dt-key">Eyewitness ID reform</div><div class="dt-val">Blind lineup administration, sequential presentation, recording initial witness confidence. Well-documented to reduce misidentification without reducing correct identifications. 38+ states have adopted some reforms.</div></div>
  <div class="dt-row"><div class="dt-key">Recording interrogations</div><div class="dt-val">Video recording all custodial interrogations dramatically reduces false confession risk and disputed interrogation testimony. Cost is minimal; benefits are clear. About 1,000 US jurisdictions now require or encourage this.</div></div>
  <div class="dt-row"><div class="dt-key">Bail reform</div><div class="dt-val">New Jersey (2017): eliminated cash bail, used risk assessment. Result: jail population fell 44%, failure-to-appear rates did not increase, no measurable public safety impact. Evidence is strong.</div></div>
  <div class="dt-row"><div class="dt-key">Early childhood intervention</div><div class="dt-val">Home visiting programs (Nurse-Family Partnership) and quality preschool (Perry Preschool, Abecedarian) show significant crime reduction effects measured 20–30 years later. Cost-effective. Requires political will to fund early rather than react late.</div></div>
  <div class="dt-row"><div class="dt-key">Drug courts</div><div class="dt-val">Treatment-focused alternative to incarceration for drug offenses. Reduces recidivism and is more cost-effective than imprisonment. Available in most jurisdictions but underfunded and underused.</div></div>
</div>
<div class="fact-box">
  <div class="fb-title">Restorative Justice</div>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;margin-bottom:8px;">Traditional criminal justice focuses on punishment: the state prosecutes the offender; the victim has limited role. <strong>Restorative justice</strong> focuses on repairing harm: the offender, victim, and community come together to address what happened, why, and how to make it right.</p>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;margin-bottom:8px;">Programs include: victim-offender mediation, family group conferencing, community accountability circles. New Zealand uses restorative justice extensively for juvenile offenders — with lower recidivism than traditional courts.</p>
  <p style="font-size:13.5px;color:#c8bcac;line-height:1.7;">Research shows: victim satisfaction is higher in restorative processes than in traditional court (victims feel heard and get answers); recidivism is lower; costs are lower. Not appropriate for all cases — particularly not for serious violent offenses where victims do not wish to participate.</p>
</div>
<div class="insight-box">
  <div class="ib-head">The Death Penalty — A Summary of the Evidence</div>
  <p>The evidence on capital punishment: it does not deter murder (murder rates are not consistently lower in death penalty states); it is applied with racial disparity (Black defendants whose victims are white are most likely to receive death sentences); it costs more than life imprisonment (due to extended legal proceedings); roughly 4% of death sentences are likely wrongful; and it is now rejected by most comparable democracies. Support for the death penalty in the US has fallen from 80% in 1994 to under 60% in recent surveys. 27 states have abolished it or have moratoriums.</p>
</div>
</div>`,
cultural:`The First Step Act (2018), signed by President Trump with bipartisan support, was the first significant federal criminal justice reform in a generation. It reduced some mandatory minimums, applied the Fair Sentencing Act retroactively (benefiting ~2,400 prisoners), expanded earned time credits, and improved prison conditions. It was far from comprehensive — it didn't touch most of the mandatory minimum structure, and it applied primarily to federal prisons (~10% of total US prisoners). But it showed that reform was politically possible in an era of intense partisan division. Perfect shouldn't be the enemy of good in policy — but good shouldn't be mistaken for sufficient.`,
quiz:[
  {q:"New Jersey's bail reform (2017) is significant because it:",choices:["Increased the jail population by removing lenient judges from the bail process","Eliminated cash bail and replaced it with risk assessment — the jail population fell 44% with no increase in failure-to-appear rates or measurable public safety impact, providing strong evidence that cash bail is unnecessary","Created the first computer-based risk assessment system used in criminal justice","Reduced crime rates by 44% within the first year"],a:1,fun:"The results were cleaner than reformers expected: jail population down by nearly half, no significant negative consequences. This is a strong evidence-based case that cash bail can be eliminated without harm to public safety. Other states have been slower to follow — partly because bail bondsmen are a politically powerful industry with financial stakes in the current system. 📊"},
  {q:"The evidence on restorative justice programs shows:",choices:["They are appropriate for all types of criminal offenses","They produce lower victim satisfaction than traditional courts","Higher victim satisfaction, lower recidivism rates, and lower costs compared to traditional court processing — though they are not appropriate for all cases","They have not been studied rigorously enough to evaluate"],a:2,fun:"Victims consistently report feeling more heard, getting more answers about why the crime happened, and achieving more closure through restorative processes. Offenders who go through restorative processes reoffend at lower rates. The evidence is consistent across many studies and jurisdictions. The limitation: they work best when victims are willing to participate and offenders are genuinely accountable. 🤝"},

  {q:"The evidence on capital punishment's deterrent effect shows:",choices:["States with the death penalty consistently have lower murder rates than states without it","The death penalty significantly deters murder compared to life imprisonment","Murder rates are not consistently lower in death penalty states — studies have found no reliable deterrent effect","The death penalty deters murder only when executions occur within 5 years of conviction"],a:2,fun:"Economists and criminologists have studied this extensively. The consensus: no reliable deterrent effect. Potential murderers don't carefully calculate that execution is worse than life imprisonment. States that have abolished the death penalty haven't seen increases in murder rates relative to states that kept it. The deterrence argument for capital punishment doesn't have evidentiary support. ⚖️"}
