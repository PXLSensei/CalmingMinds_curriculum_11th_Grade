{id:'u6', emoji:'🌧️', name:'Special Driving Conditions', weeks:'Unit 6 · Weeks 16–18', lessons:[
{id:'u6l1', day:'Week 16, Day 1', title:'Night Driving, Weather & Highway Driving',
objectives:['Apply specific techniques for driving at night and in adverse weather','Execute safe lane changes, merging, and highway entry/exit','Understand hydroplaning, black ice, and reduced-visibility driving'],
content:`<div class="body-text">
<p>Most new drivers learn in daylight and fair weather — but driving conditions are often neither. Night driving and adverse weather require specific knowledge and technique adjustments that don't come automatically from daytime experience.</p>
<div class="sign-box">
  <div class="sb-head dark">Night Driving</div>
  <div class="sb-row"><div class="sb-key">Reduce speed</div><div class="sb-val">Headlights illuminate about 350 feet at low beam. At 60 mph, you're covering 88 ft/second — you have only 4 seconds of visible road ahead. Reduce speed so you can stop within your visible range ("driving within your headlights").</div></div>
  <div class="sb-row"><div class="sb-key">Use high beams correctly</div><div class="sb-val">Use high beams on open highways when no oncoming or preceding traffic. Dim within 500 feet of an oncoming vehicle or 300 feet when following another vehicle. Don't use high beams in fog (light scatters back).</div></div>
  <div class="sb-row"><div class="sb-key">Oncoming glare</div><div class="sb-val">When blinded by oncoming headlights: look toward the right edge line (not at the oncoming lights). Your peripheral vision continues to track the road ahead while protecting your night vision.</div></div>
  <div class="sb-row"><div class="sb-key">Overdriving headlights</div><div class="sb-val">When you're traveling faster than your ability to stop within your headlight range. Common at highway speeds. Reduce speed at night — especially on unfamiliar roads.</div></div>
</div>
<div class="sign-box">
  <div class="sb-head blue">Adverse Weather Driving</div>
  <div class="sb-row"><div class="sb-key">Rain / Hydroplaning</div><div class="sb-val">Hydroplaning (floating on water film) can begin at 35 mph with worn tires. Response: ease off accelerator, steer straight, do NOT brake hard. Prevention: slow down in rain, maintain tire tread, avoid standing water. Rain increases stopping distance 2-4×.</div></div>
  <div class="sb-row"><div class="sb-key">Black ice</div><div class="sb-val">Invisible ice on pavement, most common on bridges, overpasses, and shaded areas (freeze first and last to thaw). Warning: a section of road that looks wet but has less tire noise than expected. Approach gently, do not brake while on it — let the vehicle roll through.</div></div>
  <div class="sb-row"><div class="sb-key">Fog</div><div class="sb-val">Use LOW beams (NOT high beams — they reflect back and reduce visibility). Use fog lights if equipped. Reduce speed dramatically. Increase following distance. If visibility is extremely poor, pull completely off the road and turn off lights (leave hazards on) — driving slowly in thick fog is more dangerous than stopping.</div></div>
  <div class="sb-row"><div class="sb-key">Wind</div><div class="sb-val">High winds affect high-profile vehicles most (RVs, trucks, SUVs). Anticipate wind gusts when passing large trucks or leaving shelter of buildings/trees. Grip wheel firmly. Reduce speed.</div></div>
</div>
<div class="sign-box">
  <div class="sb-head">Highway Driving — Entering and Exiting</div>
  <div class="sb-row"><div class="sb-key">Highway entry</div><div class="sb-val">Acceleration lane: use it fully to match highway speed before merging. Check traffic, signal, find gap, merge smoothly. Never stop in an acceleration lane unless forced to. Speed must match traffic.</div></div>
  <div class="sb-row"><div class="sb-key">Lane changes</div><div class="sb-val">Signal 3–5 seconds before changing. Check mirrors AND blind spot (look over shoulder, not just mirrors). Move gradually. Return to right lane after passing. Do not straddle lanes.</div></div>
  <div class="sb-row"><div class="sb-key">Highway exit</div><div class="sb-val">Get in the correct lane early. Signal. Exit at posted ramp speed — decelerate on the ramp, not on the highway. Watch for the advisory speed on the exit ramp curve (much lower than highway speed).</div></div>
  <div class="sb-row"><div class="sb-key">Keep right rule</div><div class="sb-val">On NC interstates, slower traffic must keep right. Left lane is for passing. Driving slowly in the left lane impedes traffic and is a primary cause of road rage and rear-end collisions.</div></div>
</div>
<div class="warning-box">
  <div class="wb-head">Road Rage — Response Protocol</div>
  <p>If confronted by an aggressive driver: do not make eye contact (perceived as aggressive), do not gesture, do not respond to aggressive behavior, give them space (slow or change lanes), let them go. If followed: do NOT go home. Drive to a police station, fire station, or crowded public area. Call 911. Road rage attacks are crimes and law enforcement takes them seriously. De-escalation (ignoring aggressive behavior) is always the right response.</p>
</div>
</div>`,
cultural:`"Overdriving your headlights" — traveling faster than you can stop within the visible range of your headlights — is one of the most common and least-discussed night driving errors. Standard low beams illuminate roughly 350 feet. At 60 mph, stopping distance is approximately 270 feet. At 70 mph, stopping distance exceeds 350 feet — beyond headlight range. This is why highway driving at night at full posted speed is technically unsafe unless conditions are ideal. Adaptive headlights (which turn with steering input, now standard on many vehicles) and LED headlights that illuminate farther are engineering responses to this problem.`,
quiz:[
  {q:"When driving in fog, you should use:",choices:["High beams — they project more light into the fog","Hazard lights — to warn other drivers of reduced visibility","Low beams (and fog lights if equipped) — high beams reflect back and reduce visibility in fog","Any lights are equally effective — choose based on vehicle type"],a:1,fun:"High beams in fog create 'white wall' effect — the light bounces off the water droplets directly back at you. Low beams project the light downward along the road surface under the fog layer. This is physics, not preference. If you have front fog lights (lower, wider beam): use them. If not: low beams only. 🌫️"},
  {q:"Hydroplaning occurs when:",choices:["Driving over a large puddle too slowly — water resistance creates drag","A thin film of water lifts the tire off the road surface, causing loss of traction and steering — can begin at 35 mph with worn tires","Only occurring in standing water more than 2 inches deep","Only affecting vehicles without all-wheel drive"],a:1,fun:"Hydroplaning happens when water can't escape from under the tire fast enough, and the tire rides on a film of water rather than the road surface. Steering input does nothing — you're floating. Ease off the gas, steer straight, wait for traction to return. Prevention: proper tire tread, slower speed in rain. 💧"},
  {q:"When entering a highway from an on-ramp acceleration lane, you should:",choices:["Stop at the end of the ramp and wait for a complete gap in traffic","Use the acceleration lane to match highway traffic speed before merging, signal, find a gap, and merge smoothly","Merge immediately at ramp speed and accelerate after merging","Wait until all traffic clears before attempting to enter"],a:1,fun:"The acceleration lane exists to let you match speed. Merging at ramp speed (35 mph) onto a 70 mph highway creates a dangerous speed differential. Use the full length of the lane to get up to speed. Check mirrors AND blind spot. Signal. Find a gap. Merge. Don't stop unless absolutely necessary — a stopped vehicle at the end of an acceleration lane is a serious hazard. 🛣️"},
  {q:"On NC interstates, the left lane is legally intended for:",choices:["Vehicles traveling at or above the speed limit","All vehicles regardless of speed","Passing — slower traffic must keep right, and impeding traffic in the left lane is a violation","HOV (High Occupancy Vehicle) use"],a:2,fun:"NC GS 20-146 requires vehicles to keep right except when passing. Camping in the left lane — even at or above the speed limit — is a violation. The left lane is for passing; after passing, return right. Left-lane camping forces passing on the right, increases weaving, causes rear-end pressure, and contributes to road rage. The law exists for good reason. ➡️"}
]},
]},

{id:'u7', emoji:'📝', name:'DMV Practice Test', weeks:'Final · 25 Questions', lessons:[
{id:'u7l1', day:'DMV Simulation', title:'NC DMV Knowledge Practice Test — 25 Questions',
objectives:['Demonstrate readiness for the NC DMV written knowledge test','Score at least 20/25 (80%) — the passing threshold','Identify any topic areas needing additional review before your real test'],
content:`<div class="body-text">
<p>This practice test simulates the NC DMV knowledge examination. Like the real test, it contains 25 questions drawn from all topic areas in the NC Driver's Handbook. You need <strong>20 correct (80%)</strong> to pass.</p>
<div class="sign-box">
  <div class="sb-head">About the Real NC DMV Knowledge Test</div>
  <div class="sb-row"><div class="sb-key">Questions</div><div class="sb-val">25 multiple-choice questions</div></div>
  <div class="sb-row"><div class="sb-key">Passing score</div><div class="sb-val">20 correct (80%) — you may miss 5</div></div>
  <div class="sb-row"><div class="sb-key">Retake policy</div><div class="sb-val">Up to 3 attempts; after 3 failures, a waiting period is imposed</div></div>
  <div class="sb-row"><div class="sb-key">Format</div><div class="sb-val">Multiple choice; questions drawn from the NC Driver's Handbook</div></div>
  <div class="sb-row"><div class="sb-key">Topics covered</div><div class="sb-val">Traffic signs, traffic laws, safe driving practices — all topics in this course</div></div>
</div>
<div class="tip-box">
  <div class="tb-head">Practice Test Instructions</div>
  <p>Answer all 25 questions below, then submit to see your score, correct answers, and explanations. This test can be retaken as many times as you like — each submission is scored independently. Use the detailed feedback to identify weak areas and review the relevant lessons before your real DMV appointment.</p>
</div>
</div>`,
cultural:`The NC DMV knowledge test is administered at any NC Division of Motor Vehicles driver's license office. You can schedule an appointment online at ncdot.gov/dmv. Bring your required documents (proof of identity, Social Security number, two proofs of NC residency, and if under 18, a parent or guardian). The test is taken on a computer terminal. Results are immediate. If you've studied this course and can consistently score 20/25 or higher on this practice test, you are ready for your appointment.`,
quiz:[
  {q:"NC's Graduated Driver Licensing (GDL) system requires a Limited Learner's Permit holder to complete how many total practice hours before being eligible for a Limited Provisional License?",choices:["30 hours total","45 hours total, including 5 nighttime","60 hours total, including 10 nighttime hours","75 hours total, including 15 nighttime hours"],a:2,fun:"60 hours total with at least 10 of those hours driven at night. These must be logged — NC requires parents/guardians to certify the hours. The night requirement exists because nighttime driving is where new drivers face the highest crash risk per mile. 🌙"},
  {q:"You are driving in a residential area with no posted speed limit signs. The maximum speed limit is:",choices:["25 mph","35 mph","45 mph","55 mph"],a:1,fun:"35 mph is NC's statutory speed limit in residential and business districts when no speed limit signs are posted. Remember: the posted limit is only the maximum under ideal conditions — the basic speed law may require slower speeds. 🏘️"},
  {q:"At a 4-way stop, which vehicle has the right of way when two cars arrive at exactly the same time from perpendicular directions?",choices:["The vehicle traveling at higher speed","The vehicle that honks first","The vehicle on the left yields to the vehicle on the right","The vehicle turning has priority over the vehicle going straight"],a:2,fun:"Yield to the right at a 4-way stop tie. If you arrive simultaneously with a car on your left: you go. If you arrive simultaneously with a car on your right: they go. This rule resolves the most common tie scenario. ⚖️"},
  {q:"A flashing yellow traffic signal means:",choices:["Stop completely and wait for a green signal","The signal is about to turn red — prepare to stop","Slow down and proceed with caution — treat as a yield situation","The signal is malfunctioning — stop and wait for police"],a:2,fun:"Flashing yellow = yield. Flashing red = stop (treat as stop sign). Both indicate the normal signal cycle is not operating — either due to low traffic volume off-hours or a malfunction. 🟡"},
  {q:"When must NC drivers use headlights?",choices:["Only between midnight and 5am","Only in complete darkness when you cannot see without them","From 30 minutes after sunset to 30 minutes before sunrise, and when visibility is less than 400 feet","Only during officially declared hazardous weather conditions"],a:2,fun:"30 min after sunset, 30 min before sunrise, and anytime visibility drops below 400 feet (rain, fog, smoke). Many drivers use daytime running lights and mistakenly think they satisfy the headlight requirement — but DRLs often don't illuminate taillights. Check that rear lights are actually on. 💡"},
  {q:"A solid yellow center line on a two-lane road on YOUR side means:",choices:["You may pass when you can see clearly ahead","Passing is prohibited from your lane","You are approaching a school zone","The road is under construction"],a:1,fun:"Solid yellow on your side = no passing for you. Solid on both sides = no passing either direction. Dashed yellow = passing allowed when safe. The line's style tells you the rule that applies to YOUR lane, not just the general road condition. 🚫"},
  {q:"What is the minimum following distance recommended under ideal driving conditions?",choices:["1 second","2 seconds","3 seconds","5 seconds"],a:2,fun:"3 seconds is the minimum under ideal conditions. Pick a fixed point — when the vehicle ahead passes it, you should not reach it before counting three seconds. Double it (6 seconds) in rain, fog, at night, or when following large trucks. 🕐"},
  {q:"When a school bus has stopped with its red lights flashing and stop arm extended on an undivided two-lane road, drivers in BOTH directions must:",choices:["Slow to 25 mph and proceed carefully","Stop at least 10 feet away and wait until the lights stop and the arm retracts","Yield and proceed if no children are visible","Only buses behind the bus must stop"],a:1,fun:"BOTH directions stop on undivided roads. Only exception: divided highways with 4+ lanes (raised median) — opposing traffic may proceed. Failing to stop for a school bus is a 5-point violation in NC — the most points for any single traffic violation. 🚌"},
  {q:"The shape of a yield sign is:",choices:["Octagon (8-sided)","Diamond","Downward-pointing triangle","Pentagon (5-sided)"],a:2,fun:"Triangle pointing down = yield. Octagon = stop. Diamond = warning. Rectangle/square = regulatory or informational. You should be able to identify sign categories by shape alone — important in poor visibility. 🔺"},
  {q:"A green arrow signal light means:",choices:["You may proceed in the arrow direction but must yield to all oncoming traffic","You have a protected right of way in the arrow direction — opposing traffic is stopped","You must turn only in the arrow direction — going straight is prohibited","The regular green ball will appear in 5 seconds"],a:1,fun:"Green arrow = protected turn. Opposing traffic has a red light. You still yield to pedestrians crossing your path (their crossing signal may be on). Green ball = unprotected — you must still yield to oncoming traffic when turning left. 💚"},
  {q:"Under NC law, texting while driving is:",choices:["Legal for adults 21 and older","Legal if stopped at a red light","Prohibited for all drivers at all times, including when stopped at traffic lights","Only prohibited for drivers under 18"],a:2,fun:"NC bans texting for ALL drivers at ALL times — including at red lights. The law treats the vehicle as 'in operation' when in traffic, even when stopped. For under-18 drivers, ALL cell phone use is prohibited. For adults: talking on hand-held is currently permitted in NC (though hands-free is strongly recommended). 📵"},
  {q:"What does a white dashed lane marking between lanes of same-direction traffic indicate?",choices:["No lane changes permitted — maintain your lane","Lane changes are permitted when safe","You are entering a one-way road","These lanes have different speed limits"],a:1,fun:"White dashed line between same-direction lanes = lane changes allowed when safe. White solid line = lane changes discouraged. Yellow lines (solid or dashed) separate opposite-direction traffic. Color + solid/dashed = the complete system. ⬜"},
  {q:"NC's implied consent law means that by driving in NC, you have:",choices:["Agreed to allow police to search your vehicle without a warrant","Consented to a chemical test (blood or breath) if an officer has probable cause to suspect DWI — refusal results in 30-day license revocation","Waived your right to contest traffic violations in court","Agreed to submit to random roadside sobriety tests"],a:1,fun:"By accepting a NC driver's license, you consent to chemical testing if lawfully stopped for suspected DWI. Refusal triggers an automatic 30-day revocation — and the refusal itself can be used as evidence against you in court. You have the right to refuse; there are just consequences. 🚨"},
  {q:"The legal Blood Alcohol Content (BAC) limit for a driver under 21 in NC is:",choices:["0.08% — same as adults","0.04%","0.02%","0.00% — any detectable alcohol"],a:3,fun:"NC has zero tolerance for underage drinking and driving: any detectable alcohol = DWI for drivers under 21. A single drink can put someone over 0.00%. The under-21 DWI consequences include 1-year license revocation, criminal conviction, and insurance surcharges that last years. 🚫"},
  {q:"When approaching an emergency vehicle with lights and siren active from behind you, you should:",choices:["Speed up to clear the path as quickly as possible","Maintain your current speed and position — emergency vehicles will navigate around you","Pull to the right side of the road and stop until the vehicle has passed","Move to the center lane to allow the vehicle to pass on either side"],a:2,fun:"Pull RIGHT and stop — not just slow down, but stop. If on a divided highway, stay on your side (don't cross the median to 'get out of the way'). The emergency vehicle needs a clear path, and stopping on the right provides that. 🚑"},
  {q:"NC's Move-It Law requires drivers involved in a crash with no injuries and drivable vehicles to:",choices:["Wait exactly where the crash occurred until police arrive","Move vehicles off the roadway to the nearest safe location to prevent secondary crashes","Call 911 and wait for instruction before moving any vehicles","Place flares and remain with vehicles in the roadway"],a:1,fun:"Blocking a travel lane after a minor crash creates a serious secondary crash risk — people standing in the road have been seriously injured and killed. NC law requires moving drivable vehicles to the shoulder or a nearby parking area. Photograph the scene first, exchange information, then move. 📱"},
  {q:"The NC penalty for failing to stop for a school bus with flashing red lights is:",choices:["1 point and $100 fine","2 points and a warning","5 points on your license and $500+ fine for first offense","Immediate license revocation"],a:2,fun:"5 points — the single highest point value for any moving violation in NC. Most violations are 2-4 points. At 12 points in 3 years, your license is suspended. The 5-point school bus violation can push a driver with other violations to suspension on its own. 💸"},
  {q:"Hydroplaning occurs most easily when:",choices:["Driving at very low speeds through deep puddles","Driving at higher speeds on wet roads with worn tires — tires can't channel water away fast enough","Only in standing water more than 4 inches deep","When driving on freshly paved roads during the first rainfall"],a:1,fun:"Hydroplaning risk increases with: higher speed (can begin at 35 mph on worn tires), more water (heavy rain, standing water), and less tread (worn tires can't channel water). Response: ease off gas, steer straight, do NOT brake hard. Prevention: slow down in rain, maintain proper tire tread. 💧"},
  {q:"When backing out of a driveway, drivers should:",choices:["Honk to alert pedestrians and back out quickly","Back out slowly, checking mirrors and looking over both shoulders — back slowly into the roadway","Have a passenger direct you from outside the vehicle","Only back out if no vehicles are visible in either direction"],a:1,fun:"Driveways have the worst visibility and the most likely presence of small children. Look over both shoulders (not just mirrors), back slowly, and yield to all pedestrians and vehicles in the roadway. A driveway is private property — the moment you enter the road, you must yield to everyone on it. 🔄"},
  {q:"On a multi-lane highway in NC, slower traffic should:",choices:["Stay in the center lane","Use any lane — speed determines lane choice","Keep right — the left lane is for passing only","Use the right lane only if driving below the speed limit"],a:2,fun:"NC law requires slower traffic to keep right on multi-lane highways. The left lane is for passing. Traveling at the speed limit in the left lane while blocking faster traffic is still a violation. After passing, return to the right. This reduces weaving, tailgating, and road rage. ➡️"},
  {q:"What should you do if your vehicle begins to skid (rear slides out)?",choices:["Steer in the opposite direction of the skid and brake hard","Steer into the skid (toward the direction the rear is sliding) and avoid braking until the vehicle straightens","Brake hard and steer straight","Apply the parking brake to stop the skid"],a:1,fun:"'Steer into the skid' means steer where your rear end is going, not where you WANT to go. If the rear slides right, turn the wheel right. Avoid abrupt braking — it can worsen the skid. Release the accelerator. Let the tires regain traction, then straighten. 🔄"},
  {q:"NC law requires all occupants of a vehicle to wear seatbelts. The driver is specifically responsible for ensuring seatbelts are worn by:",choices:["Only front-seat passengers","All passengers under 16, regardless of seating position","Only children under 8 years old","Passengers only if the vehicle is equipped with rear seatbelts"],a:1,fun:"The driver is legally responsible for seatbelt compliance of all passengers under 16. For passengers 16 and older, each person is responsible for their own belt. NC is a primary enforcement state — you can be stopped and cited for seatbelt violations without any other traffic offense. 🔒"},
  {q:"When passing a large truck on the highway, you should:",choices:["Pass slowly and stay alongside the truck until you have a large gap","Pass quickly and decisively, signal before moving over, ensure you can see the truck's headlights in your mirror before moving back","Flash your high beams to signal your intent to pass","Always pass on the right where visibility is better"],a:1,fun:"Pass trucks quickly — minimize time in their blind spots. Before moving back into the lane ahead of them, make sure you can see BOTH of the truck's headlights in your rearview mirror (meaning you're safely ahead). Passing on the right of a truck is the worst option — that's their largest blind spot (2-3 lanes wide). 🚛"},
  {q:"A pennant-shaped sign (elongated triangle pointing right) on the highway means:",choices:["Begin a passing zone — you may pass here","No passing zone — do not attempt to pass in this area","You are entering a construction zone","Keep right except to pass"],a:1,fun:"The pennant shape is unique to the No Passing Zone sign — you won't confuse it with anything else. It's posted on the left side of the road at the start of a no-passing zone, facing the direction of travel whose drivers cannot pass. Yellow diamond signs also mark no-passing zones — the pennant makes it explicit. 🚫"},
  {q:"If you are involved in a crash and someone is injured, NC law requires you to:",choices:["Administer first aid and then move the vehicles","Call 911, render reasonable assistance, and remain at the scene until law enforcement arrives and releases you","Move vehicles immediately then report the crash within 24 hours","Exchange information and report the crash to insurance only — police are not required"],a:1,fun:"Crashes with injuries require: stop immediately, call 911, render reasonable assistance (do not move an injured person unless in immediate danger), remain until law enforcement releases you. Leaving the scene of an injury crash is a serious crime — felony hit-and-run. Crash with property damage over $1,000: must report to law enforcement. 🚨"}
]},
]},
]};

// ── STATE ──────────────────────────────
const KEY = 'drivers_ed_course';
let state = JSON.parse(localStorage.getItem(KEY) || '{}');
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
function totalL() { return COURSE.units.reduce((s,u)=>s+u.lessons.length,0); }
function doneL() { return Object.keys(state).length; }
function avgSc() {
  const v = Object.values(state).map(x=>x.score).filter(x=>x!=null);
  return v.length ? Math.round(v.reduce((a,b)=>a+b,0)/v.length) : null;
}
function getLesson(lid) {
  for (const u of COURSE.units) for (const l of u.lessons) if (l.id===lid) return {unit:u,lesson:l};
  return null;
}

// ── SIDEBAR ─────────────────────────────
function buildSidebar() {
  const nav = document.getElementById('unit-nav'); nav.innerHTML = '';
  COURSE.units.forEach((u,ui) => {
    const done = u.lessons.filter(l=>state[l.id]).length;
    const allDone = done===u.lessons.length;
    const sh = document.createElement('div'); sh.className = 'u-sect';
    sh.textContent = 'Unit '+(ui+1); nav.appendChild(sh);
    const btn = document.createElement('button');
    btn.className = 'u-btn' + (allDone?' done':'');
    btn.innerHTML = `<span class="u-ic">${u.emoji}</span><span class="u-nm">${u.name}</span><span class="u-ck">${done>0?(allDone?'✓':done+'/'+u.lessons.length):''}</span>`;
    btn.onclick = () => document.getElementById('ll_'+u.id)?.classList.toggle('open');
    nav.appendChild(btn);
    const ll = document.createElement('div'); ll.className='lesson-list'; ll.id='ll_'+u.id;
    u.lessons.forEach(l => {
      const d = state[l.id];
      const lb = document.createElement('button');
      lb.className = 'l-btn' + (d?' done':'');
      lb.innerHTML = `<span>${l.title.substring(0,28)}${l.title.length>28?'…':''}</span>${d?`<span class="l-sc">${d.score}%</span>`:''}`;
      lb.onclick = () => showLesson(u.id, l.id);
      ll.appendChild(lb);
    });
    nav.appendChild(ll);
  });
  document.getElementById('stat-done').textContent = doneL()+'/'+totalL();
  const a = avgSc(); document.getElementById('stat-avg').textContent = a!==null?a+'%':'—';
  document.getElementById('prog-chip').textContent = doneL()+' / '+totalL();
}

// ── WELCOME ─────────────────────────────
function showWelcome() {
  document.getElementById('tb-title').textContent = 'NC STANDARD DRIVER EDUCATION';
  document.getElementById('tb-crumb').textContent = 'NC DMV Knowledge Test Prep · Calming Minds Day School · 2026–27';
  const cards = COURSE.units.map((u,ui) => {
    const done = u.lessons.filter(l=>state[l.id]).length;
    const pct = Math.round(done/u.lessons.length*100);
    return `<div class="u-card" onclick="showLesson('${u.id}','${u.lessons[0].id}')">
      <div class="uc-ic">${u.emoji}</div>
      <div class="uc-tt">Unit ${ui+1} — ${u.name}</div>
      <div class="uc-wk">${u.weeks}</div>
      <div class="uc-bar"><div class="uc-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
  document.getElementById('content').innerHTML = `
    <div class="w-hero">
      <div class="w-tag">NC Standard Driver Education · Calming Minds Day School · 2026–27</div>
      <div class="w-title">NC DRIVER'S<br><span>EDUCATION</span></div>
      <p class="w-sub">Complete NC DMV knowledge test preparation — traffic laws, road signs, safe driving techniques, and NC-specific regulations. All content aligns with the NC Driver's Handbook and NCDMV test format.</p>
      <div class="w-note">⚠️ DMV KNOWLEDGE TEST REQUIREMENT: 20/25 correct (80%) to pass. This course covers all tested material.</div>
    </div>
    <div class="u-grid">${cards}</div>`;
}

// ── LESSON ──────────────────────────────
let curUid=null, curLid=null, qa={}, submitted=false;

function showLesson(uid, lid) {
  const found = getLesson(lid); if (!found) return;
  const {unit, lesson} = found;
  curUid=uid; curLid=lid; qa={}; submitted=false;
  document.querySelectorAll('.lesson-list').forEach(el=>el.classList.remove('open'));
  document.getElementById('ll_'+uid)?.classList.add('open');
  document.getElementById('tb-title').textContent = lesson.title.toUpperCase();
  document.getElementById('tb-crumb').textContent = `${unit.name} · ${lesson.day} · Calming Minds Day School`;
  const saved = state[lid]; const L=['A','B','C','D'];
  const qHtml = lesson.quiz.map((q,qi) => `
    <div class="q-card">
      <div class="q-num">Question ${qi+1} of ${lesson.quiz.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.choices.map((c,ci) => `<button class="choice" id="ch${qi}_${ci}" onclick="pick(${qi},${ci})">
        <span class="c-ltr">${L[ci]}</span><span>${c}</span>
      </button>`).join('')}
      <div class="feedback" id="fb${qi}"></div>
    </div>`).join('');
  const banner = saved
    ? `<div class="score-banner show"><div class="score-big">${saved.score}%</div><div class="score-msg">${msg(saved.score)}</div></div>`
    : `<div class="score-banner" id="score-banner"></div>`;
  const allL = COURSE.units.flatMap(u=>u.lessons.map(l=>({uid:u.id,lid:l.id})));
  const idx = allL.findIndex(x=>x.lid===lid);
  const prev = idx>0?allL[idx-1]:null; const next = idx<allL.length-1?allL[idx+1]:null;
  document.getElementById('content').innerHTML = `
    <div class="l-header">
      <div class="l-unit-tag">${unit.emoji} ${unit.name} · ${unit.weeks}</div>
      <h2>${lesson.title}</h2>
      <div class="l-meta">${lesson.day} · Calming Minds Day School · 2026–27</div>
    </div>
    <div class="obj-box">
      <div class="obj-head">Lesson Objectives</div>
      <ul>${lesson.objectives.map(o=>`<li>${o}</li>`).join('')}</ul>
    </div>
    <div class="section">
      <div class="sec-head">Lesson Content</div>
      ${lesson.content}
    </div>
    <div class="section">
      <div class="sec-head">Context & Background</div>
      <div class="tip-box"><div class="tb-head">Did You Know</div><p>${lesson.cultural}</p></div>
    </div>
    <div class="quiz-wrap">
      <h4>KNOWLEDGE CHECK</h4>
      <div class="quiz-sub">${lesson.quiz.length} questions · Submit to record your score</div>
      ${banner}
      ${qHtml}
      <button class="sub-btn" id="sub-btn" onclick="submitQ()" ${saved?'disabled':''}>
        ${saved?'SUBMITTED ✓':'SUBMIT ANSWERS'}
      </button>
    </div>
    <div class="lesson-nav">
      ${prev?`<button class="nav-btn nav-prev" onclick="showLesson('${prev.uid}','${prev.lid}')">← PREV</button>`:''}
      ${next?`<button class="nav-btn nav-next" onclick="showLesson('${next.uid}','${next.lid}')">NEXT →</button>`:''}
    </div>`;
  if (saved) showPrev(lesson, saved);
  window.scrollTo(0,0);
}

function showPrev(lesson, saved) {
  submitted=true; const L=['A','B','C','D'];
  lesson.quiz.forEach((q,qi) => {
    const sel = saved.answers?saved.answers[qi]:null;
    if (sel!==null && sel!==undefined) {
      document.getElementById(`ch${qi}_${sel}`)?.classList.add(sel===q.a?'correct':'wrong');
      if (sel!==q.a) document.getElementById(`ch${qi}_${q.a}`)?.classList.add('correct');
      const fb = document.getElementById(`fb${qi}`);
      if (fb) {
        fb.className=`feedback ${sel===q.a?'ok':'bad'} show`;
        fb.innerHTML = sel===q.a
          ? `✓ Correct! ${q.fun?`<div class="fun-n">💡 ${q.fun}</div>`:''}`
          : `Answer: ${L[q.a]}. ${q.choices[q.a]}${q.fun?`<div class="fun-n">💡 ${q.fun}</div>`:''}`;
      }
    }
  });
}

function pick(qi,ci) {
  if (submitted) return;
  document.querySelectorAll(`[id^="ch${qi}_"]`).forEach(b=>b.classList.remove('selected'));
  document.getElementById(`ch${qi}_${ci}`)?.classList.add('selected');
  qa[qi]=ci;
}

function submitQ() {
  const found=getLesson(curLid); if(!found) return;
  const {lesson}=found; submitted=true;
  const L=['A','B','C','D']; let correct=0; const answers={};
  lesson.quiz.forEach((q,qi) => {
    const sel=qa[qi]; answers[qi]=sel!==undefined?sel:null;
    const fb=document.getElementById(`fb${qi}`);
    if (sel===undefined) {
      if(fb){fb.className='feedback bad show';fb.textContent='No answer. Correct: '+L[q.a]+'. '+q.choices[q.a];}
    } else if (sel===q.a) {
      correct++;
      document.getElementById(`ch${qi}_${sel}`)?.classList.add('correct');
      if(fb){fb.className='feedback ok show';fb.innerHTML='✓ Correct!'+(q.fun?` <div class="fun-n">💡 ${q.fun}</div>`:'');}
    } else {
      document.getElementById(`ch${qi}_${sel}`)?.classList.add('wrong');
      document.getElementById(`ch${qi}_${q.a}`)?.classList.add('correct');
      if(fb){fb.className='feedback bad show';fb.innerHTML=`Answer: ${L[q.a]}. ${q.choices[q.a]}`+(q.fun?` <div class="fun-n">💡 ${q.fun}</div>`:'');}
    }
  });
  const score=Math.round(correct/lesson.quiz.length*100);
  state[curLid]={score,answers}; save();
  const banner=document.getElementById('score-banner');
  if(banner){banner.className='score-banner show';banner.innerHTML=`<div class="score-big">${score}%</div><div class="score-msg">${msg(score)}</div>`;}
  const btn=document.getElementById('sub-btn');
  if(btn){btn.disabled=true;btn.textContent='SUBMITTED ✓';}
  buildSidebar();
}

function msg(s) {
  if(s===100) return 'PERFECT — DMV READY';
  if(s>=90) return 'EXCELLENT — NEARLY THERE';
  if(s>=80) return 'PASSING — ABOVE DMV THRESHOLD';
  if(s>=70) return 'CLOSE — REVIEW AND RETRY';
  return 'STUDY MORE — RETRY THIS LESSON';
}

buildSidebar();
showWelcome();
</script>
