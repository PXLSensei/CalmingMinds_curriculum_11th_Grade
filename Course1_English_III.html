        {
          id: 'u7l1', day: 'S2, Week 14, Day 1',
          title: '1984 — Orwell\'s Warning',
          objectives: [
            'Understand the historical context of 1984 (WWII, Stalinist USSR)',
            'Analyze doublethink, Newspeak, and the Party\'s mechanisms of control',
            'Connect Orwellian concepts to contemporary surveillance and language'
          ],
          content: `
<p>George Orwell published Nineteen Eighty-Four in 1949, dying of tuberculosis just months later. He was writing from direct experience: he had fought in the Spanish Civil War, watched Stalinist communists betray their own allies, and spent WWII watching totalitarian propaganda from both the Soviet Union and Nazi Germany. He was not making predictions — he was describing systems he had seen.</p>
<div class="text-block">
  <h5>Key Orwellian Concepts</h5>
  <div class="term"><strong>Doublethink</strong><span>Holding two contradictory beliefs simultaneously and accepting both. "War is Peace. Freedom is Slavery. Ignorance is Strength." The Party requires you to believe contradictions.</span></div>
  <div class="term"><strong>Newspeak</strong><span>A deliberately simplified and restricted language designed to make thoughtcrime literally impossible — if you don't have the word for "freedom," you cannot think the concept</span></div>
  <div class="term"><strong>Thoughtcrime</strong><span>Having thoughts that oppose the Party — itself a crime, even before action. The Thought Police enforce this through constant surveillance.</span></div>
  <div class="term"><strong>Memory Hole</strong><span>An apparatus for destroying documents and rewriting the historical record. "He who controls the past controls the future; he who controls the present controls the past."</span></div>
  <div class="term"><strong>Room 101</strong><span>The torture chamber containing each individual's worst personal fear — the Party's tool for completely breaking the self</span></div>
</div>
<p>Orwell's most terrifying insight is about language. If Newspeak eliminates the vocabulary for rebellion, rebellion becomes literally unthinkable. This is why authoritarian governments have always fought over language: what gets named, what gets defined, what words are allowed. "Pro-choice" vs. "pro-abortion." "Undocumented immigrants" vs. "illegal aliens." Language wars are power wars.</p>
<div class="quote-block">
  <p>"The Party told you to reject the evidence of your eyes and ears. It was their final, most essential command."</p>
  <div class="attribution">— George Orwell, Nineteen Eighty-Four (1949)</div>
</div>`,
          cultural: `Orwell wrote "Politics and the English Language" (1946) three years before 1984 as a companion piece. His argument: vague, pompous language is not just bad style — it enables dishonest thinking. Clear thinking requires clear language. He made six rules, including: "If it is possible to cut a word out, always cut it out." Both essays together form a complete theory about the relationship between language, thought, and power. It is still the best piece of advice ever written for any writer.`,
          quiz: [
            { q: "Orwell coined the term 'doublethink' to describe:", choices: ["The ability to think about two different subjects simultaneously", "Holding two contradictory beliefs and accepting both as true — a mental discipline the Party requires of its members", "A type of propaganda that presents only two options when more exist", "The gap between what politicians say and what they do"], a: 1, fun: "'War is Peace' — if you're always at war, you're always mobilized, always afraid, always controllable. The genius of the Party's slogans is that they're impossible to disprove if you've been trained to accept contradiction as truth. Orwell watched Stalin do this in real time. 🤯" },
            { q: "Orwell's concept of 'Newspeak' argues that:", choices: ["Language evolves naturally toward greater simplicity over time", "A deliberately impoverished vocabulary makes certain thoughts literally impossible to formulate — controlling language controls thought", "New words should be invented to keep language fresh and relevant", "Political language should be simplified so ordinary people can understand it"], a: 1, fun: "This is Orwell's most philosophically radical insight. Can you think a concept you have no words for? Philosophers debate this — but even if you can think it vaguely, you can't COMMUNICATE it without words. The Party doesn't need to prevent every rebel thought; it just needs to make rebellion impossible to organize through language. 💬" },
            { q: "Orwell based 'Nineteen Eighty-Four' on his experiences with:", choices: ["Predictions about future technology made by scientists of his era", "Stalinist USSR, Nazi Germany, and wartime propaganda he had directly witnessed and analyzed", "His imagined extrapolation of capitalism's future development", "A nightmare he had during his illness that he elaborated into a novel"], a: 1, fun: "Orwell fought against Franco's fascism in Spain, watched Stalin's show trials, worked for the BBC during WWII creating propaganda, and wrote essays on totalitarian language. He was a political journalist before a novelist. 1984 is political analysis in fictional form, not science fiction speculation. 📰" },
            { q: "The novel's final line — 'He loved Big Brother' — represents:", choices: ["Winston's successful resistance ending in a genuine change of heart", "The Party's complete and terrifying victory — Winston's self has been entirely destroyed, not merely broken", "A hopeful sign that Winston is pretending compliance while secretly resistant", "Orwell's ambiguous ending that could be interpreted as either victory or defeat"], a: 1, fun: "There is no hope in this ending. No resistance. No secret rebellion. The 'ultimate weapon' the Party uses — Room 101, your personal worst fear — doesn't break you into compliance while preserving your self. It destroys the self that could be non-compliant. It is the most devastating ending in 20th-century fiction. 💔" },
          ]
        },
      ]
    },
  ]
};

// ── STATE ─────────────────────────────────────────────────────────────────────
const KEY = 'ela3_course';
let state = JSON.parse(localStorage.getItem(KEY) || '{}');
// state = { 'u1l1': { score: 85, answers: {...} }, ... }

function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

function totalLessons() { return COURSE.units.reduce((s,u)=>s+u.lessons.length,0); }
function doneLessons() { return Object.keys(state).length; }
function avgScore() {
  const vals = Object.values(state).map(v=>v.score).filter(v=>v!=null);
  return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
}
function getLessonById(id) {
  for (const u of COURSE.units) for (const l of u.lessons) if (l.id===id) return { unit: u, lesson: l };
  return null;
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  const nav = document.getElementById('unit-nav');
  nav.innerHTML = '';
  COURSE.units.forEach((unit, ui) => {
    const doneInUnit = unit.lessons.filter(l => state[l.id]).length;
    const allDone = doneInUnit === unit.lessons.length;

    const head = document.createElement('div');
    head.className = 'unit-head';
    head.textContent = `Unit ${ui+1}`;
    nav.appendChild(head);

    const btn = document.createElement('button');
    btn.className = 'unit-btn' + (allDone ? ' completed' : '');
    btn.innerHTML = `<span class="u-emoji">${unit.emoji}</span><span class="u-name">${unit.name}</span><span class="u-check">${allDone ? '✓' : doneInUnit > 0 ? doneInUnit+'/'+unit.lessons.length : ''}</span>`;
    btn.onclick = () => toggleLessonList(unit.id);
    nav.appendChild(btn);

    const list = document.createElement('div');
    list.className = 'lesson-list'; list.id = 'll_'+unit.id;
    unit.lessons.forEach((lesson, li) => {
      const done = state[lesson.id];
      const lb = document.createElement('button');
      lb.className = 'lesson-btn' + (done ? ' done' : '');
      lb.innerHTML = `<span>Day ${li+1}: ${lesson.title.substring(0,28)}${lesson.title.length>28?'…':''}</span>${done ? `<span class="l-score">${done.score}%</span>` : ''}`;
      lb.onclick = () => showLesson(unit.id, lesson.id);
      list.appendChild(lb);
    });
    nav.appendChild(list);
  });

  document.getElementById('stat-done').textContent = doneLessons()+'/'+totalLessons();
  const avg = avgScore();
  document.getElementById('stat-score').textContent = avg !== null ? avg+'%' : '—';
  document.getElementById('prog-pill').textContent = doneLessons()+' / '+totalLessons();
}

function toggleLessonList(uid) {
  const list = document.getElementById('ll_'+uid);
  list.classList.toggle('open');
}

// ── WELCOME ───────────────────────────────────────────────────────────────────
function showWelcome() {
  document.getElementById('topbar-title').textContent = 'English III — American Literature & Composition';
  document.getElementById('topbar-crumb').textContent = '11th Grade · Full Year · 1.0 Credit · NC ELA Standards';

  let cards = COURSE.units.map((u,ui) => {
    const done = u.lessons.filter(l=>state[l.id]).length;
    const pct = Math.round(done/u.lessons.length*100);
    return `<div class="unit-card" onclick="showLesson('${u.id}','${u.lessons[0].id}')">
      <div class="uc-emoji">${u.emoji}</div>
      <div class="uc-name">${u.name}</div>
      <div class="uc-weeks">${u.weeks} · ${u.lessons.length} lesson${u.lessons.length!==1?'s':''}</div>
      <div class="uc-progress"><div class="uc-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="welcome">
      <div class="hero-tag">Calming Minds Day School · 2026–2027</div>
      <h2>English III<br>American Literature<br>& Composition</h2>
      <p class="intro">From the Harlem Renaissance to Orwell's dystopia — a full year reading the voices that shaped American literature, and learning to read critically, write clearly, and think precisely.</p>
      <div class="unit-cards">${cards}</div>
    </div>`;
}

// ── LESSON ────────────────────────────────────────────────────────────────────
let curUid = null, curLid = null, quizAnswers = {}, quizSubmitted = false;

function showLesson(uid, lid) {
  const found = getLessonById(lid);
  if (!found) return;
  const { unit, lesson } = found;
  curUid = uid; curLid = lid;
  quizAnswers = {}; quizSubmitted = false;

  // Open lesson list
  document.querySelectorAll('.lesson-list').forEach(el => el.classList.remove('open'));
  const ll = document.getElementById('ll_'+uid);
  if (ll) ll.classList.add('open');

  document.getElementById('topbar-title').textContent = lesson.title;
  document.getElementById('topbar-crumb').textContent = `${unit.name} · ${lesson.day} · ${unit.weeks}`;

  const saved = state[lid];
  const quizHTML = buildQuizHTML(lesson, saved);

  // Find prev/next
  const allLessons = COURSE.units.flatMap(u => u.lessons.map(l => ({uid:u.id, lid:l.id})));
  const idx = allLessons.findIndex(x => x.lid === lid);
  const prev = idx > 0 ? allLessons[idx-1] : null;
  const next = idx < allLessons.length-1 ? allLessons[idx+1] : null;

  const navHTML = `<div class="lesson-nav">
    ${prev ? `<button class="nav-btn prev" onclick="showLesson('${prev.uid}','${prev.lid}')">← Previous</button>` : ''}
    ${next ? `<button class="nav-btn next-lesson" onclick="showLesson('${next.uid}','${next.lid}')">Next Lesson →</button>` : ''}
  </div>`;

  document.getElementById('content').innerHTML = `
    <div class="lesson-header">
      <div class="unit-tag">${unit.emoji} ${unit.name} · ${unit.weeks}</div>
      <h2>${lesson.title}</h2>
      <div class="day-meta">${lesson.day} · Calming Minds Day School · 11th Grade</div>
    </div>
    <div class="objectives">
      <h4>Today's Objectives</h4>
      <ul>${lesson.objectives.map(o=>`<li>${o}</li>`).join('')}</ul>
    </div>
    <div class="section">
      <div class="section-title">Reading & Notes</div>
      <div class="reading-body">${lesson.content}</div>
    </div>
    <div class="section">
      <div class="section-title">Cultural Context</div>
      <div class="cultural-note"><div class="cn-label">Context</div><p>${lesson.cultural}</p></div>
    </div>
    ${quizHTML}
    ${navHTML}`;

  if (saved) renderPrevAnswers(lesson, saved);
  window.scrollTo(0,0);
}

function buildQuizHTML(lesson, saved) {
  const letters = ['A','B','C','D'];
  let qHTML = lesson.quiz.map((q,qi) => `
    <div class="q-card" id="qc${qi}">
      <div class="q-num">Question ${qi+1} of ${lesson.quiz.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.choices.map((c,ci)=>`<button class="choice" id="ch${qi}_${ci}" onclick="pickAnswer(${qi},${ci})">
        <span class="choice-letter">${letters[ci]}</span><span>${c}</span>
      </button>`).join('')}
      <div class="feedback" id="fb${qi}"></div>
    </div>`).join('');

  const score = saved ? `<div class="score-banner show" id="score-banner"><div class="score-big">${saved.score}%</div><div class="score-msg">${getMsg(saved.score)}</div></div>` :
    `<div class="score-banner" id="score-banner"><div class="score-big" id="score-big">—</div><div class="score-msg" id="score-msg"></div></div>`;

  return `<div class="quiz-section">
    <h4>Lesson Quiz</h4>
    <div class="quiz-sub">${lesson.quiz.length} questions · Submit to save your score</div>
    ${score}
    ${qHTML}
    <button class="check-btn" id="check-btn" onclick="submitQuiz()" ${saved?'disabled':''}>
      ${saved ? 'Already submitted ✓' : 'Check My Answers ✓'}
    </button>
  </div>`;
}

function renderPrevAnswers(lesson, saved) {
  quizSubmitted = true;
  lesson.quiz.forEach((q,qi) => {
    const sel = saved.answers ? saved.answers[qi] : null;
    if (sel !== null && sel !== undefined) {
      document.getElementById(`ch${qi}_${sel}`)?.classList.add(sel === q.a ? 'correct' : 'wrong');
      if (sel !== q.a) document.getElementById(`ch${qi}_${q.a}`)?.classList.add('correct');
      const fb = document.getElementById(`fb${qi}`);
      if (fb) {
        fb.className = `feedback ${sel===q.a?'ok':'bad'} show`;
        fb.innerHTML = sel===q.a ? `🎉 Correct! ${q.fun?`<div class="fun-tag">💡 ${q.fun}</div>`:''}` :
          `The answer is <strong>${['A','B','C','D'][q.a]}. ${q.choices[q.a]}</strong>${q.fun?`<div class="fun-tag">💡 ${q.fun}</div>`:''}`;
      }
    }
  });
}

function pickAnswer(qi, ci) {
  if (quizSubmitted) return;
  document.querySelectorAll(`[id^="ch${qi}_"]`).forEach(b=>b.classList.remove('selected'));
  document.getElementById(`ch${qi}_${ci}`).classList.add('selected');
  quizAnswers[qi] = ci;
}

function submitQuiz() {
  const found = getLessonById(curLid);
  if (!found) return;
  const { lesson } = found;
  quizSubmitted = true;

  let correct = 0;
  const answers = {};
  lesson.quiz.forEach((q,qi) => {
    const sel = quizAnswers[qi];
    answers[qi] = sel !== undefined ? sel : null;
    const fb = document.getElementById(`fb${qi}`);

    if (sel === undefined) {
      if (fb) { fb.className='feedback bad show'; fb.textContent='No answer — correct: '+['A','B','C','D'][q.a]+'. '+q.choices[q.a]; }
    } else if (sel === q.a) {
      correct++;
      document.getElementById(`ch${qi}_${sel}`)?.classList.add('correct');
      if (fb) { fb.className='feedback ok show'; fb.innerHTML='🎉 Correct!' + (q.fun ? `<div class="fun-tag">💡 ${q.fun}</div>` : ''); }
    } else {
      document.getElementById(`ch${qi}_${sel}`)?.classList.add('wrong');
      document.getElementById(`ch${qi}_${q.a}`)?.classList.add('correct');
      if (fb) { fb.className='feedback bad show'; fb.innerHTML=`Answer: <strong>${['A','B','C','D'][q.a]}. ${q.choices[q.a]}</strong>${q.fun?` <div class="fun-tag">💡 ${q.fun}</div>`:''}`; }
    }
  });

  const score = Math.round(correct/lesson.quiz.length*100);
  state[curLid] = { score, answers };
  save();

  const banner = document.getElementById('score-banner');
  if (banner) {
    banner.className = 'score-banner show';
    banner.innerHTML = `<div class="score-big">${score}%</div><div class="score-msg">${getMsg(score)}</div>`;
  }
  const btn = document.getElementById('check-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitted ✓'; }

  buildSidebar();
}

function getMsg(s) {
  if (s===100) return '🏆 Perfect score!';
  if (s>=90) return '⭐ Outstanding work!';
  if (s>=80) return '👍 Great job!';
  if (s>=70) return '📖 Good — review the misses';
  return '💪 Keep reading and retry!';
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildSidebar();
showWelcome();
</script>
