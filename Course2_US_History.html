<script>
(function(){
  var COURSE = 'US History';
  var KEY    = 'cms_tracker_v1';
  var start  = null;

  function pad(n){ return String(n).padStart(2,'0'); }
  function todayStr(){
    var d = new Date();
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  }
  function nowTime(){
    var d = new Date();
    return pad(d.getHours())+':'+pad(d.getMinutes());
  }
  function load(){
    try{ return JSON.parse(localStorage.getItem(KEY))||{sessions:[]}; }
    catch(e){ return {sessions:[]}; }
  }
  function save(d){ localStorage.setItem(KEY, JSON.stringify(d)); }

  function flush(){
    if(!start) return;
    var secs = Math.round((Date.now()-start)/1000);
    start = null;
    if(secs < 5) return; // ignore accidental flickers < 5 seconds
    var d = load();
    // merge into an existing session for today+course if within 30 min gap
    var today = todayStr();
    var cutoff = Date.now() - 30*60*1000;
    var existing = null;
    for(var i=d.sessions.length-1; i>=0; i--){
      var s = d.sessions[i];
      if(s.course===COURSE && s.date===today && s._lastUpdate && s._lastUpdate > cutoff){
        existing = s; break;
      }
    }
    if(existing){
      existing.secs = (existing.secs||0) + secs;
      existing._lastUpdate = Date.now();
    } else {
      d.sessions.push({
        id: Date.now(),
        date: today,
        time: nowTime(),
        course: COURSE,
        secs: secs,
        _lastUpdate: Date.now()
      });
    }
    save(d);
  }

  function begin(){
    if(!start) start = Date.now();
  }

  // Page Visibility API
  document.addEventListener('visibilitychange', function(){
    if(document.hidden){ flush(); } else { begin(); }
  });

  // Tab/window close
  window.addEventListener('beforeunload', flush);
  window.addEventListener('pagehide', flush);

  // Start immediately if visible
  if(!document.hidden) begin();
})();
</script>

{id:'u1l1',day:'Week 1, Day 1',title:'Reconstruction: Promises and Betrayal',
objectives:['Explain the competing visions for Reconstruction','Analyze the 13th, 14th, and 15th Amendments','Understand what was achieved and why it ended'],
content:`<div class="body-text">
<p>The Civil War ended in April 1865. Four million enslaved people were free. The question that consumed the next twelve years — and in many ways the next century — was: what does "free" actually mean, and who gets to decide?</p>
<div class="info-table">
  <div class="info-table-head">The Three Reconstruction Amendments</div>
  <div class="info-row"><div class="info-key">13th (1865)</div><div class="info-val">Abolished slavery — except as punishment for crime. That exception remains in the Constitution today and is at the center of ongoing debates about prison labor.</div></div>
  <div class="info-row"><div class="info-key">14th (1868)</div><div class="info-val">Guaranteed citizenship and equal protection of the laws for all persons born or naturalized in the US. One of the most-litigated amendments today — used to challenge segregation, extend civil rights, and settle presidential elections.</div></div>
  <div class="info-row"><div class="info-key">15th (1869)</div><div class="info-val">Prohibited denying the right to vote based on race, color, or previous condition of servitude. Systematically undermined by literacy tests, poll taxes, and violence for the next century.</div></div>
</div>
<p>There were two competing visions for how the South should return to the Union. <strong>Presidential Reconstruction</strong> (Lincoln's plan, then Johnson's) was relatively lenient — quick re-admission, minimal conditions. <strong>Radical Reconstruction</strong> (Congressional Republicans) insisted on real protections for formerly enslaved people before re-admission. The Radicals briefly won, but their gains were systematically dismantled after the Compromise of 1877 removed federal troops from the South.</p>
<div class="timeline">
  <div class="timeline-item"><div class="timeline-year">1865</div><div class="timeline-event">13th Amendment ratified · Freedmen's Bureau established · Lincoln assassinated; Johnson becomes president</div></div>
  <div class="timeline-item"><div class="timeline-year">1866–67</div><div class="timeline-event">Congress passes Civil Rights Act over Johnson's veto · Radical Reconstruction begins · Military districts established in South</div></div>
  <div class="timeline-item"><div class="timeline-year">1868</div><div class="timeline-event">14th Amendment ratified · Johnson impeached (acquitted by one vote) · Ulysses Grant elected</div></div>
  <div class="timeline-item"><div class="timeline-year">1870</div><div class="timeline-event">15th Amendment ratified · 16 Black men serve in Congress during Reconstruction era</div></div>
  <div class="timeline-item"><div class="timeline-year">1877</div><div class="timeline-event">Compromise of 1877 ends Reconstruction · Federal troops withdrawn · Jim Crow era begins</div></div>
</div>
<p>The Freedmen's Bureau, established in 1865, provided food, clothing, medical care, and legal assistance to formerly enslaved people and poor white Southerners. It established over 1,000 schools and many of America's historically Black colleges trace their origins to this period. But the Bureau was chronically underfunded, politically opposed, and shut down by 1872.</p>
<p>The real promise of Reconstruction — land redistribution — was never fulfilled. Thaddeus Stevens pushed for "40 acres and a mule" to give freedpeople genuine economic independence. It was defeated. Without economic independence, political freedom remained fragile. Within a generation, sharecropping and debt peonage created conditions barely distinguishable from slavery.</p>
</div>`,
cultural:`The phrase "Reconstruction" has two meanings that matter: the political Reconstruction period (1865–1877) and the ongoing reconstruction of the historical memory of that period. For most of the 20th century, mainstream historical accounts portrayed Reconstruction as a failure caused by incompetent or corrupt Black politicians and vindictive Radical Republicans — a narrative directly descended from white Southern propaganda. The actual historical record, reconstructed by scholars like W.E.B. Du Bois ("Black Reconstruction," 1935) and later generations of historians, shows the opposite: Reconstruction was one of the most democratic periods in American history, and it was destroyed not by its failures but by violent white supremacist resistance.`,
quiz:[
  {q:"The 14th Amendment (1868) is still considered one of the most important today because:",choices:["It was the last amendment added to the Constitution","Its equal protection and due process clauses have been used in landmark cases from desegregation to same-sex marriage to presidential elections","It directly abolished slavery throughout the United States","It was the first amendment passed after the founding era"],a:1,fun:"Brown v. Board (1954), Roe v. Wade (1973), Obergefell v. Hodges (2015), Bush v. Gore (2000) — all rely on the 14th Amendment. It was written for formerly enslaved people in 1868 and has since been applied to virtually every major civil rights question in American history. ⚖️"},
  {q:"The Compromise of 1877 effectively ended Reconstruction by:",choices:["Passing a constitutional amendment removing federal protections for Black Americans","Withdrawing federal troops from the South as part of a backroom deal settling the disputed 1876 presidential election","Electing a Southern Democrat as president who immediately reversed Reconstruction policies","Declaring the Civil War amendments unconstitutional in a Supreme Court ruling"],a:1,fun:"The 1876 election between Hayes (R) and Tilden (D) was disputed in three states. The backroom deal: Republicans get the White House; Democrats get federal troops withdrawn from the South. Black Americans had no seat at the table. Their political gains were immediately dismantled once federal protection was gone. 🤝"},
  {q:"'Black Codes' passed after the Civil War were designed to:",choices:["Provide formerly enslaved people with legal protection and economic opportunity","Restrict the freedom of Black Americans and effectively recreate labor conditions similar to slavery through criminal penalties for 'vagrancy' and forced labor contracts","Allow Black Americans to vote but not hold public office","Integrate formerly enslaved people into Southern society gradually over 25 years"],a:1,fun:"Black Codes required Black workers to sign yearly contracts; those without contracts could be arrested for 'vagrancy' and their labor sold. They were essentially slavery with different paperwork. Federal Reconstruction legislation struck them down — temporarily. Once troops left, Jim Crow laws served the same function. ⛓️"},
  {q:"Thaddeus Stevens's push for '40 acres and a mule' was significant because:",choices:["It would have given formerly enslaved people a symbolic gesture of reconciliation","It would have provided genuine economic independence, making political freedom sustainable — its defeat left freedpeople economically vulnerable to planter class control","It was the only Reconstruction measure that actually passed and was implemented","It was intended to humiliate Confederate landowners rather than help freedpeople"],a:1,fun:"Without economic independence, political rights are fragile. You can't vote freely when your landlord controls your livelihood. Stevens understood that land reform was the only way to make freedom real. His vision was defeated — and the consequence was generations of debt peonage, sharecropping, and economic subjugation that lasted well into the 20th century. 🌱"}
]},

{id:'u1l2',day:'Week 2, Day 1',title:'The Rise of Jim Crow',
objectives:['Explain the mechanisms of Jim Crow segregation','Analyze Plessy v. Ferguson and its "separate but equal" doctrine','Understand how Ida B. Wells fought back through journalism'],
content:`<div class="body-text">
<p>After the withdrawal of federal troops in 1877, Southern states systematically dismantled Black political power and built a comprehensive system of racial segregation and terror. Jim Crow — named after a minstrel show character — was not just a set of laws. It was a total social system enforced by law, economic coercion, and the constant threat of violence.</p>
<div class="info-table">
  <div class="info-table-head">Mechanisms of Jim Crow</div>
  <div class="info-row"><div class="info-key">Segregation laws</div><div class="info-val">Separate schools, hospitals, parks, restaurants, transportation, water fountains, restrooms — inferior facilities everywhere</div></div>
  <div class="info-row"><div class="info-key">Voting suppression</div><div class="info-val">Literacy tests (applied selectively), poll taxes, grandfather clauses, white primaries — effectively disenfranchising Black voters despite the 15th Amendment</div></div>
  <div class="info-row"><div class="info-key">Economic coercion</div><div class="info-val">Sharecropping and debt peonage kept Black farmers tied to white-owned land; Black business owners faced discrimination and violence</div></div>
  <div class="info-row"><div class="info-key">Lynching</div><div class="info-val">Over 4,000 documented racial terror lynchings in the South between 1877–1950; used to terrorize communities and enforce social control</div></div>
</div>
<p>In 1896, the Supreme Court's ruling in <strong>Plessy v. Ferguson</strong> gave constitutional blessing to segregation. Homer Plessy — who was 1/8 Black and deliberately sat in a whites-only train car to challenge the law — was arrested. The Court ruled 7-1 that "separate but equal" facilities were constitutional. Justice John Marshall Harlan's lone dissent is one of the greatest in Supreme Court history: "Our Constitution is color-blind and neither knows nor tolerates classes among citizens."</p>
<div class="primary-source">
  <div class="ps-label">Primary Source — Ida B. Wells, "Southern Horrors" (1892)</div>
  <blockquote>"The way to right wrongs is to turn the light of truth upon them."</blockquote>
  <div class="ps-attr">Wells documented hundreds of lynchings and statistically disproved the rape justifications routinely given. She was so effective that a mob destroyed her newspaper office. She continued writing from the North.</div>
</div>
<p>Ida B. Wells was one of the most important journalists and activists of her era. When a mob destroyed her Memphis newspaper office in 1892 after she published articles exposing lynching, she moved to the North and continued her anti-lynching crusade. She co-founded the NAACP (1909) and spent decades campaigning for federal anti-lynching legislation — which Congress did not pass until 2022.</p>
</div>`,
cultural:`Plessy v. Ferguson stood as constitutional law for 58 years. The man whose lone dissent was proven right — Justice John Marshall Harlan — was himself a former slaveholder from Kentucky who had initially opposed the Civil War amendments. He changed his mind. His dissent was quoted extensively when the Supreme Court finally overturned Plessy in Brown v. Board of Education (1954). Sometimes the right position loses for decades before history vindicates it. Harlan never saw that vindication.`,
quiz:[
  {q:"Plessy v. Ferguson (1896) established which doctrine that governed American law until 1954?",choices:["Separate but equal — racial segregation is constitutional as long as facilities are theoretically equal","Strict scrutiny — any racial classification must have a compelling government interest","Colorblindness — the Constitution forbids all racial classifications","Separate and unequal — the Court acknowledged inequality but allowed it temporarily"],a:0,fun:"Homer Plessy was arrested for sitting in a whites-only train car — a deliberate act of civil disobedience planned by civil rights organizations. He lost. Justice Harlan's lone dissent correctly predicted how history would judge the ruling. It took 58 years to overturn. ⚖️"},
  {q:"Ida B. Wells's anti-lynching journalism was significant because:",choices:["She was the first woman to win a Pulitzer Prize for investigative reporting","She statistically documented that the rape justification routinely given for lynching was false — the real motives were economic competition and racial intimidation — destroying the main public justification","She successfully lobbied Congress to pass anti-lynching legislation in the 1890s","She worked within the system by filing lawsuits in Southern courts to challenge lynching"],a:1,fun:"Wells counted. She documented case after case. She showed that in most lynchings, the 'crime' either didn't happen or was a commercial dispute, a personal disagreement, or simply 'acting too big.' The propaganda that lynching protected white women was exposed as a lie. Her newspaper office was burned down. She kept writing. 💪"},
  {q:"Voting suppression under Jim Crow was effective despite the 15th Amendment because:",choices:["The Supreme Court ruled the 15th Amendment only applied to federal elections","Mechanisms like literacy tests, poll taxes, and grandfather clauses were facially race-neutral but applied selectively to disenfranchise Black voters — and were upheld by courts","The 15th Amendment was repealed by Southern states after Reconstruction ended","Black voters chose not to vote due to economic concerns rather than legal barriers"],a:1,fun:"The grandfather clause was especially cynical: you could vote without paying the poll tax or passing the literacy test if your grandfather had been eligible to vote before 1867 — i.e., before formerly enslaved people could vote. Perfectly 'race-neutral.' Perfectly effective at disenfranchisement. 🗳️"},
  {q:"The 'separate but equal' doctrine in practice meant:",choices:["Genuinely equal facilities that happened to be physically separate","Separate and systematically inferior — Black schools, hospitals, and public facilities received a fraction of the funding of white ones","Equal funding but different curriculum reflecting cultural differences","Separate facilities only in certain states that chose to implement the policy"],a:1,fun:"There was never any attempt to make the facilities equal. Black schools in the South received a small fraction of per-pupil funding compared to white schools. The whole point of 'separate but equal' was to provide legal cover for inequality. Brown v. Board finally said the obvious: separate is inherently unequal. 📚"}
]},

{id:'u1l3',day:'Week 3, Day 1',title:'Frederick Douglass and the Black Intellectual Tradition',
objectives:['Understand Frederick Douglass\'s life and arguments','Analyze Booker T. Washington vs. W.E.B. Du Bois debate','Connect the Black intellectual tradition to Reconstruction and its aftermath'],
content:`<div class="body-text">
<p>The period from 1865 to 1920 produced some of the most important thinkers in American history, wrestling with the foundational question of what freedom means for people who had been legally enslaved and were now legally free but still systematically oppressed.</p>
<div class="info-table">
  <div class="info-table-head">Three Giants of the Black Intellectual Tradition</div>
  <div class="info-row"><div class="info-key">Frederick Douglass (1818–1895)</div><div class="info-val">Escaped slavery; orator and writer; demanded immediate full political and civil equality; "If there is no struggle, there is no progress." Advised Lincoln; US Marshal under Hayes.</div></div>
  <div class="info-row"><div class="info-key">Booker T. Washington (1856–1915)</div><div class="info-val">Born enslaved; founded Tuskegee Institute; advocated vocational education and economic self-sufficiency before political rights — controversial "Atlanta Compromise" (1895) accepted segregation temporarily</div></div>
  <div class="info-row"><div class="info-key">W.E.B. Du Bois (1868–1963)</div><div class="info-val">First Black Harvard PhD; founded NAACP; "Talented Tenth" — the educated elite should lead; criticized Washington's accommodation; "double consciousness"; "Black Reconstruction" (1935)</div></div>
</div>
<div class="primary-source">
  <div class="ps-label">Primary Source — Frederick Douglass, "What to the Slave Is the Fourth of July?" (1852)</div>
  <blockquote>"What, to the American slave, is your Fourth of July? I answer: a day that reveals to him, more than all other days in the year, the gross injustice and cruelty to which he is the constant victim."</blockquote>
  <div class="ps-attr">Delivered in Rochester, NY, 1852. Douglass was invited to speak at a Fourth of July celebration. He used the occasion to deliver one of the most powerful antislavery speeches in American history — using the ideals of the holiday against those who celebrated it while tolerating slavery.</div>
</div>
<p>The Washington-Du Bois debate was not simply about strategy — it was about human dignity. Washington argued: given the current power reality, demand too much and get nothing; build economic power first and political power will follow. Du Bois argued: accepting second-class citizenship even temporarily teaches a people to accept permanent inferiority; civil and political rights are not luxuries that come after economic security — they are prerequisites for it.</p>
<p>History has largely vindicated Du Bois. Washington's approach, however practical it seemed, did not produce the political equality he promised would follow economic progress. What produced that was the Civil Rights Movement — mass mobilization demanding the rights that could not be earned gradually.</p>
</div>`,
cultural:`Du Bois's concept of "double consciousness" — from "The Souls of Black Folk" (1903) — describes the experience of "always looking at one's self through the eyes of others, of measuring one's soul by the tape of a world that looks on in amused contempt and pity." It is one of the most cited concepts in African American studies and remains deeply relevant. Du Bois lived to 95 and became increasingly radical. He joined the Communist Party at age 93, renounced his US citizenship, and moved to Ghana, where he died the day before the March on Washington in 1963 — the day before MLK's speech. The timing felt like history.`,
quiz:[
  {q:"Douglass's speech 'What to the Slave Is the Fourth of July?' was rhetorically effective because:",choices:["He avoided confrontation by praising American ideals without criticizing slavery","He used America's own founding ideals — freedom, equality, liberty — to expose the hypocrisy of celebrating those ideals while tolerating slavery","He made a purely emotional appeal without logical argument","He focused only on the economic costs of slavery rather than its moral dimensions"],a:1,fun:"This is internal critique at its most powerful. Douglass didn't argue from outside American values — he argued that America was violating its own values. Much harder to dismiss. He delivered it on July 5th (not the 4th) — the day after the celebration. That choice was also deliberate. 🇺🇸"},
  {q:"The Washington-Du Bois debate centered on whether:",choices:["Black Americans should seek integration or separate nationhood","Black Americans should prioritize economic self-sufficiency before political rights (Washington) OR demand full civil and political equality immediately (Du Bois)","Reconstruction had been a success or failure","Black Americans should emigrate to Africa or remain in the United States"],a:1,fun:"This debate echoes through every civil rights movement: incremental pragmatism vs. demanding full rights immediately. Washington had the ear of white philanthropists and presidents. Du Bois had the moral high ground. The Civil Rights Movement ultimately followed Du Bois's approach — mass action demanding full rights, not gradual accommodation. 🔥"},
  {q:"Du Bois's 'double consciousness' concept describes:",choices:["The tension between African cultural heritage and American cultural assimilation","Always seeing yourself through the eyes of others — specifically, the experience of Black Americans measuring themselves against a society that views them with contempt","A psychological condition requiring treatment","The difference between African American urban and rural experience"],a:1,fun:"'One ever feels his two-ness — an American, a Negro; two souls, two thoughts, two unreconciled strivings.' 1903. This concept is 120+ years old and sociologists still cite it because the experience it describes hasn't fully changed. That's either the greatness of the concept or an indictment of American society. Probably both. 🧠"},
  {q:"History has largely vindicated Du Bois over Washington because:",choices:["Washington's Tuskegee Institute was not educationally successful","Economic progress under Washington's approach did not produce the political equality he predicted would follow — political rights required direct demands, not gradual accommodation","Du Bois was personally more admirable than Washington","Washington explicitly endorsed segregation as permanently desirable"],a:1,fun:"Black Americans made significant economic progress in some areas during Washington's era — and still faced systematic political exclusion and racial terror. The Civil Rights Movement that finally produced the Civil Rights Act was Du Boisian: demand full rights now, not later. Washington's strategy, however strategically sophisticated, ultimately required accepting a dignity that couldn't be accepted. ⚖️"}
]},
]},

{id:'u2',emoji:'🏭',name:'Gilded Age & Progressivism',weeks:'Weeks 5–8',lessons:[
{id:'u2l1',day:'Week 5, Day 1',title:'Industrialization and the Robber Barons',
objectives:['Explain the causes and effects of rapid industrialization','Analyze the rise of monopoly capitalism and its critics','Evaluate the robber baron vs. captain of industry debate'],
content:`<div class="body-text">
<p>Between 1870 and 1900, the United States transformed from a largely agricultural economy into the world's leading industrial power. This transformation created enormous wealth — and enormous inequality, labor exploitation, and environmental destruction.</p>
<div class="info-table">
  <div class="info-table-head">The Industrial Giants</div>
  <div class="info-row"><div class="info-key">Andrew Carnegie (steel)</div><div class="info-val">Built US Steel through vertical integration; "Gospel of Wealth" — rich have duty to give back; also brutally suppressed the Homestead Strike. Gave away 90% of his fortune — about $65 billion today.</div></div>
  <div class="info-row"><div class="info-key">John D. Rockefeller (oil)</div><div class="info-val">Standard Oil controlled 90% of US oil refining; used horizontal integration and predatory pricing to eliminate competitors; broken up under Sherman Antitrust Act (1911)</div></div>
  <div class="info-row"><div class="info-key">J.P. Morgan (banking/finance)</div><div class="info-val">Financed the reorganization of railroads and US Steel; so powerful he personally bailed out the US government during the Panic of 1893; essentially ran a private Federal Reserve</div></div>
  <div class="info-row"><div class="info-key">Cornelius Vanderbilt (railroads)</div><div class="info-val">Consolidated railroad networks; cut rates and services; "What do I care about the law? Hain't I got the power?"</div></div>
</div>
<p>Mark Twain coined the term "Gilded Age" — gilded means gold on the surface, with something less appealing underneath. The era's glittering wealth concealed brutal working conditions: 12-hour days, six-day weeks, child labor, dangerous factories, no safety regulations, no unions (or crushed unions), and no social safety net. Industrial accidents killed and maimed tens of thousands of workers annually.</p>
<div class="context-box">
  <div class="ctx-head">Social Darwinism</div>
  <p>Herbert Spencer (not Charles Darwin) coined "survival of the fittest" and applied evolutionary theory to economics: the rich are wealthy because they are naturally superior; poverty is natural selection; helping the poor "interferes with nature." Carnegie initially believed this. Most Gilded Age industrialists used it to justify their position. It is bad science weaponized as moral philosophy — a pattern that recurs throughout history.</p>
</div>
<p>The Sherman Antitrust Act (1890) was passed to prevent monopolies from eliminating competition, but it was barely enforced until Theodore Roosevelt used it aggressively in the early 1900s, breaking up Standard Oil, US Steel, and 44 other monopolies. Roosevelt earned the nickname "Trust Buster" — the first president to seriously challenge corporate power.</p>
</div>`,
cultural:`The debate over whether Gilded Age industrialists were "robber barons" (exploiters) or "captains of industry" (builders) is still alive. Carnegie's Gospel of Wealth, his 2,500 public libraries, and his insistence that the wealthy have a duty to give back sounds progressive — until you remember the Homestead Strike of 1892, when he hired Pinkerton agents to attack striking workers, killing nine, while he vacationed in Scotland and blamed his manager. The same person can fund libraries and crush workers. Complexity isn't an excuse — it's a description of how power actually operates.`,
quiz:[
  {q:"Mark Twain's term 'Gilded Age' described Gilded Age society as:",choices:["A golden era of American prosperity and equality","Glittering on the surface while concealing serious social problems — inequality, labor exploitation, and corruption — underneath","A period when gold rushes created widespread prosperity in the West","An era of enlightened business leadership that built America's industrial power"],a:1,fun:"Gilded = gold plated, not solid gold. The wealth was real but so was the poverty, the child labor, the 12-hour days, the industrial deaths. The image and the reality were radically different. Twain saw through it. He usually did. ✨"},
  {q:"The Sherman Antitrust Act (1890) was originally passed to address:",choices:["Corruption in the railroad industry specifically","Monopolies that eliminated competition and harmed consumers — though it was barely enforced until Theodore Roosevelt used it aggressively","Immigration competition threatening American workers","The railroads' refusal to transport agricultural products at fair prices"],a:1,fun:"The Act sat on the books for a decade with little enforcement. Teddy Roosevelt changed this dramatically — he sued 44 companies in 7 years. The Standard Oil breakup (1911) split Rockefeller's monopoly into 34 companies. Several of those companies eventually merged into... ExxonMobil. History is circular. 🔄"},
  {q:"Social Darwinism was problematic as an economic philosophy because:",choices:["It correctly applied Darwin's biological theories to economic competition","It misapplied evolutionary biology to justify economic inequality — using 'survival of the fittest' to argue that poverty is natural and helping the poor interferes with nature","It was only held by a small minority of businessmen and had little real influence","It promoted government regulation of business, which was bad for economic growth"],a:1,fun:"Darwin's theory described how species evolve through natural selection over millennia. Spencer applied it to individuals within a single generation in an industrial economy — a completely different context with completely different mechanisms. Bad science + convenient ideology = Social Darwinism. It justified every cruelty as 'nature.' 🧬"},
  {q:"The Homestead Strike of 1892 demonstrated that:",choices:["Unions could successfully negotiate with major industrial corporations through peaceful means","Gilded Age industrialists would use private hired security and state violence to crush organized labor — Carnegie ordered Pinkerton agents who killed striking workers","The federal government supported workers' rights to organize and strike","Industrial workers had sufficient political power to win significant concessions"],a:1,fun:"300 Pinkerton agents arrived by barge. An actual battle: 9 strikers and 7 Pinkertons killed. The governor sent 8,500 state militia. Labor lost. Carnegie, vacationing in Scotland, blamed his manager Henry Clay Frick. He'd actually authorized the strategy. Same person who gave away 2,500 libraries. 🥊"}
]},

{id:'u2l2',day:'Week 6, Day 1',title:'The Progressive Era and Reform',
objectives:['Explain the causes and goals of the Progressive movement','Analyze the role of muckrakers in exposing social problems','Evaluate key Progressive reforms and their limitations'],
content:`<div class="body-text">
<p>By 1900, the excesses of the Gilded Age had created a powerful reform movement: Progressivism. Progressives were a diverse coalition — middle-class reformers, journalists, settlement house workers, and labor activists — united by the belief that industrial capitalism's problems required active government solutions.</p>
<div class="info-table">
  <div class="info-table-head">The Muckrakers</div>
  <div class="info-row"><div class="info-key">Upton Sinclair — The Jungle (1906)</div><div class="info-val">Exposed brutal working conditions in Chicago meatpacking industry. Sinclair wanted sympathy for workers; readers wanted to know what was in their food. Led directly to the Pure Food and Drug Act (1906) — the origin of the FDA.</div></div>
  <div class="info-row"><div class="info-key">Ida Tarbell — Standard Oil (1904)</div><div class="info-val">19-part magazine series documenting Rockefeller's predatory business practices; one of the most important pieces of investigative journalism in American history; contributed to Standard Oil's breakup</div></div>
  <div class="info-row"><div class="info-key">Jacob Riis — How the Other Half Lives (1890)</div><div class="info-val">Photographs and text documenting New York City tenement conditions; shocked middle-class readers; helped drive tenement reform legislation</div></div>
  <div class="info-row"><div class="info-key">Lincoln Steffens — The Shame of the Cities (1904)</div><div class="info-val">Exposed political corruption in American cities; showed that corruption was systemic, not the result of a few bad individuals</div></div>
</div>
<p>Theodore Roosevelt coined the term "muckraker" — from a character in Pilgrim's Progress who only looks down at the muck, never upward. He meant it as criticism, but the journalists embraced the label. Sinclair's most famous line captures the unintended consequence: "I aimed at the public's heart, and by accident I hit it in the stomach." He wanted labor reform; he got food safety regulations instead.</p>
<div class="info-table">
  <div class="info-table-head">Key Progressive Reforms</div>
  <div class="info-row"><div class="info-key">16th Amendment (1913)</div><div class="info-val">Authorized federal income tax — essential for funding expanded government programs</div></div>
  <div class="info-row"><div class="info-key">17th Amendment (1913)</div><div class="info-val">Direct election of senators (previously chosen by state legislatures, which were easily corrupted)</div></div>
  <div class="info-row"><div class="info-key">18th Amendment (1919)</div><div class="info-val">Prohibition — banned manufacture and sale of alcohol; created organized crime; repealed by 21st Amendment (1933)</div></div>
  <div class="info-row"><div class="info-key">19th Amendment (1920)</div><div class="info-val">Women's suffrage — after a 72-year campaign from Seneca Falls (1848) to ratification</div></div>
  <div class="info-row"><div class="info-key">Clayton Antitrust Act (1914)</div><div class="info-val">Strengthened antitrust law; Labor's Magna Carta — limited use of injunctions against strikes</div></div>
</div>
<p>Progressive reform had real limitations. Most Progressives were white and middle-class; many were explicitly racist. The movement largely ignored racial injustice. Woodrow Wilson — who signed major Progressive legislation — re-segregated the federal government after decades of integration. Progressivism reformed capitalism; it did not challenge the fundamental racial hierarchy of American society.</p>
</div>`,
cultural:`The Triangle Shirtwaist Factory fire of March 25, 1911, killed 146 garment workers — mostly young immigrant women — when exits were found locked (the owners locked them to prevent unauthorized breaks). The owners were acquitted of manslaughter. But the fire transformed labor politics: it radicalized a generation of workers, directly led to 36 new labor laws in New York, and is often called the event that built the modern labor movement. 146 deaths produced decades of workplace safety law. Public outrage, properly organized, can change history.`,
quiz:[
  {q:"Upton Sinclair said 'I aimed at the public's heart and by accident hit it in the stomach.' This means:",choices:["The Jungle was primarily about food safety rather than labor conditions","Sinclair intended to create sympathy for exploited immigrant workers, but readers focused on the disgusting food safety revelations instead, which led to food regulation rather than the labor reform Sinclair wanted","The book caused physical illness in readers who were disgusted by its content","Sinclair miscalculated the emotional impact of his writing"],a:1,fun:"Sinclair was a socialist who wanted to expose capitalism's exploitation of workers. He got the FDA. The immigrant workers he wrote about remained in terrible conditions. This is a lesson about how reform works: the public determines what gets acted on, not the reformer. The lesson isn't that The Jungle failed — it's that reform rarely lands where you aimed. 🥩"},
  {q:"The muckrakers were significant because:",choices:["They were the first journalists to report on political events in American history","Their investigative reporting exposed specific, documented abuses that moved middle-class public opinion toward supporting regulation and reform","They worked directly for Theodore Roosevelt's administration to develop Progressive legislation","They primarily advocated for racial equality alongside economic reform"],a:1,fun:"Roosevelt called them muckrakers to criticize them — people who only look at the dirt. The label stuck, became a badge of honor, and describes a tradition of investigative journalism still vital today. Tarbell vs. Rockefeller in 1904 is not entirely unlike investigative reporters vs. major corporations today. 📰"},
  {q:"The 19th Amendment (1920) is notable because:",choices:["It was the first constitutional amendment passed in the 20th century","It concluded a 72-year campaign for women's suffrage that began at the Seneca Falls Convention in 1848 — some founders of the movement never lived to vote","It was the only constitutional amendment ratified without going through the state legislature process","It granted women the right to vote in federal elections only, not state elections"],a:1,fun:"Elizabeth Cady Stanton and Lucretia Mott organized Seneca Falls in 1848. Stanton died in 1902 — 18 years before the 19th Amendment. Their granddaughters cast ballots in 1920. Movements work on generational timescales. The people who start them often don't see them completed. 🗳️"},
  {q:"The main limitation of the Progressive movement was:",choices:["It failed to pass any significant legislation due to congressional opposition","Most Progressives were white middle-class reformers who focused on economic reform while largely ignoring or actively supporting racial segregation — the movement reformed capitalism without challenging racial hierarchy","It was too radical in its demands and alienated moderate voters","It was primarily a Southern phenomenon with little national impact"],a:1,fun:"Woodrow Wilson — a Progressive who signed the Federal Reserve Act and Clayton Antitrust Act — also screened 'Birth of a Nation' at the White House, praised it, and re-segregated the federal civil service. The Progressive movement shows that economic progressivism and racial progressivism do not automatically go together. They require separate struggles. 😔"}
]},
]},

// UNIT 3: WWI, 1920s, GREAT DEPRESSION
// ══════════════════════════════════════════════
{id:'u3',emoji:'🌧️',name:'WWI, 1920s & Depression',weeks:'Weeks 9–13',lessons:[
{id:'u3l1',day:'Week 9, Day 1',title:'World War I and American Entry',
objectives:['Explain the causes of WWI and reasons for US neutrality','Analyze why the US entered WWI in 1917','Evaluate the consequences of the Treaty of Versailles'],
content:`<div class="body-text">
<p>When war erupted in Europe in August 1914, President Woodrow Wilson declared American neutrality. The United States had a long tradition of staying out of European conflicts (Washington's Farewell Address warned against "entangling alliances"), and large portions of the immigrant population had ties to both sides. Wilson won re-election in 1916 with the slogan "He kept us out of war." Then he asked Congress to declare war in April 1917.</p>
<div class="info-table">
  <div class="info-table-head">Why America Entered WWI (1917)</div>
  <div class="info-row"><div class="info-key">Unrestricted submarine warfare</div><div class="info-val">Germany's decision to sink any ship, including neutral US ships, traveling to Allied ports — directly killed American citizens</div></div>
  <div class="info-row"><div class="info-key">Zimmermann Telegram (1917)</div><div class="info-val">British intelligence intercepted a German diplomatic telegram proposing that Mexico attack the US in exchange for help recovering Texas, New Mexico, and Arizona. Published in American newspapers — public outrage was immediate.</div></div>
  <div class="info-row"><div class="info-key">Economic ties to Allies</div><div class="info-val">US banks had lent $2.3 billion to Britain and France; an Allied defeat would mean financial catastrophe — US interests were not neutral</div></div>
  <div class="info-row"><div class="info-key">Ideology</div><div class="info-val">Wilson's framing: make the world "safe for democracy" — a war to end all wars, fought on moral grounds</div></div>
</div>
<div class="primary-source">
  <div class="ps-label">Primary Source — Wilson's Fourteen Points (January 1918)</div>
  <blockquote>"What we demand in this war is nothing peculiar to ourselves. It is that the world be made fit and safe to live in; and particularly that it be made safe for every peace-loving nation..."</blockquote>
  <div class="ps-attr">Wilson outlined 14 principles for a post-war peace: open diplomacy, freedom of the seas, national self-determination, and — most importantly — a League of Nations. He won the Nobel Peace Prize. The Senate rejected the League. He suffered a stroke while campaigning for it and died believing he had failed.</div>
</div>
<p>The Treaty of Versailles (1919) imposed harsh terms on Germany: $33 billion in reparations, loss of territory, military restrictions, and the humiliating "war guilt clause" assigning Germany sole responsibility for the war. Almost every historian now believes the Treaty's harshness directly contributed to the economic collapse and political instability that made Hitler's rise possible. The peace was not a peace — it was a twenty-year armistice.</p>
</div>`,
cultural:`John Maynard Keynes, the British economist who attended the Paris Peace Conference, predicted immediately that the Versailles terms would lead to disaster — he resigned from the delegation and published "The Economic Consequences of the Peace" (1919), arguing the reparations were so punishing that Germany would either collapse or seek revenge. He was right. The book is still taught in economics courses as an example of correct prediction based on rigorous analysis. Being right doesn't always change policy in time.`,
quiz:[
  {q:"The Zimmermann Telegram was significant in bringing the US into WWI because:",choices:["It proved Germany had spies operating inside the US government","It proposed a military alliance between Germany and Mexico against the US — promising to help Mexico reclaim Texas, New Mexico, and Arizona — outranging American public opinion","It revealed Germany's plans to use chemical weapons against American ships","It showed Germany was planning a direct military attack on American cities"],a:1,fun:"Germany sent this diplomatic telegram to Mexico in January 1917. British intelligence intercepted and decoded it, then strategically timed its release to American media. Can you imagine the American reaction to Germany promising Mexico three US states? Public opinion shifted dramatically. 📨"},
  {q:"The Treaty of Versailles's most destructive long-term consequence was:",choices:["It failed to end the fighting between Germany and the Allied powers","Its harsh terms — massive reparations, territory loss, the war guilt clause — created the economic collapse and national humiliation that contributed directly to Hitler's rise","It gave Germany too much land, creating future conflict over borders","It failed to address the Ottoman Empire's collapse, causing Middle East instability"],a:1,fun:"Keynes predicted this in 1919. 'If we aim deliberately at the impoverishment of Central Europe, vengeance, I dare predict, will not limp.' Fourteen years later, Hitler was Chancellor of Germany, elected largely on a platform of reversing Versailles. The failed peace caused the next war. ⚠️"},
  {q:"Wilson's League of Nations was rejected by the US Senate because:",choices:["American public opinion strongly opposed any peace agreement with Germany","Republican senators, led by Henry Cabot Lodge, feared it would entangle the US in future European conflicts and compromise American sovereignty","The League was poorly designed and all major nations rejected it simultaneously","Wilson refused to negotiate any changes to the League's charter"],a:1,fun:"The irony: Wilson created the League of Nations, won the Nobel Peace Prize for it — and the US never joined. Article X of the League Covenant, which committed members to protect each other's territory, was the sticking point. Republicans called it an unconstitutional surrender of Congress's war-declaring power. Wilson refused to compromise. The League existed without its creator. 🌍"},
  {q:"America's 'neutrality' before 1917 was never truly neutral because:",choices:["Wilson secretly sent troops to France before the declaration of war","US banks had lent $2.3 billion to Britain and France — an Allied loss would have been an American financial catastrophe, creating structural economic incentive to support the Allied side","Most Americans were recent immigrants from Germany and Austria who supported the Central Powers","American neutrality was genuine; the Zimmermann Telegram alone changed everything"],a:1,fun:"When you've lent $2.3 billion to one side, you are not a neutral party — you have an enormous financial stake in their victory. The Wilson administration could declare neutrality; it could not neutralize the economic reality. This is still true in 21st-century geopolitics: follow the money to find the real alliances. 💰"}
]},

{id:'u3l2',day:'Week 10, Day 1',title:'The Roaring Twenties and the Harlem Renaissance',
objectives:['Describe the cultural changes of the 1920s','Analyze the Harlem Renaissance as a cultural movement','Explain the contradictions of 1920s prosperity'],
content:`<div class="body-text">
<p>The 1920s roared for some Americans — but not all. The decade saw extraordinary cultural change: jazz, the flapper, radio, movies, mass consumerism, and prohibition-era speakeasies. It also saw the Ku Klux Klan reach its peak membership (4–5 million), the Tulsa Race Massacre (1921), and systematic exclusion of Black Americans from the economic boom.</p>
<div class="context-box">
  <div class="ctx-head">The Roaring Twenties — What Was Roaring?</div>
  <p>The 1920s economic boom was real but uneven. Urban white Americans with jobs enjoyed rising wages, consumer credit, and new technologies (cars, radios, refrigerators). Rural Americans and farmers were struggling throughout the decade — agricultural prices collapsed after WWI. Black Americans were largely excluded from prosperity through housing discrimination, job discrimination, and violence. The "roaring" roared mostly for a specific demographic.</p>
</div>
<div class="info-table">
  <div class="info-table-head">The Harlem Renaissance (1920s–1930s)</div>
  <div class="info-row"><div class="info-key">Why Harlem?</div><div class="info-val">Great Migration brought Black Americans north; Harlem became the cultural capital of Black America; concentration of talent in one neighborhood created a creative explosion</div></div>
  <div class="info-row"><div class="info-key">Key Figures</div><div class="info-val">Langston Hughes (poetry), Zora Neale Hurston (fiction/anthropology), Duke Ellington (jazz), Louis Armstrong (jazz), Aaron Douglas (visual art), Paul Robeson (performance)</div></div>
  <div class="info-row"><div class="info-key">Cultural Impact</div><div class="info-val">Permanently transformed American music, literature, and art; provided foundation for Civil Rights Movement; asserted Black humanity, dignity, and creative brilliance to a mainstream culture that denied all three</div></div>
  <div class="info-row"><div class="info-key">Internal debates</div><div class="info-val">Du Bois wanted "uplifting" art; Hughes wanted authentic street-level Black life; Hurston used Black Southern dialect; tension over what Black art should be — political tool or free expression?</div></div>
</div>
<p>Prohibition (18th Amendment, 1919–1933) was supposed to reduce crime, improve family life, and uplift morality. Instead, it created organized crime on an industrial scale. Al Capone earned an estimated $60 million annually — about $1 billion today — from bootlegging in Chicago. The Prohibition era essentially built the American mob, which simply pivoted to other businesses when Prohibition ended.</p>
</div>`,
cultural:`The Tulsa Race Massacre of May 31–June 1, 1921, destroyed the prosperous Greenwood District — known as "Black Wall Street" — in Tulsa, Oklahoma. White mobs, some deputized by local officials, burned 35 city blocks, killed an estimated 300 people, and left 10,000 Black residents homeless. It was one of the worst incidents of racial violence in American history. It was covered up and rarely taught for most of the 20th century — many survivors didn't tell their own children. Full documentation began only in the 1990s. History that is suppressed doesn't disappear; it waits.`,
quiz:[
  {q:"The 'Roaring Twenties' prosperity was limited because:",choices:["The decade's economic growth was actually very modest compared to other periods","Most Americans lived on farms that were experiencing declining agricultural prices throughout the decade, and Black Americans were largely excluded from urban prosperity through systematic discrimination","The prosperity only lasted the first half of the decade before economic decline began","All economic gains went exclusively to Wall Street investors"],a:1,fun:"1920s prosperity is often taught as universal, but rural America was in depression throughout the decade (farmers never recovered from WWI's price collapse), and Black Americans were systematically excluded. The Roaring Twenties roared for specific people in specific places. Context always matters. 📊"},
  {q:"Prohibition's main unintended consequence was:",choices:["Significantly reducing alcohol consumption and improving public health","Creating the infrastructure of organized crime in America — bootlegging built criminal enterprises that continued operating after Prohibition ended","Making Americans more religious by removing alcohol from society","Causing the stock market crash of 1929 through alcohol-related economic disruption"],a:1,fun:"Al Capone made more money in a year than most American corporations. When Prohibition ended, the criminal organizations didn't disappear — they diversified into gambling, prostitution, labor racketeering, and later drugs. The government accidentally created and funded organized crime. 🥃"},
  {q:"The Harlem Renaissance challenged racism primarily by:",choices:["Organizing political campaigns to vote out racist politicians","Producing extraordinary art, literature, and music that asserted Black humanity, intellectual depth, and creative brilliance — difficult to maintain claims of Black inferiority against the evidence of the Harlem Renaissance","Encouraging Black Americans to move to Europe where they faced less discrimination","Documenting racial violence to build legal cases against lynching"],a:1,fun:"Langston Hughes, Zora Neale Hurston, Duke Ellington, Louis Armstrong in one neighborhood in one decade. The cultural explosion was also political: you can't call a people inferior while listening to their music and reading their poetry. The Harlem Renaissance made that argument impossible — though racists still tried. 🎷"},
  {q:"The internal debate within the Harlem Renaissance about what Black art should be most fundamentally concerned:",choices:["Whether Black artists should use traditional African or American artistic forms","Whether art should serve political uplift by presenting idealized Black figures (Du Bois) or express authentic Black life including its gritty realities (Hughes, Hurston)","Whether Black artists should collaborate with white artists and institutions","Whether the Renaissance should focus on New York or spread to other cities"],a:1,fun:"Du Bois worried that realistic portrayals of Black poverty and struggle gave ammunition to racists. Hughes argued that sanitizing Black life for white approval was itself a kind of self-betrayal. Hurston wrote in Black Southern dialect when most 'respectable' Black writers avoided it. This debate about who art is for never ends. 🎨"}
]},

{id:'u3l3',day:'Week 11, Day 1',title:'The Great Depression',
objectives:['Explain the causes of the 1929 stock market crash','Analyze Hoover\'s response vs. FDR\'s New Deal','Understand the human impact of the Depression through primary sources'],
content:`<div class="body-text">
<p>The Great Depression was not caused by one event. The stock market crash of October 1929 was a symptom of deeper structural problems that had been building for years — and the government's initial response made things dramatically worse.</p>
<div class="info-table">
  <div class="info-table-head">Causes of the Great Depression</div>
  <div class="info-row"><div class="info-key">Overspeculation / buying on margin</div><div class="info-val">Stocks bought with borrowed money (10% down); when prices fell, margin calls created cascade of selling</div></div>
  <div class="info-row"><div class="info-key">Overproduction</div><div class="info-val">Factories and farms producing more than consumers could buy; prices falling before the crash</div></div>
  <div class="info-row"><div class="info-key">Weak banking system</div><div class="info-val">No deposit insurance; bank runs began as people feared collapse; 9,000 banks failed 1930–1933</div></div>
  <div class="info-row"><div class="info-key">Smoot-Hawley Tariff (1930)</div><div class="info-val">Raised tariffs to protect American industry; other countries retaliated; global trade collapsed 65%</div></div>
  <div class="info-row"><div class="info-key">Federal Reserve policy</div><div class="info-val">Raised interest rates during the Depression — the opposite of what was needed; deliberately contractionary policy worsened collapse</div></div>
</div>
<div class="info-table">
  <div class="info-table-head">Hoover vs. FDR: Two Approaches</div>
  <div class="info-row"><div class="info-key">Hoover's philosophy</div><div class="info-val">"Rugged individualism" — believed direct federal relief would destroy self-reliance; relied on voluntary cooperation and trickle-down; "Hoovervilles" (shantytowns) named after him</div></div>
  <div class="info-row"><div class="info-key">FDR's approach</div><div class="info-val">"Bold, persistent experimentation" — tried different things, kept what worked; direct relief, jobs programs, bank regulation, labor rights, Social Security</div></div>
  <div class="info-row"><div class="info-key">New Deal key programs</div><div class="info-val">FDIC (bank deposit insurance) · CCC (Civilian Conservation Corps) · PWA/WPA (public works jobs) · Social Security Act (1935) · NLRA (labor rights)</div></div>
  <div class="info-row"><div class="info-key">Did the New Deal end the Depression?</div><div class="info-val">It reduced unemployment and stabilized the economy but didn't end the Depression — WWII industrial production did that. The New Deal's lasting legacy was the social safety net and government's accepted role in economic management.</div></div>
</div>
<p>By 1933, 25% of Americans were unemployed. Banks were closed. Families lost farms and homes. The Dust Bowl (caused by poor farming practices combined with severe drought) drove hundreds of thousands of families — "Okies" — from the Great Plains to California, creating one of the largest internal migrations in American history.</p>
</div>`,
cultural:`Dorothea Lange's photographs of Dust Bowl migrants — especially "Migrant Mother" (Florence Owens Thompson, 1936) — became the defining images of the Depression. Lange shot "Migrant Mother" in about ten minutes. Thompson was 32 years old, pea-picking in a migrant camp with seven children. The photo appeared on front pages worldwide. Thompson later said she never received a penny from its use and was angry that Lange published it without her consent. Even documentary photography with genuine social impact raises questions about who benefits from whose suffering.`,
quiz:[
  {q:"The Great Depression was caused primarily by:",choices:["The stock market crash of October 1929, which was the sole cause of the economic collapse","Multiple structural factors including overspeculation, buying on margin, overproduction, a weak banking system with no deposit insurance, a disastrously timed tariff increase, and Federal Reserve tightening — the crash triggered a collapse waiting to happen","German reparations from WWI that destabilized the American financial system","Herbert Hoover's tax increases in 1929 that reduced consumer spending"],a:1,fun:"The stock market crash gets all the attention, but it was more trigger than cause. Like a heart attack revealing underlying arterial disease — the blockages were there before the crisis. The Fed's response (raising rates!) turned a serious recession into a decade-long catastrophe. Milton Friedman's analysis of the Fed's role won him a Nobel Prize. 📉"},
  {q:"Hoover's response to the Depression was criticized primarily because:",choices:["He raised taxes dramatically which reduced government revenue during the crisis","His philosophy of 'rugged individualism' led him to resist direct federal relief, believing economic hardship should be solved by voluntary action and personal responsibility — leaving millions without adequate assistance while 'Hoovervilles' multiplied","He spent too much on government programs and created dangerous deficits","He nationalized major banks and industries, which destroyed business confidence"],a:1,fun:"Hoovervilles — shantytowns built from cardboard and scrap — were named after him sarcastically. People called empty pockets 'Hoover flags' (turned inside out). His name became a synonym for policy failure. He was a genuinely talented administrator (organized relief in WWI Europe) who had the wrong economic philosophy at the worst possible moment. 🏚️"},
  {q:"The New Deal's most lasting legacy was:",choices:["Ending the Great Depression through government stimulus spending","Creating the social safety net (Social Security, FDIC, unemployment insurance) and establishing the principle that the federal government has responsibility for economic stability and citizen welfare — reshaping the relationship between government and people","Demonstrating that government intervention always worsens economic downturns","Creating the military-industrial complex that eventually ended the Depression through WWII"],a:1,fun:"Social Security (1935) still exists. FDIC (bank deposit insurance) still exists. Labor rights protections still exist. The New Deal didn't end the Depression — WWII did that. But it permanently changed what Americans expected government to do: not just get out of the way, but actively manage economic pain. That's still the debate today. 🏛️"},
  {q:"The Dust Bowl was caused by:",choices:["Deliberate government land mismanagement that destroyed farming communities","A combination of severe drought and decades of poor farming practices that destroyed the topsoil that native prairie grasses had previously held in place — human decisions amplified a natural disaster","Nuclear testing in the Southwest that contaminated agricultural land","A series of tornadoes that destroyed crops across multiple growing seasons"],a:1,fun:"Farmers plowed up native prairie grasses (which held soil in place for millennia) to plant wheat. When drought hit, there was nothing holding the soil. 'Black blizzards' of dust buried homes to the rooftops. 2.5 million people fled — becoming the Okies of Steinbeck's Grapes of Wrath. Human decisions + natural events = compounded disaster. 🌪️"}
]},
]},

{id:'u4',emoji:'🌍',name:'WWII & Early Cold War',weeks:'Weeks 14–18',lessons:[
{id:'u4l1',day:'Week 14, Day 1',title:'World War II: From Neutrality to Total War',
objectives:['Explain America\'s path from neutrality to full involvement in WWII','Analyze key turning points: Pearl Harbor, D-Day, the atomic bomb decision','Evaluate the moral complexity of wartime decisions'],
content:`<div class="body-text">
<p>World War II began in Europe in September 1939 with Germany's invasion of Poland. As in WWI, the US declared neutrality — and as in WWI, American neutrality was never economically or ideologically complete. The Lend-Lease Act (1941) allowed the US to supply Britain and eventually the Soviet Union with war materials, officially maintaining neutrality while clearly supporting the Allied side.</p>
<div class="primary-source">
  <div class="ps-label">Primary Source — FDR, "Day of Infamy" Speech (December 8, 1941)</div>
  <blockquote>"Yesterday, December 7th, 1941 — a date which will live in infamy — the United States of America was suddenly and deliberately attacked by naval and air forces of the Empire of Japan."</blockquote>
  <div class="ps-attr">FDR's speech to Congress the day after Pearl Harbor. Congress declared war on Japan within the hour. Within four days, Germany and Italy declared war on the US — bringing America fully into the European theater.</div>
</div>
<div class="info-table">
  <div class="info-table-head">Key WWII Turning Points</div>
  <div class="info-row"><div class="info-key">Pearl Harbor (Dec. 7, 1941)</div><div class="info-val">Japanese surprise attack on US Pacific Fleet; brought US into the war; also triggered the forced relocation of 120,000 Japanese Americans into internment camps (Executive Order 9066)</div></div>
  <div class="info-row"><div class="info-key">Battle of Midway (June 1942)</div><div class="info-val">US destroyed four Japanese aircraft carriers; turned the tide in the Pacific; Japan never recovered this naval superiority</div></div>
  <div class="info-row"><div class="info-key">D-Day (June 6, 1944)</div><div class="info-val">Allied invasion of Normandy; 156,000 troops; 4,000–9,000 Allied dead on the first day; opened Western Front; began liberation of Western Europe</div></div>
  <div class="info-row"><div class="info-key">Atomic bombs (Aug. 1945)</div><div class="info-val">Hiroshima (Aug. 6): ~140,000 dead; Nagasaki (Aug. 9): ~70,000 dead; Japan surrendered Aug. 15. Still debated: was this necessary? Could Japan have surrendered without invasion?</div></div>
</div>
<div class="context-box">
  <div class="ctx-head">The Atomic Bomb Decision</div>
  <p>Truman's stated justification: estimates of 250,000–1,000,000 American casualties in Operation Downfall (planned invasion of Japan). Critics argue: Japan was already near collapse; the Soviet entry into the Pacific war may have been sufficient to force surrender; the decision was partly about deterring the Soviet Union in the emerging Cold War. No consensus exists among historians. The decision remains one of the most debated in American history — a genuine moral question with no clean answer.</p>
</div>
</div>`,
cultural:`Executive Order 9066 authorized the forced relocation of 120,000 Japanese Americans into internment camps — 2/3 of whom were US citizens. The Supreme Court upheld the order in Korematsu v. United States (1944) in a 6-3 decision. Fred Korematsu, who had refused to report for internment, spent his life seeking justice. In 1988, Congress apologized and paid $20,000 reparations to each surviving internee. In 2018, the Supreme Court formally repudiated the Korematsu ruling in the context of the Muslim travel ban case — though by then Korematsu had been dead for 13 years. Justice is often posthumous.`,
quiz:[
  {q:"The Japanese attack on Pearl Harbor was strategically aimed at:",choices:["Occupying Hawaii as Japanese territory","Destroying the US Pacific Fleet to give Japan freedom of action in Southeast Asia and the Pacific — though the crucial aircraft carriers happened to be at sea and survived","Drawing the US into a land war in Asia where Japan had overwhelming advantages","Preventing American economic aid to China, which Japan was invading"],a:1,fun:"Japan's strategic goal was Southeast Asian resources (oil, rubber, tin) to fuel their war machine. The US Pacific Fleet was the only force that could stop them. The attack succeeded tactically (battleships sunk) but failed strategically: the carriers weren't there, and the attack unified American public opinion for war overnight. 🚢"},
  {q:"D-Day (June 6, 1944) was the largest amphibious invasion in history. Its historical significance was:",choices:["It was the decisive battle that ended WWII","It opened the Western Front in Europe, forcing Germany to fight simultaneously against Allied forces from the West and Soviet forces from the East — the two-front war that crushed Germany","It was the first significant Allied victory in Europe","It directly liberated Germany from Nazi control"],a:1,fun:"Eisenhower prepared a speech taking responsibility in case the invasion failed — it stayed in his pocket. After the war he revealed it. The D-Day decision required accepting tens of thousands of certain casualties as the cost of eventual victory. The weight of that decision is almost impossible to comprehend. 🏖️"},
  {q:"The forced internment of Japanese Americans during WWII demonstrates:",choices:["That the US government acted rationally in response to legitimate security concerns","That even constitutional democracies can commit serious civil liberties violations against ethnic minorities during wartime, especially when driven by racial prejudice and public fear","That wartime emergency powers are always justified when national security is threatened","That Japanese Americans were treated fairly compared to how the US treated German Americans"],a:1,fun:"No German Americans or Italian Americans were interned at comparable scale despite the US also being at war with Germany and Italy. The internment was about race, not security. No Japanese American was ever convicted of espionage or sabotage. The military unit of Japanese American soldiers (442nd Regiment) became the most decorated in US Army history. 😔"},
  {q:"The debate over the atomic bombing of Japan centers on:",choices:["Whether the bombs were technically functional","Whether they were necessary to end the war — specifically, whether a land invasion would have caused more casualties, whether Japan was already near surrender, and whether geopolitical considerations about the Soviet Union also played a role","Whether President Roosevelt or Truman made the decision","Whether the bombings violated the laws of war, which is legally settled"],a:1,fun:"Estimates for Operation Downfall (planned invasion) ranged from 250,000 to 1,000,000 American casualties. But historical evidence suggests Japan's military council was already fractured, the Emperor was seeking peace through the Soviet Union, and Soviet entry into the Pacific war may have been sufficient to force surrender. There is no consensus. This is what genuine historical complexity looks like. ☢️"}
]},

{id:'u4l2',day:'Week 16, Day 1',title:'The Cold War Begins',
objectives:['Explain the origins of the Cold War','Analyze containment policy and its early applications','Understand McCarthyism and its domestic consequences'],
content:`<div class="body-text">
<p>The alliance between the US and Soviet Union against Nazi Germany barely survived the end of WWII. By 1947, the two superpowers were in a global ideological competition that would define international politics for the next 45 years. Neither side wanted direct military conflict — both had nuclear weapons — but they fought through proxy wars, economic competition, propaganda, and covert operations on every continent.</p>
<div class="info-table">
  <div class="info-table-head">Cold War Architecture</div>
  <div class="info-row"><div class="info-key">Containment (1947)</div><div class="info-val">Diplomat George Kennan's strategy: don't try to roll back Soviet power, but prevent its expansion. Became the guiding principle of US foreign policy for 40 years — applied in Korea, Vietnam, and dozens of other conflicts.</div></div>
  <div class="info-row"><div class="info-key">Truman Doctrine (1947)</div><div class="info-val">US will support "free peoples" resisting subjugation anywhere in the world. Asked Congress for $400M to help Greece and Turkey. Kennan later said the doctrine was too broadly stated and would commit the US to fighting communism everywhere globally. He was right.</div></div>
  <div class="info-row"><div class="info-key">Marshall Plan (1948)</div><div class="info-val">$13 billion in economic aid to rebuild Western Europe. Brilliant strategy: a devastated, hungry Europe is fertile ground for communism; a prosperous Europe is a stable ally. Worked exactly as intended.</div></div>
  <div class="info-row"><div class="info-key">NATO (1949)</div><div class="info-val">North Atlantic Treaty Organization: first peacetime military alliance in US history; committed US to treating an attack on any NATO member as an attack on the US</div></div>
  <div class="info-row"><div class="info-key">Korean War (1950–53)</div><div class="info-val">First test of containment: North Korea (Soviet-backed) invaded South Korea; Truman sent troops without declaring war; ended in stalemate at 38th parallel; still technically ongoing (armistice, not peace treaty)</div></div>
</div>
<p>McCarthyism — Senator Joseph McCarthy's campaign of accusations against supposed communists in the government, military, and entertainment industry — destroyed careers based on rumor, pressure to name names, and guilt by association. At its peak (1950–54), being accused was nearly equivalent to being convicted. Edward R. Murrow's television broadcasts exposing McCarthy and the Army-McCarthy hearings (1954), where McCarthy's recklessness became nationally visible, finally broke his power. He died in 1957, largely disgraced.</p>
<div class="primary-source">
  <div class="ps-label">Primary Source — Joseph Welch to McCarthy, Army-McCarthy Hearings (1954)</div>
  <blockquote>"Until this moment, Senator, I think I never really gauged your cruelty or your recklessness... Have you no sense of decency?"</blockquote>
  <div class="ps-attr">Army counsel Joseph Welch's rebuke of McCarthy live on national television. The audience in the hearing room applauded. McCarthy's approval rating, already falling, collapsed. Television exposed what the print media had struggled to convey.</div>
</div>
</div>`,
cultural:`The Berlin Airlift (1948–49) was Cold War strategy at its most elegant. When the Soviet Union blockaded West Berlin, cutting off road and rail access, the US and Britain flew in supplies — at peak, a plane landed every 45 seconds for 11 months. The Soviets eventually lifted the blockade having accomplished nothing. The Airlift was won without a shot fired. It was also brilliant propaganda: the Western democracies were literally feeding a city their former enemy had tried to starve, while the Soviets blockaded civilians. Strategy, logistics, and symbolism in perfect alignment.`,
quiz:[
  {q:"George Kennan's containment strategy argued that the US should:",choices:["Roll back Soviet control of Eastern Europe through military force","Not attempt to retake territory already under Soviet control, but prevent further Soviet expansion — accepting existing Soviet power while containing its spread","Negotiate a formal partition of the world into American and Soviet spheres of influence","Use nuclear weapons as a first strike to eliminate the Soviet threat before it could expand"],a:1,fun:"Kennan was a career diplomat who understood Soviet thinking deeply. He never intended containment to mean military intervention everywhere — he meant political, economic, and diplomatic measures. When Truman applied it in Korea and others applied it in Vietnam, Kennan publicly objected. He lived to 101 and spent his later decades criticizing how his own idea had been distorted. 🌍"},
  {q:"The Marshall Plan (1948) was strategically successful because:",choices:["It demonstrated American generosity and improved the US's global image without any strategic benefit","It correctly identified that economic recovery in Western Europe was the most effective defense against communist political movements, which gain strength in conditions of poverty and desperation","It rebuilt European military capacity needed for NATO","It prevented the Soviet Union from establishing influence in Western Europe through direct military spending"],a:1,fun:"The Marshall Plan is the rare example of a foreign policy decision that worked exactly as designed. Prosperous Western European democracies became stable NATO allies. George Marshall (who proposed it) became the only general to win the Nobel Peace Prize — for post-war economic diplomacy rather than military victory. 🤝"},
  {q:"McCarthyism is most accurately characterized as:",choices:["A legitimate investigation that correctly identified significant Soviet espionage in the US government","A campaign of accusations, intimidation, and political pressure that destroyed careers based largely on rumor, association, and the refusal to name names — with little concern for evidence or due process","A successful program that made the US significantly safer from Soviet espionage","A minor phenomenon that was quickly stopped by Congress and had limited real impact"],a:1,fun:"McCarthy never proved a single case of communist infiltration. The Hollywood Ten and hundreds of others were blacklisted — unable to work in their industries — based on accusation alone. The question 'Are you now or have you ever been a member of the Communist Party?' destroyed people whether they answered yes, no, or refused to answer. 📺"},
  {q:"The Korean War (1950–53) ended with:",choices:["A decisive US/UN victory that reunified Korea under a democratic government","A return essentially to the pre-war border at the 38th parallel — a stalemate after 36,000 American deaths, often called 'The Forgotten War' between WWII and Vietnam","A North Korean victory that pushed US forces out of the Korean peninsula","A negotiated partition that gave the US permanent military control of South Korea"],a:1,fun:"The Korean War is still technically ongoing — the armistice (1953) is a ceasefire, not a peace treaty. North and South Korea are technically still at war. 36,000 Americans died to return to approximately the same line where the war started. It's called the Forgotten War partly because neither side clearly won, and Americans had difficulty with that. 🪖"}
]},
]},
