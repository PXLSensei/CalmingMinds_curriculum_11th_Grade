{id:'u5',emoji:'✊',name:'Civil Rights Movement',weeks:'Weeks 1–5, Semester 2',lessons:[
{id:'u5l1',day:'S2, Week 1, Day 1',title:'The Civil Rights Movement: Strategy and Sacrifice',
objectives:['Trace the major events of the Civil Rights Movement from 1954–1968','Analyze the strategies of nonviolent direct action','Compare MLK and Malcolm X approaches'],
content:`<div class="body-text">
<p>The Civil Rights Movement did not begin in 1954 or 1955 — it was a long struggle with roots in Reconstruction, the NAACP (founded 1909), and decades of legal and political organizing. But the post-WWII period created new conditions: Black veterans returning from fighting for democracy abroad refused to accept second-class citizenship at home; the Cold War made American racism an international embarrassment; and television brought the reality of Southern segregation into northern living rooms.</p>
<div class="timeline">
  <div class="timeline-item"><div class="timeline-year">1954</div><div class="timeline-event">Brown v. Board of Education — Supreme Court unanimously overturns Plessy v. Ferguson; separate educational facilities are "inherently unequal"</div></div>
  <div class="timeline-item"><div class="timeline-year">1955–56</div><div class="timeline-event">Montgomery Bus Boycott — Rosa Parks arrested; 381-day boycott; MLK emerges as national leader; Supreme Court rules bus segregation unconstitutional</div></div>
  <div class="timeline-item"><div class="timeline-year">1960</div><div class="timeline-event">Greensboro sit-ins — four Black college students sit at a whites-only Woolworth's counter; spark sit-in movement across the South; SNCC founded</div></div>
  <div class="timeline-item"><div class="timeline-year">1961</div><div class="timeline-event">Freedom Riders — interracial groups rode interstate buses into the South; attacked by mobs; federal government forced to act</div></div>
  <div class="timeline-item"><div class="timeline-year">1963</div><div class="timeline-event">Birmingham campaign — children's marches; police use fire hoses and dogs; national outrage; March on Washington (250,000); "I Have a Dream"</div></div>
  <div class="timeline-item"><div class="timeline-year">1964</div><div class="timeline-event">Civil Rights Act — prohibited discrimination in employment and public accommodations; LBJ signs; Freedom Summer in Mississippi</div></div>
  <div class="timeline-item"><div class="timeline-year">1965</div><div class="timeline-event">Selma to Montgomery marches; "Bloody Sunday"; Voting Rights Act eliminates literacy tests and other discriminatory barriers</div></div>
  <div class="timeline-item"><div class="timeline-year">1968</div><div class="timeline-event">Martin Luther King Jr. assassinated in Memphis (April 4); uprisings in 100+ cities; Fair Housing Act passed</div></div>
</div>
<div class="info-table">
  <div class="info-table-head">MLK vs. Malcolm X: Comparing Approaches</div>
  <div class="info-row"><div class="info-key">MLK — nonviolent direct action</div><div class="info-val">Integration; accept suffering without retaliation to expose moral bankruptcy of oppression; appeal to American conscience and founding ideals; targeted at both Black mobilization and winning white moderates</div></div>
  <div class="info-row"><div class="info-key">Malcolm X — self-determination</div><div class="info-val">Black nationalism; the right to self-defense; skepticism about integration into a fundamentally racist society; later (post-Mecca pilgrimage) moved toward multiracial coalition; assassinated 1965</div></div>
  <div class="info-row"><div class="info-key">The actual relationship</div><div class="info-val">Both men evolved throughout their lives. They met once, briefly. Each's strategy was shaped by different audiences and different analyses. Both were assassinated. Their contrast is often exaggerated — each needed the other rhetorically, and many civil rights supporters admired elements of both.</div></div>
</div>
</div>`,
cultural:`Rosa Parks was not "just a tired seamstress" who spontaneously refused to give up her seat. She was a trained activist who had attended the Highlander Folk School, had been the NAACP's Secretary in Montgomery, and had been thinking about challenging bus segregation for months. The NAACP had specifically been looking for the right test case. This doesn't make her action less heroic — it makes it more deliberate and more admirable. The "spontaneous" narrative strips agency from a woman who acted with full intention and knowledge of the consequences. History often erases the organizing that makes "spontaneous" moments possible.`,
quiz:[
  {q:"Brown v. Board of Education (1954) overturned which previous Supreme Court ruling?",choices:["Dred Scott v. Sandford","McCulloch v. Maryland","Plessy v. Ferguson (1896) — the 'separate but equal' doctrine","Marbury v. Madison"],a:2,fun:"Chief Justice Earl Warren personally lobbied the holdout justices to make the ruling unanimous — he understood that a divided court would be used to undermine desegregation. He succeeded. The ruling was unanimous. Warren wrote the opinion himself. Schools were desegregated... slowly and incompletely. 'With all deliberate speed' turned out to mean 'as slowly as possible.' ⚖️"},
  {q:"Television's role in the Civil Rights Movement was significant because:",choices:["It was used primarily to broadcast civil rights leaders' speeches nationwide","Images of police violence against peaceful protesters — fire hoses, police dogs, children on the ground — brought the brutal reality of Southern segregation into northern living rooms and shifted national public opinion","It was controlled by civil rights organizations who used it for their messaging","It had little impact since most Americans in the South did not own televisions"],a:1,fun:"LBJ watched the Birmingham footage and said the movement had found its catalyst. The Birmingham Public Safety Commissioner, Bull Connor, was the best friend the Civil Rights Movement had — every time he turned the fire hoses on children, he created thousands of new supporters for civil rights. Oppressors who perform their oppression on camera lose. 📺"},
  {q:"The Voting Rights Act of 1965 was prompted most directly by:",choices:["The assassination of President Kennedy","Bloody Sunday — March 7, 1965 — when state troopers attacked peaceful marchers on the Edmund Pettus Bridge in Selma, Alabama, on national television","The failure of the Civil Rights Act of 1964 to address voting discrimination","A Supreme Court ruling ordering Congress to protect Black voting rights"],a:1,fun:"LBJ watched 'Bloody Sunday' on television and within days called for the Voting Rights Act. 'There is no Negro problem. There is no Southern problem. There is no Northern problem. There is only an American problem.' The speech before Congress went on: '...and we shall overcome.' LBJ, a Southern Democrat, quoting the civil rights anthem. The moment was extraordinary. 🗳️"},
  {q:"The relationship between MLK and Malcolm X is most accurately described as:",choices:["Bitter personal enemies who actively worked to undermine each other's organizations","Two leaders with different strategic visions who were often contrasted as foils — but each's approach was shaped by different audiences and analyses, they met only once, and each evolved significantly before being assassinated","Partners who collaborated closely on most major civil rights campaigns","Entirely unconnected figures who operated in completely separate spheres"],a:1,fun:"They met once — briefly, in a Senate hallway in 1964. MLK needed Malcolm X rhetorically: white moderates would support integration as the alternative to Black nationalism. Malcolm X needed MLK: the alternative to respectful petition was radical self-determination. They were both right about different things. Both were killed. 🤝"}
]},
]},

{id:'u6',emoji:'📰',name:'Vietnam Era & Watergate',weeks:'Weeks 6–9, Semester 2',lessons:[
{id:'u6l1',day:'S2, Week 6, Day 1',title:'Vietnam: Escalation and Protest',
objectives:['Explain US involvement in Vietnam from Eisenhower through Nixon','Analyze the Gulf of Tonkin Resolution and its consequences','Understand the anti-war movement and its impact'],
content:`<div class="body-text">
<p>American involvement in Vietnam grew gradually over two decades from military advisors under Eisenhower, to 16,000 advisors under Kennedy, to full-scale war under Johnson following the Gulf of Tonkin Resolution (1964), to eventual withdrawal under Nixon. 58,000 Americans died. An estimated 2–3 million Vietnamese died. The war divided American society in ways still not fully healed.</p>
<div class="context-box">
  <div class="ctx-head">The Gulf of Tonkin Resolution (1964)</div>
  <p>Congress gave the president authority to use military force in Vietnam after LBJ reported that North Vietnamese forces had attacked US destroyers in the Gulf of Tonkin. The first attack (August 2) was real; the second attack (August 4) likely never happened — NSA and naval officers told LBJ as much in real time. He escalated anyway. The Resolution gave presidents nearly unlimited war-making authority in Vietnam. 500,000 American troops were deployed based partly on an incident that probably didn't happen.</p>
</div>
<div class="info-table">
  <div class="info-table-head">Why the US Failed in Vietnam</div>
  <div class="info-row"><div class="info-key">Misunderstanding the conflict</div><div class="info-val">US treated it as Cold War containment; Vietnamese experienced it as a war of national independence and anti-colonialism, as they had been fighting foreign occupiers (France, then US) for decades</div></div>
  <div class="info-row"><div class="info-key">Flawed strategy</div><div class="info-val">Body counts as measure of success; "search and destroy"; no clear political objective; winning battles but not the war — "We had to destroy the village to save it"</div></div>
  <div class="info-row"><div class="info-key">Tet Offensive (1968)</div><div class="info-val">North Vietnamese/Viet Cong launched simultaneous attacks on 100+ South Vietnamese cities during Tet holiday. Military setback for North Vietnam; psychological victory: proved US public had been lied to about the war's progress</div></div>
  <div class="info-row"><div class="info-key">Loss of public support</div><div class="info-val">My Lai massacre (1968, revealed 1969); Pentagon Papers (1971) — government deception exposed; Walter Cronkite's editorial calling the war a stalemate; draft-driven anti-war movement</div></div>
</div>
<div class="primary-source">
  <div class="ps-label">Primary Source — Walter Cronkite, CBS News Editorial (February 27, 1968)</div>
  <blockquote>"For it seems now more certain than ever that the bloody experience of Vietnam is to end in a stalemate."</blockquote>
  <div class="ps-attr">Cronkite was called "the most trusted man in America." LBJ reportedly said after the broadcast: "If I've lost Cronkite, I've lost Middle America." LBJ announced he would not seek re-election 31 days later. One journalist's opinion shaped presidential politics.</div>
</div>
</div>`,
cultural:`The Pentagon Papers (1971) were 7,000 pages of top-secret Defense Department history showing that the Johnson administration had systematically lied to the public and Congress about the war's progress. Daniel Ellsberg photocopied them using his children to help and leaked them to the New York Times. Nixon tried to block publication — the Supreme Court ruled 6-3 that the government could not engage in prior restraint of a free press. Ellsberg faced 115 years in prison. The charges were dropped because Nixon's operatives broke into Ellsberg's psychiatrist's office looking for compromising material — evidence of the same lawlessness that would bring Nixon down in Watergate.`,
quiz:[
  {q:"The Gulf of Tonkin Resolution gave the president authority to:",choices:["Declare war on North Vietnam formally","Use military force in Vietnam without a formal congressional declaration of war — essentially giving the president a blank check for escalation based on disputed incidents","Draft up to 500,000 soldiers annually for service in Vietnam","Negotiate a peace treaty with North Vietnam directly"],a:1,fun:"The second Gulf of Tonkin 'attack' that justified the resolution likely never happened. NSA documents declassified in 2005 confirmed this. 500,000 troops, 58,000 American deaths, millions of Vietnamese deaths — and the escalating justification was partly fabricated. This is why Congress passed the War Powers Resolution (1973) requiring presidential notification and limiting deployments. 📋"},
  {q:"The Tet Offensive (1968) was paradoxically both a military defeat for North Vietnam AND a political victory because:",choices:["North Vietnam won the military battles but chose to withdraw for political reasons","It proved to the American public that the government had been lying about the war's progress — the simultaneous attacks on 100+ cities demonstrated the 'enemy is about to be defeated' narrative was false","The Viet Cong gained permanent territorial control of South Vietnam's major cities","It caused Nixon to win the presidential election with his 'secret plan' to end the war"],a:1,fun:"Military commanders had been saying victory was imminent. The Tet Offensive showed the Viet Cong could attack simultaneously in 100+ cities, including the US Embassy compound in Saigon. The public saw through the 'credibility gap' between official optimism and reality. LBJ's presidency never recovered. 💣"},
  {q:"The My Lai Massacre (1968) damaged American support for Vietnam because:",choices:["It was a major military defeat where 500 US soldiers were killed","US soldiers killed over 500 unarmed South Vietnamese civilians — women, children, elderly — and the Army covered it up for a year before journalist Seymour Hersh exposed it, shattering the moral justification for the war","It proved that North Vietnamese forces were capable of defeating American units in conventional battle","The high death toll demonstrated the war was unwinnable through conventional military strategy"],a:1,fun:"Lt. William Calley was convicted of murder and sentenced to life — served 3 years under house arrest. Nixon personally ordered his release. The officer who tried to stop the massacre (Hugh Thompson) was treated as a traitor by many Americans for years. He received the Soldier's Medal 30 years later. The moral accounting took decades. 😔"},
  {q:"The Pentagon Papers revealed that:",choices:["The US military had plans to use nuclear weapons against North Vietnam","The Johnson administration had systematically deceived Congress and the public about the war's progress and the government's own internal assessments of its prospects","The CIA had conducted unauthorized operations in Vietnam without presidential approval","The Vietnam War had been profitable for US defense contractors beyond any reasonable national security justification"],a:1,fun:"The Papers showed that as early as 1967 the Defense Department privately believed the war was unwinnable — while publicly projecting confidence. Daniel Ellsberg, who helped write them, leaked them because he believed the American public deserved to know. The Supreme Court's ruling protecting publication is one of the most important press freedom decisions in American history. 📑"}
]},
]},

// ══════════════════════════════════════════════
// UNIT 7: REAGAN & END OF COLD WAR
// ══════════════════════════════════════════════
{id:'u7',emoji:'🌐',name:'Reagan & End of Cold War',weeks:'Weeks 10–14, Semester 2',lessons:[
{id:'u7l1',day:'S2, Week 10, Day 1',title:'The Reagan Revolution',
objectives:['Analyze Reaganomics and supply-side economics','Understand the social and political changes of the 1980s','Evaluate Reagan\'s foreign policy and its consequences'],
content:`<div class="body-text">
<p>Ronald Reagan's election in 1980 represented a decisive shift in American politics. After Vietnam, Watergate, the Iran hostage crisis, and stagflation, Reagan offered a simple, confident narrative: government is the problem, not the solution; America can be great again; optimism and strength will defeat communism. His rhetoric was extraordinarily effective. His record was more complicated.</p>
<div class="info-table">
  <div class="info-table-head">Reaganomics ("Supply-Side" / "Trickle-Down")</div>
  <div class="info-row"><div class="info-key">Core argument</div><div class="info-val">Cut taxes (especially for wealthy and corporations) → stimulate investment → create jobs → prosperity flows down to everyone</div></div>
  <div class="info-row"><div class="info-key">What happened</div><div class="info-val">Top marginal tax rate cut from 70% to 28%; inflation tamed (actually by Fed Chair Volcker); economic growth returned; federal deficit tripled; wealth inequality increased dramatically</div></div>
  <div class="info-row"><div class="info-key">Still debated</div><div class="info-val">Did tax cuts cause the recovery, or did monetary policy (Volcker's Fed)? Did deregulation help or harm? Did "trickle-down" actually trickle? Economists disagree along predictable lines.</div></div>
</div>
<div class="info-table">
  <div class="info-table-head">Reagan's Complex Legacy</div>
  <div class="info-row"><div class="info-key">AIDS Crisis</div><div class="info-val">First mentioned AIDS publicly in 1987 — 6 years into the epidemic, after 20,000 Americans had died. Activists from ACT UP staged dramatic protests at the FDA and NIH that forced action. Activism literally saved lives.</div></div>
  <div class="info-row"><div class="info-key">War on Drugs</div><div class="info-val">Mandatory minimum sentences; crack/powder cocaine disparity (100:1); disproportionate impact on Black communities; prison population tripled during the 1980s</div></div>
  <div class="info-row"><div class="info-key">Iran-Contra (1986)</div><div class="info-val">Administration secretly sold weapons to Iran (an enemy state under arms embargo) and used profits to fund Contra rebels in Nicaragua, explicitly bypassing a Congressional ban. Constitutional crisis. Reagan said he didn't know.</div></div>
  <div class="info-row"><div class="info-key">Cold War endgame</div><div class="info-val">Arms race pressure on Soviet economy; Reagan Doctrine (support anti-communist rebels worldwide); 'Tear down this wall' (1987); Gorbachev's reforms (glasnost/perestroika) accelerated Soviet collapse</div></div>
</div>
</div>`,
cultural:`Reagan's communication skills were extraordinary — he was called "the Great Communicator" for good reason. His 1984 "Morning in America" advertisement remains the most effective political commercial in history. But effective communication and accurate communication are not the same thing. Reagan frequently told anecdotes that were factually false (the "welfare queen" story was largely fabricated). He confused movies he had been in with real events he claimed to remember. His rhetorical skill made critical evaluation of his record more difficult — the feeling he produced was more politically powerful than the facts.`,
quiz:[
  {q:"'Supply-side economics' or 'Reaganomics' argued that:",choices:["Government spending should increase during recessions to stimulate demand","Cutting taxes on wealthy individuals and corporations would stimulate investment, create jobs, and eventually benefit everyone through economic growth — critics called it 'trickle-down'","The government should directly manage key economic sectors to ensure stable growth","Trade protectionism would restore American manufacturing jobs lost to overseas competition"],a:1,fun:"David Stockman, Reagan's own budget director, called supply-side economics 'a Trojan horse' for cutting taxes for the rich. The deficit tripled during Reagan's presidency despite promised growth. Proponents say it ended stagflation and restored growth; critics say Volcker's Fed deserves credit. The debate continues — in every budget fight, every tax debate. 💸"},
  {q:"Reagan's delayed response to the AIDS crisis demonstrates:",choices:["That the medical community failed to alert the government to the severity of the epidemic","That political priorities and cultural attitudes (AIDS primarily affected gay men and IV drug users initially) can determine which public health crises receive urgent government attention","That the Reagan administration lacked the bureaucratic capacity to respond to public health emergencies","That AIDS was so new that any administration would have struggled to respond"],a:1,fun:"When Rock Hudson — Reagan's personal friend — died of AIDS in 1985, Reagan reportedly cried. He still didn't mention AIDS publicly for two more years. 20,000 people died while the White House was silent. ACT UP's tactics — showing up at FDA headquarters, dying in the streets — forced policy change. Protest works when polite lobbying fails. 🎗️"},
  {q:"The Iran-Contra affair was a constitutional crisis because:",choices:["Reagan had violated the War Powers Resolution by deploying troops to Nicaragua without congressional approval","The administration had secretly conducted foreign policy (arms sales to Iran, funding Nicaraguan rebels) specifically designed to circumvent a Congressional ban — the legislature's power of the purse and oversight authority were bypassed","Reagan had illegally negotiated with Iran during the 1980 presidential campaign to delay release of American hostages","The CIA had operated in Central America without any executive authorization"],a:1,fun:"Oliver North shredded documents; CIA Director William Casey conveniently died before testifying; Reagan's 'I don't recall' was used 88 times in depositions. 'Plausible deniability' entered the political vocabulary — the idea that a president can authorize illegal actions while being insulated from accountability. This pattern recurs. 🤫"},
  {q:"The fall of the Berlin Wall (November 9, 1989) was most directly caused by:",choices:["Reagan's 'Tear Down This Wall' speech which inspired East Germans to revolt","Gorbachev's reforms of glasnost (openness) and perestroika (restructuring) which loosened Soviet control and allowed pent-up popular pressure to produce rapid change — the Wall fell when an East German official mistakenly announced border crossings were open immediately","Direct US military and economic pressure that made maintaining the Wall financially impossible","A planned democratic transition that Soviet and East German leaders had negotiated with the US"],a:1,fun:"The East German official at the press conference didn't know when the crossings would open. He guessed 'immediately, without delay.' Crowds gathered. Guards had no orders. They just... let people through. The most consequential moment of the late 20th century happened partly by mistake, by miscommunication, by a confused bureaucrat. History sometimes works this way. 🧱"}
]},
]},

{id:'u8',emoji:'🏙️',name:'Modern America 1991–Present',weeks:'Weeks 15–18, Semester 2',lessons:[
{id:'u8l1',day:'S2, Week 15, Day 1',title:'America After the Cold War',
objectives:['Understand the post-Cold War world order and its challenges','Analyze 9/11 and the War on Terror','Evaluate the 2008 financial crisis and its political consequences'],
content:`<div class="body-text">
<p>The end of the Cold War left the US as the world's sole superpower — the "unipolar moment." Political scientist Francis Fukuyama famously declared "the end of history" — liberal democracy had won and would spread globally. The 2001 attacks, the Iraq War, the financial crisis of 2008, and the rise of authoritarian nationalism globally suggested that history had not, in fact, ended.</p>
<div class="info-table">
  <div class="info-table-head">September 11, 2001 and Its Consequences</div>
  <div class="info-row"><div class="info-key">The attacks</div><div class="info-val">19 hijackers (15 Saudi, 2 Emirati, 1 Egyptian, 1 Lebanese); al-Qaeda; ~3,000 killed; most destructive terrorist attack on US soil in history</div></div>
  <div class="info-row"><div class="info-key">Afghanistan (2001–2021)</div><div class="info-val">US invaded to destroy al-Qaeda and remove the Taliban government. Longest war in American history. Taliban retook Afghanistan within days of US withdrawal in 2021. 2,400 Americans killed; $2.3 trillion spent.</div></div>
  <div class="info-row"><div class="info-key">Iraq (2003–2011)</div><div class="info-val">Invaded on basis of claimed WMDs (not found) and alleged al-Qaeda ties (not proven). 4,500 Americans killed; 100,000+ Iraqi civilians killed; destabilized region; created conditions for ISIS emergence.</div></div>
  <div class="info-row"><div class="info-key">PATRIOT Act / surveillance</div><div class="info-val">Expanded government surveillance authority; Edward Snowden revelations (2013) showed NSA was collecting metadata on virtually all American phone calls; ongoing tension between security and civil liberties</div></div>
</div>
<div class="info-table">
  <div class="info-table-head">The 2008 Financial Crisis</div>
  <div class="info-row"><div class="info-key">Cause</div><div class="info-val">Housing bubble built on predatory mortgages bundled into complex financial products (mortgage-backed securities, CDOs) rated as safe by complicit rating agencies; when housing prices fell, the system collapsed</div></div>
  <div class="info-row"><div class="info-key">Scale</div><div class="info-val">Largest economic contraction since the Great Depression; $13 trillion in household wealth wiped out; 8.7 million jobs lost; millions of foreclosures</div></div>
  <div class="info-row"><div class="info-key">Response and anger</div><div class="info-val">Banks bailed out; homeowners often not. Anger at this asymmetry fueled both the Tea Party (right) and Occupy Wall Street (left) movements — and arguably contributed to Trump's 2016 victory</div></div>
</div>
<p>Barack Obama's election in 2008 was historically extraordinary — the first African American president, 143 years after slavery's abolition, 43 years after the Voting Rights Act. People who had marched across the Edmund Pettus Bridge in 1965 voted for Obama in 2008. His two terms produced the Affordable Care Act, economic recovery from 2008, the killing of bin Laden, and the legalization of same-sex marriage — alongside persistent police violence, racial tension, and the rise of the Tea Party and eventually Trumpism as responses.</p>
</div>`,
cultural:`The January 6, 2021 attack on the US Capitol — when a mob attempted to prevent certification of the 2020 presidential election — was the first violent disruption of the peaceful transfer of power in American history since the Civil War. Whether it represents a temporary aberration or a harbinger of deeper democratic dysfunction is a question historians will debate for generations. Teaching "modern history" — events still being litigated politically, legally, and emotionally — requires particular care to distinguish documented fact from contested interpretation.`,
quiz:[
  {q:"The US invasion of Iraq in 2003 was primarily justified by the Bush administration on the grounds that:",choices:["Iraq had been proven to be involved in the September 11, 2001 attacks","Iraq possessed weapons of mass destruction (WMDs) — chemical and biological weapons programs — that posed an imminent threat; no WMDs were found","UN weapons inspectors had confirmed Iraqi WMD programs","The invasion was part of the broader War on Terror with no specific Iraqi justification"],a:1,fun:"Chief weapons inspector David Kay concluded there were no active WMD programs. Secretary of State Colin Powell's UN presentation — the public case for war — relied on intelligence that was later discredited. 4,500 Americans and 100,000+ Iraqis died. Whether this was intelligence failure or deliberate deception is still debated. The consequences are still unfolding. 🔍"},
  {q:"The 2008 financial crisis was primarily caused by:",choices:["Government spending that created unsustainable debt","The collapse of a housing bubble built on risky mortgages bundled into complex financial products that were falsely rated as safe — when housing prices fell, the interconnected financial system collapsed globally","China's economic growth that drew American investment away from domestic markets","Federal Reserve interest rate decisions that made mortgages too expensive for most Americans"],a:1,fun:"The rating agencies (Moody's, S&P) rated toxic mortgage bundles as AAA (safest possible). Banks paid the agencies for ratings. The agencies wanted repeat business. Everybody in the system had incentives to keep the music playing. When housing prices fell 30%, the mathematical models failed everywhere simultaneously. It was a systemic failure enabled by regulatory capture and conflict of interest. 🏠"},
  {q:"Barack Obama's election in 2008 was historically significant because:",choices:["He won by the largest electoral margin in American history","He became the first African American president — 143 years after slavery's abolition and 43 years after the Voting Rights Act — a milestone that people who had marched for civil rights lived to see","He was the first Democrat to win the South since Jimmy Carter in 1976","He was the first president to win the Nobel Peace Prize before completing a full term"],a:1,fun:"John Lewis, who had been beaten on the Edmund Pettus Bridge in 1965 on Bloody Sunday, voted for Barack Obama in 2008. The linear distance between those events is 43 years. Within a human lifetime. That compression of history — from being beaten for trying to vote to electing a Black president — is extraordinary, and its incompleteness is equally important to acknowledge. 🗳️"},
  {q:"Political polarization in America since the 1990s has increased primarily because of:",choices:["A constitutional crisis that permanently damaged public trust in government","Multiple reinforcing factors: media fragmentation into ideologically sorted information bubbles, geographic sorting of Americans into politically homogeneous communities, partisan gerrymandering, and social media algorithms that reward outrage","The end of the Cold War which removed the external threat that had unified Americans","Campaign finance changes that gave wealthy donors too much influence over both parties"],a:1,fun:"In 1960, most Americans lived next door to people who voted differently. Today Americans increasingly self-segregate into politically homogeneous communities, consume only agreeable news, and never encounter the other side's best arguments. When you don't know anyone who thinks differently, the other side seems incomprehensible — or evil. This is new, and it's dangerous for democracy. 🗺️"}
]},
]},
]};

// ── STATE ───────────────────────────────────────
const KEY = 'ush2_course';
let state = JSON.parse(localStorage.getItem(KEY) || '{}');
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
function totalLessons() { return COURSE.units.reduce((s,u)=>s+u.lessons.length,0); }
function doneLessons() { return Object.keys(state).length; }
function avgScore() {
  const vals = Object.values(state).map(v=>v.score).filter(v=>v!=null);
  return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
}
function getLessonById(id) {
  for (const u of COURSE.units) for (const l of u.lessons) if (l.id===id) return {unit:u,lesson:l};
  return null;
}

// ── SIDEBAR ─────────────────────────────────────
function buildSidebar() {
  const nav = document.getElementById('unit-nav');
  nav.innerHTML = '';
  COURSE.units.forEach((unit, ui) => {
    const done = unit.lessons.filter(l=>state[l.id]).length;
    const allDone = done === unit.lessons.length;

    const sh = document.createElement('div');
    sh.className = 'unit-section-head';
    sh.textContent = 'Unit '+(ui+1);
    nav.appendChild(sh);

    const btn = document.createElement('button');
    btn.className = 'unit-btn' + (allDone ? ' done' : '');
    btn.innerHTML = `<span class="u-emoji">${unit.emoji}</span><span class="u-name">${unit.name}</span><span class="u-badge">${done>0?(allDone?'✓':done+'/'+unit.lessons.length):''}</span>`;
    btn.onclick = () => { document.getElementById('ll_'+unit.id)?.classList.toggle('open'); };
    nav.appendChild(btn);

    const ll = document.createElement('div');
    ll.className = 'lesson-list'; ll.id = 'll_'+unit.id;
    unit.lessons.forEach((les, li) => {
      const d = state[les.id];
      const lb = document.createElement('button');
      lb.className = 'lesson-btn' + (d ? ' done' : '');
      lb.innerHTML = `<span>${les.title.substring(0,32)}${les.title.length>32?'…':''}</span>${d?`<span class="l-score">${d.score}%</span>`:''}`;
      lb.onclick = () => showLesson(unit.id, les.id);
      ll.appendChild(lb);
    });
    nav.appendChild(ll);
  });

  document.getElementById('stat-done').textContent = doneLessons()+'/'+totalLessons();
  const avg = avgScore();
  document.getElementById('stat-avg').textContent = avg !== null ? avg+'%' : '—';
  document.getElementById('prog-badge').textContent = doneLessons()+' / '+totalLessons();
}

// ── WELCOME ─────────────────────────────────────
function showWelcome() {
  document.getElementById('topbar-title').textContent = 'United States History II';
  document.getElementById('topbar-crumb').textContent = '11th Grade · Full Year · 1.0 Credit · NC American History Standards';

  const cards = COURSE.units.map((u,ui) => {
    const done = u.lessons.filter(l=>state[l.id]).length;
    const pct = Math.round(done/u.lessons.length*100);
    return `<div class="unit-card" onclick="showLesson('${u.id}','${u.lessons[0].id}')">
      <div class="uc-emoji">${u.emoji}</div>
      <div class="uc-title">Unit ${ui+1}: ${u.name}</div>
      <div class="uc-weeks">${u.weeks}</div>
      <div class="uc-bar"><div class="uc-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="welcome-hero">
      <div class="hero-tag">Calming Minds Day School · 2026–27</div>
      <h2>United States<br>History II</h2>
      <div class="hero-sub">From Reconstruction to the present — tracing the arc of American democracy, its promises kept and broken, through primary sources, key events, and the people who shaped them.</div>
    </div>
    <div class="unit-grid">${cards}</div>`;
}

// ── LESSON ──────────────────────────────────────
let curUid=null, curLid=null, qa={}, submitted=false;

function showLesson(uid, lid) {
  const found = getLessonById(lid);
  if (!found) return;
  const {unit, lesson} = found;
  curUid=uid; curLid=lid; qa={}; submitted=false;

  // Open lesson list
  document.querySelectorAll('.lesson-list').forEach(el=>el.classList.remove('open'));
  document.getElementById('ll_'+uid)?.classList.add('open');

  document.getElementById('topbar-title').textContent = lesson.title;
  document.getElementById('topbar-crumb').textContent = `${unit.name} · ${lesson.day}`;

  const saved = state[lid];
  const L = ['A','B','C','D'];

  const qHtml = lesson.quiz.map((q,qi)=>`
    <div class="q-card">
      <div class="q-num">Question ${qi+1} of ${lesson.quiz.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.choices.map((c,ci)=>`<button class="choice" id="ch${qi}_${ci}" onclick="pick(${qi},${ci})">
        <span class="c-letter">${L[ci]}</span><span>${c}</span>
      </button>`).join('')}
      <div class="feedback" id="fb${qi}"></div>
    </div>`).join('');

  const banner = saved
    ? `<div class="score-banner show"><div class="score-big">${saved.score}%</div><div class="score-msg">${getMsg(saved.score)}</div></div>`
    : `<div class="score-banner" id="score-banner"><div class="score-big"></div></div>`;

  const allLessons = COURSE.units.flatMap(u=>u.lessons.map(l=>({uid:u.id,lid:l.id})));
  const idx = allLessons.findIndex(x=>x.lid===lid);
  const prev = idx>0?allLessons[idx-1]:null;
  const next = idx<allLessons.length-1?allLessons[idx+1]:null;

  document.getElementById('content').innerHTML = `
    <div class="lesson-header">
      <div class="unit-tag">${unit.emoji} ${unit.name}</div>
      <h2>${lesson.title}</h2>
      <div class="day-meta">${lesson.day} · Calming Minds Day School</div>
    </div>
    <div class="objectives-box">
      <div class="obj-head">Learning Objectives</div>
      <ul>${lesson.objectives.map(o=>`<li>${o}</li>`).join('')}</ul>
    </div>
    <div class="section">
      <div class="sec-head">Lesson Content</div>
      ${lesson.content}
    </div>
    <div class="section">
      <div class="sec-head">Historical Context</div>
      <div class="context-box"><div class="ctx-head">Context Note</div><p>${lesson.cultural}</p></div>
    </div>
    <div class="quiz-wrap">
      <h4>LESSON QUIZ</h4>
      <div class="quiz-sub">${lesson.quiz.length} questions · Submit to record your score</div>
      ${banner}
      ${qHtml}
      <button class="submit-btn" id="sub-btn" onclick="submitQ()" ${saved?'disabled':''}>
        ${saved?'Already Submitted ✓':'SUBMIT ANSWERS'}
      </button>
    </div>
    <div class="lesson-nav">
      ${prev?`<button class="nav-btn nav-prev" onclick="showLesson('${prev.uid}','${prev.lid}')">← Previous</button>`:''}
      ${next?`<button class="nav-btn nav-next" onclick="showLesson('${next.uid}','${next.lid}')">Next Lesson →</button>`:''}
    </div>`;

  if (saved) showPrev(lesson, saved);
  window.scrollTo(0,0);
}

function showPrev(lesson, saved) {
  submitted = true;
  const L=['A','B','C','D'];
  lesson.quiz.forEach((q,qi)=>{
    const sel = saved.answers ? saved.answers[qi] : null;
    if (sel !== null && sel !== undefined) {
      document.getElementById(`ch${qi}_${sel}`)?.classList.add(sel===q.a?'correct':'wrong');
      if (sel!==q.a) document.getElementById(`ch${qi}_${q.a}`)?.classList.add('correct');
      const fb = document.getElementById(`fb${qi}`);
      if (fb) {
        fb.className=`feedback ${sel===q.a?'ok':'bad'} show`;
        fb.innerHTML = sel===q.a
          ? `✅ Correct!${q.fun?` <div class="fun-note">💡 ${q.fun}</div>`:''}`
          : `The answer is <strong>${L[q.a]}. ${q.choices[q.a]}</strong>${q.fun?` <div class="fun-note">💡 ${q.fun}</div>`:''}`;
      }
    }
  });
}

function pick(qi,ci) {
  if (submitted) return;
  document.querySelectorAll(`[id^="ch${qi}_"]`).forEach(b=>b.classList.remove('selected'));
  document.getElementById(`ch${qi}_${ci}`)?.classList.add('selected');
  qa[qi]=ci;
}

function submitQ() {
  const found = getLessonById(curLid);
  if (!found) return;
  const {lesson} = found;
  submitted = true;
  const L=['A','B','C','D'];
  let correct=0; const answers={};

  lesson.quiz.forEach((q,qi)=>{
    const sel=qa[qi];
    answers[qi] = sel !== undefined ? sel : null;
    const fb = document.getElementById(`fb${qi}`);
    if (sel===undefined) {
      if(fb){fb.className='feedback bad show';fb.textContent='No answer. Correct: '+L[q.a]+'. '+q.choices[q.a];}
    } else if (sel===q.a) {
      correct++;
      document.getElementById(`ch${qi}_${sel}`)?.classList.add('correct');
      if(fb){fb.className='feedback ok show';fb.innerHTML='✅ Correct!'+(q.fun?` <div class="fun-note">💡 ${q.fun}</div>`:'');}
    } else {
      document.getElementById(`ch${qi}_${sel}`)?.classList.add('wrong');
      document.getElementById(`ch${qi}_${q.a}`)?.classList.add('correct');
      if(fb){fb.className='feedback bad show';fb.innerHTML=`The answer is <strong>${L[q.a]}. ${q.choices[q.a]}</strong>`+(q.fun?` <div class="fun-note">💡 ${q.fun}</div>`:'');}
    }
  });

  const score = Math.round(correct/lesson.quiz.length*100);
  state[curLid] = {score, answers};
  save();

  const banner = document.getElementById('score-banner');
  if (banner) { banner.className='score-banner show'; banner.innerHTML=`<div class="score-big">${score}%</div><div class="score-msg">${getMsg(score)}</div>`; }
  const btn = document.getElementById('sub-btn');
  if(btn){btn.disabled=true;btn.textContent='Submitted ✓';}
  buildSidebar();
}

function getMsg(s) {
  if(s===100)return'🏆 Perfect score!';
  if(s>=90)return'⭐ Excellent work!';
  if(s>=80)return'👍 Great job!';
  if(s>=70)return'📖 Good — review the misses';
  return'💪 Keep going — read and retry!';
}

// ── INIT ───────────────────────────────────────
buildSidebar();
showWelcome();
</script>
</body>
</html>
