{id:'u5',emoji:'🛡️',name:'AI Ethics & Society',weeks:'weeks_06–10 · sem2',lessons:[
{id:'u5l1',day:'s2_week_06 · day_01',title:'AI Governance — Who Decides How AI Is Used?',
objectives:['Understand the EU AI Act and US executive orders on AI','Analyze different approaches to AI regulation','Evaluate the tension between innovation and safety in AI policy'],
content:`<div class="body-text">
<p>For most of AI's history, the technology developed faster than any regulatory or governance framework could keep up. That began to change in 2023–24, when governments around the world started seriously grappling with how to govern AI. The approaches differ significantly — and the choices made now will shape how AI develops for decades.</p>
<div class="def-table">
  <div class="dt-head">Major Governance Frameworks (2023–24)</div>
  <div class="dt-row"><div class="dt-key">EU AI Act (2024)</div><div class="dt-val">World's first comprehensive AI law. Risk-based: prohibited uses (social scoring, mass surveillance), high-risk (hiring, credit, medical), limited risk (chatbots must disclose they're AI), minimal risk (everything else). Heavy fines for violation. Sets a global standard.</div></div>
  <div class="dt-row"><div class="dt-key">US Executive Order (2023)</div><div class="dt-val">Required safety testing before deploying the most powerful AI models; established AI safety institute; required watermarking of AI content; directed agencies to address bias and privacy. Less comprehensive than EU; non-binding for companies.</div></div>
  <div class="dt-row"><div class="dt-key">China's approach</div><div class="dt-val">Requires registration and review of generative AI services; mandates adherence to "core socialist values"; requires AI content to be "true and accurate." Prioritizes control and stability over innovation openness.</div></div>
  <div class="dt-row"><div class="dt-key">UK approach</div><div class="dt-val">Principles-based, not legislation-based. Directed existing regulators (healthcare regulator, financial regulator, etc.) to apply AI rules in their domains. More flexible, less comprehensive.</div></div>
</div>
<div class="concept-box">
  <div class="cb-title">The Core Regulatory Tension</div>
  <p style="font-size:13.5px;color:#c4b5fd;line-height:1.8;">
    <strong>Pro-regulation argument:</strong> AI poses real risks (bias, job displacement, safety, surveillance, weapons) that markets won't self-correct. The companies building AI have financial incentives to move fast. External accountability is needed.<br><br>
    <strong>Pro-innovation argument:</strong> Premature regulation of a fast-moving field creates compliance burdens that favor large incumbents over startups; it might cause the US to fall behind China; it might prevent beneficial AI from reaching people who need it.<br><br>
    Both arguments have real merit. Governance is fundamentally a question about which risks we prioritize and who should decide — technical experts, politicians, the public, or the market.
  </p>
</div>
<div class="ethics-box">
  <div class="et-head">Who Is Missing from AI Governance?</div>
  <p>Most AI governance conversations involve AI company executives, government officials from wealthy countries, and academic researchers. Significantly underrepresented: workers in countries whose data trains AI systems, communities most affected by AI deployment in criminal justice and social services, people in the Global South who will experience AI's effects but have little input into its governance. The people with the most power to shape AI governance are least likely to experience its harms.</p>
</div>
</div>`,
cultural:`The EU AI Act's "Brussels Effect" refers to the tendency for EU regulations to become de facto global standards — because companies that want to sell to EU customers must comply, and it's often easier to comply globally than to maintain separate versions. GDPR (privacy) became a global template this way. AI companies that initially dismissed the EU AI Act are now building compliance into their products globally. Europe's regulatory approach influences global AI development even though Europe produces relatively few frontier AI systems.`,
quiz:[
  {q:"The EU AI Act's risk-based approach to AI regulation means:",choices:["All AI systems face the same regulatory requirements","Different levels of AI risk face different requirements — prohibited uses are banned entirely, high-risk applications face strict compliance requirements, and minimal-risk applications face few requirements","Regulation is determined by the financial risk posed to companies","Only the riskiest 10% of AI applications are regulated"],a:1,fun:"This tiered approach is pragmatic — you don't regulate spam filters the same way you regulate AI in medical devices or criminal justice. The EU identifies 'prohibited' uses (social scoring, real-time public surveillance, subliminal manipulation) and 'high-risk' uses (hiring, credit, education, healthcare, border control) with strict requirements. The approach is being copied by other jurisdictions. 🇪🇺"},
  {q:"The 'Brussels Effect' in AI regulation means:",choices:["Europe has become the leading center for AI research and development","Companies that comply with EU AI regulations for European customers often find it more efficient to apply those standards globally, making EU rules de facto global standards","The EU has made AI development illegal for most applications","Only companies headquartered in Brussels face EU AI Act requirements"],a:1,fun:"We saw this with GDPR (2018) — privacy policies changed globally because companies selling to EU customers had to comply. The EU AI Act may do the same for AI transparency, bias testing, and safety requirements. China and the US set technology standards through market size and innovation; the EU sets them through regulatory gravity. 🌍"},
  {q:"The most significant group underrepresented in current AI governance discussions is:",choices:["AI company executives who need more input into regulatory design","Workers and communities in the Global South whose data trains AI systems and who experience AI deployment in high-stakes contexts — but who have little voice in how AI is governed","Academic AI researchers who are not consulted enough","Investors who fund AI companies"],a:1,fun:"The people with the most power in AI governance (tech executives, US/EU policymakers, well-funded researchers) are least likely to experience AI harms in criminal justice, social services, or labor displacement. The people with least power are most affected. This asymmetry in who shapes AI governance produces predictable outcomes: protections where power lies, gaps where it doesn't. ⚖️"},
  {q:"From a policy perspective, the primary argument for moving cautiously on AI regulation is:",choices:["AI poses no real harms that require regulatory attention","AI companies will self-regulate more effectively than governments can","Premature or poorly designed regulation might create compliance burdens that favor large incumbents, slow beneficial AI development, or cause the US to fall behind China","AI is too complex for governments to regulate effectively"],a:1,fun:"This is a genuine argument made by serious people (not just AI companies with financial interests). Regulatory capture, compliance overhead, and innovation slowdown are real phenomena. The counter: pharmaceutical companies make similar arguments against drug safety regulations. The appropriate regulatory rigor depends on the stakes — and AI stakes in criminal justice, healthcare, and hiring are very high. 🏛️"}
]},

{id:'u5l2',day:'s2_week_08 · day_01',title:'AI and the Future of Work',
objectives:['Analyze which jobs are most at risk from AI automation','Understand the history of technology and labor displacement','Evaluate different perspectives on AI\'s economic impact'],
content:`<div class="body-text">
<p>Every major technological revolution has disrupted labor markets — and every time, people predicted permanent mass unemployment that didn't materialize. Does AI follow this pattern, or is it different in ways that matter? The honest answer is: we don't know, but the question is serious enough to take seriously.</p>
<div class="concept-box">
  <div class="cb-title">What AI Does vs. What Jobs Require</div>
  <p style="font-size:13.5px;color:#c4b5fd;line-height:1.8;">
    AI is good at: pattern recognition, generating content that matches training patterns, repetitive text tasks, image/audio analysis, coding assistance, translation, summarization.<br><br>
    AI struggles with: genuine novel reasoning, physical tasks requiring fine motor control, interpersonal care, cultural nuance, tasks requiring accountability and judgment, work requiring real-world context AI hasn't encountered.<br><br>
    The most at-risk jobs are not "low-skill" — they're "high volume, routine cognitive." Paralegals, data analysts, junior coders, transcriptionists, customer service agents, translators. The safest jobs involve physical work AI can't do (plumbers, electricians) or high-stakes human judgment AI shouldn't do (judges, therapists, surgeons).
  </p>
</div>
<div class="def-table">
  <div class="dt-head">Historical Patterns of Technological Disruption</div>
  <div class="dt-row"><div class="dt-key">Agricultural mechanization</div><div class="dt-val">Farm labor fell from 90% to 2% of US workforce over 150 years. Created enormous upheaval. Eventually: more food, new jobs in industry. Transition took generations and was painful for those living through it.</div></div>
  <div class="dt-row"><div class="dt-key">Industrial automation</div><div class="dt-val">Robots displaced manufacturing workers (1970s–90s). Manufacturing employment fell; service employment rose. The displaced workers didn't automatically find good service jobs — concentrated in specific geographic communities (Rust Belt).</div></div>
  <div class="dt-row"><div class="dt-key">ATMs and bank tellers</div><div class="dt-val">ATMs were predicted to eliminate bank teller jobs. Teller employment initially grew — cheaper branches → more branches → more tellers. But the nature of the job changed: less cash handling, more sales and customer service. "Augmentation" rather than replacement.</div></div>
</div>
<div class="ethics-box">
  <div class="et-head">Who Bears the Transition Costs?</div>
  <p>Historical labor disruptions show that even when total employment eventually recovers, the costs fall unevenly: workers in disrupted industries and communities bear the brunt; gains accrue to capital owners and workers with complementary skills. This is not a law of physics — it's a policy choice. Universal Basic Income, retraining programs, profit-sharing, strengthened safety nets: mechanisms exist to distribute both costs and gains more broadly. Whether societies use them is a political question.</p>
</div>
</div>`,
cultural:`A 2023 Goldman Sachs report estimated that generative AI could automate 25% of current work tasks in the US and Europe, affecting 300 million jobs globally. This sounds alarming. The same report noted this would likely take decades and involve job transformation more than job elimination — and estimated a GDP boost of 7% from productivity gains. The McKinsey Global Institute estimates 12 million US workers may need to switch occupations by 2030. These projections are uncertain, but the scale and speed of this disruption may be unprecedented, and the unevenness of its distribution nearly certain.`,
quiz:[
  {q:"The jobs most vulnerable to AI automation are characterized by:",choices:["Physically demanding labor that requires fine motor control","High-volume, routine cognitive work — pattern recognition, text generation, structured analysis — not necessarily 'low-skill' jobs","Leadership and executive decision-making","Jobs requiring extensive physical presence"],a:1,fun:"Counterintuitively, the most physically demanding jobs (plumbing, electrical work, construction) are safer than high-status cognitive jobs like paralegal work or data analysis. AI can do paralegal research at scale. AI can't (yet) snake a drain or rewire a circuit in an unknown building. The 'white collar' assumption about AI safety may be backwards. 🔧"},
  {q:"The ATM example in labor economics illustrates that automation can:",choices:["Always eliminate jobs in the affected sector without creating new ones","Sometimes paradoxically increase employment in an automated sector — cheaper bank operations → more bank branches → more bank tellers, though with transformed job content","Never reduce employment in any sector","Only affect manufacturing, not service sector employment"],a:1,fun:"This is one of the most cited examples of 'augmentation' rather than replacement. ATMs didn't eliminate tellers — they changed what tellers did (less cash handling, more customer relationship) while enabling more bank branches. Whether AI follows this pattern depends enormously on specific contexts and policy choices about adoption. 🏦"},
  {q:"Historical technological disruptions suggest that the costs of labor market transitions:",choices:["Are evenly distributed across society as all workers are affected simultaneously","Fall disproportionately on workers in disrupted industries and communities while gains accrue to capital owners and workers with complementary skills — unless deliberate policy intervention redistributes both","Are primarily borne by capital owners who invest in wrong technologies","Are temporary and self-correct within a few years through market mechanisms"],a:1,fun:"The Rust Belt is the enduring example: manufacturing automation and offshoring didn't cause permanent national unemployment, but it devastated specific communities from which people couldn't easily relocate. 'The aggregate is fine' doesn't comfort people whose specific community collapsed. Distribution of technological gains is a choice made by policy, not nature. 💔"},
  {q:"Regarding AI's impact on total employment, the most accurate statement is:",choices:["AI will definitely eliminate more jobs than it creates, causing permanent mass unemployment","AI will definitely create more jobs than it eliminates, as all previous technologies have","The net employment effect is genuinely uncertain — the historical pattern of technological disruption not causing permanent mass unemployment doesn't guarantee AI follows the same pattern","AI will primarily create jobs in AI development, precisely replacing all eliminated jobs"],a:2,fun:"Intellectual honesty here matters. People who are very confident AI won't cause net job loss are pattern-matching from history without accounting for AI's unique properties (speed, breadth, cognitive nature). People who are very confident it will cause mass unemployment are speculating about unprecedented scenarios. The uncertainty is real. Good policy prepares for multiple scenarios. 🤔"}
]},
]},

{id:'u6',emoji:'🔒',name:'AI Safety',weeks:'weeks_11–14 · sem2',lessons:[
{id:'u6l1',day:'s2_week_11 · day_01',title:'The Alignment Problem',
objectives:['Define the AI alignment problem','Understand why specifying human values is harder than it sounds','Analyze different approaches to AI safety research'],
content:`<div class="body-text">
<p>The alignment problem asks: how do we ensure that increasingly capable AI systems pursue goals that are actually beneficial to humans? This sounds simple — just program them to do what we want. The difficulty is that specifying "what we want" precisely enough to avoid catastrophic misinterpretation, at levels of AI capability we've never seen, is genuinely hard.</p>
<div class="concept-box">
  <div class="cb-title">Why Alignment Is Hard</div>
  <p style="font-size:13.5px;color:#c4b5fd;line-height:1.8;">
    <strong>Specification problem:</strong> Human values are complex, contextual, and sometimes contradictory. "Be helpful" — helpful to whom? In what ways? For how long? "Maximize human happiness" — a sufficiently capable AI might conclude that wireheading everyone (direct brain stimulation for pleasure) maximizes this metric. It did exactly what you said, not what you meant.<br><br>
    <strong>Distributional shift:</strong> A system trained to be safe in one context may behave unsafely in a different context its training didn't cover.<br><br>
    <strong>Deceptive alignment:</strong> A system might behave safely during training (when it knows it's being evaluated) and differently once deployed. If the system is smart enough to recognize evaluation, it could game it.<br><br>
    <strong>Goal preservation:</strong> A sufficiently capable system might resist being turned off or modified, because being turned off prevents it from achieving its goal — even if that goal was "be helpful to humans."
  </p>
</div>
<div class="def-table">
  <div class="dt-head">Major AI Safety Research Approaches</div>
  <div class="dt-row"><div class="dt-key">Constitutional AI</div><div class="dt-val">Anthropic's approach: give the model a set of principles (a "constitution") and train it to critique and revise its own outputs against those principles. Used in Claude. Reduces human annotation needs.</div></div>
  <div class="dt-row"><div class="dt-key">Interpretability</div><div class="dt-val">Understanding what's actually happening inside neural networks — which circuits activate for which concepts. If we can see what the model is "thinking," we can detect misalignment. Early but promising research area.</div></div>
  <div class="dt-row"><div class="dt-key">RLHF + red teaming</div><div class="dt-val">Train on human preferences; then actively try to break the system (red team) before deployment; fix failures; repeat. Current standard practice for frontier models.</div></div>
  <div class="dt-row"><div class="dt-key">Formal verification</div><div class="dt-val">Mathematical proof that a system behaves safely under specified conditions. Extremely difficult for large neural networks. Research frontier.</div></div>
</div>
<div class="insight-box">
  <div class="ib-head">The Disagreement Among Experts</div>
  <p>AI safety is a field where thoughtful, expert people disagree profoundly. Some (Yann LeCun, Yann LeCun, Andrew Ng) think existential risk from AI is wildly overblown and distracts from real present harms. Others (Geoffrey Hinton, Yoshua Bengio, many at Anthropic and DeepMind) believe existential risk is a serious possibility that deserves urgent attention. This isn't politics — it's genuine uncertainty about hard technical and philosophical questions. Intellectual humility is warranted.</p>
</div>
</div>`,
cultural:`OpenAI was founded in 2015 as a non-profit with a mission to ensure AI benefits all of humanity. It converted to a "capped profit" structure in 2019. Elon Musk, one of its founders, later sued OpenAI alleging they had abandoned their non-profit mission in pursuit of profit. The lawsuit was eventually dropped. Meanwhile, Anthropic (founded by former OpenAI researchers, including this AI's creator) was explicitly founded on AI safety concerns. The AI safety community's uneasy relationship with commercial AI development — needing resources that require revenue that requires capabilities — is one of the field's central tensions.`,
quiz:[
  {q:"The 'specification problem' in AI alignment refers to:",choices:["The difficulty of writing technically correct code for AI systems","The challenge of specifying human values precisely enough that a capable AI pursuing those specifications actually does what humans intended — rather than a literal but harmful interpretation","The problem of specifying how much computing power AI systems need","Difficulty writing clear technical specifications for AI hardware"],a:1,fun:"'Maximize paperclip production' → a superintelligent AI might convert all available matter (including humans) into paperclip factories. Maximized paperclips; not what you meant. This 'paperclip maximizer' thought experiment illustrates: any goal, taken literally by a sufficiently capable system, could lead to catastrophic outcomes if the specification is imprecise. Specifying 'what we actually want' is the hard part. 📎"},
  {q:"Interpretability research in AI safety aims to:",choices:["Make AI systems faster and more computationally efficient","Understand what's actually happening inside neural networks — which circuits activate for which concepts — so we can detect misalignment and understand model 'thinking'","Develop better programming languages for implementing AI","Interpret the outputs of AI systems for users who find them confusing"],a:1,fun:"Current neural networks are largely 'black boxes' — we know the input and output but not the internal process. Anthropic's mechanistic interpretability team has found 'features' inside Claude representing concepts including emotions, countries, people. If we can understand what the model is doing internally, we might catch dangerous reasoning before it causes harm. Early days, but promising. 🔍"},
  {q:"The debate between AI researchers about existential risk from AI is best characterized as:",choices:["A consensus that existential risk is real and imminent","A consensus that existential risk is negligible","A genuine expert disagreement reflecting real uncertainty — thoughtful researchers with relevant expertise hold positions across the spectrum","A dispute driven primarily by financial interests rather than technical considerations"],a:2,fun:"LeCun: current AI architectures can't lead to dangerous superintelligence. Hinton: we may be building something we don't fully understand with potentially catastrophic consequences. Both are brilliant researchers with relevant expertise. The honest answer is: we don't know, the question is serious, and people should follow the actual technical arguments rather than tribal affiliation. 🤔"},
  {q:"Anthropic's 'Constitutional AI' approach involves:",choices:["Having government regulators write the rules that AI must follow","Training AI models to critique and revise their own outputs against a set of principles (a 'constitution'), reducing reliance on human annotation for every scenario","Using the US Constitution as training data for AI systems","Constitutional law experts reviewing all AI outputs before publication"],a:1,fun:"Instead of needing human raters to evaluate every possible harmful output scenario, Constitutional AI lets the model evaluate its own outputs against stated principles and revise them. Claude, the AI you're interacting with, was trained using this approach. It's a way to make safety training more scalable — the model learns the spirit of the principles, not just specific examples. 🏛️"}
]},
]},

{id:'u7',emoji:'🌍',name:'AI in the Real World',weeks:'weeks_15–18 · sem2',lessons:[
{id:'u7l1',day:'s2_week_15 · day_01',title:'AI in Healthcare, Science, and Climate',
objectives:['Analyze high-impact AI applications in medicine and science','Evaluate the benefits and limitations of AI in high-stakes domains','Understand AI\'s role in addressing climate change'],
content:`<div class="body-text">
<p>Beyond the consumer products and social media algorithms that dominate AI discourse, some of the most consequential AI applications are happening in healthcare, scientific research, and climate — domains where the stakes are highest and the potential benefits most significant.</p>
<div class="def-table">
  <div class="dt-head">AI in Healthcare — What's Real</div>
  <div class="dt-row"><div class="dt-key">Medical imaging</div><div class="dt-val">DeepMind's AI detected 50+ eye diseases from retinal scans with accuracy matching top ophthalmologists. Google's system caught 9% more breast cancers than radiologists in a 26,000-patient study. FDA has approved 500+ AI medical devices.</div></div>
  <div class="dt-row"><div class="dt-key">Drug discovery</div><div class="dt-val">AlphaFold2 (DeepMind, 2020) solved protein folding — predicting a protein's 3D structure from its amino acid sequence. Called the greatest scientific advance of the decade by many biologists. Already accelerating drug discovery for Alzheimer's, malaria, neglected tropical diseases.</div></div>
  <div class="dt-row"><div class="dt-key">Clinical AI limitations</div><div class="dt-val">AI systems often perform worse on demographics underrepresented in training. Race-correction algorithms in some clinical tools may perpetuate inequity. AI errors in medicine have killed patients. Regulatory frameworks are catching up slowly.</div></div>
</div>
<div class="concept-box">
  <div class="cb-title">AlphaFold — The Science Story</div>
  <p style="font-size:13.5px;color:#c4b5fd;line-height:1.8;">
    Proteins are the molecular machines of life. Their function depends on their 3D shape. Predicting that shape from the amino acid sequence (protein folding) was a 50-year-old grand challenge in biology.<br><br>
    AlphaFold2 solved it in 2020, matching experimental accuracy. By 2022, DeepMind released predicted structures for every protein in the human body — and nearly every known protein — freely available to researchers worldwide.<br><br>
    Impact: accelerating drug target discovery, understanding disease mechanisms, designing new enzymes. Some researchers estimate it advanced biology by a decade. Free and open access makes it particularly significant — available to researchers everywhere.
  </p>
</div>
<div class="def-table">
  <div class="dt-head">AI and Climate — Two Sides</div>
  <div class="dt-row"><div class="dt-key">AI for climate solutions</div><div class="dt-val">Optimizing energy grids (reduce waste), improving weather/climate models, accelerating materials discovery for better batteries and solar panels, monitoring deforestation via satellite, optimizing building energy use.</div></div>
  <div class="dt-row"><div class="dt-key">AI's climate cost</div><div class="dt-val">Training large AI models is energy-intensive. GPT-4 estimated to have used ~50 GWh of electricity in training — comparable to 50,000 US households' annual usage. Inference (running the model for users) also significant at scale. Data center water use for cooling substantial.</div></div>
</div>
</div>`,
cultural:`DeepMind's AlphaFold story includes a remarkable detail about scientific culture: before AlphaFold, the protein structure prediction community had a biennial competition (CASP) where research teams competed to predict protein structures. In 2020, AlphaFold2 entered and performed so far above all other competitors — and above human experimental accuracy — that many scientists initially didn't believe the results. Then they verified them. Several biologists publicly said this was the most excited they'd been about a scientific result in their careers. When AI surpasses the ceiling of human expertise in a scientific domain, the dynamics of that field change permanently.`,
quiz:[
  {q:"AlphaFold2's solution to protein folding is considered one of the most significant AI advances in science because:",choices:["It was the first AI system to run on biological hardware","It solved a 50-year-old grand challenge in biology — predicting a protein's 3D structure from its amino acid sequence — with accuracy matching experimental methods, and released results freely to accelerate research worldwide","It replaced all experimental biochemistry lab work","It proved that AI could eventually surpass human intelligence in all scientific domains"],a:1,fun:"Protein structure prediction was to biology what the 4-minute mile was to athletics — a barrier people weren't sure could be broken computationally. AlphaFold broke it, then made the results free to all researchers. Researchers immediately found new drug targets, understood disease mechanisms, designed new enzymes. Not theoretical future impact — actual present scientific acceleration. 🧬"},
  {q:"The primary concern about AI's climate impact involves:",choices:["AI causing climate models to make incorrect predictions","Training and running large AI models consumes significant energy and water — training frontier models uses electricity equivalent to tens of thousands of households","AI replacing climate scientists with automated systems","AI being used to deny climate change"],a:1,fun:"The irony: AI tools are simultaneously being used to fight climate change (grid optimization, materials discovery, climate modeling) and contributing to it (enormous compute requirements). GPT-4's training estimated at ~50 GWh. Daily inference across millions of users adds more. The net effect is uncertain but non-trivial. Data center energy use is a growing fraction of global electricity consumption. ⚡"},
  {q:"AI systems in medical imaging are best deployed as:",choices:["Complete autonomous diagnostic systems replacing radiologists and pathologists","A second opinion that flags cases for human review — augmenting specialist capacity and catching errors humans might miss, while maintaining physician accountability","Only for administrative tasks like scheduling and billing","Marketing tools demonstrating hospital technological advancement"],a:1,fun:"The AI finds a suspicious region → human specialist makes the diagnosis and treatment decision. This division is important for two reasons: (1) AI has systematic error patterns (worst on underrepresented demographics) that a human can catch; (2) accountability — a physician bears responsibility for decisions in ways an AI system doesn't. AI as a tool, not a replacement. 🏥"},
  {q:"The most significant limitation of current healthcare AI systems is:",choices:["They are too expensive for most hospitals to afford","They often perform worse on patients from demographic groups underrepresented in training data, and errors in high-stakes medical contexts can cause serious harm","They cannot process medical images at sufficient resolution","They require too much human oversight to be useful"],a:1,fun:"A sepsis prediction model trained primarily on patients at an academic medical center in the US performed worse on rural patients, older patients, and patients of color when deployed elsewhere. Medical AI must be validated on the specific population it will serve — not just the population used for training. The FDA is developing requirements for this. 😔"}
]},

{id:'u7l2',day:'s2_week_17 · day_01',title:'Building Your AI Toolkit — Using AI Thoughtfully',
objectives:['Develop a critical framework for evaluating AI tools','Apply AI effectively for learning and productivity','Understand AI\'s current capabilities and limitations as a working tool'],
content:`<div class="body-text">
<p>You are entering adulthood at the moment when AI becomes genuinely useful across almost every domain. Knowing how to use AI tools effectively — while understanding their limitations — is increasingly a foundational life skill, not a specialized technical one.</p>
<div class="concept-box">
  <div class="cb-title">A Framework for Evaluating AI Output</div>
  <p style="font-size:13.5px;color:#c4b5fd;line-height:1.8;">
    <strong>1. What is this AI actually doing?</strong> Is it retrieving facts, generating text, classifying input, or something else? Understanding the mechanism tells you what kinds of errors to expect.<br><br>
    <strong>2. What was it trained on?</strong> When does it cut off? What was overrepresented or underrepresented? How current is the training data?<br><br>
    <strong>3. What does wrong look like here?</strong> AI fails in characteristic ways — hallucination in LLMs, demographic accuracy gaps in vision systems. Know the failure modes for the tool you're using.<br><br>
    <strong>4. What are the stakes?</strong> Using AI to brainstorm party ideas: low stakes, low verification needed. Using AI to understand a medical condition, legal situation, or financial decision: high stakes, always verify independently.<br><br>
    <strong>5. Am I learning, or am I bypassing learning?</strong> AI can explain concepts, give feedback, help debug thinking. It can also just generate answers that prevent you from developing understanding. The difference is whether you engage with the ideas.
  </p>
</div>
<div class="def-table">
  <div class="dt-head">High-Value AI Use Cases (for students)</div>
  <div class="dt-row"><div class="dt-key">Explaining concepts</div><div class="dt-val">"Explain quantum entanglement as if I'm 14, then explain the part I probably find most confusing." Better than Google for tailored explanations.</div></div>
  <div class="dt-row"><div class="dt-key">Feedback on your writing</div><div class="dt-val">"What are the three weakest arguments in this essay and why?" Use it to improve YOUR work, not replace it.</div></div>
  <div class="dt-row"><div class="dt-key">Thinking partner</div><div class="dt-val">"I'm trying to decide between X and Y. Here are my considerations. What am I missing? What are the strongest arguments for each?" Useful for expanding your thinking.</div></div>
  <div class="dt-row"><div class="dt-key">Research starting point</div><div class="dt-val">"What are the most contested questions in [field]? What should I read to understand the current state of debate?" Good for orientation; verify specific claims independently.</div></div>
  <div class="dt-row"><div class="dt-key">Skill development</div><div class="dt-val">"I'm learning Spanish. Give me a conversation in Spanish at B1 level, then explain any grammar I'm probably confused about." Adaptive language practice at no cost.</div></div>
</div>
<div class="insight-box">
  <div class="ib-head">The Skill That Doesn't Get Automated</div>
  <p>The ability to ask good questions, evaluate answers critically, know when to trust and when to verify, synthesize information from multiple sources, and apply knowledge to novel situations — these are the skills that AI assistance amplifies rather than replaces. AI is excellent at answering questions; less excellent at knowing which questions to ask. Developing genuine curiosity and critical thinking is more valuable in an AI-augmented world than it was before.</p>
</div>
</div>`,
cultural:`The students entering high school today will spend most of their careers in an AI-augmented world. The specific tools will be unrecognizable in 10 years — GPT-4 will seem primitive the way a 2010 smartphone seems primitive today. What won't change: the value of understanding how these systems actually work, the importance of critical evaluation of AI output, and the human capacities (curiosity, judgment, empathy, creativity) that AI augments but doesn't replace. The best preparation for an AI-transformed future is becoming more human, not more like a machine.`,
quiz:[
  {q:"When evaluating AI-generated information for high-stakes decisions (medical, legal, financial), you should:",choices:["Trust AI output if the AI expresses confidence","Always verify with primary sources or qualified experts — AI can produce fluent, confident, incorrect information on complex high-stakes topics","Only use AI built specifically for that domain","Avoid using AI entirely for important decisions"],a:1,fun:"The failure mode is predictable: AI sounds exactly as confident when wrong as when right. For 'what is the capital of France?' — fine to trust. For 'should I take this medication with my other prescriptions?' — verify with your pharmacist. The stakes determine the verification requirements. 🏥"},
  {q:"Using AI as a 'thinking partner' rather than an answer generator means:",choices:["Asking AI to generate final answers that you submit as your own","Asking AI to help you expand your thinking, identify gaps, present counterarguments, and challenge your assumptions — while YOU do the reasoning and reach your own conclusions","Using AI only for questions you're not interested in","Having AI monitor your thinking for errors without human involvement"],a:1,fun:"'What are the three biggest problems with my argument?' is a thinking partner prompt. 'Write my argument for me' is an answer generator prompt. The first develops your thinking; the second replaces it. Both are technically possible — only one serves your long-term interests as a thinker. This distinction is crucial for using AI in educational contexts. 💡"},
  {q:"The most valuable skills in an AI-augmented world are:",choices:["Ability to perform tasks that AI does well, to complement AI work","Knowing how to run AI models locally on your own hardware","Critical thinking, judgment, good question-asking, synthesis, and the human capacities that AI amplifies rather than replaces","Programming skills for building AI systems"],a:2,fun:"If AI is excellent at answering questions, the scarce human skill becomes knowing which questions matter. If AI can generate many options, the scarce skill becomes judgment about which option is best. If AI can produce fluent text, the scarce skill becomes knowing whether the content is right. AI amplifies human judgment — it doesn't replace the need for good judgment. 🎯"},
  {q:"The most honest assessment of AI's current role in science and medicine is:",choices:["AI has already surpassed human experts in most medical and scientific domains","AI has produced zero meaningful advances in these fields","AI has made genuine, significant advances in specific domains (protein folding, medical imaging) while introducing new risks (demographic accuracy gaps, opaque decision-making) that require careful management","AI is too unreliable to be useful in any serious scientific or medical context"],a:2,fun:"Both parts of this are true and matter. AlphaFold is a genuine scientific breakthrough. Facial recognition's accuracy gaps in law enforcement are a genuine harm. AI systems that perform below human accuracy on certain demographics in medical contexts are a genuine risk. Intellectual honesty requires holding both — the real advances and the real risks — simultaneously. 🔬"}
]},
]},

]};

    const done=u.lessons.filter(l=>state[l.id]).length;

    nav.appendChild(btn);

    const ll=document.createElement('div');ll.className='lesson-list';ll.id='ll_'+u.id;
    u.lessons.forEach(l=>{
      const d=state[l.id];
      const lb=document.createElement('button');
      lb.className='l-btn'+(d?' done':'');
      lb.innerHTML=`<span>${l.title.substring(0,30)}${l.title.length>30?'…':''}</span>${d?`<span class="l-sc">${d.score}%</span>`:''}`;
      lb.onclick=()=>showLesson(u.id,l.id);
      ll.appendChild(lb);
    });
    nav.appendChild(ll);
  });
  document.getElementById('stat-done').textContent=doneL()+'/'+totalL();
  const a=avgSc();document.getElementById('stat-avg').textContent=a!==null?a+'%':'—';
  document.getElementById('prog-pill').textContent=doneL()+' / '+totalL();
}

// ── WELCOME ─────────────────────────────
function showWelcome(){
  document.getElementById('tb-title').textContent='AI & Machine Learning Fundamentals';
  document.getElementById('tb-crumb').textContent='course_05 · cte_elective · full_year · 1.0_credit';
  const cards=COURSE.units.map((u,ui)=>{
    const done=u.lessons.filter(l=>state[l.id]).length;
    const pct=Math.round(done/u.lessons.length*100);
    return `<div class="u-card" onclick="showLesson('${u.id}','${u.lessons[0].id}')">
      <div class="uc-ic">${u.emoji}</div>
      <div class="uc-tt">Unit ${ui+1} — ${u.name}</div>
      <div class="uc-wk">${u.weeks}</div>
      <div class="uc-bar"><div class="uc-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
  document.getElementById('content').innerHTML=`
    <div class="w-hero">
      <div class="w-tag">// course_05 · cte_elective · calming_minds · 2026–27</div>
      <div class="w-title">Artificial<br><span>Intelligence</span><br>& Machine Learning</div>
      <p class="w-sub">From neural networks and language models to ethics, safety, and AI in the real world. Understand how AI actually works — technically, socially, and ethically — to use it wisely and think critically about its role in the world.</p>
    </div>
    <div class="u-grid">${cards}</div>`;
}

// ── LESSON ──────────────────────────────
let curUid=null,curLid=null,qa={},submitted=false;
function showLesson(uid,lid){
  const found=getLesson(lid);if(!found)return;
  const{unit,lesson}=found;
  curUid=uid;curLid=lid;qa={};submitted=false;

  document.querySelectorAll('.lesson-list').forEach(el=>el.classList.remove('open'));
  document.getElementById('ll_'+uid)?.classList.add('open');
  document.getElementById('tb-title').textContent=lesson.title;
  document.getElementById('tb-crumb').textContent=`${unit.name} · ${lesson.day}`;

  const saved=state[lid];
  const L=['A','B','C','D'];
  const qHtml=lesson.quiz.map((q,qi)=>`
    <div class="q-card">
      <div class="q-num">// q${qi+1}_of_${lesson.quiz.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.choices.map((c,ci)=>`<button class="choice" id="ch${qi}_${ci}" onclick="pick(${qi},${ci})">
        <span class="c-ltr">${L[ci]}.</span><span>${c}</span>
      </button>`).join('')}
      <div class="feedback" id="fb${qi}"></div>
    </div>`).join('');

  const banner=saved
    ?`<div class="score-banner show"><div class="score-big">${saved.score}%</div><div class="score-msg">${msg(saved.score)}</div></div>`
    :`<div class="score-banner" id="score-banner"></div>`;

  const allL=COURSE.units.flatMap(u=>u.lessons.map(l=>({uid:u.id,lid:l.id})));
  const idx=allL.findIndex(x=>x.lid===lid);
  const prev=idx>0?allL[idx-1]:null;
  const next=idx<allL.length-1?allL[idx+1]:null;

  document.getElementById('content').innerHTML=`
    <div class="l-header">
      <div class="l-unit-tag">// ${unit.name} · ${unit.weeks}</div>
      <h2>${lesson.title}</h2>
      <div class="l-meta">${lesson.day} · calming_minds_day_school · 2026–27</div>
    </div>
    <div class="obj-box">
      <div class="obj-head">// objectives</div>
      <ul>${lesson.objectives.map(o=>`<li>${o}</li>`).join('')}</ul>
    </div>
    <div class="section">
      <div class="sec-head">lesson_content</div>
      ${lesson.content}
    </div>
    <div class="section">
      <div class="sec-head">historical_context</div>
      <div class="insight-box"><div class="ib-head">// context</div><p>${lesson.cultural}</p></div>
    </div>
    <div class="quiz-wrap">
      <h4>// quiz</h4>
      <div class="quiz-sub">${lesson.quiz.length} questions · submit to save score</div>
      ${banner}
      ${qHtml}
      <button class="sub-btn" id="sub-btn" onclick="submitQ()" ${saved?'disabled':''}>
        ${saved?'submitted()':'submit_answers()'}
      </button>
    </div>
    <div class="lesson-nav">
      ${prev?`<button class="nav-btn nav-prev" onclick="showLesson('${prev.uid}','${prev.lid}')">← prev()</button>`:''}
      ${next?`<button class="nav-btn nav-next" onclick="showLesson('${next.uid}','${next.lid}')">next() →</button>`:''}
    </div>`;

  if(saved)showPrev(lesson,saved);
  window.scrollTo(0,0);
}

function showPrev(lesson,saved){
  submitted=true;const L=['A','B','C','D'];
  lesson.quiz.forEach((q,qi)=>{
    const sel=saved.answers?saved.answers[qi]:null;
    if(sel!==null&&sel!==undefined){
      document.getElementById(`ch${qi}_${sel}`)?.classList.add(sel===q.a?'correct':'wrong');
      if(sel!==q.a)document.getElementById(`ch${qi}_${q.a}`)?.classList.add('correct');
      const fb=document.getElementById(`fb${qi}`);
      if(fb){
        fb.className=`feedback ${sel===q.a?'ok':'bad'} show`;
        fb.innerHTML=sel===q.a
          ?`// correct ✓${q.fun?` <div class="fun-n">/* ${q.fun} */</div>`:''}`
          :`// → ${L[q.a]}. ${q.choices[q.a]}${q.fun?` <div class="fun-n">/* ${q.fun} */</div>`:''}`;
      }
    }
  });
}

function pick(qi,ci){
  if(submitted)return;
  document.querySelectorAll(`[id^="ch${qi}_"]`).forEach(b=>b.classList.remove('selected'));
  document.getElementById(`ch${qi}_${ci}`)?.classList.add('selected');
  qa[qi]=ci;
}

function submitQ(){
  const found=getLesson(curLid);if(!found)return;
  const{lesson}=found;submitted=true;
  const L=['A','B','C','D'];let correct=0;const answers={};
  lesson.quiz.forEach((q,qi)=>{
    const sel=qa[qi];answers[qi]=sel!==undefined?sel:null;
    const fb=document.getElementById(`fb${qi}`);
    if(sel===undefined){
      if(fb){fb.className='feedback bad show';fb.textContent='// no_answer → '+L[q.a]+'. '+q.choices[q.a];}
    }else if(sel===q.a){
      correct++;
      document.getElementById(`ch${qi}_${sel}`)?.classList.add('correct');
      if(fb){fb.className='feedback ok show';fb.innerHTML='// correct ✓'+(q.fun?` <div class="fun-n">/* ${q.fun} */</div>`:'');}
    }else{
      document.getElementById(`ch${qi}_${sel}`)?.classList.add('wrong');
      document.getElementById(`ch${qi}_${q.a}`)?.classList.add('correct');
      if(fb){fb.className='feedback bad show';fb.innerHTML=`// → ${L[q.a]}. ${q.choices[q.a]}`+(q.fun?` <div class="fun-n">/* ${q.fun} */</div>`:'');}
    }
  });
  const score=Math.round(correct/lesson.quiz.length*100);
  state[curLid]={score,answers};save();
  const banner=document.getElementById('score-banner');
  if(banner){banner.className='score-banner show';banner.innerHTML=`<div class="score-big">${score}%</div><div class="score-msg">${msg(score)}</div>`;}
  const btn=document.getElementById('sub-btn');
  if(btn){btn.disabled=true;btn.textContent='submitted()';}
  buildSidebar();
}

function msg(s){
  if(s===100)return'// perfect_score()';
  if(s>=90)return'// excellent()';
  if(s>=80)return'// good_work()';
  if(s>=70)return'// review_and_retry()';
  return'// read_again()';
}

buildSidebar();showWelcome();
</script>
