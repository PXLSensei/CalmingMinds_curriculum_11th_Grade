<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  var COURSE = 'PE & Health';
  var KEY    = 'cms_tracker_v1';
  var start  = null;

  function pad(n){ return String(n).padStart(2,'0'); }
  function todayStr(){
    var d = new Date();
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  }
  function nowTime(){
    var d = new Date();
    return pad(d.getHours())+':'+pad(d.getMinutes());
  }
  function load(){
    try{ return JSON.parse(localStorage.getItem(KEY))||{sessions:[]}; }
    catch(e){ return {sessions:[]}; }
  }
  function save(d){ localStorage.setItem(KEY, JSON.stringify(d)); }

  function flush(){
    if(!start) return;
    var secs = Math.round((Date.now()-start)/1000);
    start = null;
    if(secs < 5) return; // ignore accidental flickers < 5 seconds
    var d = load();
    // merge into an existing session for today+course if within 30 min gap
    var today = todayStr();
    var cutoff = Date.now() - 30*60*1000;
    var existing = null;
    for(var i=d.sessions.length-1; i>=0; i--){
      var s = d.sessions[i];
      if(s.course===COURSE && s.date===today && s._lastUpdate && s._lastUpdate > cutoff){
        existing = s; break;
      }
    }
    if(existing){
      existing.secs = (existing.secs||0) + secs;
      existing._lastUpdate = Date.now();
    } else {
      d.sessions.push({
        id: Date.now(),
        date: today,
        time: nowTime(),
        course: COURSE,
        secs: secs,
        _lastUpdate: Date.now()
      });
    }
    save(d);
  }

  function begin(){
    if(!start) start = Date.now();
  }

  // Page Visibility API
  document.addEventListener('visibilitychange', function(){
    if(document.hidden){ flush(); } else { begin(); }
  });

  // Tab/window close
  window.addEventListener('beforeunload', flush);
  window.addEventListener('pagehide', flush);

  // Start immediately if visible
  if(!document.hidden) begin();
})();
</script>

<script>
const COURSE = { units: [

// ══════════════════════════════════════
// UNIT 1: FITNESS FUNDAMENTALS
// ══════════════════════════════════════
{id:'u1', emoji:'💪', name:'Fitness Fundamentals', weeks:'Weeks 1–5, Semester 1', lessons:[
{id:'u1l1', day:'Week 1, Day 1', title:'The Five Components of Health-Related Fitness',
objectives:['Define and distinguish the five health-related fitness components','Explain why each component matters for long-term health','Differentiate health-related from skill-related fitness'],
content:`<div class="body-text">
<p>Fitness is not one thing — it is a collection of related but distinct physical qualities. Understanding the components helps you train intelligently, identify your weak points, and design a program that actually moves you toward health rather than just toward soreness.</p>
<div class="info-card">
  <div class="ic-head">The Five Health-Related Fitness Components</div>
  <div class="ic-row"><div class="ic-key">Cardiovascular Endurance</div><div class="ic-val">The ability of the heart, lungs, and circulatory system to deliver oxygen to working muscles over sustained periods. The most important predictor of long-term health and longevity. Examples: running a mile, cycling, swimming laps.</div></div>
  <div class="ic-row"><div class="ic-key">Muscular Strength</div><div class="ic-val">The maximum force a muscle or muscle group can exert in a single effort. Examples: one-rep max on a bench press, pulling yourself up over an obstacle. Important for posture, injury prevention, and daily tasks.</div></div>
  <div class="ic-row"><div class="ic-key">Muscular Endurance</div><div class="ic-val">The ability of a muscle to exert force repeatedly over time. Examples: push-ups until failure, holding a plank, doing many reps with light weight. Different from strength — a marathon runner has high muscular endurance, not necessarily max strength.</div></div>
  <div class="ic-row"><div class="ic-key">Flexibility</div><div class="ic-val">The range of motion available at a joint. Reduces injury risk, improves posture, and maintains functional movement as we age. Examples: touching toes, shoulder rotation, hip mobility.</div></div>
  <div class="ic-row"><div class="ic-key">Body Composition</div><div class="ic-val">The ratio of fat mass to lean mass (muscle, bone, organs, water). A person can be "normal weight" with unhealthy body composition, or "overweight" by BMI while being extremely fit. BMI is a crude measure that doesn't capture this distinction.</div></div>
</div>
<div class="highlight-box">
  <div class="hb-head">Health-Related vs. Skill-Related Fitness</div>
  <p>Health-related fitness (the five components above) predicts long-term health outcomes. Skill-related fitness — speed, agility, power, balance, coordination, reaction time — matters for sports performance. You can be extremely healthy with low skill-related fitness. A 65-year-old who walks 5 miles daily may have better health-related fitness than a 20-year-old athlete despite having no sports skill at all.</p>
</div>
<div class="tip-box">
  <div class="tb-head">The Most Important Component</div>
  <p>Cardiovascular endurance (also called cardiorespiratory fitness or VO₂ max) is the single strongest predictor of all-cause mortality — better than BMI, cholesterol, blood pressure, or any other commonly measured factor. Low cardiorespiratory fitness is a bigger risk factor for early death than obesity. This is one of the most robust findings in exercise science.</p>
</div>
</div>`,
cultural:`The President's Challenge fitness test (now the Presidential Youth Fitness Program) was introduced in 1956 after research showed American children were less fit than European children. Physical fitness became a national security concern during the Cold War — Eisenhower, Kennedy, and every president since have had some fitness initiative. Kennedy's 1960 Sports Illustrated article "The Soft American" argued that physical weakness threatened national vigor. The irony: the most powerful predictor of population health and longevity — cardiorespiratory fitness — requires something completely free: sustained moderate-intensity movement. The bottleneck is cultural and motivational, not technological.`,
quiz:[
  {q:"Which fitness component is the strongest predictor of long-term health and longevity?",choices:["Muscular strength","Flexibility","Cardiovascular endurance (cardiorespiratory fitness)","Body composition"],a:2,fun:"VO₂ max (maximal oxygen uptake) is the gold standard measure of cardiovascular fitness. Research consistently shows that low cardiorespiratory fitness predicts early mortality more strongly than high cholesterol, high blood pressure, obesity, or smoking. The good news: it responds well to training. 🏃"},
  {q:"Body composition differs from body weight because:",choices:["Body composition measures height and weight together","Body composition measures the ratio of fat to lean mass — a person can be normal weight with unhealthy body composition, or 'overweight' by BMI while being very fit","Body composition only measures bone density","They measure the same thing using different scales"],a:1,fun:"A 200-lb linebacker and a 200-lb sedentary person weigh the same. Their body compositions are completely different — the athlete has much higher lean mass percentage. BMI can't distinguish these cases. Body composition is what actually matters for health; weight is just a proxy that often misleads. 📊"},
  {q:"Muscular endurance differs from muscular strength in that:",choices:["Muscular endurance applies only to leg muscles","Muscular endurance is the ability to exert force repeatedly over time; strength is maximum force in a single effort — a marathon runner demonstrates endurance, a powerlifter demonstrates strength","Muscular strength requires weights; endurance only uses bodyweight","They are identical concepts measured with different tests"],a:1,fun:"A person who can do 100 push-ups has high muscular endurance. A person who can do 3 push-ups but can deadlift 400 pounds has high muscular strength. Training for each requires different approaches: high reps/light weight builds endurance; low reps/heavy weight builds strength. 💪"},
  {q:"Flexibility training is most effective when performed:",choices:["Before exercise with cold muscles to prevent injury during the workout","Immediately after exercise when muscles are warm and blood-filled — muscles stretch more safely and effectively when warm","Only on rest days to avoid overtraining","At any time — muscle temperature doesn't affect flexibility outcomes"],a:1,fun:"Cold muscles are stiffer and more injury-prone when stretched forcefully. Post-workout static stretching (hold 30-60 seconds) takes advantage of warm, pliable muscles. Pre-workout: use dynamic stretching (movement-based) instead of static. This distinction is exercise science consensus that contradicts what many people were taught in gym class. 🧘"}
]},

{id:'u1l2', day:'Week 2, Day 1', title:'The FITT Principle & Designing Exercise Programs',
objectives:['Apply the FITT principle to design any exercise program','Understand progressive overload and why it\'s necessary','Calculate target heart rate zones for aerobic training'],
content:`<div class="body-text">
<p>The FITT principle gives you four variables to adjust in any exercise program. Understanding these variables means you can design training for any goal — and understand why your current routine might not be working.</p>
<div class="formula-box">
  <div class="fb-head">The FITT Principle</div>
  <div class="formula">F — Frequency: How often you exercise (days per week)</div>
  <div class="formula">I — Intensity: How hard you exercise (% of max heart rate, RPE, % of 1RM)</div>
  <div class="formula">T — Time: How long each session lasts (minutes)</div>
  <div class="formula">T — Type: What kind of exercise (aerobic, strength, flexibility, sport)</div>
  <div class="formula-note">Change any one variable and you change the training stimulus. Progressive overload = systematically increasing one or more FITT variables over time to continue making gains.</div>
</div>
<div class="info-card">
  <div class="ic-head">FITT Recommendations — General Health (ACSM Guidelines)</div>
  <div class="ic-row"><div class="ic-key">Cardiovascular</div><div class="ic-val">F: 3–5 days/week · I: Moderate (50–70% max HR) or vigorous (70–85% max HR) · T: 150 min/week moderate OR 75 min/week vigorous · Type: Any sustained aerobic activity</div></div>
  <div class="ic-row"><div class="ic-key">Strength</div><div class="ic-val">F: 2–3 days/week (not consecutive) · I: 60–80% of 1RM for health · T: 2–4 sets of 8–15 reps per exercise · Type: Free weights, machines, bodyweight — all effective</div></div>
  <div class="ic-row"><div class="ic-key">Flexibility</div><div class="ic-val">F: 2–3 days/week minimum; daily is ideal · I: Mild discomfort, never pain · T: Hold static stretches 30–60 seconds · Type: Static, dynamic, PNF</div></div>
</div>
<div class="formula-box">
  <div class="fb-head">Target Heart Rate Zones</div>
  <div class="formula">Estimated Max HR = 220 − age</div>
  <div class="formula">At age 16: max HR ≈ 204 bpm</div>
  <div class="formula">Moderate intensity zone: 50–70% of max HR = ~102–143 bpm</div>
  <div class="formula">Vigorous intensity zone: 70–85% of max HR = ~143–173 bpm</div>
  <div class="formula-note">These are estimates — actual max HR varies. The "talk test": moderate = can speak in sentences; vigorous = can only say a few words before needing to breathe. Both intensities provide health benefits; vigorous is more time-efficient.</div>
</div>
<div class="highlight-box">
  <div class="hb-head">Progressive Overload — Why You Must Keep Challenging Yourself</div>
  <p>Your body adapts to whatever stress you consistently impose on it — then stops changing. If you run the same 2-mile route at the same pace every day, you'll maintain that fitness level but not improve it. Progressive overload means systematically increasing the challenge: run farther, run faster, add hills, add intervals. Without it, you're maintaining, not improving. The same principle applies to strength training: add weight, reps, sets, or reduce rest as your capacity grows.</p>
</div>
</div>`,
cultural:`The American College of Sports Medicine (ACSM) guidelines for physical activity are evidence-based recommendations updated periodically as research develops. The current recommendation of 150 minutes of moderate activity per week was chosen partly because it's achievable: 30 minutes five days a week, or even 10-minute walks scattered throughout the day. Research shows accumulated activity (multiple short bouts) produces similar health benefits to single longer sessions. The hardest part of exercise prescription is designing something people will actually do — not the most optimal possible program, but the most optimal program that fits a specific person's life.`,
quiz:[
  {q:"Progressive overload in exercise training means:",choices:["Starting with very heavy weights and reducing weight as you fatigue","Systematically increasing the exercise challenge over time — more weight, reps, sets, or reduced rest — to continue improving beyond initial adaptation","Exercising progressively more hours each day until reaching peak fitness","Alternating between easy and hard workouts in a progressive pattern"],a:1,fun:"Your body is remarkably good at adapting — which is great, but means you have to keep raising the bar. The powerlifter who always lifts 200 lbs will always lift 200 lbs. Add 5 lbs each week and after a year you've transformed. The principle is simple; the discipline is the challenge. 📈"},
  {q:"The target heart rate zone for moderate-intensity aerobic exercise for a 16-year-old is approximately:",choices:["50–100 bpm","102–143 bpm (50–70% of estimated 220–16=204 max HR)","150–180 bpm","60–90 bpm"],a:1,fun:"Max HR estimate: 220 - 16 = 204. Moderate zone: 50-70% of 204 = 102-143 bpm. This is a comfortable challenge — you're breathing harder but can still talk in sentences. Vigorous is 70-85%: 143-173 bpm. Both zones produce health benefits. Monitor with a fitness tracker or count pulse for 15 seconds × 4. 💓"},
  {q:"The ACSM recommendation of 150 minutes of moderate activity per week can be broken into:",choices:["One 150-minute session per week only","Any combination that totals 150 minutes — including multiple 10-minute bouts throughout the day, which produce similar health benefits to longer single sessions","Only two 75-minute sessions to maximize benefit","It must be three 50-minute sessions specifically"],a:1,fun:"This is one of the most practically important exercise science findings: accumulated activity counts. Three 10-minute walks produce similar health benefits to one 30-minute walk. This removes the 'I don't have time' objection — 10 minutes is nearly always findable. Adherence matters more than optimization. 🚶"},
  {q:"In the FITT principle, 'Intensity' for strength training is often measured by:",choices:["How much you sweat during the workout","Percentage of your one-repetition maximum (1RM) — the maximum weight you can lift for one rep","How long each set takes to complete","Your perceived enjoyment of the exercise"],a:1,fun:"1RM-based intensity prescription: 60-80% of 1RM for hypertrophy/health, 80-95% for strength, under 60% for muscular endurance. To find 1RM without maximal effort: use a rep-max formula (e.g., 10RM weight × 1.33 ≈ 1RM estimate). Professional programs always anchor intensity to individual capacity, not absolute weights. 🏋️"}
]},

{id:'u1l3', day:'Week 3, Day 1', title:'Nutrition Foundations for Active Lifestyles',
objectives:['Distinguish macronutrients and their roles in the body','Understand nutrient timing for exercise performance','Identify common nutrition myths and what the evidence actually shows'],
content:`<div class="body-text">
<p>Nutrition is one of the most myth-laden topics in health. Everyone has opinions; the evidence is often more nuanced than headlines suggest. Here is what the science actually supports for an active person seeking health — not six-pack abs, but genuine long-term wellbeing.</p>
<div class="info-card">
  <div class="ic-head">Macronutrients — The Big Three</div>
  <div class="ic-row"><div class="ic-key">Carbohydrates (4 cal/g)</div><div class="ic-val">The body's preferred fuel for high-intensity exercise. Stored as glycogen in muscle and liver. "Carbs are bad" is a persistent myth — endurance athletes and strength athletes both require adequate carbohydrates for performance and recovery.</div></div>
  <div class="ic-row"><div class="ic-key">Protein (4 cal/g)</div><div class="ic-val">Builds and repairs muscle tissue. Also used as enzymes, hormones, and immune factors. Active people need more: 1.4–2.0 g/kg body weight/day (vs. ~0.8 g/kg for sedentary adults). Spread throughout the day — the body can't store excess protein.</div></div>
  <div class="ic-row"><div class="ic-key">Fats (9 cal/g)</div><div class="ic-val">Essential for hormone production, vitamin absorption (A, D, E, K), brain function, and as fuel for low-intensity exercise. Unsaturated fats (olive oil, avocado, nuts, fish) are associated with better health outcomes. Fats are not the enemy.</div></div>
</div>
<div class="highlight-box">
  <div class="hb-head">Hydration — The Most Underrated Performance Factor</div>
  <p>Even mild dehydration (1–2% of body weight) impairs cognitive function, mood, and physical performance. By the time you feel thirsty, you're already mildly dehydrated. For exercise: drink before, during (especially in heat), and after. Urine color is a practical indicator: pale yellow = well hydrated; dark yellow = drink more; clear = possibly overhydrated. Water is adequate for most exercise under 60–90 minutes; sports drinks add electrolytes for longer efforts.</p>
</div>
<div class="info-card">
  <div class="ic-head">Common Nutrition Myths vs. Evidence</div>
  <div class="ic-row"><div class="ic-key">"Eating fat makes you fat"</div><div class="ic-val">False. Fat is calorie-dense but doesn't directly cause fat gain — caloric surplus does. Dietary fat is essential for health.</div></div>
  <div class="ic-row"><div class="ic-key">"Carbs are bad"</div><div class="ic-val">Oversimplified. Refined carbs in excess are problematic; whole food carbohydrates are a healthy energy source, especially for active people.</div></div>
  <div class="ic-row"><div class="ic-key">"You must eat within 30 min of exercise"</div><div class="ic-val">Overstated. The "anabolic window" is real but wider than 30 min — getting adequate total daily protein matters more than precise timing.</div></div>
  <div class="ic-row"><div class="ic-key">"Protein shakes are necessary"</div><div class="ic-val">No. Whole food protein sources are equally effective. Shakes are convenient, not superior.</div></div>
  <div class="ic-row"><div class="ic-key">"You can out-exercise a bad diet"</div><div class="ic-val">Almost impossible at a caloric level. Nutrition is the foundation; exercise builds on it.</div></div>
</div>
</div>`,
cultural:`The US government's dietary guidelines have changed significantly over decades, often lagging behind research. The "low-fat" craze of the 1980s–90s — driven partly by flawed research and partly by the food industry's influence on dietary guidelines — led Americans to replace fat with refined carbohydrates, likely contributing to the obesity and diabetes rise. The research on saturated fat, dietary cholesterol, and optimal macronutrient ratios has become much more nuanced. "The science is settled" in nutrition is rarely accurate — the science is ongoing and often messier than headlines suggest. Critical evaluation of nutrition claims is a fundamental health skill.`,
quiz:[
  {q:"Carbohydrates are the body's preferred fuel for high-intensity exercise because:",choices:["They have more calories per gram than protein or fat","They are quickly converted to glucose and can fuel both aerobic and anaerobic metabolism — fat cannot fuel anaerobic (high-intensity) exercise efficiently","Carbohydrates are stored more easily than fat","The digestive system processes carbohydrates faster than other macronutrients"],a:1,fun:"At high intensities, your body needs ATP fast — faster than fat can provide it. Only carbohydrates (glycogen) can fuel anaerobic exercise. At low intensities, fat is the primary fuel. This is why 'carb loading' before endurance events is scientifically justified, and why very low-carb diets impair high-intensity performance. Carbs aren't bad — they're essential. 🍝"},
  {q:"The most accurate indicator of hydration status is:",choices:["Whether you feel thirsty","Urine color — pale yellow indicates good hydration; dark yellow indicates dehydration; clear may indicate overhydration","How much you sweated during exercise","Your weight before and after exercise"],a:1,fun:"Thirst lags behind actual hydration status — you're already mildly dehydrated when thirst kicks in. Urine color is practical and accurate. Dark yellow/amber = drink water now. Pale yellow = you're good. Clear for extended periods = you might be overdrinking (can dilute electrolytes). 💧"},
  {q:"Active people need more protein than sedentary people because:",choices:["Exercise damages muscle protein and the body needs extra protein to repair and grow stronger muscle tissue","Exercise increases body temperature which requires more protein to maintain","Active people lose protein through sweat","Higher caloric intake from exercise increases all macronutrient needs proportionally"],a:0,fun:"Exercise (especially strength training) creates micro-damage in muscle fibers. The repair process builds them back stronger — but requires protein as building material. Active adults: 1.4–2.0 g protein per kg body weight daily. An active 150-lb person (68 kg) needs 95–136g protein per day. Spreading it across meals maximizes muscle protein synthesis. 💪"},
  {q:"The statement 'you can out-exercise a bad diet' is mostly false because:",choices:["Exercise has no effect on caloric needs","The calorie expenditure from exercise is typically much smaller than the caloric content of poor dietary choices — a 30-minute run burns roughly 300 calories, equivalent to one fast food item","Exercise makes people less hungry, reducing the impact of diet quality","The human body absorbs fewer calories when exercising regularly"],a:1,fun:"A 30-minute run ≈ 300 calories. A large fast food meal ≈ 1,000–1,500 calories. The math is brutal. This doesn't mean exercise is unimportant — exercise is essential for health independent of weight — but for body composition, nutrition creates the conditions and exercise refines them. 🍔"}
]},

{id:'u1l4', day:'Week 4, Day 1', title:'Sleep Science — The Foundation of Recovery',
objectives:['Explain the stages and functions of sleep','Understand the health consequences of sleep deprivation','Apply sleep hygiene principles for optimal recovery'],
content:`<div class="body-text">
<p>Sleep is not a passive state — it is when critical biological repair and consolidation happen. For active people especially, sleep is the most powerful recovery tool available. It is also the most commonly sacrificed.</p>
<div class="stat-strip">
  <div class="stat-card"><div class="stat-num">8–10</div><div class="stat-lbl">Hours recommended for teenagers (AASM)</div></div>
  <div class="stat-card"><div class="stat-num">~20%</div><div class="stat-lbl">Teens who actually get 8+ hours on school nights</div></div>
  <div class="stat-card"><div class="stat-num">↓40%</div><div class="stat-lbl">Learning capacity with severe sleep deprivation</div></div>
</div>
<div class="info-card">
  <div class="ic-head">Sleep Stages and Their Functions</div>
  <div class="ic-row"><div class="ic-key">NREM Stage 1–2 (Light)</div><div class="ic-val">Transition to sleep; body temperature drops, heart rate slows. Memory consolidation begins. Easy to wake from. Takes up ~50% of total sleep.</div></div>
  <div class="ic-row"><div class="ic-key">NREM Stage 3 (Deep / Slow Wave)</div><div class="ic-val">Most physically restorative — growth hormone released, muscle repair occurs, immune system consolidates. Hardest to wake from. More concentrated in early part of night.</div></div>
  <div class="ic-row"><div class="ic-key">REM Sleep</div><div class="ic-val">Rapid Eye Movement — most dreaming occurs. Critical for emotional processing, creativity, and procedural memory (learning skills). More concentrated in later part of night. This is why cutting sleep short is especially costly for learning.</div></div>
</div>
<div class="highlight-box">
  <div class="hb-head">What Sleep Deprivation Does to You</div>
  <p>Sleep deprivation mimics intoxication: 17 hours awake ≈ 0.05% blood alcohol (legal impairment threshold in many countries). 24 hours awake ≈ 0.10% BAC. Effects include: impaired decision-making, reduced impulse control, emotional dysregulation, reduced athletic performance (reaction time, accuracy, endurance all decline), impaired immune function, increased cortisol (stress hormone), and with chronic deprivation — elevated risk of obesity, diabetes, cardiovascular disease, and depression.</p>
</div>
<div class="info-card">
  <div class="ic-head">Sleep Hygiene — Evidence-Based Practices</div>
  <div class="ic-row"><div class="ic-key">Consistent schedule</div><div class="ic-val">Same sleep and wake time daily (including weekends). Irregular schedules disrupt circadian rhythm — "social jet lag" from weekend sleep shifts is a real phenomenon with measurable health effects.</div></div>
  <div class="ic-row"><div class="ic-key">Screen-free wind-down</div><div class="ic-val">Blue light from screens suppresses melatonin production (the sleep signal). 30–60 minutes screen-free before bed; or use blue light filters and dim mode.</div></div>
  <div class="ic-row"><div class="ic-key">Cool, dark room</div><div class="ic-val">Core body temperature must drop ~1–2°F to initiate sleep. A cool room facilitates this. Darkness is essential — even small amounts of light can disrupt sleep architecture.</div></div>
  <div class="ic-row"><div class="ic-key">Avoid caffeine late</div><div class="ic-val">Caffeine has a half-life of ~5 hours. A coffee at 3pm means half the caffeine is still in your system at 8pm. Affects sleep quality even if you fall asleep easily.</div></div>
  <div class="ic-row"><div class="ic-key">Exercise timing</div><div class="ic-val">Regular exercise dramatically improves sleep quality. Intense exercise within 1–2 hours of bedtime can temporarily elevate cortisol and delay sleep — individual variation is large.</div></div>
</div>
</div>`,
cultural:`Teenagers have a biologically delayed circadian rhythm — melatonin releases about 1–3 hours later than in adults, making it genuinely difficult to fall asleep before 11pm or wake easily before 8am. School start times before 8:30am conflict with adolescent biology. The American Academy of Pediatrics and the CDC recommend that middle and high schools start no earlier than 8:30am. Some school districts have shifted start times and seen improvements in attendance, grades, mental health, and reduced traffic accidents by teen drivers. This is a public health issue with a known solution that conflicts with adult scheduling convenience.`,
quiz:[
  {q:"REM sleep is particularly important for:",choices:["Physical muscle repair and growth hormone release","Emotional processing, creativity, and procedural memory consolidation — skills learning happens largely during REM","Maintaining a stable body temperature during sleep","Clearing metabolic waste from the brain"],a:1,fun:"REM sleep is when your brain consolidates skills — it's why 'sleeping on it' improves performance on motor tasks. A musician who practices before sleep and gets good REM sleep performs better the next day than one who practices but cuts sleep short. This is why cramming all night before a test is doubly counterproductive: you learn less AND consolidate less. 🧠"},
  {q:"Sleep deprivation impairs performance similarly to alcohol intoxication because:",choices:["Both substances increase serotonin levels in similar ways","17 hours of wakefulness produces cognitive impairment equivalent to a 0.05% blood alcohol concentration — both impair reaction time, decision-making, and impulse control","Both primarily affect the cerebellum","Sleep deprivation and alcohol both reduce cortisol levels"],a:1,fun:"This comparison comes from research by Charles Czeisler at Harvard. Most people driving while very sleepy would be legally impaired if they were drunk. Yet we treat sleep-deprived driving as acceptable and drunk driving as criminal. The impairment is comparable. 'I'm fine' is not reliable self-assessment in either condition. 🚗"},
  {q:"The teenage biological circadian delay means:",choices:["Teenagers need less sleep than adults","Teenagers' melatonin release is biologically delayed ~1–3 hours compared to adults, making early school start times a public health mismatch with adolescent biology","Teenagers are lazy by choice about sleeping late","Teenage sleep patterns are entirely determined by screen use"],a:1,fun:"This is not laziness — it's melatonin. Teenagers who 'can't fall asleep' before 11pm often genuinely cannot because their circadian clock doesn't signal sleep until later. Early school start times force biological misalignment. Schools that have shifted to later start times see measurable improvements in grades, attendance, depression rates, and teen driving accidents. 😴"},
  {q:"The most important sleep hygiene practice for improving sleep quality is:",choices:["Taking melatonin supplements every night","Maintaining a consistent sleep and wake time every day — including weekends — to stabilize the circadian rhythm","Sleeping in a completely silent room","Getting exactly 8 hours of sleep regardless of natural wake time"],a:1,fun:"Consistency beats all other interventions. Variable sleep times create 'social jet lag' — Monday morning after a weekend of late sleeping feels like you flew across time zones. The circadian rhythm is robust and self-regulating if you let it anchor. Other hygiene practices help; this one is foundational. ⏰"}
]},

{id:'u1l5', day:'Week 5, Day 1', title:'CPR, First Aid & Emergency Response',
objectives:['Perform the steps of adult/child/infant CPR correctly','Operate an AED (Automated External Defibrillator)','Respond appropriately to common first aid emergencies'],
content:`<div class="body-text">
<p>CPR and first aid skills are required for NC high school graduation. But beyond the graduation requirement, these are skills that may save a life — possibly someone you love. Cardiac arrest outside a hospital has a survival rate of about 10%. Bystander CPR can double or triple that rate. Knowing what to do in the critical minutes before EMS arrives matters enormously.</p>
<div class="info-card">
  <div class="ic-head">The Chain of Survival (American Heart Association)</div>
  <div class="ic-row"><div class="ic-key">1. Recognize & Call</div><div class="ic-val">Recognize cardiac arrest (unresponsive, no normal breathing). Call 911 immediately. Activate emergency response.</div></div>
  <div class="ic-row"><div class="ic-key">2. Early CPR</div><div class="ic-val">Start CPR immediately. Each minute without CPR reduces survival by 7–10%. Compressions keep blood circulating to brain and heart.</div></div>
  <div class="ic-row"><div class="ic-key">3. Early Defibrillation</div><div class="ic-val">AED shock restores normal heart rhythm. Most effective in the first minutes. AEDs are designed for bystander use — they tell you what to do.</div></div>
  <div class="ic-row"><div class="ic-key">4. Advanced Care</div><div class="ic-val">EMS arrives and provides advanced interventions. Then hospital care.</div></div>
</div>
<div class="formula-box">
  <div class="fb-head">Hands-Only CPR — Adult (Most Common Scenario)</div>
  <div class="formula">1. CHECK: Tap shoulders — "Are you okay?" — check for normal breathing (no more than 10 seconds)</div>
  <div class="formula">2. CALL: Send someone to call 911 and get an AED. Do both simultaneously if alone.</div>
  <div class="formula">3. COMPRESS: Heel of hand on center of chest. Arms straight. Push hard and fast.</div>
  <div class="formula">Rate: 100–120 compressions per minute (tempo of "Stayin' Alive" by the Bee Gees)</div>
  <div class="formula">Depth: At least 2 inches for adults; allow full chest recoil between compressions</div>
  <div class="formula-note">Hands-only CPR (no rescue breaths) is recommended for untrained bystanders on adults. It is effective and simpler than full CPR. Don't stop until EMS arrives or the person shows clear signs of life.</div>
</div>
<div class="checklist">
  <div class="check-item"><span class="ci-icon">⚡</span><span>AED use: Power on → follow voice prompts → attach pads → clear everyone → push shock button if advised → resume CPR immediately after shock</span></div>
  <div class="check-item"><span class="ci-icon">🩸</span><span>Severe bleeding: Apply direct pressure with clean cloth, maintain pressure, don't remove if soaked (add more material), elevate if possible</span></div>
  <div class="check-item"><span class="ci-icon">🔥</span><span>Burns: Cool with cool (not cold) running water for 10–20 minutes; do NOT use ice, butter, or toothpaste; cover loosely</span></div>
  <div class="check-item"><span class="ci-icon">🦴</span><span>Suspected fracture: Immobilize — don't try to straighten; apply ice wrapped in cloth; seek medical care</span></div>
  <div class="check-item"><span class="ci-icon">🌡️</span><span>Heat stroke (hot, dry skin, confusion): Call 911; cool rapidly (ice packs to neck, armpits, groin; fan; move to shade/AC)</span></div>
</div>
</div>`,
cultural:`The "Stayin' Alive" CPR connection was discovered by researchers who measured the song's tempo (103 BPM — within the 100–120 recommended range) and found it actually worked as a mental metronome for compression rate. It became standard teaching practice. Other songs at the right tempo: "Dancing Queen" (ABBA), "Another One Bites the Dust" (Queen — though the title seems unfortunate for this purpose), "Crazy in Love" (Beyoncé). The American Heart Association literally published a playlist. Science meets pop culture in the service of saving lives.`,
quiz:[
  {q:"The compression rate for adult CPR is:",choices:["60–80 compressions per minute","80–100 compressions per minute","100–120 compressions per minute — approximately the tempo of 'Stayin' Alive'","140–160 compressions per minute"],a:2,fun:"100–120 BPM. 'Stayin' Alive' is 103 BPM — right in the zone. Push hard (2+ inches deep), push fast, let the chest fully recoil between compressions. Do NOT lean on the chest between compressions — full recoil allows the heart to refill. Fatigue is real — if someone else is available, switch every 2 minutes. 💓"},
  {q:"Bystander CPR is important because:",choices:["It eliminates the need for EMS response","Each minute without CPR reduces cardiac arrest survival by 7–10% — bystander CPR can double or triple survival rates by maintaining blood flow until EMS arrives","CPR alone can restart a stopped heart without an AED","Only trained medical professionals can effectively perform CPR"],a:1,fun:"Survival from out-of-hospital cardiac arrest without CPR: about 10%. With bystander CPR: 20–30% or more. CPR doesn't restart the heart — it keeps blood circulating until a defibrillator can restore normal rhythm. Every minute counts. This is why AEDs are placed in public spaces and why bystander response matters enormously. ⏱️"},
  {q:"An AED (Automated External Defibrillator) is designed so that:",choices:["Only trained medical professionals can operate it safely","Any bystander can use it — it analyzes heart rhythm and will only advise a shock when one is needed; it talks you through every step","It requires knowledge of cardiac rhythms to operate effectively","It must be used simultaneously with CPR at all times"],a:1,fun:"AEDs are specifically designed for panicked, untrained bystanders. They will NOT advise a shock if the heart is in a shockable rhythm — they analyze and make the decision. Your job: turn it on, follow the voice prompts, clear everyone before the shock, immediately resume CPR after. The device tells you what to do. Don't be afraid to use one — you cannot make the situation worse. ⚡"},
  {q:"For severe external bleeding, the most important first aid action is:",choices:["Applying a tourniquet above the wound immediately","Cleaning the wound thoroughly with water before applying pressure","Applying direct, continuous pressure with clean material — and maintaining that pressure even if it soaks through","Keeping the wound elevated above heart level as the primary intervention"],a:2,fun:"Direct pressure is the cornerstone. Don't remove blood-soaked material (you'll disrupt clotting); add more material on top and keep pressing. Elevation helps if possible. Tourniquets for limbs in life-threatening bleeding are now standard recommendation — the 'only as last resort' guidance has changed based on military medicine data. For most bleeding: pressure, pressure, pressure. 🩸"}
]},
]},

{id:'u2', emoji:'🧠', name:'Mental Health & Wellness', weeks:'Weeks 6–10, Semester 1', lessons:[
{id:'u2l1', day:'Week 6, Day 1', title:'Mental Health Literacy — Understanding the Basics',
objectives:['Define mental health and mental health disorders','Recognize common mental health conditions and their symptoms','Understand stigma and why it prevents people from seeking help'],
content:`<div class="body-text">
<p>Mental health is not just the absence of mental illness — it's a positive state of wellbeing where you can recognize your own potential, cope with normal stresses, work productively, and contribute to your community. Like physical health, mental health exists on a spectrum, changes over time, and responds to effort and care.</p>
<div class="stat-strip">
  <div class="stat-card"><div class="stat-num">1 in 5</div><div class="stat-lbl">US adults experience mental illness each year</div></div>
  <div class="stat-card"><div class="stat-num">1 in 8</div><div class="stat-lbl">Adolescents with depression</div></div>
  <div class="stat-card"><div class="stat-num">75%</div><div class="stat-lbl">Mental health conditions begin by age 24</div></div>
</div>
<div class="info-card">
  <div class="ic-head">Common Mental Health Conditions — Facts vs. Myths</div>
  <div class="ic-row"><div class="ic-key">Depression</div><div class="ic-val">Not just sadness — persistent low mood, loss of interest, fatigue, cognitive changes, sleep disruption. A medical condition involving brain chemistry, not a character flaw. Responds to treatment (therapy, medication, lifestyle). About 1 in 8 adolescents is affected.</div></div>
  <div class="ic-row"><div class="ic-key">Anxiety Disorders</div><div class="ic-val">The most common mental health condition. Some anxiety is normal and adaptive (improves performance). Anxiety disorders involve excessive, persistent, disruptive anxiety. Generalized anxiety, social anxiety, panic disorder, phobias — each has specific features.</div></div>
  <div class="ic-row"><div class="ic-key">ADHD</div><div class="ic-val">Neurodevelopmental difference involving difficulty with attention regulation, impulse control, and executive function. Not a result of poor parenting or lack of effort. Often undiagnosed in girls (presentation can differ). Many strategies help.</div></div>
  <div class="ic-row"><div class="ic-key">Eating Disorders</div><div class="ic-val">Anorexia, bulimia, binge eating disorder, ARFID — serious medical conditions with the highest mortality rate of any psychiatric diagnosis. Driven by complex psychological, social, and biological factors. Not vanity or choice.</div></div>
</div>
<div class="highlight-box">
  <div class="hb-head">Stigma — The Biggest Barrier to Getting Help</div>
  <p>Mental health stigma — negative attitudes, stereotypes, and discrimination based on mental illness — prevents millions of people from seeking help. Studies show people wait an average of 11 years between first experiencing symptoms and seeking treatment. Stigma says: weakness, danger, personal failure. Science says: medical condition, treatable, common. Reducing stigma starts with accurate information, talking openly, and treating mental health with the same matter-of-fact approach as physical health.</p>
</div>
<div class="tip-box">
  <div class="tb-head">When to Reach Out for Help</div>
  <p>Reach out to a trusted adult, counselor, or mental health professional when: feelings of hopelessness, sadness, or anxiety are persistent (lasting more than 2 weeks), interfering with school, relationships, or daily functioning, or when you're having thoughts of self-harm or harming others. Crisis resources: National Suicide and Crisis Lifeline: 988 (call or text). Crisis Text Line: text HOME to 741741. These services are free and confidential.</p>
</div>
</div>`,
cultural:`The Mental Health Parity and Addiction Equity Act (2008) required that insurance coverage for mental health conditions be comparable to coverage for physical health conditions — but enforcement has been weak and loopholes significant. The COVID-19 pandemic created a significant increase in anxiety, depression, and suicide ideation, especially among adolescents, while simultaneously disrupting access to mental health services. Telehealth expanded mental health access significantly. In NC, the availability of mental health services in rural areas remains a significant gap — understanding and navigating available resources is a genuine health literacy skill.`,
quiz:[
  {q:"Mental health, as defined by the WHO, is best described as:",choices:["The absence of any mental illness or psychological symptoms","A positive state of wellbeing in which a person can realize their potential, cope with normal stresses, work productively, and contribute to their community — not just the absence of illness","A fixed trait determined by genetics that doesn't change over time","The ability to manage emotions without professional assistance"],a:1,fun:"This framing shifts mental health from 'not sick' to 'actively thriving.' You can be diagnosable with depression AND work toward mental health. You can have no diagnosis AND struggle with mental health. It's a spectrum that changes over time and responds to effort — much like physical fitness. 🌱"},
  {q:"The primary reason people wait an average of 11 years between experiencing mental health symptoms and seeking help is:",choices:["Mental health treatment is too expensive for most people","Mental health conditions resolve on their own without treatment in most cases","Mental health stigma — negative attitudes and fear of judgment prevent people from acknowledging symptoms and seeking help","There are not enough mental health providers to meet demand"],a:2,fun:"11 years. The average. During that time, conditions often worsen, complications develop, and opportunities for earlier, easier treatment are missed. The gap is primarily stigma-driven — 'I should be able to handle this,' 'people will think I'm weak,' 'it's not serious enough.' Mental health treatment works best early. 😔"},
  {q:"Eating disorders are best understood as:",choices:["Choices made by vain people who prioritize appearance over health","Serious medical conditions with the highest mortality rate of any psychiatric diagnosis, driven by complex psychological, social, and biological factors","Problems that primarily affect white, upper-class teenage girls","Primarily a result of social media influence on body image"],a:1,fun:"Eating disorders have the highest mortality rate of any psychiatric condition. They affect people of all genders, ages, races, and body sizes. They are driven by complex interactions of genetics, psychology, and social factors — not vanity or choice. 'Just eat more' is as useful as telling someone with a broken leg to 'just walk.' 💙"},
  {q:"If you or someone you know is experiencing thoughts of self-harm or suicide, the most important first step is:",choices:["Wait to see if the feelings pass on their own before involving anyone else","Tell the person to think positively and focus on reasons to live","Reach out to a trusted adult or crisis resource immediately — 988 (call or text) is the National Suicide and Crisis Lifeline","Research self-help resources online before contacting any professional"],a:2,fun:"988 is free, confidential, available 24/7, and staffed by trained crisis counselors. Crisis Text Line (text HOME to 741741) is also available. These are not last resorts — they're first resources. Connecting someone to help is not betraying their trust; it's taking their safety seriously. If someone is in immediate danger, call 911. 📞"}
]},

{id:'u2l2', day:'Week 7, Day 1', title:'Stress, Emotional Regulation & Coping Strategies',
objectives:['Understand the physiological stress response','Distinguish healthy from unhealthy coping mechanisms','Practice evidence-based emotional regulation techniques'],
content:`<div class="body-text">
<p>Stress is not inherently bad — it's a biological response that evolved to help us handle threats. The problem is when the stress system stays activated chronically, when the "threat" is social media or school pressure rather than a predator, and when we cope with maladaptive strategies that create new problems.</p>
<div class="info-card">
  <div class="ic-head">The Stress Response — What Happens in Your Body</div>
  <div class="ic-row"><div class="ic-key">Trigger</div><div class="ic-val">Brain perceives a threat (real or imagined, physical or psychological). The amygdala sends a distress signal.</div></div>
  <div class="ic-row"><div class="ic-key">HPA axis activation</div><div class="ic-val">Hypothalamus triggers the adrenal glands to release adrenaline (immediate) and cortisol (sustained). Heart rate and blood pressure rise. Blood goes to muscles, away from digestion.</div></div>
  <div class="ic-row"><div class="ic-key">Acute response</div><div class="ic-val">Heightened alertness, faster reaction time, suppressed digestion and immune function, elevated blood sugar for quick energy. Useful short-term.</div></div>
  <div class="ic-row"><div class="ic-key">Chronic activation</div><div class="ic-val">Sustained high cortisol: disrupts sleep, impairs memory (shrinks hippocampus), suppresses immune system, increases inflammation, promotes fat storage, elevates cardiovascular risk, worsens mood. Deeply harmful long-term.</div></div>
</div>
<div class="highlight-box">
  <div class="hb-head">The Yerkes-Dodson Curve — Optimal Arousal</div>
  <p>Performance on most tasks is best at intermediate levels of arousal (stress/activation). Too little stress → boredom, lack of motivation, poor performance. Too much stress → anxiety, cognitive overload, poor performance. The sweet spot — called optimal arousal — is where you feel engaged and challenged but not overwhelmed. This is why some exam anxiety can improve performance (increases focus) while severe anxiety impairs it (cognitive resources hijacked by worry). Managing stress is about finding and maintaining optimal arousal, not eliminating stress entirely.</p>
</div>
<div class="info-card">
  <div class="ic-head">Evidence-Based Coping Strategies</div>
  <div class="ic-row"><div class="ic-key">Diaphragmatic breathing</div><div class="ic-val">Deep belly breathing activates the parasympathetic nervous system (the "rest and digest" system), directly counteracting the stress response. 4-7-8 breathing: inhale 4 sec, hold 7 sec, exhale 8 sec. Takes effect in minutes.</div></div>
  <div class="ic-row"><div class="ic-key">Physical exercise</div><div class="ic-val">Metabolizes stress hormones, releases endorphins and BDNF (brain-derived neurotrophic factor — "miracle-gro for the brain"), improves sleep, reduces anxiety and depression. One of the most consistently effective interventions.</div></div>
  <div class="ic-row"><div class="ic-key">Cognitive reappraisal</div><div class="ic-val">Change how you think about the stressor: "This is an opportunity to show what I've learned" vs. "I'm going to fail." Reframing changes the emotional response without denying the challenge. More effective long-term than suppression.</div></div>
  <div class="ic-row"><div class="ic-key">Social connection</div><div class="ic-val">Talking to a trusted person reduces cortisol. The "tend and befriend" stress response (more common in women) — social connection in response to stress — is highly adaptive. Isolation amplifies stress.</div></div>
  <div class="ic-row"><div class="ic-key">Adequate sleep</div><div class="ic-val">Sleep is when cortisol is cleared and emotional processing occurs. Sleep deprivation significantly amplifies emotional reactivity — the amygdala is 60% more reactive when sleep-deprived.</div></div>
</div>
</div>`,
cultural:`The Adverse Childhood Experiences (ACE) study (1995–1997, over 17,000 participants) found that childhood exposure to abuse, neglect, and household dysfunction creates lasting biological changes — epigenetic, neurological, and physiological — that increase risk for physical and mental health problems decades later. People with 4+ ACE scores have dramatically higher rates of heart disease, cancer, depression, and early death. This research reframed childhood trauma as a public health crisis. Trauma-informed care — in schools, healthcare, and criminal justice — is a direct policy response to this evidence. Understanding stress biology helps explain why adverse early experiences have such long reach.`,
quiz:[
  {q:"The Yerkes-Dodson curve shows that performance is best when:",choices:["Stress and arousal are completely absent","Stress and arousal are at an intermediate 'optimal' level — enough to focus and motivate, not so much as to overwhelm","Maximum stress is present to trigger peak performance","Stress is suppressed through medication or relaxation techniques"],a:1,fun:"This is why some pre-competition nervousness helps athletes, and why boredom hurts performance. The optimal zone varies by task: complex cognitive tasks have a lower optimal arousal level than simple physical tasks. Test anxiety beyond moderate levels hijacks cognitive resources, reducing performance. The goal is optimal, not zero. 📊"},
  {q:"Chronic (long-term) activation of the stress response causes harm primarily because:",choices:["The stress response uses too much blood sugar, causing nutritional deficiency","Sustained high cortisol disrupts sleep, impairs memory, suppresses immune function, increases inflammation, and elevates cardiovascular risk — systems meant to be temporarily diverted become chronically disrupted","Adrenaline accumulates in tissues and becomes toxic","People become physically exhausted from continuous physiological activation"],a:1,fun:"Cortisol is useful for sprinting away from a threat. Cortisol activated by work stress for years shrinks your hippocampus (memory center), suppresses your immune system, disrupts sleep, and increases cardiovascular risk. The same mechanism that saves your life in the short term damages it in the long term when never turned off. 😰"},
  {q:"Diaphragmatic (deep belly) breathing reduces the stress response because:",choices:["It distracts the mind from stressful thoughts","It directly activates the parasympathetic nervous system ('rest and digest') which physiologically counteracts the sympathetic stress response","It increases oxygen levels that help cortisol break down faster","It triggers the release of endorphins that offset cortisol"],a:1,fun:"The vagus nerve — the primary parasympathetic nerve — is activated by slow, deep breathing. This is the physiological mechanism behind meditation, yoga, mindfulness, and most relaxation techniques. 4-7-8 breathing, box breathing, and simple slow exhales all work. This is one of the fastest, most reliable ways to shift your nervous system state. 🌬️"},
  {q:"Cognitive reappraisal as a coping strategy involves:",choices:["Suppressing stressful thoughts until they go away","Distraction through physical activity or social media","Changing how you interpret a stressful situation — finding a different, less threatening, or more empowering meaning — which changes the emotional response","Accepting that the stressor is unchangeable and unimportant"],a:2,fun:"'I have a test tomorrow — I'm going to fail' (catastrophizing) → 'I have a test tomorrow — this is an opportunity to show what I've learned, and I've been preparing' (reappraisal). Same test, different interpretation, different emotional response, different performance. Research shows reappraisal is more effective than suppression (which actually amplifies stress). 🔄"}
]},
]},

{id:'u3', emoji:'⚠️', name:'Substance Use Education', weeks:'Weeks 11–14, Semester 1', lessons:[
{id:'u3l1', day:'Week 11, Day 1', title:'Understanding Addiction — How the Brain Changes',
objectives:['Explain the neurological mechanism of addiction','Understand why adolescent brains are more vulnerable to addiction','Evaluate tobacco, alcohol, and cannabis risks for developing brains'],
content:`<div class="body-text">
<p>Addiction is not a moral failure or lack of willpower — it is a change in brain structure and function caused by repeated substance exposure. Understanding the biology removes the moral judgment and clarifies why recovery is genuinely difficult, and why prevention during adolescence matters so much.</p>
<div class="info-card">
  <div class="ic-head">The Neuroscience of Addiction</div>
  <div class="ic-row"><div class="ic-key">The reward system</div><div class="ic-val">The brain's limbic system releases dopamine in response to rewards (food, connection, achievement). Addictive substances hijack this system, releasing dopamine at levels impossible to reach naturally — creating a "shortcut" to intense pleasure.</div></div>
  <div class="ic-row"><div class="ic-key">Tolerance</div><div class="ic-val">The brain adapts to repeated substance exposure by reducing dopamine receptor sensitivity. More substance is needed to get the same effect — and the natural reward system becomes relatively inadequate, making normal pleasures feel flat.</div></div>
  <div class="ic-row"><div class="ic-key">Dependence</div><div class="ic-val">Physical adaptation where the body requires the substance to function "normally." Withdrawal — the unpleasant symptoms of stopping — is the physical manifestation of dependence. Not the same as addiction, though often co-occurring.</div></div>
  <div class="ic-row"><div class="ic-key">Craving & relapse</div><div class="ic-val">Environmental cues (places, people, emotions) associated with substance use can trigger powerful cravings long after stopping — because memory circuits linked to the reward system remain changed. This is why relapse is common even after years of abstinence.</div></div>
</div>
<div class="highlight-box">
  <div class="hb-head">Why Adolescent Brains Are More Vulnerable</div>
  <p>The prefrontal cortex — responsible for impulse control, risk assessment, and long-term planning — isn't fully developed until around age 25. Adolescents have a fully-developed reward system (seeking novel experiences, immediate rewards) without the fully-developed brake system (evaluating long-term consequences). Substances used during adolescence produce addiction more quickly, with lower doses, and cause more lasting neurological changes than the same substances used as adults. The earlier the initiation, the higher the addiction risk.</p>
</div>
<div class="info-card">
  <div class="ic-head">Specific Substance Risks for Adolescents</div>
  <div class="ic-row"><div class="ic-key">Nicotine / Vaping</div><div class="ic-val">Nicotine reaches the brain in 10 seconds; causes dopamine release. Adolescent brains become addicted faster and more deeply than adult brains. Vaping delivers nicotine more efficiently than cigarettes. "Just occasional" use during adolescence often becomes regular use. JUUL delivered nicotine equivalent to 20 cigarettes per pod.</div></div>
  <div class="ic-row"><div class="ic-key">Alcohol</div><div class="ic-val">A central nervous system depressant. The prefrontal cortex is depressed first (inhibition released before coordination impaired — why people "feel braver"). Alcohol disrupts REM sleep. Adolescent brains show greater neurological damage from alcohol than adult brains at equivalent doses.</div></div>
  <div class="ic-row"><div class="ic-key">Cannabis (THC)</div><div class="ic-val">THC binds to endocannabinoid receptors that play important roles in brain development during adolescence. Regular adolescent cannabis use is associated with IQ changes, increased depression/anxiety risk, and higher probability of cannabis use disorder. High-potency concentrates (dabs, wax) carry higher risk.</div></div>
</div>
</div>`,
cultural:`The national conversation about cannabis has shifted dramatically with legalization in many states — creating a gap between legal status and the evidence on adolescent risk. Cannabis is legal for adults in NC's neighboring states; it is not legal for minors anywhere. The public health concern is specific to adolescent developing brains, not adult use. The evidence on adolescent cannabis use is consistent: earlier use + more frequent use + higher potency = greater risk of negative outcomes. Legalization for adults changes the legal landscape; it does not change adolescent neurobiology. These are distinct questions.`,
quiz:[
  {q:"Addiction involves changes in the brain primarily because:",choices:["Addictive substances create psychological habits without physical brain changes","Repeated substance exposure causes structural and functional changes in the brain's reward circuitry — tolerance, altered dopamine systems, memory-linked cravings — making quitting genuinely difficult even after the desire to quit is strong","Addiction is primarily a behavioral habit rather than a brain disorder","The physical withdrawal symptoms are the primary driver of continued substance use"],a:1,fun:"The brain physically changes — receptor densities shift, dopamine systems recalibrate, memory circuits link cues to craving. Telling an addicted person to 'just stop' ignores these biological changes — it's similar to telling someone with a broken leg to 'just run.' This doesn't remove personal responsibility, but it explains why willpower alone is often insufficient. 🧠"},
  {q:"The adolescent brain is more vulnerable to addiction than an adult brain because:",choices:["Teenagers metabolize substances faster, leading to more frequent use","The fully-developed reward system (novelty-seeking) is not matched by a fully-developed prefrontal cortex (impulse control, long-term thinking) — substances produce addiction faster with lower doses during this critical window","Adolescent bodies have more receptor sites for addictive substances","Teenagers are more likely to be exposed to addictive substances than adults"],a:1,fun:"This is why the evidence on all substances — nicotine, alcohol, cannabis — shows greater risk with earlier initiation. The developing brain is literally being built during adolescence. Substances that bind to neurotransmitter systems during this construction phase leave lasting changes that wouldn't occur in an adult brain. 🔧"},
  {q:"Tolerance to a substance develops because:",choices:["The substance becomes less pure over time","The body produces antibodies that neutralize the substance","The brain reduces receptor sensitivity in response to repeated exposure — making more substance necessary for the same effect, and making normal pleasures feel less rewarding by comparison","The liver processes the substance more efficiently with practice"],a:2,fun:"Tolerance is adaptation — your brain downregulates dopamine receptors to compensate for the artificial flooding. The user now needs more substance AND finds natural rewards (food, connection, achievement) less satisfying because the baseline dopamine sensitivity has dropped. This is the trap: the thing that made you feel good now just makes you feel normal. 😔"},
  {q:"Relapse after a period of sobriety is common because:",choices:["People who relapse never truly wanted to stop","The treatment they received was ineffective","Environmental cues linked to past substance use can trigger intense cravings long after stopping — because memory circuits connecting cues to reward remain in the brain","People who relapse have a moral weakness that prevents sustained recovery"],a:2,fun:"The place, people, songs, smells, or emotions associated with past use can trigger powerful cravings through conditioned associations — sometimes years after stopping. This isn't failure of will; it's neuroscience. Recovery programs address cue exposure systematically. Understanding relapse as a brain phenomenon rather than a moral failure changes how we support people in recovery. 🔄"}
]},
]},

{id:'u4', emoji:'📱', name:'Digital Wellness & Consumer Health', weeks:'Weeks 1–4, Semester 2', lessons:[
{id:'u4l1', day:'S2 Week 1, Day 1', title:'Screens, Social Media & Mental Health',
objectives:['Evaluate the evidence on social media\'s mental health effects','Apply the concept of intentional technology use','Develop personal strategies for digital wellness'],
content:`<div class="body-text">
<p>You are the first generation to grow up with smartphones and social media as normal from childhood. The research on effects is still developing — but what we know is nuanced: it's not simply that social media is harmful, nor that it's neutral. The effects depend heavily on how, how much, and for what purpose you use it.</p>
<div class="info-card">
  <div class="ic-head">What the Research Actually Shows</div>
  <div class="ic-row"><div class="ic-key">The nuanced picture</div><div class="ic-val">Research (Jonathan Haidt, Jean Twenge, Amy Orben, Andrew Przybylski) shows associations between heavy social media use and anxiety/depression — especially in teenage girls. But associations don't prove causation. Unhappy people may use social media more; social media may make people more unhappy; both; neither alone.</div></div>
  <div class="ic-row"><div class="ic-key">Passive vs. active use</div><div class="ic-val">Passive use (scrolling, watching others' lives) is more consistently associated with negative feelings than active use (posting, interacting, creating). The "compare and despair" dynamic comes primarily from passive consumption of curated highlight reels.</div></div>
  <div class="ic-row"><div class="ic-key">Sleep disruption</div><div class="ic-val">Most consistently harmful documented effect: phone use displaces sleep, blue light disrupts melatonin, and content activates rather than relaxes before bed. The combination of less sleep + worse sleep quality + more emotional content creates measurable mental health consequences.</div></div>
  <div class="ic-row"><div class="ic-key">Positive effects exist too</div><div class="ic-val">Social media provides connection for isolated teens, community for marginalized groups (LGBTQ+ youth in unsupportive environments), creative outlets, access to information and activism. The relationship is complex, not simply harmful.</div></div>
</div>
<div class="highlight-box">
  <div class="hb-head">Intentional Technology Use</div>
  <p>The question isn't "is social media good or bad?" — it's "how are YOU using it, and is that serving your wellbeing?" Intentional use means: using platforms with purpose rather than defaulting to them when bored, knowing what you're looking for when you open an app, noticing how you feel during and after use, and making conscious choices about time and content. Social media is designed by psychologists and engineers to maximize engagement — your intentional use is competing against deliberate engineering. That's the real challenge.</p>
</div>
<div class="checklist">
  <div class="check-item"><span class="ci-icon">📵</span><span><strong>Phone-free bedroom:</strong> Charge your phone outside your room. Sleep quality and morning mood consistently improve. This single change has the strongest evidence base of any digital wellness intervention.</span></div>
  <div class="check-item"><span class="ci-icon">⏱️</span><span><strong>Time boundaries:</strong> Set specific times for checking social media rather than responding to every notification. Notifications are engineered to feel urgent; most aren't.</span></div>
  <div class="check-item"><span class="ci-icon">👁️</span><span><strong>Audit your feeds:</strong> Curate what you see. Accounts that make you feel inadequate, envious, or anxious — unfollow. You have control over your information environment.</span></div>
  <div class="check-item"><span class="ci-icon">🔄</span><span><strong>Notice your state:</strong> How do you feel before and after phone use? Track it for a week. The data from your own experience is the most relevant data you can collect.</span></div>
</div>
</div>`,
cultural:`The Center for Humane Technology — founded by former Google Design Ethicist Tristan Harris — argues that social media platforms are "slot machines in your pocket" — using variable reward schedules (sometimes you get a like, sometimes you don't) to maximize engagement. The same psychological principles that make gambling addictive are applied to social media by design. Harris's Netflix documentary "The Social Dilemma" (2020) made this argument to a broad audience. The platforms dispute the characterization while employing hundreds of psychologists and behavioral scientists whose job is to maximize the time you spend on the platform. The incentive structure is what it is.`,
quiz:[
  {q:"Research on social media and mental health is best summarized as showing:",choices:["Social media definitively causes depression and anxiety in all users","Social media has no meaningful effects on mental health","Associations between heavy use and negative mental health outcomes — especially in teenage girls — with the causal direction and mechanisms still being studied","Social media improves mental health for most users through increased social connection"],a:2,fun:"The research is genuinely complex. Associations are real; causation is debated. Heavy passive use correlates with lower wellbeing. Causation could run either direction. What IS clear: sleep displacement from phones has documented harmful effects, and platforms are designed to maximize engagement regardless of wellbeing effects. 📊"},
  {q:"Passive social media use (scrolling, observing others' lives) is more consistently associated with negative feelings than active use because:",choices:["Passive use takes more time than active use","Passive scrolling exposes you primarily to curated highlight reels of others' best moments, triggering upward social comparison — while active use (creating, connecting) provides a sense of agency and belonging","Passive use contains more advertising content","The algorithms show more negative content during passive browsing"],a:1,fun:"Upward social comparison (comparing yourself to people who seem better off) reliably reduces wellbeing. Instagram highlights are curated — nobody posts their bad days, mundane moments, or failures at the same rate as their exciting experiences. Passive consumption of highlights creates a systematically distorted picture of others' lives. 📸"},
  {q:"The most consistently documented harmful effect of smartphone use on adolescent wellbeing is:",choices:["Increased exposure to cyberbullying","Reduced physical activity due to time spent on devices","Sleep displacement and disruption — phones in bedrooms delay sleep, reduce sleep quality, and expose users to emotionally activating content before sleep","Reduced face-to-face social skills development"],a:2,fun:"Sleep is where the evidence is clearest. Blue light suppresses melatonin. Notification checking delays sleep onset. Emotionally activating content prevents the wind-down needed for sleep. The phone in the bedroom combines all three. Charging the phone outside the bedroom is the single intervention with the strongest evidence base for improving adolescent wellbeing. 😴"},
  {q:"'Intentional technology use' means:",choices:["Using technology only for educational purposes","Limiting technology use to specific approved apps","Using technology with conscious awareness of your purpose, noticing its effects on your wellbeing, and making deliberate choices about time and content rather than using it by default or habit","Tracking all your screen time and keeping it under one hour daily"],a:2,fun:"The opposite of intentional use: opening your phone every time you're slightly bored, scrolling for an hour without any particular purpose, checking notifications the moment they arrive. Intentional use asks: why am I reaching for my phone? Is this serving me? How do I feel right now, and how will I feel in 30 minutes? These questions create space between stimulus and response — where wellbeing is built. 🎯"}
]},
]},
