{id:'u5', emoji:'🏃', name:'Physical Activity for Life', weeks:'Weeks 5–9, Semester 2', lessons:[
{id:'u5l1', day:'S2 Week 5, Day 1', title:'Building Lifelong Fitness Habits',
objectives:['Apply behavior change principles to fitness habit formation','Design a personalized fitness plan','Understand how to maintain fitness across life stages'],
content:`<div class="body-text">
<p>Knowledge of exercise is not the same as exercising. The gap between knowing you should be physically active and consistently being physically active is where most people live. Behavior change science has identified evidence-based strategies that bridge this gap — and they work better than willpower alone.</p>
<div class="info-card">
  <div class="ic-head">Evidence-Based Behavior Change Strategies</div>
  <div class="ic-row"><div class="ic-key">SMART goals</div><div class="ic-val"><strong>S</strong>pecific · <strong>M</strong>easurable · <strong>A</strong>chievable · <strong>R</strong>elevant · <strong>T</strong>ime-bound. "Get in shape" fails; "Walk 30 minutes 4 days/week for 8 weeks starting Monday" succeeds. Specificity creates accountability.</div></div>
  <div class="ic-row"><div class="ic-key">Implementation intentions</div><div class="ic-val">"When/where/how" planning. "I will exercise on Monday, Wednesday, and Friday at 4pm at the park near my house." Research shows if-then planning dramatically improves follow-through compared to vague intentions.</div></div>
  <div class="ic-row"><div class="ic-key">Habit stacking</div><div class="ic-val">Attach new behavior to an existing habit. "After I brush my teeth in the morning, I will do 10 minutes of stretching." The existing habit serves as the trigger for the new one.</div></div>
  <div class="ic-row"><div class="ic-key">Remove friction</div><div class="ic-val">Put your workout clothes by your bed. Pack your bag the night before. Make the desired behavior the path of least resistance. Every barrier reduced is a meaningful increase in the probability of follow-through.</div></div>
  <div class="ic-row"><div class="ic-key">Identity-based habits</div><div class="ic-val">James Clear (Atomic Habits): the most durable habit change comes from identity shift, not outcome goals. "I'm trying to exercise more" vs. "I'm becoming a person who is physically active." Each workout is a vote for the identity you're building.</div></div>
</div>
<div class="tip-box">
  <div class="tb-head">The Most Important Exercise Principle for Long-Term Adherence</div>
  <p>Find activities you enjoy enough to do consistently — even if they're not "optimal" — rather than doing the theoretically best exercise program poorly. A person who enjoys hiking and does it twice a week will have dramatically better long-term outcomes than a person who does the "best" gym program for 6 weeks then quits. Consistency over optimization. The best workout is the one you'll actually do.</p>
</div>
<div class="formula-box">
  <div class="fb-head">Building Your Personal Fitness Plan</div>
  <div class="formula">Step 1: Assess your current fitness (what can you do comfortably?)</div>
  <div class="formula">Step 2: Identify your goal (health maintenance? strength gain? endurance?)</div>
  <div class="formula">Step 3: Choose activities you enjoy and can access</div>
  <div class="formula">Step 4: Apply FITT principle — start conservatively, build gradually</div>
  <div class="formula">Step 5: Schedule it — put it in your calendar like a commitment</div>
  <div class="formula">Step 6: Track progress and adjust every 4–6 weeks</div>
  <div class="formula-note">Start where you are, not where you think you should be. Starting too hard leads to injury and burnout. Sustainable progress beats heroic starts followed by collapse.</div>
</div>
</div>`,
cultural:`The Blue Zones research (Dan Buettner) identified regions of the world with exceptional longevity — Okinawa, Sardinia, Nicoya Peninsula, Ikaria, Loma Linda. Common factors: plant-rich diets, moderate natural wine consumption, strong social connection, purpose ("ikigai" in Okinawan), stress management practices, and crucially — not going to the gym, but having movement built into daily life. Walking everywhere, gardening, herding animals. The lesson: you don't need an elaborate gym program; you need consistent moderate movement woven into your life. The American model of sedentary life punctuated by gym visits is less effective than a lifestyle that makes movement the default.`,
quiz:[
  {q:"SMART goals are more effective than general goals because:",choices:["They are more ambitious and motivating","Specificity, measurability, and time-binding create accountability and a clear success criterion — 'get fit' gives you no way to know if you succeeded or what to do next","They are designed by certified fitness professionals","They automatically adjust to your current fitness level"],a:1,fun:"'Get in shape' — how do you know when you've succeeded? What exactly are you doing? When? 'Run a 5K in under 35 minutes by June 1st by running 3× per week starting this Monday' — every part of this is actionable and measurable. The specificity is what makes follow-through possible. 🎯"},
  {q:"Identity-based habits (James Clear's framework) are more durable than outcome-based habits because:",choices:["They focus on immediate rewards rather than distant goals","Shifting your self-concept ('I am a physically active person') makes each workout consistent with who you are — rather than a sacrifice toward a distant goal that may feel irrelevant on any given day","They require less effort than traditional goal-setting approaches","They are based on scientific research that outcome-based goals do not use"],a:1,fun:"'I'm trying to exercise more' requires continuous motivation. 'I'm a person who is physically active' — when you skip a workout, it conflicts with your identity rather than just your goal. Each workout reinforces the identity; each skipped workout becomes a choice about who you are. Identity change is slow but the most durable kind. 🏃"},
  {q:"The most important factor for long-term fitness maintenance is:",choices:["Following the scientifically optimal exercise program","Consistency over optimization — finding activities you genuinely enjoy enough to do regularly, even if they're not theoretically best","Exercising at maximum intensity every session","Training with a professional coach or trainer"],a:1,fun:"A person who does 'good enough' exercise consistently for 10 years will be vastly healthier than a person who does the 'best' program for 3 months and then stops. Enjoyment and sustainability are the multipliers. This is the meta-lesson of exercise science for the general population. 💪"},
  {q:"'Implementation intentions' improve exercise adherence compared to vague intentions because:",choices:["They make goals more ambitious","Specifying exactly when, where, and how you will exercise removes the daily decision-making that often leads to skipping — the plan is already made","They require social accountability from others","They connect exercise to financial incentives"],a:1,fun:"Research by Peter Gollwitzer shows that if-then planning (when X happens, I will do Y) dramatically increases follow-through compared to just intending to do something. 'I will exercise more' → maybe. 'When I finish school on Tuesdays and Thursdays, I will put on my shoes immediately and walk for 30 minutes' → much more likely. The plan removes the friction of deciding. 📅"}
]},

{id:'u5l2', day:'S2 Week 7, Day 1', title:'Sexual Health — Rights, Responsibility & Resources',
objectives:['Understand NC sexual health education standards','Apply decision-making frameworks to relationship and sexual health choices','Know how to access sexual health resources and services'],
content:`<div class="body-text">
<p>Sexual health is a normal and important part of overall health. Making informed decisions requires accurate information, clear values, and knowledge of available resources — not shame or avoidance. This lesson provides factual, age-appropriate information aligned with NC Healthful Living Standards.</p>
<div class="info-card">
  <div class="ic-head">Key Sexual Health Facts</div>
  <div class="ic-row"><div class="ic-key">Consent</div><div class="ic-val">Freely given, reversible, informed, enthusiastic, and specific (FRIES). All sexual activity requires consent from all people involved. Consent cannot be given by someone who is intoxicated, unconscious, or under the legal age of consent. NC age of consent: 16.</div></div>
  <div class="ic-row"><div class="ic-key">STI prevention</div><div class="ic-val">Consistent and correct condom use reduces STI transmission risk significantly. Regular STI testing is recommended for sexually active people. Many STIs (including chlamydia) are asymptomatic — testing is the only way to know status. Most STIs are treatable; some are curable.</div></div>
  <div class="ic-row"><div class="ic-key">Pregnancy prevention</div><div class="ic-val">Abstinence is the only 100% effective method. Hormonal contraception (pills, patch, ring, injection, implant) and IUDs are highly effective when used correctly. Condoms are the only method that also reduces STI risk. Combining methods is most effective.</div></div>
  <div class="ic-row"><div class="ic-key">LGBTQ+ health</div><div class="ic-val">LGBTQ+ individuals have the same sexual health needs as others, plus specific considerations. Finding affirming healthcare providers is important. Trevor Project: 1-866-488-7386 (crisis support for LGBTQ+ youth).</div></div>
</div>
<div class="highlight-box">
  <div class="hb-head">Decision-Making Framework for Relationships</div>
  <p>Healthy relationships share several qualities: mutual respect, trust, honesty, equality, safety, and the freedom to maintain your own identity and friendships. Warning signs in any relationship — romantic, friendship, or otherwise: pressure to change who you are, jealousy framed as love, isolation from other relationships, disrespect of your "no," and control of your time or communication. If something doesn't feel right, it probably isn't. Trusted adults, school counselors, and hotlines (loveisrespect.org, 1-866-331-9474) can help.</p>
</div>
<div class="checklist">
  <div class="check-item"><span class="ci-icon">🏥</span><span><strong>Health departments</strong> provide confidential STI testing, contraception, and sexual health services — often free or low cost regardless of insurance or parental status for minors in NC.</span></div>
  <div class="check-item"><span class="ci-icon">💊</span><span><strong>Emergency contraception</strong> (Plan B) is available without a prescription and is most effective within 72 hours of unprotected sex.</span></div>
  <div class="check-item"><span class="ci-icon">📞</span><span><strong>Planned Parenthood</strong> (plannedparenthood.org) and NC public health clinics provide comprehensive sexual health services regardless of income.</span></div>
  <div class="check-item"><span class="ci-icon">🔒</span><span><strong>Confidentiality:</strong> In NC, minors can receive STI testing, treatment, and contraception confidentially without parental consent in most cases.</span></div>
</div>
</div>`,
cultural:`North Carolina uses a "stress abstinence" approach in sex education — teaching abstinence as the preferred choice while also providing information about contraception. Research on abstinence-only vs. comprehensive sex education consistently shows that comprehensive education does not increase sexual activity but does reduce rates of unintended pregnancy and STIs. The CDC and virtually every major medical organization recommend comprehensive sex education. NC's approach is more comprehensive than some states, less comprehensive than others. Understanding how to access services and information outside the classroom is a genuine health literacy skill.`,
quiz:[
  {q:"Consent in sexual activity must be (using the FRIES framework):",choices:["Given once and assumed for future encounters","Freely given, reversible, informed, enthusiastic, and specific — not assumed, coerced, or given while intoxicated or under legal age","Simply verbal agreement without conditions","Implied by relationship status or past behavior"],a:1,fun:"FRIES: Freely given (not coerced), Reversible (can be withdrawn at any time, even during), Informed (both parties understand what they're agreeing to), Enthusiastic (not just absence of 'no'), Specific (for this activity, not all activities). Past consent doesn't mean future consent. Relationship status doesn't mean automatic consent. 🤝"},
  {q:"Why is regular STI testing important for sexually active people?",choices:["STI testing is only needed if you have symptoms","Most common STIs (including chlamydia, the most commonly reported) are frequently asymptomatic — testing is the only way to know your status and prevent unknowing transmission","Testing is only recommended annually for people over 25","STI testing is only available through doctors who require parental notification for minors"],a:1,fun:"Chlamydia, the most commonly reported STI, is asymptomatic in about 70-80% of women and 50% of men. Without testing, people can unknowingly transmit infection for years. Testing is straightforward, often free at health departments, and confidential for minors in most cases in NC. Knowing your status is the responsible choice. 🏥"},
  {q:"In NC, minors can generally access STI testing and contraception:",choices:["Only with written parental consent","Only through their primary care physician","Confidentially without parental consent through health departments and clinics","Only after age 18 for any sexual health services"],a:2,fun:"NC law allows minors to consent to their own STI testing, treatment, and contraception in most cases — the healthcare provider is not required to notify parents. This is a public health approach: confidentiality encourages testing and treatment. Health departments often provide these services free or at low cost. Knowing your rights is part of health literacy. 🔒"},
  {q:"The warning sign most clearly indicating an unhealthy relationship is:",choices:["Disagreements about lifestyle choices or preferences","Spending significant time together","Pressure to change who you are, isolation from other relationships, jealousy framed as love, or disrespect of your boundaries — signs of control rather than care","Having different social circles and friend groups"],a:2,fun:"Healthy relationships support your independence. Unhealthy relationships — romantic or otherwise — often look like love but function as control. Isolation from friends and family, monitoring your communications, jealousy framed as 'I love you so much,' pressure to change your appearance or values. loveisrespect.org and 1-866-331-9474 provide help navigating these situations. 💙"}
]},
]},

{id:'u6', emoji:'🔍', name:'Consumer Health & Year Review', weeks:'Weeks 10–18, Semester 2', lessons:[
{id:'u6l1', day:'S2 Week 10, Day 1', title:'Evaluating Health Information — Navigating a Confusing World',
objectives:['Apply critical thinking to health claims','Identify reliable vs. unreliable health information sources','Understand the difference between correlation and causation in health research'],
content:`<div class="body-text">
<p>You live in a world of infinite health information and spectacular misinformation. Supplement companies, wellness influencers, clickbait health articles, and genuinely peer-reviewed research all exist in the same information ecosystem. Being able to tell them apart is a foundational health skill.</p>
<div class="info-card">
  <div class="ic-head">Evaluating Health Claims — Key Questions</div>
  <div class="ic-row"><div class="ic-key">Who is making the claim?</div><div class="ic-val">What are their credentials? Do they have expertise in the relevant area? Are they selling something? Do they have a financial interest in your belief? A registered dietitian vs. a fitness influencer selling supplements have very different expertise and incentives.</div></div>
  <div class="ic-row"><div class="ic-key">What is the evidence?</div><div class="ic-val">A single study ≠ settled science. Look for: systematic reviews and meta-analyses (analyze many studies together), peer-reviewed research, large sample sizes, replication by independent researchers. "Studies show" without citation is meaningless.</div></div>
  <div class="ic-row"><div class="ic-key">Correlation vs. causation</div><div class="ic-val">Two things can be associated without one causing the other. People who eat breakfast cereal have higher academic achievement — correlation. Does cereal cause academic achievement? Unlikely — families who eat regular breakfast may have other advantageous factors. Always ask: what else might explain this relationship?</div></div>
  <div class="ic-row"><div class="ic-key">Absolute vs. relative risk</div><div class="ic-val">"This supplement reduces cancer risk by 50%!" From what? If baseline risk is 0.2%, a 50% reduction = 0.1% — not very impressive. Always ask for absolute numbers, not just relative percentages.</div></div>
  <div class="ic-row"><div class="ic-key">Who funded the research?</div><div class="ic-val">Industry-funded nutrition research is several times more likely to show favorable results for the funding company's products than independently funded research. Conflicts of interest don't automatically invalidate research — but they're relevant context.</div></div>
</div>
<div class="highlight-box">
  <div class="hb-head">Reliable Health Information Sources</div>
  <p><strong>High reliability:</strong> CDC (cdc.gov), NIH (nih.gov), Mayo Clinic (mayoclinic.org), American Heart Association, peer-reviewed journals via PubMed (pubmed.ncbi.nlm.nih.gov), WHO (who.int).</p>
  <p style="margin-top:8px;"><strong>Use with caution:</strong> News articles about studies (often oversimplify or sensationalize), wellness blogs, supplement company websites, social media health content, and anyone selling something they're also telling you to buy.</p>
  <p style="margin-top:8px;"><strong>Red flags:</strong> "Doctors don't want you to know," "one simple trick," dramatic before/after photos, testimonials as primary evidence, products that cure everything, and "natural" as a synonym for "safe."</p>
</div>
<div class="tip-box">
  <div class="tb-head">The Supplement Industry — Buyer Beware</div>
  <p>Dietary supplements are regulated less strictly than medications — companies don't need to prove efficacy before selling. Third-party testing (NSF, USP, Informed Sport certifications) verifies what's in the product but not that it does what it claims. Most supplements with dramatic claims have weak or no evidence supporting those claims. The exceptions: vitamin D and omega-3 fatty acids have meaningful evidence bases. Creatine has solid evidence for strength/power athletes. Protein supplements work as well as food protein — they're convenient, not magic.</p>
</div>
</div>`,
cultural:`The wellness industry in the US generates over $450 billion annually. Much of it sells products, services, and beliefs with little to no evidence base. Gwyneth Paltrow's Goop has been fined for unsubstantiated health claims. "Detox" products and cleanses have no scientific support — your liver and kidneys are your detox system and they work fine unless you have organ disease. The appeal of wellness culture is understandable: people want to feel in control of their health, and conventional medicine often feels impersonal and pill-focused. But the desire for control shouldn't override the demand for evidence. Health literacy means applying the same critical thinking to wellness claims that you'd apply to anything else.`,
quiz:[
  {q:"The difference between correlation and causation in health research matters because:",choices:["Correlations are always unreliable and should be ignored","Two things being associated doesn't mean one causes the other — many correlations have alternative explanations that are more plausible","Only randomized controlled trials provide any meaningful health information","Causation is impossible to establish in human health research"],a:1,fun:"Ice cream sales and drowning deaths are correlated — not because ice cream causes drowning, but because both increase in summer (a confounding variable). Countries with more TV sets per capita have longer lifespans — TV isn't the mechanism; both reflect economic development. Always ask: what else could explain this relationship? 📊"},
  {q:"When evaluating a health supplement company's claims about their product, the most important red flag is:",choices:["The product has a celebrity endorsement","The product is described as 'natural'","The company is using their own research to support efficacy claims, and is simultaneously selling the product — financial conflicts of interest significantly bias research outcomes","The product is expensive"],a:2,fun:"Industry-funded research showing industry-favorable results is dramatically more common than independently funded research showing the same. This doesn't automatically mean the product doesn't work — but it means the evidence is less trustworthy than it appears. Look for independent replication by researchers with no financial stake in the outcome. 🔍"},
  {q:"The distinction between absolute and relative risk matters when evaluating health claims because:",choices:["They measure the same thing in different units","A 50% relative risk reduction sounds dramatic but may represent a tiny absolute difference — from 0.2% to 0.1% risk — context is essential for meaningful interpretation","Absolute risk is always more impressive than relative risk","Healthcare providers only use relative risk to communicate treatment benefits"],a:1,fun:"Drug companies and supplement companies love relative risk percentages — they sound more impressive. 'Reduces heart attack risk by 33%' could mean from 3% to 2% (a 1% absolute reduction) or from 30% to 20% (a 10% absolute reduction). Same relative number, very different real-world impact. Ask for both. 📈"},
  {q:"Which of the following is the most reliable source of health information?",choices:["Popular wellness blogs with large followings","Social media posts from health influencers with medical-sounding titles","Peer-reviewed systematic reviews and meta-analyses from PubMed, or guidance from major health organizations like the CDC and NIH","News articles reporting on individual new studies"],a:2,fun:"Systematic reviews pool many studies and analyze them together — much more reliable than any single study. The CDC, NIH, and WHO base their guidance on this kind of evidence synthesis. Individual studies — especially reported in news articles that often cherry-pick dramatic results — represent one data point, not a conclusion. 'Scientists find X' ≠ 'we now know X.' 🏛️"}
]},

{id:'u6l2', day:'S2 Week 12, Day 1', title:'Year Review — Building Your Personal Wellness Plan',
objectives:['Integrate all course concepts into a personal wellness framework','Demonstrate application of health knowledge to real decisions','Create a sustainable personal health plan for the future'],
content:`<div class="body-text">
<p>This final lesson connects everything from the year into a coherent personal health framework. Health is not a destination you reach — it is a set of daily practices and long-term habits. The goal is not perfection but direction: consistently moving toward better health, knowing what to prioritize, and having the knowledge to make informed choices.</p>
<div class="highlight-box">
  <div class="hb-head">The Foundations That Matter Most — Year in Review</div>
  <p>If you could only do five things for your health, research consistently points to: <strong>regular moderate physical activity</strong> (cardiovascular endurance especially), <strong>adequate sleep</strong> (7-9 hours consistently), <strong>a diet built mostly on whole foods</strong> (plants, proteins, minimal ultra-processed), <strong>strong social connections</strong> (loneliness is as harmful as smoking 15 cigarettes/day by some measures), and <strong>stress management practices</strong> that work for you. These are not glamorous — but they are what the evidence shows, consistently, across decades of research.</p>
</div>
<div class="formula-box">
  <div class="fb-head">Building Your Personal Wellness Plan — Framework</div>
  <div class="formula">PHYSICAL: What exercise will you do? When? What's your backup plan for bad days?</div>
  <div class="formula">NUTRITION: What does a realistic healthy eating pattern look like for YOUR life?</div>
  <div class="formula">SLEEP: What bedtime and wake time will you protect? What will you change first?</div>
  <div class="formula">MENTAL: What practices help you manage stress? Who is in your support network?</div>
  <div class="formula">DIGITAL: What intentional boundaries do you want around technology?</div>
  <div class="formula">PREVENTIVE: When did you last see a doctor? Dentist? When is your next checkup?</div>
  <div class="formula-note">Start with one area. Small, consistent improvements compound over time. You are building a person — don't renovate everything at once. Pick the lever that moves you most.</div>
</div>
<div class="checklist">
  <div class="check-item"><span class="ci-icon">🏃</span><span><strong>Physical activity:</strong> 150 min/week moderate OR 75 min vigorous · 2× strength per week · Consistency over intensity</span></div>
  <div class="check-item"><span class="ci-icon">🥗</span><span><strong>Nutrition:</strong> Mostly whole foods · Adequate protein · Hydrate consistently · Don't fear any macronutrient group</span></div>
  <div class="check-item"><span class="ci-icon">😴</span><span><strong>Sleep:</strong> 8–10 hours (you're 16-17) · Consistent schedule · Phone outside bedroom · Cool and dark room</span></div>
  <div class="check-item"><span class="ci-icon">🧠</span><span><strong>Mental health:</strong> Know your stress signals · Practice evidence-based coping · Reach out proactively · 988 when needed</span></div>
  <div class="check-item"><span class="ci-icon">📱</span><span><strong>Digital:</strong> Intentional use · Phone-free bedroom · Audit your feeds · Notice how you feel</span></div>
  <div class="check-item"><span class="ci-icon">🏥</span><span><strong>Preventive care:</strong> Annual physical · Dental cleanings · Know your health numbers · Vaccinations current</span></div>
</div>
<div class="tip-box">
  <div class="tb-head">The Permission to Be Imperfect</div>
  <p>Wellness perfectionism is counterproductive. People who try to be perfect often give up entirely after any slip — the "all or nothing" trap. The research is clear: consistently doing 60% of the ideal is dramatically better than doing 100% for two weeks and then nothing. Miss a workout — do something small instead of nothing. Eat a bad meal — make the next one better. The goal is the direction of the journey, not the perfection of each step. Small consistent actions over long time horizons build the health outcomes that matter.</p>
</div>
</div>`,
cultural:`Blue Zones researcher Dan Buettner identified that the longest-lived populations in the world don't have gym memberships, diet plans, or wellness apps. They move naturally through their days, eat mostly plants, have strong community bonds, have a clear sense of purpose, and manage stress through faith, family, and rest. The lesson isn't to live like an Okinawan — it's that the fundamentals of human health are deeply simple and deeply human: move, eat real food, sleep, connect, and have something worth waking up for. The wellness industry profits from complexity; your body thrives on basics. This course has been about giving you the knowledge to navigate the complexity and return to the basics with confidence.`,
quiz:[
  {q:"According to research, the five most impactful things you can do for long-term health are:",choices:["Take the right supplements, follow a strict diet, exercise intensively, avoid all processed food, and see specialists regularly","Regular moderate physical activity, adequate sleep, a mostly whole-food diet, strong social connections, and evidence-based stress management","Maximize exercise volume, eliminate all sugar and carbohydrates, meditate daily, avoid alcohol entirely, and take vitamin supplements","Get a gym membership, hire a personal trainer, follow a meal plan, track all macros, and weigh yourself daily"],a:1,fun:"These five consistently appear across the world's longevity research. None of them require money, special equipment, or extreme discipline. They require consistency over time. The unglamorous truth: the basics, done consistently, produce better outcomes than any optimization strategy imperfectly applied. 🌿"},
  {q:"'Wellness perfectionism' undermines health goals because:",choices:["Perfect health is actually unachievable","It motivates people to try harder and maintain higher standards","The 'all or nothing' mindset causes people to abandon entirely after any imperfection — while consistent imperfect action over time produces dramatically better outcomes than perfect action in short bursts","Perfectionism only applies to weight loss goals, not general wellness"],a:2,fun:"The person who exercises 3 times a week for 20 years — even with occasional off weeks — will have dramatically better health outcomes than the person who does a perfect program for 6 weeks and then quits. 'I ruined my diet today, might as well eat terribly all week' is the all-or-nothing trap. The next meal is always an opportunity to make a better choice. 🔄"},
  {q:"A personal wellness plan is most sustainable when it:",choices:["Maximizes every health variable simultaneously for optimal results","Starts with one or two changes, is built around your actual life and preferences, and treats imperfection as normal rather than as failure","Follows a specific expert-designed protocol without modification","Involves purchasing a comprehensive health program with all components included"],a:1,fun:"Behavior change research is consistent: smaller changes are more sustainable than dramatic overhauls. Fitting changes to your actual life (not an imaginary ideal life) is essential. Expecting imperfection and planning for it prevents the all-or-nothing trap. You're building habits you'll have for decades — they need to fit your real life. 🏗️"},
  {q:"The most important lesson about health information from this course is:",choices:["Always trust doctors over any other source of information","Most health information online is dangerous and should be avoided","Apply critical thinking to all health claims — evaluate the source, the evidence quality, potential conflicts of interest, and the difference between correlation and causation — regardless of how credible the source appears","The most popular health approaches are usually the most evidence-based"],a:2,fun:"Critical thinking doesn't stop working when you like the claim. Your favorite wellness influencer, your doctor, the CDC — all deserve the same critical lens: what is the evidence? Who funded it? Does correlation show causation? What are the alternatives? Health literacy is applying intellectual standards to health claims, not just accepting the most authoritative-sounding source. 🔍"}
]},
]},

]};

// ── STATE ──────────────────────────────
const KEY = 'pe_health_course';
let state = JSON.parse(localStorage.getItem(KEY) || '{}');
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
function totalL() { return COURSE.units.reduce((s,u)=>s+u.lessons.length,0); }
function doneL() { return Object.keys(state).length; }
function avgSc() {
  const v = Object.values(state).map(x=>x.score).filter(x=>x!=null);
  return v.length ? Math.round(v.reduce((a,b)=>a+b,0)/v.length) : null;
}
function getLesson(lid) {
  for (const u of COURSE.units) for (const l of u.lessons) if (l.id===lid) return {unit:u,lesson:l};
  return null;
}

// ── SIDEBAR ─────────────────────────────
function buildSidebar() {
  const nav = document.getElementById('unit-nav'); nav.innerHTML = '';
  COURSE.units.forEach((u,ui) => {
    const done = u.lessons.filter(l=>state[l.id]).length;
    const allDone = done === u.lessons.length;
    const sh = document.createElement('div'); sh.className = 'u-sect'; sh.textContent = 'Unit '+(ui+1); nav.appendChild(sh);
    const btn = document.createElement('button');
    btn.className = 'u-btn' + (allDone ? ' done' : '');
    btn.innerHTML = `<span class="u-ic">${u.emoji}</span><span class="u-nm">${u.name}</span><span class="u-ck">${done>0?(allDone?'✓':done+'/'+u.lessons.length):''}</span>`;
    btn.onclick = () => document.getElementById('ll_'+u.id)?.classList.toggle('open');
    nav.appendChild(btn);
    const ll = document.createElement('div'); ll.className = 'lesson-list'; ll.id = 'll_'+u.id;
    u.lessons.forEach(l => {
      const d = state[l.id];
      const lb = document.createElement('button');
      lb.className = 'l-btn' + (d ? ' done' : '');
      lb.innerHTML = `<span>${l.title.substring(0,28)}${l.title.length>28?'…':''}</span>${d?`<span class="l-sc">${d.score}%</span>`:''}`;
      lb.onclick = () => showLesson(u.id, l.id);
      ll.appendChild(lb);
    });
    nav.appendChild(ll);
  });
  document.getElementById('stat-done').textContent = doneL()+'/'+totalL();
  const a = avgSc(); document.getElementById('stat-avg').textContent = a!==null ? a+'%' : '—';
  document.getElementById('prog-chip').textContent = doneL()+' / '+totalL();
}

// ── WELCOME ─────────────────────────────
function showWelcome() {
  document.getElementById('tb-title').textContent = 'Healthful Living & Physical Education';
  document.getElementById('tb-crumb').textContent = 'Course 7 · 0.5 Credit · Full Year · NC Healthful Living Standards';
  const cards = COURSE.units.map((u,ui) => {
    const done = u.lessons.filter(l=>state[l.id]).length;
    const pct = Math.round(done/u.lessons.length*100);
    return `<div class="u-card" onclick="showLesson('${u.id}','${u.lessons[0].id}')">
      <div class="uc-ic">${u.emoji}</div>
      <div class="uc-tt">Unit ${ui+1} — ${u.name}</div>
      <div class="uc-wk">${u.weeks}</div>
      <div class="uc-bar"><div class="uc-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
  document.getElementById('content').innerHTML = `
    <div class="w-hero">
      <div class="w-tag">Course 7 · Calming Minds Day School · 2026–27</div>
      <div class="w-title">Healthful Living<br>& Physical Education</div>
      <p class="w-sub">The science of fitness, nutrition, sleep, mental health, stress, and smart health decisions — everything you need to build a healthy life on your own terms.</p>
    </div>
    <div class="u-grid">${cards}</div>`;
}

// ── LESSON ──────────────────────────────
let curUid=null, curLid=null, qa={}, submitted=false;

function showLesson(uid, lid) {
  const found = getLesson(lid); if (!found) return;
  const {unit, lesson} = found;
  curUid=uid; curLid=lid; qa={}; submitted=false;
  document.querySelectorAll('.lesson-list').forEach(el=>el.classList.remove('open'));
  document.getElementById('ll_'+uid)?.classList.add('open');
  document.getElementById('tb-title').textContent = lesson.title;
  document.getElementById('tb-crumb').textContent = `${unit.name} · ${lesson.day}`;
  const saved = state[lid]; const L=['A','B','C','D'];
  const qHtml = lesson.quiz.map((q,qi) => `
    <div class="q-card">
      <div class="q-num">Question ${qi+1} of ${lesson.quiz.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.choices.map((c,ci) => `<button class="choice" id="ch${qi}_${ci}" onclick="pick(${qi},${ci})">
        <span class="c-ltr">${L[ci]}</span><span>${c}</span>
      </button>`).join('')}
      <div class="feedback" id="fb${qi}"></div>
    </div>`).join('');
  const banner = saved
    ? `<div class="score-banner show"><div class="score-big">${saved.score}%</div><div class="score-msg">${msg(saved.score)}</div></div>`
    : `<div class="score-banner" id="score-banner"></div>`;
  const allL = COURSE.units.flatMap(u=>u.lessons.map(l=>({uid:u.id,lid:l.id})));
  const idx = allL.findIndex(x=>x.lid===lid);
  const prev = idx>0?allL[idx-1]:null; const next = idx<allL.length-1?allL[idx+1]:null;
  document.getElementById('content').innerHTML = `
    <div class="l-header">
      <div class="l-unit-tag">${unit.emoji} ${unit.name} · ${unit.weeks}</div>
      <h2>${lesson.title}</h2>
      <div class="l-meta">${lesson.day} · Calming Minds Day School · 2026–27</div>
    </div>
    <div class="obj-box">
      <div class="obj-head">Today's Objectives</div>
      <ul>${lesson.objectives.map(o=>`<li>${o}</li>`).join('')}</ul>
    </div>
    <div class="section">
      <div class="sec-head">Lesson Content</div>
      ${lesson.content}
    </div>
    <div class="section">
      <div class="sec-head">Historical & Cultural Context</div>
      <div class="highlight-box"><div class="hb-head">Context</div><p>${lesson.cultural}</p></div>
    </div>
    <div class="quiz-wrap">
      <h4>Lesson Quiz 🌿</h4>
      <div class="quiz-sub">${lesson.quiz.length} questions · Submit to save your score</div>
      ${banner}
      ${qHtml}
      <button class="sub-btn" id="sub-btn" onclick="submitQ()" ${saved?'disabled':''}>
        ${saved?'Already Submitted ✓':'Submit Answers'}
      </button>
    </div>
    <div class="lesson-nav">
      ${prev?`<button class="nav-btn nav-prev" onclick="showLesson('${prev.uid}','${prev.lid}')">← Previous</button>`:''}
      ${next?`<button class="nav-btn nav-next" onclick="showLesson('${next.uid}','${next.lid}')">Next Lesson →</button>`:''}
    </div>`;
  if (saved) showPrev(lesson, saved);
  window.scrollTo(0,0);
}

function showPrev(lesson, saved) {
  submitted = true; const L=['A','B','C','D'];
  lesson.quiz.forEach((q,qi) => {
    const sel = saved.answers ? saved.answers[qi] : null;
    if (sel!==null && sel!==undefined) {
      document.getElementById(`ch${qi}_${sel}`)?.classList.add(sel===q.a?'correct':'wrong');
      if (sel!==q.a) document.getElementById(`ch${qi}_${q.a}`)?.classList.add('correct');
      const fb = document.getElementById(`fb${qi}`);
      if (fb) {
        fb.className = `feedback ${sel===q.a?'ok':'bad'} show`;
        fb.innerHTML = sel===q.a
          ? `✓ Correct! ${q.fun ? `<div class="fun-n">💡 ${q.fun}</div>` : ''}`
          : `The answer is ${L[q.a]}. ${q.choices[q.a]}${q.fun?`<div class="fun-n">💡 ${q.fun}</div>`:''}`;
      }
    }
  });
}

function pick(qi, ci) {
  if (submitted) return;
  document.querySelectorAll(`[id^="ch${qi}_"]`).forEach(b=>b.classList.remove('selected'));
  document.getElementById(`ch${qi}_${ci}`)?.classList.add('selected');
  qa[qi] = ci;
}

function submitQ() {
  const found = getLesson(curLid); if (!found) return;
  const {lesson} = found; submitted = true;
  const L=['A','B','C','D']; let correct=0; const answers={};
  lesson.quiz.forEach((q,qi) => {
    const sel = qa[qi]; answers[qi] = sel!==undefined?sel:null;
    const fb = document.getElementById(`fb${qi}`);
    if (sel===undefined) {
      if(fb){fb.className='feedback bad show';fb.textContent='No answer. Correct: '+L[q.a]+'. '+q.choices[q.a];}
    } else if (sel===q.a) {
      correct++;
      document.getElementById(`ch${qi}_${sel}`)?.classList.add('correct');
      if(fb){fb.className='feedback ok show';fb.innerHTML='✓ Correct!'+(q.fun?` <div class="fun-n">💡 ${q.fun}</div>` : '');}
    } else {
      document.getElementById(`ch${qi}_${sel}`)?.classList.add('wrong');
      document.getElementById(`ch${qi}_${q.a}`)?.classList.add('correct');
      if(fb){fb.className='feedback bad show';fb.innerHTML=`The answer is ${L[q.a]}. ${q.choices[q.a]}`+(q.fun?` <div class="fun-n">💡 ${q.fun}</div>`:'');}
    }
  });
  const score = Math.round(correct/lesson.quiz.length*100);
  state[curLid] = {score, answers}; save();
  const banner = document.getElementById('score-banner');
  if(banner){banner.className='score-banner show';banner.innerHTML=`<div class="score-big">${score}%</div><div class="score-msg">${msg(score)}</div>`;}
  const btn = document.getElementById('sub-btn');
  if(btn){btn.disabled=true;btn.textContent='Submitted ✓';}
  buildSidebar();
}

function msg(s) {
  if(s===100) return '🏆 Perfect score!';
  if(s>=90) return '⭐ Outstanding!';
  if(s>=80) return '👍 Great work!';
  if(s>=70) return '📖 Good — review the misses';
  return '💪 Review and retry!';
}

buildSidebar();
showWelcome();
</script>
</body>
</html>
